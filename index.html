政策盛行。【选答】美国奥巴马政府和 特朗普政府都反复挑起贸易摩擦；英国排斥欧盟合作，通过脱欧公投最终决定退欧；欧洲大 陆，以意大利五星联盟党为代表的右翼保护主义政党获得议席数增加；在金砖国家，巴西以 博索纳罗为代表的极右政党上台。\n(1)贸易保护的供给与需求分析\n①尽管国家整体从自由贸易中获益，但在国家内部，自由贸易会造成部分居民的福利水平  绝对下降。S-S定理表明，自由贸易将使一国的丰裕要素报酬上升，稀缺要素报酬下降。 因此，进口替代部门及供应商或稀缺要素所有者的利益集团则会极力鼓动政府采取贸易  限制措施。这是英国“脱欧”和特朗普当选美国总统的民意基础。\n②政府及竞选党派出于竞选或利益集团的考虑，往往成为保护政策的供给者。一方面，政 府面临竞选和连任的压力，因此会提出保护政策以增强竞选优势；另一方面，政府官员 在当选之后，会回馈所代表的经济利益集团。\n③  特殊情况下保护有合理性，但这些规则极易遭到滥用。世界贸易组织规定，允许为维护 国家安全、生态环境和文化多样性而采取贸易保护措施，然而出于国防安全、报复性保 护政策等目标的政策遭到滥用，如特朗普认为钢铁事关国家安全，对钢和铝大幅征税， 引起欧盟等国的不满。\n(2)贸易保护的政治经济学模型\n①中点选民模型\n中点选民的意见指表现为两种意见之间的观点。以中点意见为界，一边保守，另一边激 进，且两边人数一样。政党在制定贸易政策时，往往会争取更多的选票，尽可能靠近中点选 民的意见。如美国的民主党和共和党在对华强硬态度，要求减少美国对华逆差的态度非常一 致，正是中点选民意见。\n②  有效游说模型\n集体行动认为一种政策是否被政府采纳并不在于受益或受损人数的多少，而在于利益集 团的集体行动是否有效。虽然消费者都从廉价进口品获益，但消费者势力分散，缺乏动力组 织起来反对保护；而生产者仅少数几个，能结成势力强大的集团进行有效游说。如美国的甜 菜、甘蔗农场主会集体要求对进口糖征税，但消费者不会为了糖的涨价而组织游说。\n③  竞选贡献与政治贡献\n大多数政府政策的目标是维护其政权的稳定性，所以对于帮助其当选或连任的利益集团， 政府会极力加以保护。政府的保护政策是对利益集团回报，保护利益集团也是保护政府本身。 如特朗普为了兑现对钢铁、汽车等传统制造业的竞选承诺、通过贸易战、税改等方式推动制  造业回流美国，增加传统行业的就业。\n(3)【选答】在全球化逆流涌现、保护主义盛行的当下，中国应当理性对待全球保护主义， 坚定推进改革开放，高举自由贸易和多边贸易合作的旗帜，推进一带一路倡议，为解决全球 经贸治理贡献中国智慧和中国力量。\n(2)如果我们用论述题的思路答，增加一些能力导向，可以先点明保护主义盛行的现象，\n如特朗普的贸易保护、英国脱欧，而后解释“为什么贸易保护没有得到接受”,并引入理论 分析原因(中点选民、有效游说、竞选贡献),分析侧重结合美国的贸易保护战略。根据中 间投票人定理，民主党和共和党竞选口号都会对华强硬要求减少逆差，这是中点选民政策； 消费者势力分散但生产者能够集中起来有效游说，农业保护就比较典型；竞选贡献方面，特 朗普的主要支持者包括传统制造业、中产阶级中下层和白人阶层，为了获得这些选票，特朗 普的贸易战、税改、反移民(在美墨边界筑墙)都是兑现竞选承诺的表现。\n(3)论述题可以答政策建议： 一方面要防范保护主义带来的不利影响；另一方面要推动自 由贸易，破解贸易保护带来的治理难题。\nH 老师的经典题目，经院期末重复考过，所以初试有出现的可能性，且是20分的分值。期 末试题是当年初试的翻版，考到需要会。另外“301条款”、“337条款”需要记下来，初试 或者复试出现一小问“什么是301条款”也不过分。\n特朗普采取保护主义的主要原因就是政治经济学——赢得竞选并保护利益集团。比较关键的 要点是“S-S  定理/特定要素模型+贸易保护的政治经济学”。正是由于国际贸易造成了美国 “铁锈州”等传统行业的大幅失业.特朗普“美国优先”的竞选口号才得到空前支持。","knowledge":["国际贸易政策"]},{"id":"2013_8","year":2013,"num":8,"type":"论述","question":"美国某啤酒公司在调查中发现，占30%的狂欢者大约消耗啤酒销量的80%,于是，该公司 在针对狂欢者的广告中展示了石油钻井并成功后两个狂欢镜头，还有年轻人在沙滩冲浪后， 开怀畅饮的镜头，塑造了一个“精力充沛”的形象，从而成功占据了啤酒豪饮者的市场达十 年之久。综合该公司的做法，阐述有效细分的条件及市场定位的步骤。\n\n(1)市场细分指将消费者市场根据一定变量细分为子市场，常见的细分方法包括地理细分、 人口细分、心理细分、行为细分、效用组合细分。有效市场细分的条件包括","answer":"(1)市场细分指将消费者市场根据一定变量细分为子市场，常见的细分方法包括地理细分、 人口细分、心理细分、行为细分、效用组合细分。有效市场细分的条件包括\n①、可区分性：在不同的子市场间，在概念上可以清楚地加以区分。啤酒豪饮者市场属 于啤酒市场的一个子市场，可以详细区分出来。\n②  可测量性：细分后子市场大小及其购买力的数据资料应能够加以测量和推算。美国 某啤酒公司的调查结果，证明该子市场是可以测量的。\n③可进入性：企业细分后的子市场应能够借助营销努力达到进入的目的，企业的营销 组合策略等能够在该市场上发挥作用。啤酒公司成功占据啤酒豪饮者市场说明这个 市场之前的竞争并不特别激烈，产品和信息可以通过渠道到达目标市场，细分市场 是可以进入的。\n④可盈利性：细分后的市场有足够的需求潜量且有一定的发展潜力，其规模足以使企 业有利可图。30%的狂欢者可以消耗约80%的啤酒销量，说明这是啤酒市场中一个 可盈利的巨大的市场。\n【选答】啤酒公司将“狂欢者”作为消费群体，是一种行为细分，狂欢是一种庆祝活动，将狂 欢作为特定的消费时机与场景，不同年龄、不同职业、不同地区和州的消费者都可狂欢，这\n些消费者构成一个细分市场。\n(2)市场定位指企业为了使自己的产品获得稳定的销路，要从各方面赋予产品一定的特色， 梳理产品鲜明市场营销，形成稳定的认知和特殊的偏爱。市场定位的步骤包括：\n①确认本企业的竞争优势。这一步骤的中心任务是回答以下三大问题：竞争对手的产 品如何，目标市场上足够数量的顾客满足程度如何以及还需要做什么;针对竞争者 的市场定位和潜在顾客的真正需要。美国某啤酒公司发现了啤酒豪饮者这一细分市 场，并通过调研明确了顾客需求，并与本产品相结合。\n②准确地选择相对竞争优势。相对竞争优势表明了企业能够胜过竞争者的现实和潜在 能力。美国某啤酒公司的调研能力和数据分析能力，和广宣传都充分展示出自身相 对与其他企业的竞争优势。\n③明确独特的竞争优势。这一步骤的主要任务是企业要通过一系列宣传促销活动，将 其独特的竞争优势准确传达给潜在顾客，在顾客心中留下深刻印象。美国某啤酒公 司的广告，充分向啤酒豪饮者传达了自身的独特竞争优势，并以此占据了细分市场。\n(2)这个营销案例体现的管理学理念称为“二八法则”,比如，前20%的客户会贡献80%的 利润，20%的员工会创造80%的业绩，因此，企业需要把主要精力放在前20%。对庞大的企业 来说，尤其需要找到什么是最关键的20%——对宝洁来说，众多小品牌重要吗?对固特异来  说，广撒网的中小经销商重要吗?企业需要集中精力处理给自己带来最大收益的关系，避免  把精力浪费在不重要的资源上。\n原题问的是市场细分和市场定位，而 Position   ing  也有体现，把主要资源用在啤酒豪饮者身 上 ， 是 一 种 集 中 性 市 场 营 销 战 略 。","knowledge":["综合"]},{"id":"2013_9","year":2013,"num":9,"type":"案例","question":"中国光伏产业反补贴 中国光伏产业在短短十年内经历了从无到有、由小到大、盛极而衰而衰的过程。2005 年底到2008年，仅尚德公司的产能从10多兆瓦增至1000多兆瓦，跃升至全球第一。尚德 的掌舵人施正荣2006年被“福布斯”评定为中国首富。2012年，美国参议员致奥巴马总统 的信中提及，中国产品在可再生能源市场中越发占据主要地位，中国光伏组件量在 2006-2010年间增加了1593%,占据了全球60%总量，但市场预测，包括尚德公司在内的中 国企业将大幅倒闭，预计2013年后中国三线光伏组件企业将基本消失，市场被一、二线品","answer":"中国光伏产业在短短十年内经历了从无到有、由小到大、盛极而衰而衰的过程。2005 年底到2008年，仅尚德公司的产能从10多兆瓦增至1000多兆瓦，跃升至全球第一。尚德 的掌舵人施正荣2006年被“福布斯”评定为中国首富。2012年，美国参议员致奥巴马总统的 信中提及，中国产品在可再生能源市场中越发占据主要地位，中国光伏组件量在2006-2010 年间增加了1593%,占据了全球60%总量，但市场预测，包括尚德公司在内的中国企业将大 幅倒闭，预计2013年后中国三线光伏组件企业将基本消失，市场被一、二线品牌占据有专 业人士认为，中国光伏产品制造还是一个相对初级的行业，依赖于大规模扩张和低价获得现 在的行业地位，多年来总体技术方法都没有改变过，现在市场正逐步走向成熟，对研发和技 术创新能力的要求提高了，没有品质和技术含量的就算价格低也很难找到顾客，在众多企业 纷纷倒闭之时，浙江某企业却与美国光伏组件商业系统解决方案商 Solar Planet Power 公司\n达成高效供应协议，该公司推出的高瑞产品深受国外市场喜爱。中国企业还要面对美国的贸 易壁垒，Solar World Industries America Inc联合其它6家美国光伏企业，向美国商务部和国 际贸易委员会提起诉讼，称中国政府向国内生产企业提供非法补贴，要求对中国的光伏产品 展开双反调查。在反倾销调查终栽结果中，尚德被判定倾销幅度为31.73%,在反补贴方面， 尚德被判定接受补贴14.78%。\n但是，美国政府对光伏发电却同样采用了初投资补贴税收优惠和“净电表法等支持施。 美国37个州给予光伏发电项目初投资补贴或电价补，在26个州有税收优惠政策，对于居 民房屋的光伏项目，减免比例为10%-100,最高减免额度可以到20000美元。金融危机后， 美国启动8000亿美元的救市计划，其中包括960亿美元用于可再生能源的税收补偿金，希 望通过税收补偿刺激可再生能源发电的市场。\n(1)  什么是反补贴措施?美国政府大量补贴了美国光伏产业，为什么还对中国企业实施 反补贴措施?中国政府应如何应对?(10分)\n反补贴措施指出口国企业的产品在本国得到直接或间接地补贴，伤害了进口国同类或相 同产品的国内产业，进口国政府可对进口产品征收反补贴税。\n美国反补贴的实质是保护主义，滥用反补贴手段维护自身利益，具体原因包括：\n①  中国光伏产品出口的快速增长与贸易顺差，冲击美国贸易平衡，导致美国贸易保护主义 不断加强，通过反倾销手段限制进口，试图扭转贸易赤字。\n②美国经济衰退，增长乏力，失业问题凸显。美国劳动力成本大大高于中国，与中国出口 的同类光伏产品相比，其国内产品在价格上处于不利地位。美国通过反补贴税保护国内 光伏产业，维持就业率，并抑制经济衰退。\n③美欧国内光伏产业利益集团进行游说活动争取贸易保护政策。美国光伏企业、生产互补 性产品的企业和为光伏产业提供投入的企业，它们规模通常较大、易聚集在一起，具有 强大的游说力量。\n中国的应对措施包括：\n①  政府层面\nA.    通过对外谈判施加积极影响。与美国就光伏产业补贴问题进行谈判，在外交领域施 加正面影响，达成反补贴互惠条款，减轻两国损失。\nB.    加强对光伏产品出口企业的管理。规范出口秩序，禁止出口企业低价竞销，控制光 伏产品出口增速，将低价竞争力转变为高质量竞争力。\nC.    建立光伏产品价格监控体系。追踪美国的反补贴调查情况，了解光伏产品成本、产 能、利润、价格数据，及时发出预警措施。\nD.    培育国内市场对光伏产品的需求。减少光伏产业“两头在外”的对外依赖，培育国内 需求，带动光伏产业的良性发展和竞争力提升。\n② 行业方面\nA.   发挥行业协会的协调作用，加强行业自律，维持出口秩序。\nB.    为企业应诉提供相应的咨询和法律援助，建立反倾销反补贴咨询机构，深入研究反 补贴法律，总结经验和对策，提高企业应诉能力。\nC.    建立反倾销应诉基金。从光伏企业的利润中提取一定比例上缴协会，当企业遇到反 补贴案例时由行业协会拨付资金，降低企业应诉成本。\n是美国故技重施。\n(2)原因分析和应对措施在韩玉军论文《美欧对华光伏产品反倾销成因与影响》都有详细 分析，把论文中的“反倾销”换成“反补贴”修改语言。\n(3)反补贴认定的条件包括：①补贴存在；②补贴产品造成了损害；③补贴和损害之间存 在关联。反补贴认定条件更多属于国际商法问题，如何应诉?可以通过提出美方的计算价格  不合理，补贴产品没有造成损害，或者补贴和损害之间没有联系(比如曾有对中国盐产品进  行双反调查，但中国出口盐主要用于工业，不会对食用盐行业造成损害),国商不涉及这些。 审题与思路：应对措施包括政府、行业、企业层面，第三问需要答企业层面的对策，所以第 一问可答政府方面，或者“政府+行业”层面。有些对策是放在行业或企业层面都行，比如  培 养 人 才 问 题 等 。","knowledge":["国际贸易政策","跨国公司与国际化"]},{"id":"2013_10","year":2013,"num":10,"type":"案例","question":"日本和美国的企业文化 日本电子产业在世界各地建立跨国公司，如美国、欧洲等。但文化差异产生了问题，如 美国人注重眼前利益，日本人注重长远利益。以及日本公司怎样与当地经营策合，发展终身 雇佣制等等。 (1)日本文化和美国文化有什么不同?(8分) (2)日本在美国等地推行终身雇佣制度，是否会成功?为什么? ( 5 分 ) (3)结合以上案例，说明国际贸易和国际投资的关系。(6分) (4)中国进行对外投资建立跨国公司应从日本借鉴什么?(6分)","answer":"日本电子产业在世界各地建立跨国公司，如美国、欧洲等。但文化差异产生了问题，如 美国人注重眼前利益，日本人注重长远利益。以及日本公司怎样与当地经营策合，发展终身 雇佣制等等。\n(1)  日本文化和美国文化有什么不同?(8分) 引入霍夫斯泰德文化维度分析美日文化不同。\n① 权 力 距 离 指 数\n权力距离 ( Power Distance Index) 指社会中地位低的人对于权力在社会或组织中不平 等分配的接受程度。权力距离指数越高，对不公平的接受程度越高。日本有较高的权力距离， 上下级观念比较强，下级必须服从上级；美国权力距离指数低，上下级间较为平等。\n② 不确定性规避\n不确定性规避 (Uncertainty Avoidance Index) 指受到不确定的事件和非常规的环境威 胁时是否通过正式的渠道来避免和控制不确定性。不确定规避指数高的文化追求稳定，反对 偏激与冒险。而不确定性规避程度低的文化对待反常行为较为宽容。日本文化反感不确定性， 倾向于稳定、安全，缺少冒险精神。而美国对冲突和不确定更加包容，鼓励冒险与创新。\n③ 个 人 主 义 和 集 体 主 义\n个人/集体主义 (Individualism vs Collectivism) 维度是衡量社会关注个人的利益还是关 注集体的利益。个人主义文化中，人们倾向于关心自己及小家庭；而集体主义文化注重族群 内关系，关心大家庭。日本集体主义精神较强，强调集体的地位而可能忽视个人的作用；美 国个人主义强，突出个人的才华，鼓励个人实现追求实现自我价值。\n④男性化与女性化\n男性化与女性化 (Masculinity vs Femininity) 指社会代表男性的品质如竞争性、独断性 更多，还是代表女性的品质如谦虚、关爱他人更多，以及不同性别之间的分工界限。男性度 指数越高，说明男性气质越突出。日本男性度指数高，性别分工更加明显，强调竞争性与独 断性；美国男女相对平等，不同性别都能追求职业成就。\n⑤ 长 期 取 向 和 短 期 取 向\n长期取向与短期取向 (Long-term vs Short-term) 指对延迟其物质、情感、社会需求的 满足所能接受的程度。长期取向越高，则越能牺牲当下换未来的满足。日本偏向于长期取向， 能够以现在的隐忍换取未来的满足；美国偏向于短期取向，注重当下而解决现实问题。\n⑥自我放纵与约束\n自身放纵与约束( Indulgence vs Restraint) 指对人基本需求与享受生活享乐欲望的允许 程度。放纵指数越大，社会对任自放纵的允许度越大。日本文化侧重自我管制和约束，反对 享乐主义；美国文化对自我放纵更加宽容，鼓励享乐与消费。\n有些和我们的认知并不相符，如日本的权力距离指数其实和美国相差不大，中国和美国 的男性指数很接近，中国的不确定性规避比美国更低(中国人比美国人更偏好冒险)。但是\n霍夫斯泰德的研究方法本身有局限：霍选择的调查对象是跨国公司员工，后天的教育和工作 经历会抹去国家文化本身的印记。\n①刚性指数高的国家往往雷厉风行，采取封闭社区和强制隔离，更加强制有效，如中国； 柔性化的国家则强调循循善诱，更多体现为引导，如荷兰等西欧国家。\n②集体主义社会强调服从整体的利益，能够遵守防控秩序；而个人主义的国家容易产生对 国家防疫政策的抵制，甚至出现社会混乱。\n③长期取向的社会能够牺牲眼前短暂的经济停滞而维持社会的长远、健康发展，如中国； 短期取向的国家往往更考虑当下，难以放弃短期的经济停滞而把疫情防控摆在首位，如  美国。\n④不确定性规避高的国家可能排斥、压制异常的想法，影响其对待“吹哨人”的态度。 详情可阅读霍夫斯泰德中心(geert hof ste de . com)的文章.有兴趣可阅读。\n(2)日本在美国等地推行终身雇佣制度，是否会成功?为什么?(5分) 不会成功。\n①承上题，日本的终生雇佣制建立在日本文化的基础上：日本强调集体主义，对集体归属 感强，日本厌恶不确定性，反对冒险，日本更倾向于长期目标，日本能放弃当下的享乐 而获得未来的愉悦。终生雇佣制符合日本的价值取向，收到日本员工欢迎。\n②但是，终生雇佣制不会对美国员工起到类似的激励，美国文化与日本文化相反，美国人 不喜欢集体的束缚，注重个人自由，美国人喜欢冒险，职业流动性大，与终生雇佣相比， 美国人更注重短期目标实现，美国人更愿意现在放纵享受而不是现在忍受去换取未来的 职业稳定或退休待遇。所以，在美国推行终生雇佣制缺乏文化基础，行不通。\n③ 日本应该根据美国的文化特性管理在美国的子公司，如更加强调扁平化管理  (PDI小),充分吸纳员工意见、给予员工更大自主权(IDV 高),鼓励员工提出新方案、 反对因循守旧(UAI小),建立明确的绩效激励制度 (LTO 小而IND 大)。\n(3)  结合以上案例，说明国际贸易和国际投资的关系。(6分)\n①国际直接投资与国际贸易的替代效应\n支持 FDI替代贸易的理论包括要素禀赋理论、产品生命周期理论、国际生产折中理论和 水平型跨国公司理论。当FDI是水平型时，意味着跨国公司在不同国家生产相同的产品或服 务 ，FDI 与对外贸易是替代性的FDI和贸易的最终选择取决于母公司规模经济、交易成本和 子公司规模经济间的权衡，高运输成本和子公司强的规模经济效应偏好水平型 FDI。\n②国际直接投资与国际贸易的互补效应\nFDI 和贸易间的互补关系一般存在于垂直型FD中在垂直型跨国公司的情形中，公司总 部与产品的生产分设在不同国家。一方面，公司总部要向工广提供各项必须的总部服务导致 了公司总部所在国向工厂所在的出口。另一方面，工厂生产出来的最终产品会被销售回总公 司所在国，所以 FDI与贸易形成了互补关系。\n③国际直接投资与国际贸易的转移效应\n实例如日本与“亚洲四小龙”对中国大陆的大量投资与产业转移，这些经济体对美出口大\n量转移到中国，使原来这些经济体对美国的大量出口及顺差转变成了中国对美国的大量出口 及 顺 差 。","knowledge":["跨国公司与国际化"]},{"id":"2014_1","year":2014,"num":1,"type":"简答","question":"简述蒙代尔一弗莱明模型的基本内容，并指出其局限性。","answer":"美国经济学家蒙代尔和弗莱明运用凯恩斯主义IS-LM-BP 曲线，研究斯旺曲线模型提出 的政策性难题，探讨了不同汇率政策(固定与浮动汇率)和不同的国际资本流动性(完全与 不完全流动)下，货币政策和财政政策的有效性会出现大相径庭的结果。在浮动汇率制度下， 货币政策有效而财政政策无效。在固定汇率制度下，财政政策有效而货币政策无效。\n(1)模型假设\n①小国开放经济；\n②  总供给曲线是水平的，意味着产出完全由总需求水平决定，名义汇率和实际汇率之间不 存在差别；\n③即使在长期，购买力平价也不存在。因此，浮动汇率制度下汇率完全依据国际收支状况 进行调整；\n④不存在汇率将发生变动的预期，投资者风险中立。\n(2)模型内容：不同汇率体制下，宏观政策的效果是完全不同的。在浮动汇率制度下，货 币政策有效而财政政策无效。在固定汇率制度下，财政政策有效而货币政策无效。\n(3)理论评价 优点：\n①开放经济条件下制定宏观政策的最重要理论之一，说明汇率制度选择对政策制定有重要 影响；\n②在蒙代尔弗莱明模型的基础上形成了不可能三角：在维持固定汇率制度、允许资本自由 流动和保持货币政策独立性三个目标间，只能同时实现两个。\n缺点：\n①模型假定满足马歇尔-勒纳条件。蒙代尔弗莱明模型只是短期模型，而短期内ML 条件 很难满足；\n②模型的理论基础是凯恩斯主义的需求分析，而忽视供给方面的因素的影响。模型实际上 假定总供给曲线在实现充分就业以前是水平线，所以总需求扩张就可以使产出增长，在 政策分析中基本没有考虑价格等因素的作用；\n③模型忽略了资本流量和存量之间的关系，认为经常项目的逆差可以由资本账户的顺差加 以平衡，但实际上如果一国的经常账户长期逆差，则对债务不断积累，影响融资能力；\n④其它缺陷：认为利率是唯一决定国际资本流动的因素，实际上国际资本流动不完全取决 于利率差异。资产组合投资中的风险和收益等因素会共同决定资本存量调整，从而引起 资本在国际间的流动。\n(1)财政政策的作用\n①对内部均衡：扩张性财政政策会导致总需求增加，进而在乘数作用下引起产出和国民收入 增加，就业增加、失业减少。反之，紧缩性的财政政策引起国民收入水平下降，物价水平降 低，财政政策对内部均衡作用明确。\n②对外部均衡：扩张性的财政政策会因需求增加引起国民收入增加，引起进口增加，从而导  致经常项目收支恶化；另一方面会带来利率上升，吸引资本流入，资本和金融项目改善。综  合这两个方面，扩张性财政政策对外部平衡的方向不明确，同理，紧缩性政策影响也不明确。\n(2)货币政策的作用\n①对内部均衡：如果采取扩张性货币政策，货币供给增加，利率下降，进而刺激消费和投资  支出增加，引起国民收入水平提高，增加就业，反之，紧缩性的货币政策会使国民收入下降， 物价水平降低。\n②对外部均衡：如果采取扩张性的货币政策，则利率下降一方面会通过刺激消费和投资支出 增加提高国民收入水平，导致进口增加，使得国际收支恶化，另一方面利率下降也会导致资 本流出，从而使资本和金融项目恶化，因此，货币政策对外部均衡的影响是确定的。\n因此.蒙代尔政策搭配原则主张.用货币政策调节外部均衡而用财政政策调节内部均衡。","knowledge":["国际金融"]},{"id":"2014_2","year":2014,"num":2,"type":"简答","question":"简述对外直接投资的类型和特点。","answer":"对外直接投资( Outward  Foreign  Direct   Investment,OFDI),与国际直接投资流入(IFDI) 相对，指本国投资者获取外国资产并掌握控制权、或在外国新设子公司的投资行为。\n(1)按股权比例的不同：分为独资经营、合资经营与合作经营\n①独资经营指由本国企业拥有海外子公司全部股权和经营权。独资经营能够保护公司技术、 独享全部利润、减少控制权争端、积累经验曲线，但也面临成本高、风险大的问题。\n②合资经营指共同投资各方按一定比例的股份出资，共同组建独立法人地位、独立核算、 独立经营的企业。合资经营能够向合作者学习经验，具有分摊经营风险、获得政策便利 和优惠等优势，但也面临技术保护、控制权争端等问题。\n③   【选答】合作经营指本国企业在外国与当地投资者共同成立经济实体，不同于独资与合  资的股权模式，合作经营的资本、风险、收益等问题完全由合同规定，故称契约式合营。\n(2)按是否新建企业分为跨国并购和绿地投资\n① 绿 地 投 资 (Greenfield   Investment): 跨国公司在东道国境内依照东道国的法律新设的部 分或全部资产所有权归外国投资者所有的企业。尽管绿地投资成本高、周期长，但不存\n在旧企业遗留问题和资产高估风险。\n②跨国并购 ( Merger&Acquisition):  跨国兼并和收购的总称，兼并指原来不同国家企业 的资产和经营结合成一个新的法人实体，收购指本国企业购买东道国企业的资产或股份 并控制或影响东道国企业经营的行为。并购不需新建或创建企业，又称为“棕地投资”。 并购能够快速进入市场并实现运营，但面临整合困难等挑战。\n(3)按国际分工所处的环节分为水平型投资、垂直型投资和混合型投资\n①水平型直接投资，指到海外投资生产或销售同一类型的产品或服务的企业，所投资的企 业与投资母公司处于价值链的相同环节，这种投资行为具有贸易替代效应。\n②垂直型直接投资，指到海外投资处于相同行业的不同生产阶段的企业，所投企业与母公 司处于价值链的不同环节，相互间有上下游买卖关系，这种投资行为具有贸易互补效应。\n③混合型投资，指在性质上不是完全的水平或垂直关系，即母公司需要所投资的企业生产 自己不能生产的产品，但又具有生产和销售有关产品的业务关系。\n(4)按投资的目的分为资源寻求型、市场寻求型、效率寻求型、战略资产寻求型。\n①资源寻求型：指企业为了获得东道国自然资源、掌控资源供应的投资行为。\n②市场寻求型：指投资的动机是占领海外市场，存在贸易壁垒时容易产生这种投资。\n③效率寻求型：指企业投资目标是利用东道国廉价的生产要素，如低成本劳动力；扩大生 产和销售规模，进而实现规模经济。\n④战略资产寻求型：指企业为了寻求先进技术等稀缺资产而进行的FDI。\n(2)问对外投资的类型，而答案和市场进入模式的内容非常接近，实际上考的六种市场进 入模式和并购、绿地投资，要能够熟练默写。","knowledge":["跨国公司与国际化"]},{"id":"2014_3","year":2014,"num":3,"type":"简答","question":"简要说明要素价格均等定理的意义及实现机制；在现实中，各国的劳动工资存在持续的 差异，请结合要素价格均等化的条件说明其原因。","answer":"(1)含义\n要素均等化定理即HOS 定理，也称广义要素禀赋理论，是萨缪尔森对HO 模型的结论 进行数学证明而得名的，是贸易对要素价格的反作用理论，认为国际贸易会使各国要素价格 或要素报酬的差异缩小，包括绝对和相对价格均等化。\n①要素价格相对均等化，即原先要素价格比率不一致的两个国家在发生贸易以后，会逐渐 趋于均等，最后达到完全相等。\n②要素价格绝对均等化，即原先同一种要素的绝对价格在不同国家不相等，在发生贸易后， 会逐渐趋于相等，最后达到完全相等。\nHOS 定理证明了各国要素禀赋存在差异，生产要素不能跨国流动的前提下，贸易可替 代要素的国际流动，间接实现世界范围内资源的最佳配置。另一方面，说明了贸易利益在一\n国内的分配问题，即说明国际贸易如何影响贸易国收入分配格局。\n(2)实现机制\n答案一：韩玉军《国际贸易学》版本(从要素供求机制角度论述)\nHO 模型假定A国是资本丰裕国，资本要素价格低， B 国是劳动丰裕国，劳动要素价 格低。X产品是资本密集产品，Y 产品是劳动密集产品。根据HO 定理，A 国出口资本密集 型产品到B 国，为生产更多X 产品，A 国一部分原用于生产劳动密集型产品Y的要素会转 而用于资本密集型产品X 生产。这一要素转移过程会导致对资本的相对需求增加，对劳动 的相对需求下降。由于A 国的要素禀赋是固定的，要素相对供给不变，资本-劳动相对需求 的增加会导致资本-劳动的相对价格上涨。即丰裕要素资本的价格上涨，稀缺要素劳动价格 下降。B 国则反之，贸易会导致资本-劳动相对需求下降，资本要素价格下降，而劳动价格 上升。这一调整过程会让两国资本劳动相对价格完全相等。\n答案二：海闻《国际贸易》版本(由SS定理推出要素价格均等化)\n假定中国是劳动丰裕国，美国是资本丰裕国，大米和钢铁分别为劳动密集型产品和资本 密集型产品。两个部门的生产中，中国都比美国使用更多劳动，即(L/K)cnina>(L/K)us, 中国两 个部门的边际劳动生产率都低于美国，中国劳动密集型产品的相对价格低于美国，中国劳动 力的相对工资也低于美国劳动力的相对工资。\n中美之间发生贸易，中国大米价格上升而钢铁价格下跌，美国则相反，根据斯托尔珀-  萨缪尔森定理，某一商品相对价格的上升，将导致该商品密集使用的生产要素的实际价格或  报酬提高，而另一种生产要素的实际价格或报酬则下降。因此，中国劳动力均衡工资上升而  资本报酬下降，美国劳动力工资下降和资本报酬上升，中美两国劳动力的相对工资差距缩小。 而产品的价格由生产成本决定，如果两国要素报酬仍然存在不同，生产成本及产品价格之间  差别就会存在，贸易会继续进行，直到两国产品价格和要素价格完全相等。\n(3)中国开放贸易使某些行业中美工人收入之间差距缩小，说明现实中存在要素价格均等 化趋势。然而，现实中要素收益巨大差异。要素价格均等化不成立的原因在于HO 模型的基 本假设难以成立：\n①  要素价格均等化要求满足完全自由贸易使得产品价格最终实现均等。但现实中，由于政 治经济利益冲突造成贸易壁垒广泛存在，同种产品的价格无法均等；此外，影响产品价 格的因素复杂多变，产品价格几乎不可能相同。\n②  HO 模型假定贸易双方技术水平相同且不变。但事实上各国之间技术水平既非相同，又  不是固定不变。发达国家工人的劳动生产率更高(有效劳动),且工人工资的不断增长 更多地来自于生产技术的不断革新，因此，发达国家与发展中国家的工资差距仍然很大。\n③ HO 模型假定生产要素可以在国内跨部门流动。但现实中，生产要素在各国国内也达不 到自由流动，因此即使同一要素价格在一国之内也存在差别。\n④  HO模型假定完全竞争市场和规模报酬不变。这种假设明显脱离现实，规模经济和垄断 的存在会阻碍要素价格均等化的实现。\n【选答】尽管要素价格均等化难以实现，但不能否认这一机制的积极作用，如果没有要素价 格均等的趋势，发展中国家和发达国家的收入差距会比现实更大。\n供求角度分析，不涉及“边际产量”、“边际收益递减规律”等经济学概念，比较适合跨专业 的同学记忆，又出自经院教材，考试时候答肯定给分。\n(2) SC 版本的答案要素价格均等化定理不成立的原因选自克鲁格曼《国际经济学》上册第 66页：假设两个国家生产两种相同的产品；两国技术水平相同；贸易会使得两个国家产品 价格相等，但克鲁格曼的解释原因却并不是“市场价格复杂多变”、“联合需求”、“集中大规 模生产”,所以旧版答案读起来比较费解缺乏一致性，这里更换为海闻第100页的解释，不 建议参考旧版答案。\n这道题和国商2014年的初试题目存在一些差别，如果初试出现则属于比较难的题目。\n(1)美国是个幅员辽阔的国家，不同地区差别很大，国内劳动力不可跨部门流动，且即使 同一制造业部门的劳动力也无法在美国不同地区间充分流动，要素价格无法均等(上一题的 理由③)。回归要素价格均等化的实质，即产品价格均等推要素价格均等，受到运输成本等 因素影响，美国东南部和西部产品也无法均等，况且，东西部的国际贸易开放程度不同，港 口城市受贸易收入分配效应的影响更大，所以要素价格存在差异。\n(2)以上分析的假定是美国东西部技术水平相同，而美国和墨西哥两国的技术水平自然相 去甚远，两国工资差别主要取决于技术水平和劳动生产率差别(上一题的理由②),地理距 离和要素流动不是主要原因。这一点和美国国内的工资差距产生原因有区别——一个是技术 水 平 不 同 、 一 个 是 要 素 和 产 品 不 充 分 流 动 。","knowledge":["国际贸易理论"]},{"id":"2014_4","year":2014,"num":4,"type":"简答","question":"简要说明外资大量流入对东道国贸易条件和比较优势的影响。","answer":"贸易条件指进出口商品的比价；比较优势指一国在生产某种商品上具有相对价格优势； 外资流入即东道国的资本要素大量增加。\n外资流入可以一定程度上改变东道国的要素禀赋，从而对贸易条件和比较优势产生影响。\n(1)如果东道国是资本相对充裕的国家\n根据要素禀赋理论，外资流入前，东道国出口资本密集型产品，外资流入后，东道国的 资本要素更加充裕，根据雷布津斯基定理，东道国会增加资本密集型产品的生产，强化本国 的比较优势，国民收入水平得到提高，国民福利改善。但是，另一方面，东道国增加资本密 集型产品的生产也可能使得本国贸易条件恶化，对本国福利产生不利影响。\n如果东道国是大国，在这种情况下，经济增长的净福利效应取决于上述两种影响效应的 对比。大国出口商品增加会使得产品在国际市场上供过于求，出口商品价格下跌，贸易条件 恶化。极端情况下，贸易条件恶化造成的社会福利损失超过出口增加带来的福利改善，则会 产生“贫困化增长”。\n如果东道国是小国，由于小国是国际市场价格的接受者，资本密集型产品出口增加不会 影响国际市场价格，贸易条件不变，比较优势得到强化。\n(2)如果东道国是资本相对稀缺的国家\n根据要素禀赋理论，外资流入前，东道国进口资本密集型产品，外资流入后，资本要素 增加可能使得原来资本相对稀缺的国家变成资本相对丰裕的国家。当要素禀赋改变以后，东 道国可以发挥新形成的比较优势进行国际贸易，提高福利水平。\n这一题本质和初试题目内涵一致，外资流入是资本单一增加的影响，而人口增长是劳动要素 单一增长的影响。注意，中国是劳动力丰裕国，出口劳动密集型产品，且中国是劳动密集型 产品的出口大国，足以影响国际市场价格，因而这一题不需要分类讨论。\n【复旦学硕：假定布是资本密集型产品，麦是劳动密集型产品，本国是劳动丰裕的小国，在 布的生产方面取得技术突破，使其相对价格低于世界的相对价格，贸易的方向会发生什么变 化?如果会变化这种变化能持续多长时间?】\n上一题考察要素偏向增长，而这一题考察偏向型技术进步的影响，二者类似。\n(1)由于本国进口部门——布的生产出现偏向技术进步，且使得相对价格低于世界市场， 因此本国的比较优势发生改变，本国会出口布。\n(2)然而，出口模式改变并维持的前提是生产技术不发生模仿和国际转移，根据技术差距 论的观点，随着他国逐渐掌握这种技术，本国的出口会逐渐缩小最终消失，贸易分工重回要 素禀赋与比较优势。特殊情况下，如果技术转移足够快，超过国内两部门生产调整的速度， 那么贸易格局不会发生变化。\n(3)正是出于维护本国出口领先地位的考虑，创新国往往会想方设法减缓技术的国际转移， 这是美国对华技术禁运的理论依据。\n这道题综合了技术进步和技术差距论，比前面两题难不少，要根据技术转移的速度分类讨论， 国商考到这题的概率较低，但整体不算超纲。2014年真题和两道扩展题目归纳了四种相似  考点：资本要素增长，劳动要素增长，偏向型技术进步，技术转移。复习过程中可以把四种 情 况 结 合 理 解 。","knowledge":["国际贸易理论"]},{"id":"2014_5","year":2014,"num":5,"type":"简答","question":"列举四种国际人力资源绩效管理的方法，并简要解释。","answer":"(1)排序法：将表现最好的员工和最差的员工选出来，分别放在第一位和最后一位，然后 在剩下的员工中，再选出一名最好的和最差的，把他们分别放在第二位和倒数第二位， 依此类推，直到把评估对象排列完为止。\n(2)配对比较法：配对比较法是将每一个被考评员工都与小组或团体中的其他员工进行比 较，而不是仅仅按照一定的顺序依次比较。\n(3)图表法：它首先要求确定出与被评估者的工作相适应的几项基本评估要素，然后对应 于各项评估要素列出各种程度的选择项。当对员工进行绩效评估时，相对应于每个评 估要素，对员工的工作表现确定出一定的程度，然后对各个要素上的评估结果进行汇 总，即可得出该员工总的绩效评估结果。\n(4)强制分布法：强制分布法是将员工按照事先确定的若干等级分别归入某一级别中的人 员绩效评估方法。实施强制分布法，首先要确定分类等级一级相应的人数，然后将员 工按照绩效归入某一等级当中去。\n(5)目标管理法：目标管理法是通过考察员工工作目标达成程度来实现人员绩效评估的一 种方法。目标管理法一方面强调员工工作成果的重要性，另一方面还强调个人和组织 目标的一致性，尽量减少员工将工作重点移向偏离组织目标方向的情况。\n(6)关键事件法：使用关键事件法进行绩效评估，就是将注意力集中在那些区分有效和无 效工作绩效的关键行为上。\n(7)行为定位评分法：这种方法综合了关键事件法和图表法的主要要素：考评按某一序数 值尺度对各项指标打分，不过，评分项目是某人从事某项职务的具体行为事例，而不 是一般的个人特质描述。\n(8)描述法：描述法也是最简单的绩效评估方法之一，它要求评估者针对员工前面一个阶 段的工作，写一份记叙性材料，描述员工的所长、所短、过去的绩效以及未来的潜能 等，然后提出予以改进的和提高的建议。\n审 题 与 思 路 ： 题 目 要 求 列 举 四 种 ， 则 默 写 4 - 5 种 。","knowledge":["国际商务管理"]},{"id":"2014_6","year":2014,"num":6,"type":"论述","question":"2013年12月1日，某外汇市场上美元的汇率为1欧元元兑1.3586美元，预期一年后的 汇率为1欧元兑1.4129美元(中间价),那么美元兑欧元年预期贬值率为多少?一名外汇交 易员若对此情况用升贴水向客户报价，那么他给出的1年期美元报价(中间价)应是多少?","answer":"(1)2013年12月1日，美元兑欧元汇率为：$1=€1/1.3586=€0.7361 一年后，美元兑欧元汇率为：$1=€1/1.4129=€0.7078\n则美元兑欧元的预期贬值率为：\n由于1年后美元贬值，则应用贴水向客户报价\n1年后美元的贬值额为0.7361-0.7078=0.0283,因此，外汇员给出的1年期美元报价(中间 价)美元贴水283点，汇率为$1=0.7078","knowledge":["国际金融"]},{"id":"2014_7","year":2014,"num":7,"type":"论述","question":"请结合麦当劳在中国的实践来论企业跨国经营管理中如何处理好本地化战略与标准化战 略的关系。\n\n(2)处理二者关系企业在跨国经营管理中，要根据降低成本的压力和地区调适压力的大小来决定采取本地 化战略还是标准化战略。\n(2)本土化方面：星巴克的商业模式是提供更好的体验消费，创造舒适的咖啡办公环境，全球消费者的生活方 式存在差异，往往需要本土化适应不同消费者的需求，所以在标准化的同时，在特色饮品、 咖啡周边产品、门店装修、营销活动等方面需要考虑本土化因素。\n(3)二者关系：不同时期面临的低成本压力和本土化压力不同，本土化和标准化的侧重会 发生变化。","answer":"(1)本土化战略和标准化战略\n①本土战略是根据不同国家的不同市场提供能满足当地市场需要的产品和服务。采用本土 化战略的企业寻求的是地区调适最大化。\n【选答】本土化战略的核心内容：确定各个东道国市场的需求特征，这样就能从各个方面提 高子公司对东道国经营环境的适应能力。\n优点在于：\nA.   跨国公司对东道国的市场需求适应能力强，市场反应速度快；\nB.   可以灵活地适应当地消费者需求和竞争等方面要求；\nC.   容易被当地社会所接纳。\n缺点在于：\nA.  资源分散造成成本上升，跨国公司需要在各主要市场建立不同的营销和生产方式，增加 管理成本；\nB.   子公司自主性强，影响各子公司间的协同，影响知识共享，可能损害企业形象的统一性。\n②标准化战略指跨国公司从全球角度出发，利用不同国家和地区的区位比较优势，把价值 链各个环节和职能加以分散与配置，有机的结合实现综合一体化的经营，努力降低成本，获 得长期利益。采取标准化战略的企业强调的是增加盈利能力。\n【选答】标准化战略的核心：确定什么样的产品是全球产品；怎样在全球范围内合理配置有 限的生产资源，实现全球产品的大规模生产经营；如何通过集权管理和决策，有效协调与控 制全球范围内的生产活动，从而提高企业的经营效率。\n优点在于：\nA..  集中力量建立规模经济优势，将制造活动转移至低成本国家以增强灵活性，有效降低成 本；\nB.   同时增强全球可获得性、全球服务能力和全球知名度，可以加强消费者偏好。 缺点在于：\nA.  全球化需要增强协调、加强报告甚至增加员工，明显引发管理成本；\nB.  过度集中化会损害当地公司的动力和士气；\nC.  产品标准化可能会导致一种产品不能满足任何客户的结果；\nD.  活动集中化可能会降低企业反应速度与灵活性。\n(2)处理二者关系\n企业在跨国经营管理中，要根据降低成本的压力和地区调适压力的大小来决定采取本地 化战略还是标准化战略。\n①麦当劳在进入中国市场前期采用了标准化战略。麦当劳食品在全球各分店的口味和制作 工艺几乎一致，其在中国各大城市迅速扩张门店是为了通过规模经济和标准化经营来降 低成本。\n②麦当劳在进入中国市场后期采取了标准化战略和本土化战略相结合的战略。标准化战略 在降低成本、发挥规模经济效益方面作用巨大，但其弊端是不能满足所有消费者偏好， 因此，标准化战略取得一定市场规模后，很难进一步深入。而本土化战略则根据不同国 家饮食习惯的不同，特别定制不同产品以满足东道国消费者偏好，例如麦当劳在进入中 国市场之后在不同的餐厅都推出了中国特色的标准化的早餐。这样把标准化和本地化结 合起来，便能进一步吸引消费者，提高市场占有率，扩大经营规模。\n③综上，企业在跨国经营管理中，前期进入市场可以采用标准化或本土化战略开辟市场， 取得一定市场地位之后，应将两种战略有机结合为企业赢得更大的发展空间。\n(2)本土化和标准化的基础之一是全球化理论。如果国与国之间完全隔离，则需要本土化 策略。但全球化加速了全球消费文化和生活方式的趋同化：全世界的中产阶级家具都是宜家、 到街头买麦当劳的汉堡、进超市带一瓶可口可乐、上班空余点一杯星巴克、逛街买国际品牌  男装女装。全球化加速了消费方式的传播，购买需求的同质化程度越来越高，所以跨国企业  能够采取标准化战略，降低成本。但是各国之间的边界并不是完全打通的，处于半全球化状  态，所以跨国公司战略选择更可能在标准化和本土化之间，且是一个动态变化过程。\n【改编：结合星巴克的“全球”经营战略说明如何进行标准化和本土化】 把星巴克“在中国”换成了“在全球”,所以分析侧重变成了全球角度。\n(1)标准化方面：\n①星巴克目标市场群体是白领阶层和上班族，收入水平和受教育水平相对较高，全球中产 阶级消费方式存在相似和趋同，所以标准化战略成为可能(可行性);\n②星巴克需要强化国际品牌形象，进而培育消费者的习惯，扩大全球咖啡消费市场(必要 性);和美国不同，有的国家咖啡消费只占饮品市场的很小份额，比如茶是咖啡的替代 品，为了培育咖啡市场和强化偏好，需要吸引消费者转变行为而不是迁就消费者，因此 标准化战略比本土化更合适。\n(2)本土化方面：\n星巴克的商业模式是提供更好的体验消费，创造舒适的咖啡办公环境，全球消费者的生活方 式存在差异，往往需要本土化适应不同消费者的需求，所以在标准化的同时，在特色饮品、 咖啡周边产品、门店装修、营销活动等方面需要考虑本土化因素。\n(3)二者关系：不同时期面临的低成本压力和本土化压力不同，本土化和标准化的侧重会 发生变化。\n①星巴克是中高端的咖啡消费品，需求收入弹性较大，收入下降会减少消费；\n②  当经济下行时，如新冠疫情给全球消费带来了巨大冲击，此时星巴克面临成本压力更大 (被迫关停全球门店),采取标准化战略可以降低成本，适度降价(多发优惠券)还能 稳住部分收入下滑的客户群体，反而有助于增加销售收入；\n③  当经济繁荣时，咖啡购买者的挑剔程度为提高，这时候本土化调试压力更大，标准化产\n品不能满足消费需求，这时候转为本土化策略更可取。\n【案例：可口可乐为什么在80-90年代由强调本土化的战略转变为强调全球标准化的战略? 这种战略有什么局限使得后继者放弃这一战略?】\n同样是饮料，星巴克与可口可乐的特性与定位有些不同，可口可乐是更加大众的消费品，日 常生活中， 一杯星巴克价格是一瓶可乐的10倍，因此，可口可乐更应当降低成本和强化偏 好，扩大销量，实行标准化战略。但是，哪怕再基础的大众产品，也面临本土化的威胁，当\n消费者选择越来越多样，可能会更加偏好口感本土化的饮品，可以喝可乐也可以喝维他柠檬 茶。单纯标准化战略很难获得成功，需要把本土化和标准化结合。\n【如何评价抖音短视频的国际化战略。】\n互联网产品与传统行业又有差别。短视频是一个分享平台，平台使用者也是内容创作者，因 此抖音可“标准化产品”而“本土化内容”,邀请或者培养更多当地网红入驻，扩大短视频 平台的影响力。\n总结：本土化和标准化问题不是抽象的文字描述和固定的套路，除了掌握基本理论，还要结 合 具 体 行 业 、 具 体 企 业 、 具 体 市 场 分 析 ， 仔 细 体 会 。","knowledge":["综合"]},{"id":"2014_8","year":2014,"num":8,"type":"论述","question":"2003年以来，围绕人民币汇率问题，国内很多学者主张，随着进口成本上升和国内投资 需求的增加，中国通货膨胀压力不断加大，宏观经济出现过热苗头。为了抑制通货膨胀压力 和提高货币政策的独立性，应对人民币进行升值，并走向浮动汇率制。随着美国对华贸易逆 差的不断增加，2003年以来，众多美国官员和学者以不同方式提出了人民币升值的要求。 进入2005年，要求人民币升值的呼声逐渐减弱，要求中国政府提高汇率制度弹性和采取扩 张财政政策的呼声越来越大。请运用国际经济学及汇率的基础理论，尝试分析如下问题：\n(2)这道题解释的问题是“为什么人民币低估了”和“人民币低估的不利影响”。认为人民 币升值的观点是购买力平价说。而人民币低估的不利影响是，汇率不能浮动时，若人民币供 不应求，央行不得不被动投放人民币保持币值稳定，损害货币政策独立性，同时还会造成通 货膨胀。2018年经院世界经济案例的课程内容，和本题类似，都是结合内外均衡理论分析。\n(1)保汇率：维持人民币汇率稳定，动用外汇储备进行外汇市场干预。好处：缓解贬值预期，增强投资者信心，避免盲从效应带来过度贬值(或者减轻汇率超调的影 响);企业可避免汇率波动风险，有助于国际贸易和国际投资平稳；代价：维持固定汇率的成本过高，造成外汇储备减少；实际币值与名义汇率扭曲；受到三元 悖论制约，损害货币政策独立性。","answer":"(1)   分析国内学者主张的理论基础。\n①人民币汇率本身存在低估，人民币升值可减少币值扭曲。购买力平价说认为，两国货币  之间的比率应该取决于它们之间的购买力之比。随着国内经济的发展，中国的生产制造  能力提高，国内供给能力增强，使得人民币的国内购买力增强。国际收支说认为，国际  收支引起外汇供求流量变动，进而决定汇率水平及变动。我国的出口导向和吸引外资政  策，造成国际收支经常账户和资本账户的“双顺差”局面，外汇市场人民币需求大。购买  力提高和长期顺差共同推动人民币的实际币值升值，但我国实行盯住美元的固定汇率制， 官方汇率不能市场变化而波动，因此，人民币汇率本身存在低估。\n②长期顺差造成外汇占款规模过大，人民币升值可减轻通货膨胀压力。币值低估使得贸易 维持顺差，人民币升值预期吸引资本流入，进一步积累“双顺差”,造成外汇储备巨额增 长，形成巨额外汇占款。这意味着央行要向市场投放人民币基础货币，市场流动性过剩， 加剧通货膨胀压力。考虑到国内总需求上涨，通胀压力更加严峻。\n③固定汇率制约货币政策有效性，人民币升值可打开宏观调控的政策空间。根据三元悖论， 货币政策的独立性、固定汇率和资本自由流动三个目标只能实现两个，提高开放水平促 进资本自由流动是我国的改革目标，如果维持盯住美元汇率，央行不得不持续增加货币 供给，损害中国货币政策独立性。\n因此，为了减少官方汇率和市场汇率的扭曲、减少顺差带来的经济失衡、缓解国内通胀、 保持我国货币政策独立性，国内学者主张人民币顺势升值，走向浮动汇率制。\n(2)这道题解释的问题是“为什么人民币低估了”和“人民币低估的不利影响”。认为人民 币升值的观点是购买力平价说。而人民币低估的不利影响是，汇率不能浮动时，若人民币供 不应求，央行不得不被动投放人民币保持币值稳定，损害货币政策独立性，同时还会造成通 货膨胀。\n2018年经院世界经济案例的课程内容，和本题类似，都是结合内外均衡理论分析。\n(1)保汇率：维持人民币汇率稳定，动用外汇储备进行外汇市场干预。\n好处：缓解贬值预期，增强投资者信心，避免盲从效应带来过度贬值(或者减轻汇率超调的影 响);企业可避免汇率波动风险，有助于国际贸易和国际投资平稳；\n代价：维持固定汇率的成本过高，造成外汇储备减少；实际币值与名义汇率扭曲；受到三元 悖论制约，损害货币政策独立性。\n(2)保外汇：扩大人民币汇率的浮动区间，不动用外汇储备干预人民币币值或减少干预。\n好处：减少三元悖论制约，释放政策调节的空间；节省外汇储备；完善汇率形成机制，使得 汇率更加接近基本面；\n代价：强化单边贬值预期，容易造成汇率大幅贬值；损害投资者信心，金融市场出现波动； 加剧微观主体的汇率风险。\n支持哪一方观点结合实际情况分析，2018年的政策取向更偏向汇率稳定，而2019年人民币 顺势破7,两个观点都有一定道理。","knowledge":["国际金融","中国对外经济"]},{"id":"2014_9","year":2014,"num":9,"type":"案例","question":"中国商业银行“走出去” 自2004年的商业银行股份制改革至今，中国银行行业的规模与实力经历了爆发式的增 长，在世界金融舞台上占有一席之地。以市值为例，根据bloomberg的数据，截止2012年， 全球市值前10位的银行中，中国拥有4席，与美国持平。工商银行按市值曾为全球最大的 银行。2013《福布斯》全球企业200强，亦将工行置于榜首。然而，庞大的市值与全球化程 度极不相称，中资银行境外资产份额较低，普遍不及5%,利润贡献率更低，不足1%。而以 外资银行中的花旗银行为例，其海外资产占比近50%,更是贡献了60%的利润。2012年11 月 ，Basel 委员会公布的28家全球系统性重要银行中，中国一家入选，与市值和资产规模\n\n(2)国际银行机构模式在商院《国际结算》课程中间会学到，只作了解，有志于从事银行 国际业务的同学可记，普通同学答不出这种亮点。银行国际化的主要模式有以下几种：\n(2)  请从国际商务战略的角度讨论，中资银行在国际化进程中存在的问题和可行的应对 策略。(15分)\n(2)第一条提高国际化水平，很容易联想到跨国指数 TNI 的三个","answer":"自2004年的商业银行股份制改革至今，中国银行行业的规模与实力经历了爆发式的增 长，在世界金融舞台上占有一席之地。以市值为例，根据bloomberg 的数据，截止2012年， 全球市值前10位的银行中，中国拥有4席，与美国持平。工商银行按市值曾为全球最大的 银行。2013《福布斯》全球企业200强，亦将工行置于榜首。然而，庞大的市值与全球化 程度极不相称，中资银行境外资产份额较低，普遍不及5%,利润贡献率更低，不足1%。而 以外资银行中的花旗银行为例，其海外资产占比近50%,更是贡献了60%的利润。2012年 11月，Basel 委员会公布的28家全球系统性重要银行中，中国一家入选，与市值和资产规 模的排名相差甚远。\n近几年来，随着自身实力的提高和中国企业“走出去”步伐加快，中资银行也意识到地强 全球布局性的必要性。无论是大型国有行业银行股份制商业银行还是政策性银行，都积极推 进全球化的战略，在完善全球网点的基础上，参与多起跨国并购，交易的阶段以2006年为 界，此前主要集中在大中华地区以及东南亚等周边地区，规模不大和程度较低，2006年后， 并购的范围扩展到美洲、非洲、欧洲等地区规模和频率均有较大程度的提高。海外并购无疑 极大推动了中国银行全球化的进程。然而，由于不熟悉国际环境，缺乏相应的经验和人才， 加之并购本身具有的风险和复杂性，中资银行并非每一个并购项目上都取得了预期的效果， 还存在部分不完全成功的案例。根据案例内容回答以下问题。\n(1)   中资银行在国际化进程中采取了哪些市场进入模式?请讨论其海外市场进入模式的\n理由?(10分)\n中资银行海外国际化采取了股权型进入模式，即通过收购东道国企业股权或直接在东道 国成立子公司的市场进入模式。股权型模式能实现在东道国的经营并积累经验，市场控制力 较强，但是成本和风险较高，如果失败会面临巨额损失。根据在东道国持股比例不同，股权 模式可分为独资经营和合资经营；根据是否新建企业，可分为并购和绿地投资。\n①跨国并购模式：中资银行发起了多起跨国并购，通过并购方式参股或控股东道国银行， 将其变为中资银行的附属银行或子公司。\nA.   这种模式的好处在于能直接继承东道国银行的资产、客户和资金资源、经营网点及 金融业务经验，快速进入东道国市场；\nB.   与在东道国新建分支行或子公司相比，跨国并购投入的成本较低、风险较小；\nC . 中资银行在东道国新设分行需要经过东道国金融监管机构批准(俗称银行 “牌照”。在金融监管严格、金融开放程度低的国家，外国银行很难获得经营许可， 出于监管考虑，海外并购是更加可行的选择。\n②绿地投资模式：中资银行国际化过程中，还可在东道国成立子公司或海外分支行(如中 国银行在全球成立了50多个海外分行),参与东道国经营。\nA.    绿地投资不存在遗漏问题，最大限度建设自己想要的金融分支机构；\nB.   新设分支行不存在并购东道国银行的资产高估风险；\nC.    设立海外分行使用的是中资银行品牌，以中资银行本身的名义经营业务(而  不是以附属银行的名义),能够强化中资银行的品牌形象扩大中资银行国际影响力。\n在货物出口，和我们《国际商务》讲的市场进入模式不完全一致。\n(2)国际银行机构模式在商院《国际结算》课程中间会学到，只作了解，有志于从事银行 国际业务的同学可记，普通同学答不出这种亮点。银行国际化的主要模式有以下几种：\n①代理行模式：与东道国银行签订业务代理协议，在东道国银行开设账户，建立业务 委托关系，合作开展国际结算业务的模式。\n②代表处模式：海外代表处是商业银行在海外设立的非营业性机构， 一般没有限权独 立开展信贷或资金业务，主要职能协助与代表总部或分行进行业务开拓和管理。\n③附属子银行模式：通过控股东道国外国银行部分或全部股权，而在东道国经营银行 业务的模式。受到经营许可或监管限制无法直接在东道国成立分支行时，银行可采 取控股当地银行实现在当地经营。\n④分支行模式：经东道国监管部门批准，在东道国成立下属分行。\n不难理解，从①到④的控制力和影响力逐渐增强，这几种模式在中资银行国际化过程中都比 较常见，但③和④的市场影响较大，属于比较熟知的投资型模式。比较熟知的银行里面，中 行、工行国际化步伐较快，海外分行数目较多。\n(2)  请从国际商务战略的角度讨论，中资银行在国际化进程中存在的问题和可行的应对 策略。(15分)\n①中资银行的整体国际化水平较低，需要进一步提高国际化水平。中资银行境外资产份额 较低，普遍不及5%,利润贡献率更低，不足1%,远远不及花旗银行等西方金融机构， 未来中资银行要提高国际化水平：\nA.   提高海外资产比重，加大对海外机构的增资，扩大海外机构的信贷规模；\nB.    拓宽海外市场的业务范围，促进信贷、结算、金融市场业务多元化发展，增加海 外营业收入；\nC.   雇佣更多的海外人才，提高海外雇员比重。\n②中资银行的国际化动机不明，应当结合经济动机制定国际化战略。现阶段，中资银行的 动机有：战略跟随，如中国银行在某一城市设立分行，那么主要对手工行、建行、交行 也可能随之进入；配合国家战略，如随着一带一路的倡议推进，沿线国家中资银行分支 机构增加。整体看来，战略作用较强，但国际化本身的市场动机和效率动机尚未突显， 未来，中资银行应借助国际化形成市场和效率优势：\nA.   加快布局海外机构和网点，吸引和积累海外客户，提高市场覆盖率和占有率；\nB.  整合零散的海外资源，加强海外附属子行与分行、代表处之间的合作，形成规模 效益和协同效应，以国际化带动经营效率提高。\n③ 中资银行的国际化竞争力不强，需要参与海外金融市场竞争提高竞争力。中资 银行的资产规模主要来自中国国内的庞大市场，中资银行尤其是国有行在国内处于垄断 地位，但海外发达国家的金融市场发达、金融机构众多、竞争更加激烈。中资银行应当 以国际化倒逼提高自身竞争力提高，不能以国内坐享垄断利润的思维进行国际经营：\nA.   提高自身产品、营销、品牌竞争力，尤其注重凭借在国内形成金融科技优势参与国 际竞争；\nB.  充分学习花旗、汇丰等西方大行的金融业务经验和管理经验并化为己用。\n④  中资银行国际化时机、规模和市场选择不当，国际化步伐需要更加稳健。08年金融危\n机之后，中资银行国际化扩张迎来机遇期，国际化步伐加快，但十年间一直保持较为粗 放增长，缺乏统筹规划。\nA.   明确国际化战略，统筹部署，制定国际化的中期和长期战略；\nB.   时机选择上，中资银行可采取“逆周期”战略，在国外银行收缩时期，加快海外并购； 此时海外金融机构资产价格相对较低，国际化阻力较小；\nC.  规模选择上，中资银行对待竞争激烈的市场，可采取小规模进入，而后逐渐增加投  资；而对待机遇大、外资大行尚未涉足的市场，可采取大规模进入，快速形成优势。\n⑤  中资银行国际化方式相对单一，缺乏不同市场进入模式的综合运用。中资银行国际化以 跨国并购为主，但由于不熟悉环境等原因，造成并购未能达成目标。未来，中资银行应 当合理控制并购风险，综合运用绿地投资等多种国际化方式：\nA.  跨国并购应当防范估价过高风险，注重并购之后的整合与协同问题；\nB.  在重要的地区金融中心，应当主动争取经营牌照，优先通过新设分支行的形式(绿 地投资)实现国际化；\nC.  在难以获得牌照的国家，中资银行可以与当地银行建立代理行关系，借助当地银行 的影响力开展国际业务；\nD.  在具备市场潜力但暂时无法下设分行或并购附属子行的国家，可考虑设代表处或驻 派工作组，积淀合作资源。\n⑥  中资银行的风控与国际化水平不匹配，中资银行应着实提高风险控制能力。金融机构国 际化意味着风险国际化，中资银行面临更加复杂的信用风险、市场风险、利率风险、流 动性风险和操作风险。中资银行应对国际金融风险的能力不足，因此，国际化过程中特 别应当提高风险控制能力：\nA.  优化资本结构，保证资本充足率在适当水平，遵照《巴塞尔协议》等金融行业规则；\nB.  完善金融产品设计，尤其要充分考虑利率变化和市场波动，避免缺陷产品带来损失；\nC.   加强内控制度和风控体系建设，改造业务流程，对信贷审批必须有严格的审批路径， 严格贷前检查和贷后管理，降低不良贷款率。\n(2)第一条提高国际化水平，很容易联想到跨国指数 TNI 的三个指标，即提高海外资产、  海外收入和海外雇员比重。第二条动机不明，思考国际化为中资银行带来了好处吗?并没有 明确感知中资银行国际化为中资银行带来了什么或者实现了什么目标，那么要回归基本理论 探讨国际化的动机——市场、资源、效率等。第三条是必须从组织的国际化推动业务国际化， 倒逼中资银行参与国际竞争，提高自身竞争力，语言表达要斟酌一下政治正确。第四条战略 不当，可以说缺乏明确的理论指导和规划，也可以具体从时机、规模选择等方面考虑。第五 条国际化方式选择，用SC 原答案刚刚好，主要指并购风险管理。第六条风险控制，可从跨  国公司财务的角度分析，如资产负债表管理、税收管理、现金管理，不过银行财务性质有些  特殊，比较难，不能结合银行业务则不必强求。\n审题和思路：答题格式可采取“一条问题+解决方案”,采取对症下药法的思路由问题推解决 对策，一一对应。也可采取“答完所有潜在问题再统一答对策”的格式。其他年份的答案多 用格式二，这道题就用了第一种思路参考。不需要太多，内容详略根据熟悉程度调整，用一 级 小 标 题 后 ， 不 一 定 非 要 二 级 小 标 题 具 体 展 开 。","knowledge":["跨国公司与国际化"]},{"id":"2014_10","year":2014,"num":10,"type":"案例","question":"宜家的OEM 宜家家居经过短短的60多年的时间，已经在全球36个国家拥有商场，在9个国家设立 35个家具生产部门，宜家成功的秘诀归于成本路线与品牌差异路线之外开辟第三条路，即 控制品牌又控制成本，宜家通过纵向一体化和严格的OEM 管理来实现品牌与成本双管齐下， 从而控制着整条价值链。 宜家鼓励全球范围的多家供应商展开自由竞争，只有保证质量的同时能达到低成本的供 应商才有可能得到大额订单。随着亚洲市场特别是中国市场所占的比重扩大，宜家正把越来 越多的产品放在中国等亚洲国家生产，这大大降低了运费对成本的影响。2007年，宜家在 中国的供应商为370家，但是国内为宜家代工的企业利润率在5%左右，而非代工企业利润 率可以达到40%以上，低的也在15%左右，宜家经常和代工企业发生冲突。宜家家居以消费 者需求为导向，鼓励消费者在卖场进行亲身体验，比如拉开抽屉，在地毯上走走，试试沙发 是否舒适等。宜家还实施了“一块钱”冰激凌策略，希望来宜家的人不要空手而回，哪怕是 买一个冰激凌也好。根据案例回答下列问题：","answer":"宜家家居经过短短的60多年的时间，已经在全球36个国家拥有商场，在9个国家设 立35个家具生产部门，宜家成功的秘诀归于成本路线与品牌差异路线之外开辟第三条路， 即控制品牌又控制成本，宜家通过纵向一体化和严格的OEM 管理来实现品牌与成本双管齐 下，从而控制着整条价值链。\n宜家鼓励全球范围的多家供应商展开自由竞争，只有保证质量的同时能达到低成本的供 应商才有可能得到大额订单。随着亚洲市场特别是中国市场所占的比重扩大，宜家正把越来 越多的产品放在中国等亚洲国家生产，这大大降低了运费对成本的影响。2007年，宜家在 中国的供应商为370家，但是国内为宜家代工的企业利润率在5%左右，而非代工企业利润 率可以达到40%以上，低的也在15%左右，宜家经常和代工企业发生冲突。宜家家居以消费 者需求为导向，鼓励消费者在卖场进行亲身体验，比如拉开抽屉，在地毯上走走，试试沙发 是否舒适等。宜家还实施了“一块钱”冰激凌策略，希望来宜家的人不要空手而回，哪怕是买 一个冰激凌也好。根据案例回答下列问题：\n(1)  列举说明宜家的市场营销方法。(7分)\n①服务营销：服务营销是企业在充分认识满足消费者需求的前提下，为充分满足消费者需 要在营销过程中所采取的一系列活动。宜家鼓励鼓励消费者在卖场亲身体验，实施一块 钱冰凌策略，改善消费者在购买过程中的体验。\n②体验营销：体验营销是指企业从感官、情感、思想、行动和关联诸方面设计营销理念， 以产品或服务为道具，激发并满足顾客体验需求，从而达到企业目标的营销模式。宜家 欢迎顾客在卖场进行亲身体验，比如拉开抽屉，在地毯上走走，试试沙发是否舒适等， 都是满足顾客对家居产品的体验需求。\n③口碑营销：指个或群体发起，关于某一特定产品、服务、品牌或组织的双向信息沟通行 为，引导消费者主动传播营销信息。宜家注重产品质量，强调品牌、优质服务、口碑，\n引导消费者积极传播宜家推广的生活方式和理念，是口碑营销的体现。\n口碑营销简单说就是消费者“口口相传”,而不是生产者的主动传播，包括宜家在内的成功 的跨国企业很多都是注重产品质量、服务，形成品牌的口碑，消费者自发传播的口碑更有信 服力。启示要传播长期的口碑，而不仅仅是赚 一 时“快钱”。\n(2)  什么是跨国公司的纵向一体化模式?跨国公司采取纵向一体化可获得哪些优势?(8 分)\n① 含 义\n纵向一体化模式指企业处于控制的目的对为其提供原材料、零部件的其他企业， 一般采 取投资自建、控股或兼并的办法予以控制，以加强企业对原材料供应、产业制造、分销和销 售全过程的管理，使企业在市场竞争中掌握主动，获取各个环节的利润。纵向一体化包括前 向一体化和后向一体化。\nA.   前向一体化是指通过收购和兼并若干个处于生产环节下游的企业，以实现对产品分 销和销售系统的管理和控制。\nB.   后向一体化是指通过兼并和收购处于生产环节上游的企业，以实现对原材料和零件  供应的控制和管理。宜家家居主要采取的是前向一体化和后向一体化相结合的方式， 通过实现对销售系统和生产系统的管理，从而实现对整条价值链的控制。\n② 优势：\nA.   节约交易成本。通过纵向一体化，将原来的市场交易转变为母公司与子公司内部的 交易，可以节约订立市场交易契约的搜寻、谈判等成本。\nB.    保护专利产品和技术。内部交易可防止核心技术扩散，保持企业竞争优势。\nC.   发挥规模经济效应，纵向一体化必然带来企业规模的扩大，充分发挥规模经济效应。\nD.   确保通畅的资源供给渠道纵向一体化减少了上下游企业随意终止交易的不确定性。\n(3)  什么是 OEM? 中国企业如何突破在全球价值链上OEM的定位角色?(10分)\n① 定义：\nOEM 是Original Equipment Manufacturer (原始设备制造商)的缩写，是一种“代工生 产\"方式，指跨国公司不直接生产产品，而是利用自己掌握的“关键的核心技术”,负责设计  和研发、控制销售渠道，具体的加工任务交给别的企业去完成的方式并贴上跨国公司的商标， 因此OEM 又称贴牌生产。\n②全球价值链的含义：\n全球价值链指遍布全球的诸多企业网络相互连接而组成的有序集合，把一项产品或服务 从概念开始经过不同阶段，交付给最终消费者使用之后还要进行最终处理，它是代表全球一 系列专业企业的价值网络。产生背景是国际分工发展到新阶段，由货物贸易演化为任务贸易。\n③中国在全球价值链的定位角色\n中国制造业目前大多还属于“橄形”结构，中国制造企业致力于全球价值链的生产环节。 虽然成为“世界工厂”,但并没有获得太多的价值增值，我国企业处于全球价值链的底端，研 发和营销渠道比较薄弱。\n④中国企业突破在全球价值链上 OEM的角色定位应采取以下措施：\nA.    ( 价值链上游)加快技术创新、提高企业技术水平。中国企业没有掌握“关键的核 心技术”,故只能专注生产，获取较少的价值增值，处于价值链的底端。因此，提 高企业技术水平，增加研发投入，才能由中国制造走向中国创造。\nB.    ( 价值链下游)积极打造品牌。企业要积极培育自身品牌，利用更优质的产品和更 有效的营销吸引费者，培有品牌价值，进一步增加产品附加值。\nC.    ( 价值链下游)提高全球营销能力。营销水平决定了好产品是否能被更多人购买， 只是研发出好产品并不能保证企业的快速发展，好产品还要通过营销卖出去才能真 正形成企业利润，促进企业进一步发展。\nD.  培育集群产业链的核心企业，嵌入全球价值链的核心环节。对于OEM 企业而言， 要主动嵌入业内著名跨国公司所掌控的全球价值链中，并成为其中的一个角色(生 产商、供应商、服务商和合作伙伴等),遵循和学习跨国公司的经营理念与管理方 式，同时还可以充分利用价值链中的资金、技术与管理等资源，提高自身的国际竞 争力和国际化经营水平，以便在全球市场范围内拓展生存空间，终达到实现企业升\n级 的 目 标 。\n宜家具有垄断优势；获得海外市场；形成规模经济，通过0EM 转移生产环节，降低成本；推 广 “ 大 众 化 家 具 ” 的 生 活 方 式 和 商 业 模 式 。","knowledge":["跨国公司与国际化","中国对外经济","国际商务管理"]},{"id":"2015_1","year":2015,"num":1,"type":"简答","question":"简述比较优势理论和要素禀赋理论的区别和联系。","answer":"(1)   比较优势论和要素禀赋论①李嘉图比较优势论发展了斯密的绝对优势理论，提出国际贸易的基础是比较优势而非绝 对优势。一国应按照“两利相权取其重，两弊相权取其轻”的原则出口具有比较优势的产 品，进口不具有比较优势的产品，贸易的结果是使双方获利。②赫克歇尔和俄林提出了要素禀赋论，又称HO 模型，认为即使技术水平相同但要素禀赋 的不同的两国也可以进行国际贸易，一国应生产并出口密集使用其相对丰裕要素生产的 产品，进口密集使用其相对稀缺要素生产的产品。在HO(1)   比较优势论和要素禀赋论①李嘉图比较优势论发展了斯密的绝对优势理论，提出国际贸易的基础是比较优势而非绝 对优势。一国应按照“两利相权取其重，两弊相权取其轻”的原则出口具有比较优势的产 品，进口不具有比较优势的产品，贸易的结果是使双方获利。②赫克歇尔和俄林提出了要素禀赋论，又称HO 模型，认为即使技术水平相同但要素禀赋 的不同的两国也可以进行国际贸易，一国应生产并出口密集使用其相对丰裕要素生产的 产品，进口密集使用其相对稀缺要素生产的产品。在HO模型基础上，萨缪尔森等人提\n出了要素价格均等化定理、斯托尔珀-萨缪尔森定理和雷布津斯基定理。\n(2)相同点\n①二者都主张自由贸易，承认自由贸易具有互利性；\n②二者都是比较利益论，都要发挥比较优势：比较优势论认为外生的技术差异导致了生产 成本的差异。要素禀赋理论认为外生的自然资源禀赋差异导致了生产成本的不同。\n(3)不同点\n①贸易产生的原因不同\n比较优势理论认为是劳动生产率差异，要素禀赋理论认为是要素禀赋差异。 ②使用的要素不同\n比较优势理论是单要素生产模型，要素禀赋理论是双要素生产模型。\n③交换规律不同\n比较优势理论认为国内交换规律不适用于国际交换，要素禀赋理论认为国内交换规律可以适 用于国际交换。\n④贸易福利不同 ·\nHO 理论比李嘉图的比较优势论更进一步，研究了国际贸易与一国国内收入分配的关系。\n比较优势论和后继的HO理论可对比，和前面的绝对优势论也可对比。二者都是古典贸易模 型 ；区别在于比较优势比绝对优势更贴合实际；比较优势是相对概念，有绝对优势一定有比\n一一较 优 势 ， 而 有 比 较 优 势 不   定 有 绝 对 优 势","knowledge":["国际贸易理论"]},{"id":"2015_2","year":2015,"num":2,"type":"简答","question":"简述新贸易理论的“新”的主要表现。","answer":"(1)新贸易理论\n新贸易理论指产业内贸易理论和动态贸易理论。随着传统的国际分工格局出现了两个倾  向：产业内贸易越来越多、发达国家之间的贸易越来越多。原有的贸易理论已不能解释这些  新趋势。克鲁格曼、兰卡斯特等人突破了传统贸易理论的假定，在不完全竞争的框架下，从  产品异质、需求偏好相似、规模经济等角度解释产业内贸易，提出了产业内贸易理论。弗农、 波斯纳等人从技术差距、产品生命周期的角度提出了动态贸易理论，突破了传统贸易理论不  能解释技术进步、后发优势的静态局限。\n(2)新贸易理论没有完全否定比较成本说，而是根据市场结构对贸易功能进行重新定位，\n认为规模经济和自然禀赋差异均是引发国际分工和贸易的经济变量。在完全竞争市场框架下， 自然禀赋和比较成本是引发贸易和国际分工的主要原因。而在不完全竞争市场框架下，规模  经济、产品差异等是贸易和国际分工的主要解释变量。\n(3)新贸易理论“新”体现在：\n①   (新的分工格局)新贸易理论能够解释发达国家之间的水平分工和产业内贸易现象，而 传统贸易理论只能解释发展中国家和发达国家之间的垂直分工和产业间贸易现象；\n②  (新的市场结构)新贸易理论从不完全竞争市场的角度进行分析，比传统理论的完全竞 争市场结构更贴近国际贸易现实；\n③   (新的生产函数)提出规模经济的概念，认为规模经济是新贸易理论所主要解释的产业 内贸易的利益来源；\n④   (新的产品特性)从产品异质性的角度解释了产业内贸易发生的基础，比传统贸易理论 中产品同质的假设更进一步；\n⑤  (新的贸易动机)不同于传统贸易理论仅从生产角度进行研究，新贸易理论中的需求偏 好相似理论从第一次需求的角度解释贸易发生的原因；\n⑥   (新的技术假定/由静态到动态)新贸易理论如产品生命周期认为技术创新及动态变化 能够影响贸易格局，突破了传统贸易理论的静态局限的局限；\n⑦   (新的贸易政策)传统贸易理论都主张自由贸易，但新贸易理论中的部分理论，如战略 性贸易政策，考察了贸易福利的不均衡分配，更倾向于贸易保护政策。\n审题与提示：侧重于强调“新”在哪里，主要答区别，联系可略答。注意不要漏了新贸易理 论的概念。\nH 老师的期末考试原题，审题要求解释产业内贸易的含义与理论内涵、对国际分工体系的影 响、对中国的启示。考这道题目则是20分的分值。\n对发展中国家的启示包括：价格不是国际贸易的唯一决定因素，还需要追求产品差异、规模 经济、技术进步；贸易分工不仅包括产业间分工，也包括产业内分工和经济发展水平相近的 国家之间的分工，一国应当提高产业内贸易水平；政府应当对一些能产生外部经济效应的产 业进行扶持，促进产业结构的调整升级。","knowledge":["国际贸易理论"]},{"id":"2015_3","year":2015,"num":3,"type":"简答","question":"非关税壁垒成为新贸易保护政策的原因。","answer":"(1)非关税壁垒指关税以外的一切限制外国商品进口的各种措施。主要包括进口配额、自 愿出口限制、歧视性政府采购、海关估价、技术壁垒、环境壁垒等。\n(2)相较于关税壁垒，非关税壁垒种类繁多，更有利于达到限制进口的目的，主要体现在：\n①具有更大的灵活性和针对性。\n关税税率的制定必须通过严格的程序，有一定延续性，关税的调整和更改往往存在时滞。 同时，关税还受到最惠国待遇条款的约束。非关税壁垒通过行政手续制定，过程较为迅  速，手续简便，更加灵活，能够针对特定国家的特定种类的商品制定，针对性强。\n②具有更强的隐蔽性和歧视性。\n关税通常以法律的形式公开并执行，出口商比较容易获得关税相关信息。但非关税壁垒  的信息往往不公开，或规定较为繁琐复杂的标准或手续，使得出口商难以适应和应付。\n③具有更强的复杂性和广泛性。\n发达国家采取的非关税壁垒日益复杂，此外，非关税壁垒的使用范围也日益广泛，被限 制进口的商品不仅包括汽车、钢铁等，还延伸到服务行业、软件等领域。\n④具有更明显的有效性。\n关税壁垒通过提高进口商品的成本和价格，削弱竞争力，间接达到限制进口的目的。但  如果出口商宁愿多缴纳关税也要出口商品，或者出口国采取补贴的形式支持该商品出口， 或者出口商采取倾销形式，那么关税则不能有效限制商品进口。但配额、自愿出口限制\n等非关税壁垒直接规定了进口商品的数量或金额，限制进口的作用更加有效 因此，现代贸易保护主义特别是新贸易保护主义主要以非关税壁垒为主要手段。\n韩玉军《国际贸易学》中讲到的内容，具体比较了两个贸易政策。关税是通过市场机制调节 进口量，具有透明、稳定的特点，且能够保护政府收入。进口配额是典型的非关税壁垒，配 额是对市场机制的替代，配额有更明显的歧视性和有效性，但是配额更容易滋生腐败和寻租 问题。两者的共同点则体现在使生产者剩余增加、消费者剩余减少，限制进口，如果是小国 情 形 则 会 使 得 社 会 总 福 利 下 降 。","knowledge":["国际贸易政策"]},{"id":"2015_4","year":2015,"num":4,"type":"简答","question":"购买力平价理论的前提条件和主要内容。","answer":"购买力平价理论 ( Purchase  Power  Parity,PPP) 是卡塞尔提出的汇率决定理论，从货 币购买力的角度分析汇率决定，是西方经典的汇率决定理论之一。\n(1)购买力平价理论的前提条件\n①开放经济中的一价定律：指同一商品在不同国家用同一货币表示时应一致或相同； 所有商品都是可贸易商品，不存在非贸易商品；贸易自由，不存在贸易壁垒和贸易 成本；\n②货币数量论：两国货币的交换取决于纸币购买力；\n③物价是汇率的唯一决定因素，物价决定汇率而不是汇率影响物价；\n④忽略国际资本流动对汇率的影响。\n(2)购买力平价理论的主要内容\n购买力平价包括绝对购买力平价和相对购买力平价，前者说明某一时点的汇率决定，而 后者说明汇率的变动\n①  绝对购买力平价\n一国之所以需要外国货币，是因为外国货币在外国具有对一般商品的购买力，而外国之 所以需要本国货币，是因为本国货币在国内具有对一般商品的购买力。因此，两种货币的购 买力之比决定两国货币的交换比率(即汇率),均衡汇率等于一定时点上两国一般物价水平 之比。公式为：E=P/P*\n其中，E 代表均衡汇率(直接标价法，即每一外国货币单位所代表的本国货币单位数),P 表示国内一般价格指数，P*表示外国一般价格指数。\n② 相 对 购 买 力 平 价\n相对购买力平价理论认为汇率变动的根源是两国物价水平变动或两国货币购买力变动， 汇率变化与同一时期两国物价水平的相对变动成比例，公式为：\nE₁=E。P/P*, 其中，E₁ 为汇率，E。为基期汇率。\n相对购买力平价说明，汇率与本国的物价水平成正比，与外国的物价水平成反比，本 国通货膨胀率上升会导致本币贬值。\n(3)理论评价 贡献：\n①以国内物价对比作为汇率决定的依据，说明货币的对内贬值必然引起对外贬值，具有 进步意义；\n②揭示了汇率变动的长期原因，符合汇率运动的长期规律，是广泛使用的汇率决定理论；\n③物价指数相对容易获得，因此相对购买力平价的实用性较强。\n局限：\n①颠倒了货币价值和货币购实力的逻辑关系，购买力平价认为购买力决定货币价值，但 根据马克思主义经济学，应当是货币价值决定购买力；\n②假设较为严格，认为所有商品可贸易，忽略了不可贸易商品，假定完全的自由贸易， 忽视了贸易成本和贸易壁垒，\n③由于短期资本流动的冲击和价格黏性，购买力平价短期内往往不能成立；\n④物价与汇率的因果关系不是绝对的，汇率也会影响物价；\n⑤只是一种静态或比较静态分析，没有对物价如何影响汇率的传导机制进行具体分析， 各国物价指数的编制方法、范围、基期选择也存在技术性困难。\n注意，不考虑市场结构、消费结构、支出结构、非贸易品，这些不是短期内不成立的原因， 而是放在长期也不成立的原因。短期内不成立的原因主要是国际资本流动，国际资本流动进\n而受到货币政策调整(利率变化)、心理预期的影响；其次，由于价格黏性存在，短期内物 价不能及时调整，也会影响购买力平价的有效性。\n经院复试时候这道题答“不考虑市场结构、消费结构、非贸易品”,面试老师一直怼“你说 的 不 对 这 些 长 期 也 不 成 立 ” , 直 到 答 出 短 期 资 本 流 动 才 满 意 。","knowledge":["国际金融"]},{"id":"2015_5","year":2015,"num":5,"type":"简答","question":"简述海外市场进入模式的类别和特点。","answer":"海外市场进入模式（Foreign Market Entry Modes）是企业进入国际市场的战略选择。主要类别及特点如下：\n\n① 出口（Export）\n- 间接出口：通过本国中间商，风险最低，控制力最弱，适合初始国际化阶段。\n- 直接出口：企业自建出口部门或海外分销渠道，控制力增强，投入和风险增加。\n\n② 契约模式（Contractual Modes）\n- 技术授权/许可经营（Licensing）：许可方收取许可费，投入少、风险低，但可能培育竞争对手。\n- 特许经营（Franchising）：将商业模式授权给加盟商，适用于标准化服务（如餐饮、零售）。\n- 交钥匙工程/管理合同：提供技术和管理服务，适合工程和酒店行业。\n\n③ 投资模式（Investment Modes）\n- 合资企业（Joint Venture）：与东道国企业共同投资，共享利润和风险，利于利用当地资源。\n- 全资子公司（Wholly Owned Subsidiary）：通过绿地投资或并购建立，控制力最强，但投入和风险最大。\n\n④ 战略联盟（Strategic Alliance）：企业间合作而不涉及股权，灵活但稳定性较弱。\n\n选择进入模式需综合考虑：企业资源能力、东道国市场环境、行业特征、风险偏好和控制需求。","knowledge":["跨国公司与国际化"]},{"id":"2015_6","year":2015,"num":6,"type":"论述","question":"欧元兑美元即期汇率为1.21,一年期远期汇率为1.1,欧元存款利率为10%,美元存款 利率为6%。EUR=1.21USD (1)如果你持有1000欧元，并且只对欧元计价的资产感兴趣，那么在上述条件下，你更愿 意用欧元存款还是美元存款? (2)若一笔外汇兑换交易收取5%的手续费，你是否会改变第一问的结论?","answer":"(1)如果你持有1000欧元，并且只对欧元计价的资产感兴趣，那么在上述条件下，你更 愿意用欧元存款还是美元存款?\n(2)若一笔外汇兑换交易收取5%的手续费，你是否会改变第一问的结论?\n(3)在何种情况下档期欧元存款和当期美元存款对于你没有差别?结合利率平价理论说 明。 方法一：\n用欧元存款，一年后本息合计1000×(1+10%)=1100欧元 将欧元兑换为美元，可兑换1000×1.21=1210美元\n用美元存款一年后本息和为1210×(1+6%)=1282美元， 再将美元兑回欧元为1282.6/1.1=1166欧元\n用美元存款收益更高，应该用美元存款。\n方法二：\n高利率货币在外汇市场上贴水，由利率平价 E=E 。(Ia-I₆+1),A 为美国，B 为欧洲，E0为即 期汇率，Et 为远期汇率\nE=1.211=6%E₀=1.21\n根据利率平价得，理论上，远期汇率 Et=1.21*(0.06-0.1+1)=1.1616 而实际上远期汇率为 EUR1=USD1.1<1.1616\n相同美元远期换回欧元更多，故应当用美元存款。\n(3)在一价定律成立的前提下，根据利率平价理论，在美国投资与在欧洲投资的收益应当 相等。\n由利率平价E=E 。(I₂-I₆+1),A  为美国，B 为欧洲，EO 为即期汇率，Et 为远期汇率 E=1.21I=6%E₀=1.21\nEt=1.21*(0.06-0.1+1)=1.1616\n即远期汇率为1欧元=1.1616美元时，在美国投资与在德国投资没有差别。","knowledge":["国际金融"]},{"id":"2015_7","year":2015,"num":7,"type":"论述","question":"根据所学国际贸易理论，分析中美的贸易结构和贸易利益格局，论述中国进行国际贸易 的现实意义。","answer":"(1)中美贸易结构\n①中美贸易结构中国对美国保持巨额商品贸易顺差，顺差规模约为每年2700亿美元，长 期的货物贸易失衡成为中美贸易摩擦的直接诱因；\n②中国对美国商品出口的主要是劳动密集型产品和中低端制成品 (机电产品等), 美国对 中国的出口主要是资本、技术密集型产品和高端制成品 (以及农产品);\n③中国服务贸易对美国保持逆差，服务贸易逆差规模呈现扩大的趋势。\n(2)贸易利益格局：顺差在中国，利益在美国\n从统计数据中来看，中国对美国贸易存在大量顺差，中国获益较多，但从实际情况来看， 中美贸易利益的分配并非由中国决定，贸易的失衡也并不能真正反映双方利益格局。\n①  中国劳动密集型产品附加值低，出口弹性和进口需求弹性均较小，价格变动并不能引起 销量的显著变动，中国出口产品的利润率较低；美国技术、资本密集型产品附加值高， 出口弹性和进口需求弹性均较大，产品出口到中国利润率高。\n②中美贸易统计存在明显差异，美国使用的方法大大高估了对华贸易的逆差，主要体现在 统计逆差只计算商品贸易，而不包含服务贸易；将通过第三方中国商品对美转口全部算 作从中国进口，同时又将美国商品通过香港等地的对华转口忽略不计；美国进口商品按 到岸价计算，而出口商品按离岸价计算，忽略了保费和运输费用，实际上低估了出口金 额。\n③美国长期限制高新技术产品对华出口，自身并未主动寻求降低逆差的方式而一味谴责中 国，如果放开对中国的技术禁运，美国的逆差会大幅减小。\n④简单进出口的统计口径反映的是一般贸易，而中国的出口模式中加工贸易占到较大比重， 如果以价值链增殖额对中国顺差进行调整，中国对美的顺差会大大减少。\n⑤跨国公司是出口的主力军，中国向美国出口的部分利益被跨国公司赚取，而很大一部分  跨国公司又是美资企业。统计上顺差不能代表中国在中美贸易中获利巨大且占据主动性， 考虑价值链分工，美国是更大的受益者。\n⑥美国凭借美元霸权，发行美元获得铸币税，中国通过货物贸易顺差获得美元储备之后， 又购买美国国债，实质是美国利用美元特权消耗中国的资源获得商品满足美国国内消费 需求。\n(3)理论解释\n① 【选答，建议答】根据国民收入恒等式Y=C+l+G+X-M, 同时Y=C+S+T,T=G,   经变 形可得S-I=X-M,  美国经济发展模式为高消费、低储蓄，需要大量进口消费品，即储 蓄S过低，净出口X-M 必然为负。美国的经济结构和发展模式决定美国逆差。\n②比较优势论。李嘉图比较优势论是国际分工的基础。李嘉图模型认为，一国应生产并出 口自己具有比较优势的产品，进口不具有比较优势的产品。中国在初级产品和工业制成 品方面具有比较优势，而美国在高技术产品方面具有比较优势。\n③  要素禀赋论。 H-O  模型认为一国应生产并出口密集使用其丰裕要素生产的产品，进口\n密集使用其稀缺要素生产的产品。中国劳动力丰裕，美国资本丰裕，故中国对美国出口 劳动密集型产品，美国对中国出口技术密集型产品。\n④动态贸易理论。弗农将产品生命周期分为新产品时期、成长成熟期和标准化产品时期， 产品生命周期影响中美贸易格局及获益程度。当产品处于新产品时期在美国生产，而随 着产品逐步标准化，逐步转移到中国生产，形成美国对中国出口创新型产品，而中国对 美国出口标准化产品。\n⑤  【选答】中心-外围论。美国是“中心国家”,出口利润率高的制成品，中国是“外围国家”, 出口利润率低的初级产品，不合理的中心-外围格局使得中国贸易条件恶化，贸易利益 主要由居于中心地位的美国获得。\n(4)中国开展对外贸易的现实意义\n①中美贸易的互补性大于竞争性，两国开展平等贸易对两国福利提升均有好处。\n②国际贸易增加了中国消费者可选择的产品种类，有助于提升和改善消费者的消费结构， 培育和扩大国内市场。\n③出口贸易助推了中国多年的高速增长，创造了经济增长奇迹。\n④对外贸易促进出口部门发展，也带动了出口部门的协同产业发展，创造了大量的直接或 间接就业机会。\n⑤对外贸易使中国拥有3万亿美元的外汇储备，解决了国际储备和资金不足问题。\n⑥对外贸易推动中国资本积累和技术进步，促进资本密集型行业和技术密集型行业的发展， 推动调整产业结构，形成了新的行业优势。\n(2)中美利益分配格局的关键要点：“中国是生产中心，美国是消费中心”,美国高消费低 储蓄模式和产业空心化必然导致逆差；“顺差在中国，利益在美国”,美资企业贡献了美国逆 差的绝大部分，且中国出口商品附加值低，美国出口商品附加值高，考虑到加工贸易的价值 增值，美国是绝对受益者；“两利相权取其重，两弊相权取其轻”,美国具有高技术产品比较 优势，理应出口高技术产品，但对中国技术禁运，人为扩大了逆差；“世界各国生产美元购 买的商品，美国生产美元”,美元储备地位决定美国必须保持贸易逆差提供国际清偿力；此 外是统计口径的问题。\n(3)解释中美贸易格局的理论：凯恩斯国民收入恒等式，分析的是失衡的经济根源；李嘉 图模型和HO 模型从静态角度，分析中美的出口产品格局；技术差距论和产品生命周期从动 态角度，分析产业转移；普雷维什中心外围论，从利润率和贸易条件角度，分析中美贸易的 利益分配。以上四条是从四个方面解读中美贸易格局，如果集中为国际贸易理论，最常见的 四个理论是比较优势论、 HO 理论、技术差距论和产品生命周期。\n(4)对外贸易的现实利益：从贸易的直接利得看，根据李嘉图模型，中美双方的贸易互补 提高了社会福利；从贸易的间接利得看，首先，贸易扩大了市场规模，提高了资源的利用效 率；其次，国际贸易可以打破对国内市场的垄断，为消费者提供更多产品和福利；再者，国 际贸易纵向的产业带动效应和横向的产业结构调整效应，促进出口部门相关产业发展并创造 就业，要素积累和技术进步推动产业结构调整；最后，国际贸易是经济增长的发动机，带动 经济增长。\n审题和思路：这是H 老师国际商务导论课的必考期末题，可以说是关于中美贸易的经典题目， 这道题的得分点都在韩玉军《国际贸易学》中有体现，要求全部会背，结合现实分析。 当 时 考到这道题其实非常难，如果缺乏整体认知，很难答清楚。\n比论述题中多出了“国际政治”要求。代表说法是“修昔底德陷阱”,后起者必然挑战秩序 维护者的地位，形成双方的争霸战争，中国的崛起威胁到美国作为世界霸主的地位，因此美 国打压中国，陷入“强国必霸，两强相争”的逻辑怪圈。另一种说法如果一国的 GDP总额达 到美国的60%,美国则会将其视为竞争对手，阻止其崛起。这种观点是建立在国际关系理论 的权力与安全观的基础上，从国际经济学的基础看却有待商榷，国际经济学的基本观点是保 护利益集团，而不是追求国际权力或意识形态。中国的基本态度应当是“对内改革，对外开 放 ” , 结 合 实 际 分 析 。","knowledge":["综合"]},{"id":"2015_8","year":2015,"num":8,"type":"论述","question":"(英文)过去二十年间，国际贸易的动力是欧美国家和中国的劳动力价格差异，这种差异 使发达国家的产业转移到中国。现在由于中国等发展中国家工资水平的提高，已经达到美国 的二分之一以上，劳动力成本优势逐渐丧失。而能源价格不断降低，所以现在国际贸易动力 变成了能源资源。如国际油价大幅下跌，OPEC 主要石油生产国难以承担，而一些幸运的富 裕国家，特别是美国，能一次从两个方面受益。根据以上内容，结合所学国际贸易理论，解 释经济全球化动力转变的潜在因素，以及对国际投资战略的影响。","answer":"(1)全球化动力转变的潜在因素\n经济全球化即资本、劳动和商品在全球范围内的流动，实质是世界范围内统一市场的形 成，商品价格和要素价格差异产生了国际贸易和投资。根据HO 模型，商品相对价格差异是 国际分工的基础，而商品价格取决于要素价格，要素价格取决于要素禀赋，即要素价格和要 素禀赋变化是全球化动力转变的潜在因素。\n①资源禀赋的变化\n全球范围内新的能源资源的发现，部分国家成为能源丰裕国，进而形成这些国家的能源 出口，改变了石油等大宗商品的国际贸易格局；全球能源供给能力的增加导致能源价格下降， 能源价格成为国际贸易的重要动力。\n②要素价格均等化\nH-O-S 定理表明，国际贸易会使各国要素价格或要素酬的差异缩小直至完全相等。过去， 中国凭借劳动力成本优势，与发达国家开展贸易，出口劳动密集型产品，而随着贸易的发生， 中国劳动要素报酬提高，劳动力成本优势逐渐丧失。\n③国家(及组织)自由贸易或保护政策\nA.   以往，OPEC 石油输出国组织作为国际卡特尔，长期操控国际油价。新油藏的发现 和新能源替代削弱了OPEC的垄断定价能力，使得能源价格更接近国际贸易现实；\nB.   更多劳动成本低的新兴市场成为开放经济体，改变了国际分工格局；\nC.【 选答】部分国家走上贸易保护的道路，增加商品进出口壁垒，限制自由贸易。\n④ 【选答】消费市场格局变化\n随着中国等新兴市场国家经济快速增长，居民收入水平和消费能力提高，成为潜力巨大 的市场，从需求的角度影响贸易和分工。\n(2)国际投资的主要动机包括寻求资源、寻求低要素成本、寻求市场等。为了实现资本的 高收益，跨国公司会将生产转移到生产成本最低、具有丰富资源或市场潜力较大的国家和地 区。因此，资源禀赋、要素成本和市场规模的变化会导致资本流向改变，影响不同国家的投\n资战略。\n①对美国等发达国家投资战略的影响\nA.OFDI  : 低劳动力成本和低能源价格的出现将促使发达国家开启新一轮产业转移。 美国将劳动密集型产业转移至东南亚等劳动力廉价国家，而将资源、能源密集型产 业转移至巴西等新兴能源资源国。【选答】为了避开贸易壁垒，美国公司会产生贸 易替代的对外投资进入他国市场。\nB.   IFDI:【选答】对外投资造成美国制造业空心化，加剧国内失业，出于保护就业考 虑，美国会吸引制造业回流。\n②对新兴市场国家投资战略的影响：\nA. IFDI: 廉价的能源资源和低要素成本使得新兴市场国家吸引外资大规模流入，这种 投资多为垂直型投资；【选答】居民消费能力提高产生更强的消费需求，吸引更多 跨国公司的水平型投资流入。\nB.    OFDI: 根据投资的动态发展阶段理论，这些新兴市场国家应当提高外资的利用效 率水平，发展本国工业并促进产业结构调整，逐步从外资流入国成为对外投资国。\n③对中国投资战略的影响：\nA.   IFDI: 中国劳动力成本优势丧失，劳动密集型的加工制造业随着产业转移流出，面 临外资流出的局面；【选答】中国是仅次于美国的第二大消费市场，市场因素成为 吸引外资的主导因素，依然有较强的投资吸引力；优化营商环境和稳定外资成为政 府的重要工作内容。\nB.    OFDI: 由于资本和技术实力增强，中国投资战略更加侧重扩大对外投资和投资结 构优化，资本流出增速快于外资流入。地区分布上对一带一路直接投资大幅增加， 产业分布上金融业、信息服务业呈现较快发展趋势。\n(2)全球化的本质在于商品、劳动、资本的跨国流动，国商不涉及移民问题，简单理解就 是商品和资本流动，这样就回归到国际经济学的基本问题——国际贸易和国际投资。商品流 动即国际贸易的动力是相对价格差异，资源价格差异产生初级产品贸易，劳动力价格差异产 生中低端制成品贸易，因此，能源价格和劳动力价格变化是全球化动力转变的潜在因素，这 两条是材料要求的答题要点，理论基础是我们熟知的HO理论。\n(3)国际投资战略更多指的直接投资战略， 一国的区位优势和所有权优势对比决定了 IFDI     和 0FDI 的对比(邓宁的投资发展周期理论):拥有低劳动力成本和丰富资源区位优势的国家  会吸引外资，对于这些国家来说发展路径在于引进外资-利用外资-资本积累-产业转型；拥   有所有权优势的国家会扩大对外投资，对于这些国家来说发展战略在于使其投资收益最大化； 部分国家丧失原有的区位优势，发生产业转移，对于这些国家来说发展战略在于变要素成本  优势为规模经济优势、技术进步优势，变引进外资为对外投资。\n以上两个表格是本题的主要要点。但2015年真题材料缺失，可能会出现其他要点，所以还 可以考虑市场、贸易政策、技术进步等因素，逻辑比较复杂，可不答。\n(2)材料中产生了几个主体——美国是资本丰裕国，OPEC国家是资源丰裕国，中国是旧的 劳动力丰裕国，其他新兴经济体是新的劳动力丰裕国。采用按主体划分的思想，站在这几个 国家立场分析投资战略就是可行的思路。去掉所有选答部分，逻辑非常简单清晰。\n(3)这道题要求比较强的国际经济学基础，非常难，只读了《国际商务》就很难解释清楚 这个问题。因为国际商务对贸易理论的解读比较浅显，理解不到要素流动的层次， 一时半会 都想不明白哪个理论能够解释全球国际投资现象。提示我们要仔细审题，抓住题干要求的理 论 进 行 深 入 分 析 。","knowledge":["综合"]},{"id":"2015_9","year":2015,"num":9,"type":"案例","question":"中国铁建的国际化进程 随着“一带一路”国家战略的推进，为中国高铁走出去迎来前所未有的发展机遇中国支 持高铁海外投资，推动一带一路建设，拿出400亿美元作为丝路基金。墨西哥高铁项目指连 接起首都墨西哥城和第三大城市克雷塔罗的一条高速铁路项目，全场210公里，设计时速 300公里，单程运行时间58分钟，预计年日均客运量2.7万人次预计投资约43亿美元，该 项目估计将提供两万个直接就业岗位和4.1万个间接就业岗位。这对墨西哥来说是一项及极 其重要的基础设施项目，将极大的拉动相关产业的发展，增加就业和便利国民的出行。墨西 哥高铁项目一开始时就吸引了包括中国公司在内的17家公司竞争，但是由于其要求竞标和 建造时间期限短，随后日本三菱公司、加拿大庞巴迪公司、德国西门子公司、法国阿尔斯通 公司等16家公司放弃了竞标，中标自然而然地落在以中国铁建股份有限公司为首的联合体","answer":"随着“一带一路”国家战略的推进，为中国高铁走出去迎来前所未有的发展机遇中国支持 高铁海外投资，推动一带一路建设，拿出400亿美元作为丝路基金。墨西哥高铁项目指连 接起首都墨西哥城和第三大城市克雷塔罗的一条高速铁路项目，全场210公里，设计时速 300公里，单程运行时间58分钟，预计年日均客运量2.7万人次预计投资约43亿美元，该 项目估计将提供两万个直接就业岗位和4.1万个间接就业岗位。这对墨西哥来说是一项及极 其重要的基础设施项目，将极大的拉动相关产业的发展，增加就业和便利国民的出行。墨西 哥高铁项目一开始时就吸引了包括中国公司在内的17家公司竞争，但是由于其要求竞标和 建造时间期限短，随后日本三菱公司、加拿大庞巴迪公司、德国西门子公司、法国阿尔斯通 公司等16家公司放弃了竞标，中标自然而然地落在以中国铁建股份有限公司为首的联合体 头上，如果顺利完成合同，这将是第一条中国在海外设计、承建并采用中国标准和设备的高 铁，对中国企业走出去具有里程碑的意义可是，天有不测风云，出人意料的是墨西哥在宣布 中铁建联合体中标后的第三天单方面取消了中标结果。中铁建联合体还未高兴完就被当头一 击，按照项目投标成本占项目金额0.5%计算，上亿元人民币打了水花。在眼看着第二次重新 启动招标程序时，墨西哥政府又发布公告宣布无限期搁置该高铁项目，这让中铁建联合体被 “接着忽悠”了。中国铁建公司与墨西哥的牵头人有过丑闻，幸好与这笔订单取消没有直接关 系，中国铁建保留关于这笔订单取消的法律诉讼权利。中国和非洲签订的高铁协议，由于中 方公司透明度较小问题引发了热议，非洲国家对待中国企业的投资的态度，既欢迎又谨慎。 中国企业在非洲的投资项目的合同中经常包括中国政府机构设立的对外投资机构(如国家开 发银行)等的贷款资金，但是这些贷款并不一定能得到确认。非洲某国央行行长提醒说，要 正确看待中国和非洲的浪漫关系，中国可能是帮助，也可能是竞争。\n(1)   试述中国铁建国际化进程中面临的问题。(20分)\n引入 PESTEL 模型从政治、经济、社会、技术、竞争、法律和自然地理方面分析外部环 境带来的挑战：\n①政治层面 (Political): 中国高铁投资的多为非洲、拉美、中亚、东南亚、东欧等转轨国 家，沿线政治形势复杂，中国铁建国际化面临较大的政治风险。\nA.    战争风险：尤其是非洲和中东地区，沿线国家因为宗教、民族等冲突出现战争、武 装暴乱和镇压问题，容易对投资项目造成损失；\nB.    恐怖主义威胁：高铁沿线地区恐怖主义频发，如伊斯兰国、塔利班等恐怖主义严重 威胁高铁施工的项目和人员安全；\nC.    政权更迭和政策不连贯：和政治成熟的两党制国家相比，转轨国家政权缺乏稳定性， 政权更迭频繁，而高铁施工往往历时较长、跨越两个甚至多个政权，政策变动极易 产生不利影响；\nD.    双边关系和多边关系恶化：西方大国的影响，如美国的亚太战略会影响印度、越南 等国的对华态度，阻碍中国高铁进入这些市场，并加大正在进行的项目的不确定性；\nE.   国有化风险：中国铁建的海外资产可能遭到沿线政府的国有化征用，尤其 是高铁作为关键基础设施会遭遇政府的垂涎，遭遇征用可能性更高。\n②经济层面 (Economic):\nA.    消费市场：许多国家国土面积狭小或城市人口数量不足，居民收入水平较低，对高 铁的需求有限，中国铁建的海外市场空间狭小；\nB.    基础设施：高铁建设与运行需要配套工业设施，如建材、能源、电力等；沿线国家 基建配套本身不完善，不足以支持高铁项目的建设和运行；\nC.   市场不完善风险：发展中国家经济体制不完善，甚至缺乏对契约精神，在 非洲等地区经营高铁项目建设容易与当地供应商产生合同纠纷；\nD.    投融资困难：基建项目投资金额大、周期长、现金流压力大，对投融资要求极高， 银行金融机构对高铁项目融资态度谨慎；而发展中国家政府受到经济发展水平低、 信用评级差等因素制约，政府融资能力弱，需要中国铁建提供融资渠道甚至提供担 保；\nE.    经济下行风险：宏观经济下行，通货膨胀上升，失业率提高，会导致居民收入下降， 乘坐高铁次数减少，影响高铁项目收益；此外，经济恶化会造成政府债务问题，政 务无力偿还修建高铁的融资贷款，引起债务违约；\nF.    利率变动风险：国际金融市场的利率波动会影响铁路建设项目投资的现金 流，如果利率抬高，浮动利率的贷款协议的付息金额上升，增加财务压力。\n③社会文化层面 (Social)\nA.    需求多样性：各个国家社会文化、生活习惯、消费习惯等因素不一致产生对高铁的 差异化和多元化的需求，高铁项目设计需根据具体国情而大幅更改，造成较大的地 区调试压力；\nB.    意识形态差异：“中国威胁论”、“新殖民主义”等言论甚嚣尘上，加大沿线居民和社会 对中国高铁项目的抵制。\n④技术层面 (Technological)\nA.    技术标准：中国铁建尚未在高铁技术领域掌握充足话语权；日本、欧洲具有更悠久 的高铁建设历史，垄断高铁的国际技术标准；\nB.    技术兼容性：各国在铁路建设、车站建设及铁路配套中技术和工程标准不一，甚至  曾出现火车头过不了隧道的闹剧，中国铁建国际化需要克服技术兼容的软硬件问题；\nC.    技术和环境壁垒：高铁所产生的污染、浪费及其他环境问题常常受到发达国家指责， 防治污染及减少对当地环境的影响也是一大难题。\n⑤ 竞 争 环 境 层 面 ( Environmental):\nA.   竞争者：中国铁建会面临来自德国、日本高铁公司的竞争，这些企业是传统的高铁 领军者，技术优势强、资金实力雄厚、行业话语权强、工程经验丰富，具备较强的 市场竞争力，威胁中国铁建的地位；\nB.    协力者：中国铁建走出去缺乏对协同统筹规划，如需要中国建材、中国机械、中国 电子等国有企业提供建材、设备等方面的配合，融资方面还需要国家开发银行等金 融机构的支持，但行业之间缺乏统一协调规划，陷入单打独斗的困境；\nC.   外溢效应：高铁投资本身不仅在于项目盈利性，更重要的作用在于改善当地社会、 经济、民生，通过交通设施带来更多的贸易、投资及商业合作机会，促进当地经济  社会发展，如果高铁和其他行业之间无法形成联动发挥外溢作用，则高铁项目的意  义会被大大削弱。\n⑥ 法 律 层 面 (Legal)\nA.   法律制度：法律体制不完善，产权界定不清晰会对高铁项目的实施带来纠纷与争议；\nB.    法律变更：高铁项目作为重大基建，涉及的法律法规较多，法规变动可能抬高项目 成本，甚至中断项目建设。\n⑦ 自然地理风险\n世界各国地理环境复杂，与中国国内地质环境差别较大，高铁涉及要克服地质条件带来  的不利影响；某些地区地震、洪水的灾害时有发生，如不加预防，也会影响到项目进行。\n来自企业内部的挑战包括\n① 核心竞争力挑战：中国铁建走出去的基础是其高铁设计、施工的优势，然而，与德国、 日本高铁公司相比，中国铁建并没有形成难以模仿性或不可替代性强的竞争优势，有被  击败的风险。\n②财务管理挑战(材料):中国铁建的资金运用不合理，资金运用透明度小，极易引发寻 租和腐败行为，引发东道国的猜忌。\n③风险控制的挑战(材料):中国铁建缺乏对经营风险的评估、预测和防范，墨西哥高铁 项目要求的竞标和建造时间期限短，风险大，在其他公司退出时，中国铁建并没有重新 评估项目可能存在问题或风险而做好退出准备。\n④ 跨文化挑战：中国铁建的国际化涉及雇佣当地劳动力，可能遭遇复杂的文化管 理问题，不同文化背景的员工对工作的态度相差甚远，加大了管理难度。\n⑤  人才方面的挑战：中国铁建走出国门需要技术、法律、商务、外语等方面的人才，长期 以来对国际化人才储备不足，优秀的项目管理人员较少，具有技术、管理和商务经验的\n复 合 人 才 尤 为 稀 缺 。\n内容主体换成“中国铁建”,然后迁移运用到高铁行业。当年缺了一道案例题，实际这一问 应当是10分，判定分值内部外部加起来不用超过10条。但如果换成20分就多答一些内容， 展开更加详细。可以说要点很多，碰到这种题目只有时间不够发挥不完的情况，不存在答不 满的情况。\n中国高铁是建设类国企的代表，而不同行业的国际化遇到的问题有不同特色。如果换成互联 网企业国际化(如字节跳动),那么答题的重心就不在政权更迭、战争这些方面了，需要更 多强调网络基础设施、市场监管、国别和文化差异、技术兼容问题等方面。\n(2)  如果你是中国铁建的战略管理部人员，结合所学，从行业、资源、制度三个角度分\n析如何解决现有问题?(20分) 行业层面：\n①研究高铁市场的行业现状和前景，制定发展规划\nA.   研究世界不同国家和地区的经济发展水平、政府财政收入水平、城市化水平、居民收入 水平、人口规模和人口密度、现有交通基础设施并分析高铁消费市场，从这些支撑高铁 市场的基础因素，判别哪些国家和地区是未来的潜力高铁市场，做好战略研究和布局。\nB.   静态角度：高铁市场需要打破国界的空间地理界限；高铁运输效率高、速度快，如果仅 停留在一国或地区范围内，会极大程度制约高铁市场发展；因此，以蒙内铁路(蒙巴萨\n-内罗毕)为范式的跨国别、跨区域高铁干线将成为重要的开拓领域。比如，我 国云南、广西和东南亚等国接壤或相邻，如果将其视为整体市场、修通昆明和泰国、缅 甸、柬埔寨等国主要城市的高铁干线，那么中南半岛和我国西南地区的一体化水平会空 前提高。\nC.   动态角度：经济发展水平、城镇化水平和基础设施变化会衍生新的高铁市场，原本产业 发展较低的地区或原本基础设施落后的地区，会产生将普通铁路升级为高铁的需求。这种情况会发生经济表现良好的国家， 如印度等国在全球经济放缓的背景下保持了 较为快速的经济增长，印度人口稠密且流动较大，交通要道众多，但同时印度基础设施 水平远远落后于中国，可以预见，未来印度的高铁市场具备相应潜力。\n②紧跟竞争者的发展动态和竞争能力\nA.   从供给角度分析，全球高铁市场处于德国、日本等少数高铁公司寡头垄断的结构。\nB.   竞争角度：高铁是技术、资本密集型行业，中国铁建要紧跟高铁市场的技术动向，防止 对手的技术进步形成行业壁垒，保持中国铁建的技术竞争优势；要密切追踪行业内主要 竞争者的财务数据对比，如利润率、资产负债率，保持中国铁建的财务优势和成本优势； 根据竞争者的发展动态制定中国铁建的战略规划。\nC.   合作角度：中国铁建可以和德国、日本的高铁公司成立联合体参与投标，那么会形成更 强的垄断定价权，还能与合作者分享经验，学习先进的技术和管理知识。\n③构建与供应商和协力者合作框架\nA.   国内高铁行业：中国铁建可牵头国内高铁行业的重组与整合，通过整合提高整个行业的 经营效率，加强高铁行业的联合，避免恶性竞争，变单兵作战为抱团取暖，增强行业竞 争力和抵御风险能力。\nB.    国内相关行业：疏通高铁行业的上游产业，与建材行业、机械行业、电力行业签订长期 战略协议，在走出国门的过程中通力合作、相互配合，释放更强的价值链潜力，以国内 的工业制造优势促进中国高铁国际化，以中国高铁国际化带动其他行业走出国门。\nC.   国外相关行业：与国外的配套行业建立合作关系，实现部分原材料在东道国当 地的供应，这样能够促进当地产业的发展，带动就业，通过这些行业的利益集团影响政\n府的决策，进而在项目招投标中获得优势。\n④发挥高铁建设带来的溢出效应\nA.   铁路建设的设计、论证需要充分考虑对城市化和经济发展的外溢，因此，中国铁建可以 联合东道国的房地产行业或其他行业，共同游说东道国政府。\nB.   用高铁建成带动城市房地产增长，由于交通设施改善，城市居住环境和便利程度大大提 高，地产商可以加快商业楼盘和居民住宅区的开发，吸引外来人口流入；同时，当地政 府能够增加土地拍卖的财政收入，优化政府财政结构。\nC.   高铁建成带来商务合作机遇，促进高端服务业的发展，高铁建成之后，当地政府加强招 商引资工作，吸引更多市场微观主体，增强经济活力，为政府贡献税收；人口流动的增 加又能增加高铁项目收益，形成良性循环。\nD.   高铁变更城市间的分工合作格局，将孤立的城市变为城市带，充分发挥各个城 市的区位优势，提高区域整体的分工水平，增强区域竞争实力。\n资源层面：\n根据巴尼等人的基础资源观，企业的资源必须具有价值性(Value)、稀 缺 性( Rareness)、 难以模仿性 ( Inimitability)  和组织性 ( Organization),   企业应该将内部与外部资源优势最大 化，构建企业竞争力。\n①内部资源\nA.   价值方面：中国铁建的能力在于规模经济优势和经验曲线积累，近年来，国内高铁建成  举世稀有的超长通勤里程，中国铁建由此积累了高铁的研发、设计、施工、运营经验， 加上高铁里程增加带来的公司规模扩大和固定成本分摊，经营呈现动态成本递减的过程， 高铁产品具有极高的性价比。中国铁建要发挥低成本优势，显示出价值性。\nB.    稀缺方面：国有企业能够集中优势力量，高效、快速的完成工程任务，这是西方跨国公 司不具备的稀缺性。中国铁建要明确自身的资源和能力，将其转化为国际化竞争力。\nC.   难以模仿方面：然而，尽管中国铁建有一定的技术实力，但是日本、德国在高铁领域先 入者优势更强，中国铁建还未完全形成高铁技术的护城河，未来，需要加大研发投入， 增加技术的模仿难度。\nD.   组织方面：中国铁建整体采取大型国企典型的总部-分公司的组织架构，随着国际化的 进行，组织模式应当向海外市场倾斜，成立以项目为基础的专业团队乃至海外分公司， 给予海外团队充分的谈判和项目开拓自主权，协助海外业务开展。还可将非核心业务外 包，自身集中于高铁领域。\n②外部资源\nA. 中国铁建投资领域为基建，有较强的带动作用，因此，中国铁建应向中国政府争取政策 支持和补贴。政府出于实际考虑，也会支持国有企业走出去，提供相应帮助。\nB.   中国铁建在投标和建设过程中和东道国政府打交道，因此需要向外交部、商务部和中国 驻外使馆寻求支持，创造在东道国经营的良好环境。\nC.    高铁建设需要投资金额巨大，中国铁建要争取国家开发银行、中国进出口银行的政策性 贷款支持，为项目提供低息融资贷款，解决东道国政府融资难的问题。\nD.   考虑到海外投资风险较高，中国铁建要同中国出口信用保险公司签订协议，办理海外投 资保险，分散海外项目不确定性带来的风险。\n制度层面：\n诺斯将制度定义为“决定人们相互之间关系的人为约束”由正式制度和非正式制度构成， 正式制度包括法律、规章和规则，非正式的制度(俗称“潜规则”包括价值观、信仰、行动 和道德等方面。制度理论认为，制度的作用在于降低不确定性。制度基础观认为，在一定制 度框架内，企业理性追求自身利益，正式与非正式的制度共同支配企业的行为，但是正式制\n度约束不明时，非正式制度会发挥更重要作用。\n①正式制度方面\nA.   各国法律制度千差万别，在有明确法律规范的领域，中国应当严格遵守东道国法律，买 卖交易涉及《合同法》,用工涉及《劳动法》,支付结算涉及《票据法》,技术问题涉及 《知识产权法》,应当熟知经营领域常见法律，减少纠纷。尤其必须仔细甄别研究签订 合同的条款，对高铁项目的责任和义务有明确界定，约定争端解决的方式，使合同更有 利于己方。\nB.   在规范和制度方面，工程项目涉及较多标准和许可证问题，手续繁杂，中国铁建应当及  时了解涉及的程序和规定，同时，要关注制度规定可能存在变动，减少政策变动损失。\nC.   工程施工、工程投标领域有相应的行业惯例，高铁项目还需遵循国际惯例，并利用行业 惯例减少纠纷不不确定性。但要注意，国际惯例的约束力往往弱于国内法律与合同文本， 对惯例不能过分依赖。\n②  非正式制度方面\n墨西哥作为新兴经济体，正式制度即法律法规对政府和经济主体的约束相对有限，墨西 哥政府在中国铁建中标后取消中标结果，而第二次招标又无限延期，表明缺乏充足的制度与 法规约束政府招标行为，而类似情况在新兴市场国家并不鲜见。所以，中国铁建在这些国家 运作时尤其需要了解政府运转的“非正式制度”,摸清支持政府决策的“潜规则”,对当地政府 和企业的行为(尤其何时会做出不利干我方的违约行为)进行预判.避免谈判陷入被动。 答案参考： 彭维刚《全球商务》、陈志军《企业战略管理》\n试 题 变 形 ：商院这道复试题和《全球商务》结合紧密，可以答制度转型的含义、原因、方式，对中国企 业的影响等方面。新兴市场国情千差万别，有的转型比较成功有的则失败(经典案例是“休 克疗法”),有兴趣自己了解。\n(1)最关键的一条：国家利益优先取得论。高铁是一种风险比较高的基建投资，而且投资  的回报不够确定，但是高铁是重要的基础设施(基建是“半赚钱半援助”性质),对民生和  地区经济具有改善作用，高铁的建成会诞生更多中外合作机遇，这是超过投资本身的价值。 另外，高铁走出去也是扩大中国高铁影响力、宣传中国品牌、彰显综合国力的方式。传统国  企的投资多数会用到“国家利益优先取得论”这个观点。\n(2)其他要素：垄断优势，高铁是少数国家掌握的高端技术。市场控制论，掌握海外高铁 市 场 ； 规 模 经 济 论 ， 修 的 里 程 越 长 ， 规 模 成 本 越 低 。","knowledge":["中国对外经济"]},{"id":"2016_1","year":2016,"num":1,"type":"简答","question":"简述贸易条件，并说明一国出口生产率提高其他不变的情况下贸易条件是改善还是恶化， 说明原因。","answer":"(1)贸易条件(Terms of Trade) 是由穆勒和马歇尔等人提出的用以衡量国际贸易利益的指 标，指进出口商品的交换比价，常常用出口价格指数比进口价格指数表示。\n贸易条件包括以下四种类型\n①净贸易条件，指一国在一定时期内，出口商品价格指数与进口商品价格指数之比。 N=Px/Pm×100\n其中，Px表示出口商品价格指数， Pm 表示进口商品价格指数。\n②收入贸易条件，指在净贸易条件的基础上，把出口数量变化考虑进来。公式为\nI=Px/Pm×Qx\n其 中 ，Qx 表示出口数量指数\n③单因素贸易条件，指在净贸易条件基础上，把出口商品劳动生产率变化考虑进来 S=Px/Pm×Zx\n其中，Zx表示出口商品劳动生产率指数\n④双因素贸易条件，指在净贸易条件基础上，把进出口商品的劳动生产率都考虑进来 D=Px/Pm×Zx/Zm×100\n其中，Zm 表示进口商品劳动生产率指数\n(2)贸易条件改善意为同样的出口商品可以换得更多的进口商品，反之则贸易条件恶化。 一般而言，贸易条件指净贸易条件，当出口商品价格Px提高或进口商品价格Pm 降低，净 贸易条件上升，贸易条件改善。但考虑到出口收入，即使进出口商品价格指数Px/Pm 不变， 出口数量或劳动生产率的变化也会形成贸易条件改善或恶化。\n(3)当一国出口产品的劳动生产率提高，根据单因素贸易条件公式：S=Px/Pm×Zx,Zx 提高，而Px/Pm不变，贸易条件改善。\n例：若出口商品价格指数较基期下降5%,为95,进口价格指数上升10%,为110,出口商 品的劳动生产率由100提高到130,则单因素贸易条件\nS=(95/110)×130=112.27\n说明尽管净贸易条件恶化，但此期间出口商品劳动生产率提高，不但弥补了净贸易条件恶化， 而且使得单因素贸易条件好转。它说明了出口商品劳动生产率提高在贸易条件改善中的作用。 答案参考： 韩玉军《国际商务》\n(2)一般情况分析国际商品价格用的是净贸易条件，但是考虑到出口收入需要用其他定义， 注意区分狭义的净贸易条件和收入贸易条件。\n(3)第二问亦可结合国际经济学理解，出口部门的劳动生产率提高，强化本国的比较优势。\n如果是两部门单要素模型，生产可能性边界偏向于出口商品(假设为X 轴),封闭经济中X  产品的相对价格变小，而开放经济预算线的斜率未发生变化(假定进出口商品价格比不变), 出口优势增强。同时，本国市场和世界市场的价格差变大，贸易带来的福利改进(贸易利得) 也更加明显了。\n贸易条件常常和社会福利问题结合，是国际经济学模型中的常用概念。使用一般均衡分析， 开放经济下预算线的斜率表示贸易条件，贸易条件恶化，即预算线斜率变小，无差异曲线内 移 ， 福 利 降 低 。","knowledge":["国际贸易理论"]},{"id":"2016_2","year":2016,"num":2,"type":"简答","question":"简述产业内贸易和产业间贸易的理论基础。","answer":"(1)产业间贸易指不同产品之间的国际贸易，其理论假定为完全竞争市场、规模报酬不变、 进出口贸易平衡，认为技术水平或要素禀赋差异是国际贸易的动因，主要包括亚当斯密绝对  优势论、李嘉图比较优势论、赫克歇尔-俄林要素禀赋论、萨缪尔森-琼斯特定要素模型。\n产业内贸易指同类产品的进出口贸易，又称重叠贸易，其理论假定为不完全竞争市场、规模 经济和产品异质，主要包括克鲁格曼规模经济论，林德重叠需求论，克鲁格曼、兰卡斯特的 新张伯伦模型，法尔维的新HO 模型，布兰德的相互倾销模型等。产业内贸易理论不是对传 统贸易理论的否定，而是承认比较优势的基础，认为不完全竞争使得产品价格偏离边际成本， 规模经济独立于比较成本是贸易产生的决定因素。\n(2)产业间贸易的理论基础\n①绝对优势论认为一国应出口本国具有绝对优势的产品，进口本国不具有绝对优势的产品。\n②比较优势论的核心思想是两利相权取其重，两弊相权取其轻，认为一国应出口本国具有 相对优势的产品，进口本国不具有相对优势的产品。\n③ H-O 理论认为比较优势的来源是资源禀赋差异，认为一国应出口密集使用其丰裕要素 生产的产品，进口密集使用其稀缺要素生产的产品。\n④  【选答】特定要素模型认为，短期内存在不可流动的特定要素，因此国际贸易使得出口 部门的特定要素所有者受益，进口部门特定要素所有者受损。\n(3)产业内贸易的理论基础\n①不完全竞争是产业内贸易的市场基础。包括完全垄断、寡头垄断、垄断竞争，不完全竞 争使同一产业的产品呈现出复杂的产品系列。\n②产品差异是产业内贸易产生的基础。异质产品是指可以在一定程度上被替代但不能完全  替代的、需求交叉弹性小于同质产品的产品。异质产品的差异包括水平差异、垂直差  异和技术差异。通过贸易互相出口差异产品，增加消费者的选择余地，提高福利水平。\n③需求偏好相似是产业内贸易的动机。重叠需求论认为两国经济发展水平越接近，收入水 平相近。则需求重叠部分越大，两国的需求偏好就越接近，因此发生贸易的可能性就越 大。\n④规模经济是产业内贸易的利益来源。外部规模经济使行业总体规模扩大，厂商数量提高。 消费者数量增加，消费者剩余增加，社会福利水平提高。内部规模经济使厂商生产成本  下降，短期内产生超额利润。尽管长期竞争使得生产成本和产品价格相等，厂商利润归\n零，但成本降低，消费者剩余增多，社会福利改善。\n⑤ 【选答】新张伯伦模型认为垄断竞争市场中，产品具有水平差异，开放贸易增加了消费 者商品选择种类，产品种类增加提高了社会福利。\n⑥ 【选答】新 HO 模型认为，在HO 模型框架中引入垂直差异产品，由于对高质量和低质 量产品存在不同需求，资本充裕国出口高质量产品，另一国出口低质量产品，会发生南 北国家之间的产业内贸易。\n⑦  【选答】相互倾销模型认为，在寡头垄断市场前提下，贸易是扩大竞争的一种方式，企 业可以通过贸易向别国的国内市场倾销以扩大销售，即使存在运输成本，也会存在双向 贸易，并由两国间需求弹性的预期差异决定贸易量。\n提示：产业间贸易理论又称传统贸易理论，主要包括绝对优势论、比较优势论和要素禀赋论， 李嘉图模型和HO 模型的解释力更强。产业内贸易理论即不完全竞争与三大支柱——产品差 异、偏好相似、规模经济。相互需求理论解释的是贸易价格决定，而不是进出口贸易模式， 特定要素模型更侧重于贸易利得的分配关系，新要素理论解释的不是产业内贸易，这些都不 是最重要的踩分点。","knowledge":["国际贸易理论"]},{"id":"2016_3","year":2016,"num":3,"type":"简答","question":"简述波特的国家竞争优势理论。","answer":"迈克尔 ·波特的国家竞争优势理论又称钻石模型，认为企业或者产业的国际竞争优势是 国家竞争优势的体现。国家竞争优势来源包括四个基本因素(生产要素、需求因素、支撑产 业因素、企业组织战略竞争因素)以及两个辅助因素(政府和机遇)。\n(1)钻石模型六要素\n①生产要素包括初级要素和高级要素。初级要素是先天拥有或容易获得的基础要素，如自 然资源；高级要素是通过长期投资或发展形成的要素，如人力资本。形成竞争优势则必 须发展高级要素。\n②  需求因素包括市场的全球性、本国需求的层次、本国需求的超前性、国内市场规模和成 长速度。企业首先着眼于国内市场，所以国内市场需求的特征会影响国际竞争力。\n③  相关和支撑产业即国内是否存在有国际竞争力的供货商和相关支撑产业。由于产品竞争 力依赖于相关产业的支持，竞争优势在很大程度上来自产业聚集。\n④企业组织、战略和竞争状态因素：企业通过正确的管理方式、适当的战略变化形成产业 竞争力，并保持竞争优势。激烈的国内竞争是创造和保持国际竞争优势最有力的刺激因 素。\n⑤  政府在创造竞争优势应当有所作为，首要任务就是尽力创造一个有利于生产率提升的良 好环境。\n⑥机遇包括重要发明、技术突破、生产要素供求状况的重大变动以及其他突发事件。\n(2)竞争优势的发展阶段\n根据一国优势产业参与国际竞争的过程，可以分为要素驱动阶段、投资驱动阶段、创新 驱动阶段和财富驱动阶段。\n(3)理论评价： 优点\n①突破以往国际贸易理论对单一因素的考察，综合权衡国内要素条件、市场状况、产业结\n构以及政策战略等因素，强调各要素综合作用；\n②接近当代国际贸易现实，对现实问题有一定解释能力；\n③第一次明确阐述了竞争优势的内涵，对于一国发展相关产业、获得竞争优势有指导意义。 缺点\n① 国家竞争优势只是把以往理论的观点以新的形式组装在一起；\n②缺乏规范的经济学语言和数学推导，难以成为理论；\n③过多强调了企业与市场的作用，政府仅是辅助因素；\n④选择的是已结构化或未完全结构化的产业，企业在这些产业中取得竞争优势较困难；\n⑤不适用于小型经济体和发展中国家。\n审题和思路： 简述单一理论需要包括概述一假设-内容-评价，这里是一道默写题。六个要素 需要详细答，四个阶段概括答，整个国家竞争优势讲了三四页，要把书上三四页的内容凝练 成 一 页 答 题 纸 的 内 容 ， 比 较 考 验 默 写 能 力 。","knowledge":["国际贸易理论"]},{"id":"2016_4","year":2016,"num":4,"type":"简答","question":"说明国际投资中国家风险的表现形式并简述预防措施。","answer":"(1)国家风险指东道国内发生的非预期性事件，导致投资者资产价值遭受损失的可能性。 国家风险存在于国际经济贸易、金融交易和投资活动中，通常由债务人所在国家的行为引起， 超出债权人的控制范围。\n(2)国家风险包括政治风险和金融风险。\n①政治风险包括政治冲突、动乱或武装镇压、国有化风险、对外关系恶化等。如东道国爆 发战争冲突，政府对企业资产国有化征用，政治腐败增加企业负担，对企业运作干预或 要求强制技术转移，这些都会给企业带来损失。\n②金融风险包括汇率风险、利率风险、通货膨胀风险、贸易差额风险，还包括贷款违约或 重组、延迟支付、东道国政府取消合约、外汇管制和利润汇回限制。\n③其他风险包括获准风险，即政府延迟批复对项目的授权或许可；法律变更风险，即政府 变更相关法律而导致项目开支增加。\n(3)国家风险的预防措施\n①实行系统的国家风险评估，全面了解东道国的社会经济和政治状况\nA.   风险回避：根据风险评估决定对该国是进入还是退出，是全方位还是小规模投资， 原则是除非发生战争等极端情况，不轻易停止投资计划，应采取有限回避的态度；\nB.   风险分散：采取经营项目分散化、投资主体分散化、投资形式多元化，此外，应控 制产品的分销渠道，使营销渠道或手段分散化；\nC.    参加国际投资保险，如海外投资保险、出口信用保险，以抵御或分散国家风险。\nD.   签订国家间的国际投资保护条约；同东道国谈判，减少今后发生国家风险的可能。\n②投后风险管理\nA.   与东道国妥协，使经营策略符合东道国政府的需要。如雇佣当地员工增加就业，出 让一部分股权，使用东道国原材料和零部件，扩大出口增加外汇储备；\nB.    合资经营。与东道国投资者共同持股子公司，降低国有化风险；\nC.   增加国有化难度。控制关键技术，让子公司指仅负责一个环节，控制出口市场；\nD.   通过掩护贷款等方式在东道国融资。\n③通过预先行动、谈判等方式应对强迫性股权稀释。","knowledge":["综合"]},{"id":"2016_5","year":2016,"num":5,"type":"简答","question":"简述名义汇率和实际汇率的区别和联系。","answer":"名义汇率（Nominal Exchange Rate）和实际汇率（Real Exchange Rate）是衡量货币对外价值的重要指标。\n\n一、定义\n- 名义汇率（E）：两国货币之间的比价，即一单位本币兑换多少单位外币（或相反）。\n- 实际汇率（RER）：经两国价格水平调整后的汇率，反映两国商品的相对购买力。公式：RER = E × (P*/P)，其中P*为外国价格水平，P为本国价格水平。\n\n二、区别\n① 计算基础不同：名义汇率直接由外汇市场供求决定，实际汇率还需考虑两国通货膨胀差异。\n② 经济含义不同：名义汇率只反映货币兑换关系，实际汇率反映两国商品的实际竞争力。实际汇率上升（本币实际升值）意味着本国商品在国际市场上的竞争力下降。\n③ 稳定性不同：名义汇率波动频繁（受短期资本流动、投机、政策干预影响），实际汇率相对稳定。\n\n三、联系\n① 购买力平价（PPP）：长期来看，名义汇率趋向于使购买力平价成立，即实际汇率趋向于1。\n② 名义汇率变化 + 通胀差异 = 实际汇率变化。若本国通胀高于外国，则实际汇率可能升值（即使名义汇率不变）。\n③ 实际汇率是衡量出口竞争力和贸易条件的关键指标，名义汇率是日常交易的基础。","knowledge":["国际金融"]},{"id":"2016_6","year":2016,"num":6,"type":"论述","question":"中国对某产品的需求和供给函数分别为Dc=3000-0.03P,Sc=1800+0.05P 。 美国对该产品 的需求和供给函数分别为Dus=2400-0.03P,Sus=2000+0.05P (1)求贸易前，两国的均衡价格和产量 (2)自由贸易后，国际市场的均衡价格、各国产量和贸易量为多少(无运输成本)。并说明 自由贸易对消费者和生产者福利的影响。 (3)如果中国对美国征收1000美元单位商品税，求两国的价格、产量与贸易量和关税对中 国生产者、消费者和政府福利影响，以及关税的净福利变化(与自由贸易相比)\n\n(1)  求贸易前，两国的均衡价格和产量\n(3)  如果中国对美国征收1000美元单位商品税，求两国的价格、产量与贸易量和关税 对中国生产者、消费者和政府福利影响，以及关税的净福利变化(与自由贸易相比)","answer":"(1)  求贸易前，两国的均衡价格和产量\n(2)   自由贸易后，国际市场的均衡价格、各国产量和贸易量为多少(无运输成本)。并说 明自由贸易对消费者和生产者福利的影响。\n(3)  如果中国对美国征收1000美元单位商品税，求两国的价格、产量与贸易量和关税 对中国生产者、消费者和政府福利影响，以及关税的净福利变化(与自由贸易相比)\n(1)封闭经济中，两国供给和需求相等时达到均衡\n由 Sc=Dc,  即3000-0.03P=1800+0.05P,  解得 P=15000,Sc=2550 同理，Sus=Dus,  解得 P=5000,Sus=2250。\n中国的均衡价格为15000美元，产量为2550 美国均衡价格为5000,产量为2250\n(2)当开发自由贸易\n①自由贸易后，两国市场合并，中美两国的供给和需求构成世界该产品的供给和需求 即 Dc+Dus=Sc+Sus:  3000-0.03Pw+2400-0.03Pw=1800+0.05Pw+2000+0.05Pw\n解得Pw=10000此时，Sc=2300,Dc=2700,  中国进口量为400 Dus=2100,Sus=2500,       美国出口量400\n②   中国市场的局部均衡\nQ\n自由贸易前，中国消费者剩余为a,  生产者剩余为b+e\n自由贸易后，中国消费者剩余为a+b+c+d,   生产者剩余为e\n贸易使得产品价格下降15000-10000=5000\n自由贸易使消费者剩余增加：b+c+d=(2550+2700)×5000/2=13125000 使生产者剩余减少b=(2300+2550)×5000/2=12125000\n社会净福利增加：13125000-12125000=1000000 ③美国市场的局部均衡\n自由贸易前，美国消费者剩余为a+b+c,  生产者剩余为e     自由贸易后，美国消费者剩余为a,  生产者剩余为b+c+d+e 消费者剩余减少b+c=(2100+2250)×5000/2=10875000\n生产者剩余增加 b+c+d=(2500+2250)×5000/2=11875000 社会净福利增加11875000-10875000=1000000\n可以发现，自由贸易使得中美双方的社会福利均增加。\n(3)若中国对美国征收1000美元的关税\n征收关税后，中国市场价格变为Pt=Pw'+1000, 美国市场价格不变：\n[3000-0.03(Pw'+1000)]+(2400-0.03 Pw')=[1800+0.05(Pw'+1000)]+(2000+0.05 Pw')\nQ\n解得，征税后的世界市场价格Pw'=9500, 则中国市场征税后价格Pt=10500 中国的供给与需求为 Sc=2325,Dc=2685,  进口量为360单位；\n美国的供给与需求为Sus=2475,Dus=2115,  出口量为360单位。\n自由贸易时，中国市场价格为10000,世界市场价格为10000,征收关税后中国市场价格为 10500,世界市场价格为9500\n政府税收为： c+e=(2685-2325)×10000=360000\n消费者剩余减少a+b+c+d=(2685+2700)×500/2=1346250 生产者剩余增加a=(2325+2300)×500/2=1156250\n社会总福利变动c+e+a-(a+b+c+d)=e-(b+d)= 1156250-1346250+360000=170000","knowledge":["国际贸易政策"]},{"id":"2016_7","year":2016,"num":7,"type":"论述","question":"分析生产分割和外包的理论基础，并举例说明。","answer":"(1)生产分割和外包\n生产分割是指企业将产品研发、制造和营销等连续活动拆分成若干个独立进行的阶段， 将不同阶段分布到不同的国家和地区进行，企业根据每个阶段的产品特性和工厂区位条件等 因素决定生产地点，形成以工序和区段为基础的国际分工体系。\n外包是指企业为维持组织的核心竞争力，将组织的非核心业务委托给外部独立的专业公 司，以降低营运成本、减少资金投入，将精力集中于主要业务。外包的业务可以是制造的某 个环节，也可以是广告、物流、人力资源等职能。\n生产分割实际是垂直型的组织分工形式，企业通过内部的垂直一体化或外部的制造外包\n完成中间产品的生产。\n(2)理论基础包括：\n①基于比较优势理论的对生产分割的解释。\n产品内贸易理论发展了比较优势的思想，认为最终产品在零部件生产的各环节也存在资 本、劳动、技术要素投入的比例差异，各国从事哪一个环节的生产和贸易，最初取决于其拥 有的生产要素状况。 一国不需要在完整产品上拥有比较优势，只要在该产品某一个环节或工 序上有特殊的比较优势，就可以参与国际生产分工。\n②基于不完全竞争和规模经济的对生产分割的解释。\n不完全竞争和规模经济也对同一产品内部的零部件生产分工有着明显影响。规模经济认 为，产品生产成本随着其产量递增而减少，收益随之上升的现象。一方面，由于同一产品的 不同生产环节的有效规模不同，当一国从事完整的生产过程，只能依据某个关键环节来安排 生产规模，不得不受制于“木桶效应”,达不到规模经济。但是将不同环节安排到不同国家和 地区，就能发挥各个厂商的规模优势，并降低成本。另一方面，全球化生产需要在全球配置 完善的交通、通讯、公共设施等服务，属于固定成本，呈现明显的规模成本递减的特点。\n③  基于内部化理论对生产分割的解释。\n巴克利和卡森的内部化理论认为，当存在市场不完全外部导致交易费用过高时，企业倾 向于用内部化的方式实现国际化，降低交易成本。因此，当寻求海外中间商生产时，如果交 易成本过高，企业则通过垂直一体化在海外中间产品的生产，而如果交易成本较低而内部化 成本过高，则通过制造外包进行中间产品生产。\n④基于垂直型跨国公司理论的解释\n赫尔普曼的垂直型跨国公司理论在H-O 模型的基础上，基于完全竞争和规模报酬不变 的假设，加入了跨国公司，认为不同的生产阶段具有不同的要素密集度，而国际间要素禀赋 的差异导致同一要素价格的国际差异，产品各个工序的要素密集度不同，最优生产区位不同， 为了追求低成本不同工序环节配置到不同地区生产，产生了国际生产分割。\n马库森将公司的活动分总部活动和工厂特定活动，跨国公司面临水平型公司和垂直型公 司的选择。总部活动密集使用高技能工人，生产活动密集使用低技能工人，当本国和外国规 模相近，但在高技能与低技能工人之间存在要素禀赋差异时，垂直型的跨国公司组织更有优 势，因此会产生总部和工厂之间的生产分割。\n⑤基于新新贸易理论的解释。\n新新贸易理论从微观层面说明企业国际化动因。Antras的企业内生边界模型认为，高生 产率的企业选择在外国生产中间产品，而低生产率企业只能在本国生产中间产品。对一国内 部企业的组织形式选择上，低生产率企业倾向于外包形式，而高生产率企业倾向于垂直一体 化形式，而对于跨国外包的选择上，低生产率企业选择本国，而高生产率企业选择外国。企 业内生边界模型较好解释了中间产品的外包与一体化选择问题。\n⑥基于资源基础观及核心竞争力的解释\n企业的核心竞争力理论认为，企业有各种各样的能力，只有能给企业带来长期竞争优势 和超额利润的能力与专长，才是企业的核心能力。企业可以通过制造外包或者服务外包，把 非核心的业务交给外部的服务商，而将有限的资源投入到增强自己的核心竞争力中。由于全 球化的发展，当外包的对象是国际合作伙伴时，就发生了国际外包现象。\n(3)举例：\n苹果公司核心是负责手机设计、IOS 系统的研发、升级、维护，掌握苹果的核心环节， 而通过垂直一体化和制造外包的方式将 iPhone的各个工序分布在世界不同地区。iPhone的 关键部件制造和供应分布在中国、德国、日本、韩国、马来西亚、泰国和新加坡等地，苹果 计算机、iPhones、iPads 和 iPods 装配在中国完成。iPhone  供应链中，每个生产者购买上\n游原料或中间产品，经过加工的零部件，销售后转化为下一生产阶段的成本，最终形成 iPhone产品。这是生产分割和制造外包的体现。\n(2)传统贸易理论只能部分解释生产分割，不同地区确实拥有不同的比较优势和要素禀赋。 然而，传统理论不能充分说明生产分割现象，比较优势论和要素禀赋论分析的是简单进出口  贸易，而生产分割是复杂的加工贸易，李嘉图模型会曲解贸易的利益分配。如我国作为世界  制造工厂，从出口额统计口径对美大量顺差，但从生产增加值的角度，顺差会大幅缩减，中  国真正得到的利益只是加工附加值。这是传统贸易理论的明显局限。\n(3)能够解释公司内贸易、产品内贸易以及垂直型国际投资现象的理论基本适用于生产“分”\n“割”。首先，显然，涉及外部与内部的生产选择理论是内部化理论，能够解释国际生产的 组织形式，这是外包最重要的理论基础；其次，赫尔普曼垂直跨国公司模型(要素禀赋论) 也是垂直型投资的代表；再次，产品内贸易理论(比较优势或规模经济)主张每个国家依据 本国的比较优势参与产品的不同生产环节；最后，新新贸易理论(公司内贸易理论)的企业 内生边界模型直接解释了中间产品的一体化与外包选择模式；这四个理论与垂直型的产品内 分工直接相关，比较契合。\n(2)运用理论方面，公司内贸易理论和产品内贸易理论比较复杂，相当一部分同学无法掌 握，挑战性较高。如果不会垂直型FDI 理论和公司内贸易理论，答贸易理论也没有错。\n(3)最典型的举例是波音公司的零部件生产和苹果手机的零部件生产，这两个例子在国际\n投 资 里 面 都 读 到 过 ， 任 选   个 。投 资 里 面 都 读 到 过 ， 任 选   个 。一","knowledge":["综合"]},{"id":"2016_8","year":2016,"num":8,"type":"论述","question":"现今各界对于中国对外投资以合资企业和独资企业的方式那种比较好各执一词，请你谈 谈你对于合资企业和独资企业的理解和看法。","answer":"(1)  合资经营和独资经营都属于市场进入模式的股权模式。\n①合资企业指共同投资的各方按一定比例的股份出资，共同组建独立法人地位、独立核算、 独立经营的企业。合资企业的优点包括：\nA.   从合作处得到东道国经济、政治、文化等的知识；\nB.    分摊市场开发的风险和费用；\nC.   政治上可能只允许合资；\nD.   面临国有化和干预的风险低；\nE.  合资企业被视作东道国企企业，能减少当地民众的抵制，享受政策优惠 合资企业的缺点包括\nA.   技术泄密风险大；\nB.     总公司对分支机构控制不足；\nC.   合资股东之间目标不一致，争夺控制权；\nD.   无法独享全部利润。\n② 独资企业指母公司持有子公司100%的股权。独资企业的优势包括：\nA.    最大限度保护技术；\nB.    总公司控制力强，企业全球协调能力强；\nC.   利于实现区位经济和规模经济；\nD.   独享全部利润；\nE.  不存在控制权争夺问题。\n独资企业缺点包括：\nA. 成本高，风险大；\nB.   独资企业缺乏对东道国环境的了解，经营风险高；\nC.   独资企业被当地政府视为外国企业，面临政治风险大，某些领域不允许独资；\nD.   东道国对独资企业和本土企业实行差别待遇。\n(2)  中国企业走出去过程中，合资和独资的模式并存，合资模式更受欢迎。\n①采用合资形式的考虑因素是政策可行性。中国对对发展中国家投资所占比例较高，而新  兴市场国家的开放程度相对低，对外资的持股比例往往有着限制，不能占有多数股权。 中国对外投资传统行业所占比重高，对于能源开发等特定行业，东道国往往也有着较严  的管控。因此，东道国的所有权和运作限制使得合资是更优的选择。\n②相较于大型跨国公司，中国企业对外投资的风险管理能力、风险承担能力较弱，出于分 担风险的考虑需要合资经营。\n③此外，中国企业对外投资多以现金支付，对企业走出去的融资支持力度有限，资金实力 和融资能力制约了设立全资子公司。\n④而随着中国企业发展方式和对外投资结构的调整，越来越多企业(尤其是互联网企业) 凭借技术优势实现跨国经营，出于对技术的保护，独资经营的比重正在提高。\n⑤  【选答】合资经营与独资经营的方式相互转化。如果东道国外资政策出现松动，中国企 业可以提高对合资企业的持股比例达到多数控股甚至全资控股；如果东道国的政治风险 显著上升，可能面临民族主义政党或排华势力上台，那么调整独资模式为合资模式，能 够降低风险。\n总之，选择独资或合资要根据企业的特点具体问题具体分析，选择最适合本企业的经营方式。","knowledge":["综合"]},{"id":"2016_9","year":2016,"num":9,"type":"案例","question":"从贴牌到创牌，格兰仕的品牌“蝶变”【案例由小鹿学姐整理，素材来自网络】 2015年9月，代表全球最高水平的柏林国际电子消费品展览会首次设立中国品牌馆， 格兰仕展台前人头攒动，设计颖、功能强大、技术前卫的格兰仕系列产品，引起了欧洲客商 和消费者的浓厚兴趣，除了欧洲，在北美市场，格兰仕微波炉已经布满了传统卖场最显耀位 置。经济进入新常态，正处于新动能转换阶段格兰仕总裁梁昭贤认为，对于家电业来说，改 变过去代工“贴牌”生产方式，实施品牌“走出去”战略，是适应“新常态”的最好应对。","answer":"2015年9月，代表全球最高水平的柏林国际电子消费品展览会首次设立中国品牌馆， 格兰仕展台前人头攒动，设计颖、功能强大、技术前卫的格兰仕系列产品，引起了欧洲客商 和消费者的浓厚兴趣，除了欧洲，在北美市场，格兰仕微波炉已经布满了传统卖场最显耀位 置。经济进入新常态，正处于新动能转换阶段格兰仕总裁梁昭贤认为，对于家电业来说，改 变过去代工“贴牌”生产方式，实施品牌“走出去”战略，是适应“新常态”的最好应对。\n从鸡毛掸子到家电全系列\n记者来到格兰仕位于中山的生产基地，新落成的智能化工厂展现了全新的生产能力，分 装、总装、打包、入库…… ·生产的全过程实现了高度自动化，从这里下线的微波炉及各类家 电产品销往全球200多个国家和地区。“可能很少有人知道，格兰仕的前身就是一群不愿意 挨饿的人在1978年办起来的一个乡镇企业，当时的产品是鸡毛掸子。”梁昭贤介绍说。格兰 仕微波炉生活电器外贸公司总经理李淑玲清楚地记得1996年第一次参加广交会的情景，她 一个人扛着一台微波炉、两个电饭煲进了展馆，展台还是“借用”别的外贸公司的一个角落。 尽管如此，那一届广交会格兰仕还是获得了两三台订单，撬开了世界市场一条门缝\"。\n以此为起点，格兰微波炉在国内国外两个市场迅猛发展，1997年格兰第一次拿到了出 口南非的直接订单，1999年出口新西兰的订单实现了以自主品牌“格兰仕”的首次出口，也  同样是在1999年，格兰仕成为全球最大的微波炉生产企业同时格兰向空调、冰箱，洗衣机、 小家电等白色家电全线拓展，凭借优异的性价比和可靠的质量，格兰仕成为家电业“世界工  厂”里的一个标志企业“与改革开放同行，格兰仕抓住了发展机遇。”梁贤感慨地说：“过去求生  存、求发展是这样：现在转型升级，从中国制造走向中国品牌，从局部领先发展到综合领先， 也同样要抓住机遇。\n以自有品牌 ·布局全球\n北美市场，全球品牌竞争最激烈的市场，有的企业不敢轻易涉足，怕陷入泥潭，有的企 业则视为“走出去”必须攻克的高地。“当初开拓北美市场说起来特别心酸，当地主要超市里 摆满了各种外国品牌的微波炉很多都是格兰仕多年为他们贴牌生产的但与当道商和超市接 触一谈到格兰仕品牌进超市的合作计划，对方均断然说 NO”格兰仕海外市场管理部副部长 刘清字表示，这从一个侧面说明了国外市场对中国企业品牌经营的怀疑，他们不相信中国品 牌能够在北美市场站住脚跟。梁昭贤说，目前中国品牌“走出去”正面临一个前所未有的机遇， 过去粗放的发展方式正转向质量的发展模式，创新驱动成为企业发展的共识，“一带一路”建 设带来新的机遇，也迫使企业提升“走出去”的水平和层次。\n从以标准化OEM ( 贴牌生产)及ODM (自主设计生产)方式服务欧美消费者，到以自 主品牌输出中东、非洲等新兴市场，格兰仕不断寻求与行业先进技术和有实力的国外品牌进  行深度合作，并通过建立海外营销分公司、和客户合资等多样化的形式进行自主品牌的开拓。 通过把当地品牌转化为格兰仕制造，格兰仕在北美市场站住了脚跟。在此基础上，格兰仕进  一步完善品牌经营支撑体系，自主品牌顺理成章走进了北美市场。几轮竞争下来，格兰仕已  经在北美市场牢牢扎下了根。格兰仕目前除了在北市场外，在欧洲市场也逐步亮出自主品牌， 中东市场自有品牌达到40%,东南亚、非洲市场以自有品牌为主，格兰仕还在全球10多个  国家和地区建立了商务机构，自主品牌已在全球60多个国家和地区进行销售。\n给未来插上飞翔的翅膀\n格兰仕集团企划部部长游丽敏介绍，格兰仕注册了产业互联网品牌“UU”这个专供网售、 专注年轻人需求的品牌，成了格兰仕互联化的一张“名片”。“UU”只是格兰仕创新发展的一个  小小的例子，绕制造自动化、管理信息化、品牌国际化、企业人性化、将兰仕正在加快企业  的转型升级步伐。仅在研发投入、技术装备更新和智能化工厂建设方面，格兰仕近年来的投  入就超过了过去30多年的总和，各项发展战略已经全面铺开。\n格兰仕联合中国科学院计算技术研究所开发的“G+智慧家居平台”已经投入使用，依托 该平台，格兰仕相继开发出成系列的智能家居产品，互联网正在深刻地改变着格兰仕依托 “G+”平台和理念，格兰仕无论是线上还是线下，都打开了广阔空间目前格兰仕已经将北美 办事处搬到硅谷，利用硅谷的学术团队和人才优势，规划未来。梁昭贤表示，创新的速度是 真正的竞争力，现在强调自主创新，更强调分工合作，要集中力量整合全球最顶尖的人才和 创新团队，把全球最前沿的技术以最快的速度产业化、商业化。“给梦想插上翅膀，未来就 会飞。”梁昭贤表示，无论怎样飞翔，格兰将始终不忘提升中国制造的责任。\n(1)  格兰仕为创立自有品牌做了哪些努力?(5分)\n大卫 · 艾克提出了品牌资产理论，认为品牌资产是品牌带来的附加利益，实质上反映了 品牌与顾客的关系。格兰仕通过扩大品牌知名度、增强品牌美誉度、提高品牌忠诚度和创造 品牌联想，打造自主品牌，形成品牌资产，为消费者和企业提供附加利益。\n①格兰仕扩大品牌知名度的努力：\nA.    积极参与各类外贸展览会，不遗余力宣传自有品牌；\nB.    加快品牌国际化，布局60多个国家和市场，形成全方位的品牌推广。\n②增强品牌美誉度的努力：\nA.    将粗放的发展方式转向质量的发展模式，优化产品声誉；\nB.    加大研发投入，整合人才团队，以增加品牌的创新价值，打造高质量品牌。\n③提高品牌忠诚的努力：与国外品牌进行深度合作，并通过建立海外营销分公司，和客户 合资，形成品牌的长期影响和深度影响。\n④创造品牌联想的努力：\nA.    注册互联网品牌“UU”,  打造专注年轻人需求的品牌，成了格兰仕一张“名片”;\nB.    研发\"G+智慧家居平台\",形成了互联网+智能家居的特色和理念。\n提示：品牌资产论是影响力较强的品牌理论，这里引入了品牌资产论，把格兰仕建设自主品 牌的做法归为扩大品牌知名度(来源于传播影响力)、增强美誉度(来源于质量和服务)、提 高忠诚度(来源于长期维护和重复购买)和创造品牌联想(来源于形成特色),最终自主品 牌的作用是带来附加价值，刚好与第二问的问法承接。\n(2)  你如何看待格兰仕创立自有品牌?(7分)\n承上题，格兰仕从OEM 到 ODM, 打造自主品牌，以自主品牌布局全球，形成了品牌 资产“溢价”为生产者和消费者创造了附加利益，进而扩大了市场份额，增强了竞争力，最 终获得了更多利润。自主品牌的作用包括：\n①市场定位：格兰仕可以根据品牌的特色进行市场细分，在不同的细分市场使用不同的品 牌，满足消费者个性差异。\n②市场扩张：格兰仕通过自主品牌形成了营销竞争力，扩大销路，占领海外市场，形成消 费者忠诚，刺激消费者重复购买。\n③市场竞争：格兰仕的品牌是一种特有资产，产品易被模仿而品牌不易被模仿，因此自主 有助于企业抵御竞争者攻击，保持竞争优势。\n④产品创新：格兰仕通过品牌建设，能够进一步推动研发和创新，采用现有知名品牌，推\n出新产品。\n⑤企业经营：自有品牌可稳定产品的价格，减少价格弹性，增强格兰仕对市场的适应性， 减少未来的经营风险。同时，品牌能形成和强化企业文化，增强员工对企业的认同感， 优化经营管理。\n格兰仕自主品牌建设对中国制造业参与国际分工、改变中国企业的价值链定位有借鉴意义。\n①长期以来，我国参与对外贸易基础是劳动力低成本优势，产品主要是劳动密集型产品， 技术含量较低，起初格兰仕OEM 策略也符合这一情况。在这种分工格局中，中国企业 处于微笑曲线的低端，缺乏研发实力和品牌实力带来的价值增值，尽管中国是制造大国， 但无法成为制造强国。\n②格兰仕自主品牌建设使其突破了在价值链分工中的定位。一方面，格兰仕借助互联网时 代的机遇，与科研院所合作，加强自主创新和产品研发，增加上游附加值，同时，通过 营销和品牌建设，实现向高附加值产品的转化，增加下游附加值，给未来插上飞翔的翅 膀，是中国制造业转型的典范。\n③未来，中国需要更多自主品牌出现，走出国门，实现“中国制造2025”的腾飞。\n(3)  格兰仕品牌国际战略中，还将遇到哪些风险?谈谈如何解决。(8分) 格兰仕面临的外部因素 (EFE) 风险包括：\n①竞争者威胁：国际品牌战略不可避免地踏入与西门子、通用电器等家电行业巨头的竞争， 这些竞争者的品牌优势更强，作为先入者的积淀更深厚，威胁格兰仕的品牌地位。\n②消费者的挑战：\nA.   不同市场的消费者需求有差异性，标准化难以满足消费者口味，损害品牌声誉；\nB.    消费者需求存在有动态变化，如果不能紧跟消费者需求变动，则会丧失品牌忠诚。\n③  国别差异的挑战：各国的政治经济文化差异产生“水土不服”风险。\n④行业变化风险：\nA.   海外市场波动会导致市场需求缩减，引发市场风险\nB.    电器产品更新换代迅速，旧的品牌和技术容易被淘汰。\n格兰仕面临的内部因素 (IFE) 风险\n①组织管理风险：格兰仕规模扩大面临管理困难，产生规模不经济，企业管理能力跟不上 品牌海外扩张。\n②财务管理风险：产品研发和品牌建设投入大，投资回报不确定，规划不合理则会产生亏 损，甚至造成资金链断裂。\n③经营管理风险：品牌经营是长期过程，如果营销、服务等环节出现失误，一个品牌的失 败会损害品牌整体形象。\n对此，可以采取的策略包括：\n①增强核心竞争力。坚持发展智能家居，将物联网技术、智能识别技术与传统电器结合， 形成产品的稀缺性和不可替代性，挑战外国电器设备商的地位。\n②组织管理变革。梳理组织架构，成立地区分部或产品分部结构，增强组织的反应调试能 力，配合国际品牌建设。\n③差异化战略和本土化战略。在价值创造上坚持消费者导向，提供优质的服务，关注文化 差异产生的需求，处理好标准化与战略之间的关系。\n④多品牌策略。随着业务的扩展，单一品牌不能满足产品多样化的需求，格兰仕可以扩展 多品牌，进而保护自己的核心品牌。\n⑤加强风险控制。保持财务稳健、采取合理的融资策略，尤其注意管理市场开发和产品开 发失败可能带来的潜在损失。","knowledge":["跨国公司与国际化","新兴议题","国际商务管理"]},{"id":"2016_10","year":2016,"num":10,"type":"案例","question":"固特异轮胎的分销变革 【案例由小鹿学姐整理，素材来自网络】 固特异轮胎暨橡胶公司通过其强大的固特异独立经销商网络独家销售备用轮胎已有60 多年的历史，固特异和它的2500家经销商都受益，经销商们拥有享有盛誉的固特异轮胎产 品独家销售权。但是，在1992年，固特异开始打破传统，宣布它将通过西尔斯公司的汽车 中心销售固特异牌轮胎。无疑，这是对固特异原有经销商们的一次沉重打击，因为这使他们 处于和零售商巨人西尔斯公司直接竞争的地位。这次对原先神圣不可动摇的经销商网络的背 弃，使许多经销商感到震惊和愤怒。 一位固特异经销商说：“就像是结婚35年之后，你的 ‘爱人’在做不忠于你的事。”另一位则说：“我感觉就像他们在我背后捕了一刀”。","answer":"固特异轮胎暨橡胶公司通过其强大的固特异独立经销商网络独家销售备用轮胎已有60 多年的历史，固特异和它的2500家经销商都受益，经销商们拥有享有盛誉的固特异轮胎产 品独家销售权。但是，在1992年，固特异开始打破传统，宣布它将通过西尔斯公司的汽车 中心销售固特异牌轮胎。无疑，这是对固特异原有经销商们的一次沉重打击，因为这使他们 处于和零售商巨人西尔斯公司直接竞争的地位。这次对原先神圣不可动摇的经销商网络的背 弃，使许多经销商感到震惊和愤怒。一位固特异经销商说：“就像是结婚35年之后，你的‘爱 人’在做不忠于你的事。”另一位则说：“我感觉就像他们在我背后捕了一刀”。\n有好几个因素导致了固特异销售系统的变化80年代末期，大规模的国际合并浪潮重组 了轮胎行业，最后只剩下了5个竞争者。例如，日本的石桥( Bridgestone) 公司兼井了凡 士通公司 (Firestone), 德国的大陆 ( Continental) 收购了通用轮胎公司 (General Tire),意 大利派利公司 ( Pivelli) 吞并了阿姆斯特朗公司 ( Armstrong), 还有法国的米其林(Michelin) 公司兼并了UG公司(Uniroyal Goodrich。60年来一直位居世界轮胎制造业老大的固特异公 司已经落在米其林公司之后而屈居第二。作为惟一幸存者的一家美国轮胎公司，固特异发现 它在与强大的、新近补充了能量的国际竞争者争夺美国市场份额时已不能再像对付国内较小 的竞争者那样随心所欲。\n雪上加霜的是，消费者对怎样及到哪儿购买轮胎的观点正在发生变化。与以前相比，买 轮胎更具冲动性，并且在意价值的轮胎购买者越来越多地从更便宜的多品牌折扣商店、百货 商店和仓库俱乐部中购买轮胎。这些商店所占有的市场份额在过去5年中增长了30%,而轮 胎经销商的市场份额却下降了4%。由经销商包销，固特异就不能把轮胎放在许多消费者购 买轮胎的地方。消费者购买方式的转变也给经销商造成了很多问题。尽管固特异为其经销商 提供充足的各色溢价轮胎产品，但是却不能提供许多消费者需求的低价轮胎。进入90年代， 固特异这座大厦开始坍塌。尽管在美国它仍位居第一，但是它在美国备用轮胎市场中的份额 仅在5年之内便下降了3%。在与持久的经济衰退和来自米其林公司和桥石公司的各种价格 竞争的博斗中，固特异公司产生了自大萧条以来的和一个亏损年，因此急需补救办法市场营 销、销售以及相关变革使固特异公司重新进入良性运转状态。在高特领导下的第一年，固特 异的销售量和利润直线上升，市场份额增加了1%,股票价格翻了4番到了1993年和1994 年，固特异创造的利润比它的直接竞争者的利润总和还多。拓展销售系统成了固特异公司的 一个重要的促进因素，例如西尔斯公司独自控制着10%的美国备用轮胎市场，对固特异公司 来说，只要在西尔斯轮胎业务中占20%便意味着每年可多售300万只轮胎，足以挽回公司先 前丢失掉的一半以上的市场份额。\n但是，从长远来看，开发新渠道有失去固特异包销商网络忠诚和效益的危险——这是公   司最珍贵的主要竞争资产之一。为了实现尽可能大的效益，固特异公司应该与其经销商进行   协调、合作。但是，固特异与西尔斯及其他零售商们的达成的协议引起了经销商们的强烈不  满。一些气愤的经销商开始采取报复性手段——经营并大规模促销更便宜的私有品牌的轮胎， 这些私有品牌的产品能带给经销商更多的利润，同时对一些注重价值的消费者更具有吸引力。 经销商的这些做法最无疑会削弱固特异的名声，并减少固特异公司所要求的溢价。固特异采   取了一些行动来支持这些处于焦急状态中的经销商。例如，它开始向经销商提供急需的低价   固特异轮胎系列。固特异衷心地希望扩大后的销售渠道能更多地帮助它的经销商而不是伤害   他们。最后，高特认为通过西尔斯的销售能使固特异的名声更大，销售渠道的拓宽为经销商  可以带来更多的盈利，但许多经销商表示怀疑。从长远来看，经销商的不合作将减弱固特异  的市场力量，并抵消从新渠道中获得的销售收益。例如，在和西尔斯宣布合作之后不久，固  特异在佛罗里达的一位大经销商就接受了几种低价私有品牌的轮胎产品，使固特异的轮胎销  量减少了20%,但利润却增加了。这位提出挑战的经销商说：“我们现在只卖我们认为能给顾  客提供最好价值的产品，因此并不总是固特异。”所以，尽管固特异公司可能又在滚滚前行， 但是行程却并没有结束，前方路上还有许多障碍。\n所幸的是从2003年底开始，固特异公司的总经理罗伯特在逐步将公司从原先的财务困 境中扭转过来，开始深刻地意识到与经销商之间的关系的重要性，也明白是需要好好整顿的 时候了该公司承认自己忘记了一个不可颠扑的事实，那就是公司的利益应该是和经销商的成 功息息相关的。经销商经营不善，公司也不可能蒸蒸日上。有了深刻的认识，下一步就是实 际的行动了。现在固特异的经销商们通过一部分批发商来统一价格，供货率也得到了一定的 提高。更重要的是，固特异给旗下的经销商提供了一个只供应给他们的热门产品：含有保修 保证的轮胎。顾客在通常的折扣店、大卖场或是网上，是无法购得这样的产品的，他们必须 到固特异指定的经销商那里购买。这一产品上市后，销售量超过了公司的预测。固特异尝到 了甜头，准备扩充产量以满足市场需求，而且，更让经销商们惊奇的是固特异也开始重视起 他们的意见。有一个经销商很激动地说，固特异已经邀请他参加了4次座谈会，这在过去是 闻所未闻的。\n(1)  简述4P理论并结合固特异案例分析。(8分) 4P 理论是麦卡锡提出的经典营销理论，包括产品(Product)、定价(Price)、渠道( Place)\n和促销 (Promotion)。结合案例分析如下。\n①产品指能够提供给市场的用于满足人们某种需求的实物和服务。产品的整体概念包含核 心产品、有形产品和附加产品。固特异的核心产品包括溢价轮胎产品和低价轮胎产品， 产品分类组合较简单，难以满足不同消费者口味。后来，固特异推出含保修服务的轮胎， 保修服务是轮胎产品的附加产品，增强了产品竞争力。\n②定价指顾客购买产品时的价格，包括折扣、支付期限等。影响定价的因素是多方面的， 包括定价目标、产品成本、市场需求、竞争者等，常见定价方法包括成本定价法、需求  定价法、竞争定价法。固特异的定价方法主要是竞争定价，通过折扣策略与米其林公司、 桥石公司等竞争对手进行价格搏斗，保持在轮胎市场的市场份额。\n③  分销渠道是指某种产品和服务在从生产者向消费者转移的过程中，取得这种产品和产品 的所有权或帮助所有权转移的所有企业包括经销商(它们取得商品所有权)和代理商(它 们帮助转移所有权)。固特异采取了中间商渠道策略，由经销商独家包销固特异轮胎产 品，之后与西尔斯公司合作销售轮胎产品，扩宽了销售渠道，更加接近消费者。\n④ 促销指企业根据需要，对广告、活动促销、上门推销和公共关系等各种促销方式进行适 当的选择和综合配置。固特异与西尔斯公司合作，能通过西尔斯公司开展折扣促销；此 外，提供给经销商的附保修的轮胎也具有销售促进作用。\n(2)  用产品创新理论分析固特异的产品创新策略(5分)\n产品创新是指创造某种新产品或对原来产品进行创新。罗伯特 ·库珀对产品创新作出了 定义，认为产品创新可以归为六种类型：全新产品、新产品线、已有产品品种的补充、老产 品的改进、重新定位的产品、降低成本的产品。\n①全新产品：这些新产品是首次投放市场，真正创造了一个崭新的市场。\n②  新产品线：这些产品虽然对于市场来说不是崭新的，但是对于特定的公司来说确实是崭 新的。它们使得公司可以第一次进人一个已经建立起来的产品种类或者市场。\n③已有产品品种的补充：它们对于公司来说是新的，但是它们是公司已经存在的产品线上 可以制造的。它们也可能代表了一种市场上新出现的产品。\n④  老产品的改进：这种不算很新的产品是公司现有产品线的一种替代。\n⑤重新定位的产品：这是指对于已有产品的新的应用，经常包括将现有产品投放到新的目 标市场中或者一种新的应用。\n⑥  降低成本的产品：这是所有新产品种类中最不“新”的一种。它们是用来代替公司现有产 品的产品，但是它们以较低的成本创造了相同的收益和绩效。从市场的观点来看，它们 并不是新产品；但是从设计和生产的角度来看，它们可能代表了重大的改变。\n固特异意识到与经销商之间关系的重要性，为经销商提供了一个只供应他们的热门产品， 提供含有维修保证的产品，这种产品对公司来说是新产品，以往市场中并不存在，因此刺激  了消费者购买，扩大了产品销量。固特异通过产品创新，改善了和经销商的关系，促进了产  品销售。\n(3)   如何解决固特异因为开发新渠道而失去传统分销商的困境(7分) 答案一：并购\n开发新渠道影响了固特异传统分销商的利益，尽管固特异试图消除疑虑，但经销商依然 保持怀疑。这一问题实际表现为固特异对经销商的“无法控制”,造成交易成本和风险，根据 交易费用论，当交易费用大于并购成本时，固特异可通过并购的方式实现一体化，控制分销 渠道。\n①在并购目标上，固特异应首先收购财务状况不佳的经销商，因为这些经销商股价或估值 较低，能够节约并购成本；同时，并购亏损经销商有避税的效果。\n②  在并购规模上\nA.   对规模小的分销商，固特异可采取多数持股的方式，获得分销商51%的股权，将经 销商变为控股子公司，进而完全影响分销商的销售决策；\nB.    对规模较大的分销商，实现控股过于困难，固特异可采取少数持股的方式，以股东 的身份影响经销商的销售商品选择；或者采取联合控制的方式，与其他股 东结成一致行动人完全控制销售决策；\nC.    考虑到固特异轮胎本身的规模以及分销商数量众多，更多情况应当选择持有少数股 权。\n③在支付方式上，除了现金支付，固特异可以向其主要分销商出售少部分母公司股权，可 设计“股权换股权”的交叉持股模式，结成利益共同体。主要经销商获得固特异股权之后， 即使固特异通过新渠道实现了业绩增长，也不会动摇经销商的利益，因为经销商能够从 所持股权中获得分红收入和股价上涨收益；经销商也有更强的动力销售固特异产品，帮 助其提高业绩。\n④  在并购条款中，固特异可加入“对赌协议”的业绩要求，比如，未来三年经销商 完成固特异产品到一定的销售额，固特异可支付额外的收购溢价，以此推动固特异的产 品销量。\n⑤ 并购战略上，当固特异能控制足够多的经销商，可以将经销渠道进行整合重组， 成立专属汽配销售公司，变中间商模式为直营模式，增强销售竞争力，对抗米其林等竞 争对手。\n总之，并购经销商的方式可以帮助固特异控制下游销售渠道，解决无法控制经销商的困 境。甚至可产生协同效应，开辟新的业务领域。但是，并购模式非常复杂，存在估值过高等 风险，需要谨慎完善并购方案。\n考 点 提 示 ：“无法控制”经销商的实质是“外部性”,那么解决方案就是“内部化”,通过企   业收购的方式实现前向一体化，完成销售渠道整合。某种意义上讲，这是一种“治本之策” (相较于供应链激励机制),因为无论如何激励经销商，无论给多少的奖励，经销商都能选   择不与固特异合作，总有情形让固特异再度陷入失去分销商的困境，谈判的成本甚至可能越   来越高，所以内部化更加一劳永逸。\n答案二：构建良好的中间商关系\n固特异可以采取合作、合伙和分销规划的方法解决与经销商的矛盾。\n① 合 作 ：\nA.   固特异可对经销商采取高利润、奖赏、津贴、销售竞赛等手段激励。如对年销售规 模大、业绩排名前三的经销商设置销售奖励，颁发“年度优秀经销商”荣誉，在企业 文化、企业合作中作为典例进行宣传，让经销商赢得更广泛的声誉。对集中订货经 销商，给予一定的规模折扣，帮助经销商降低成本，提高利润。对销售额保持连续 增长或优于上一年销售表现的经销商，给予一定津贴奖励。\nB.    如果产生极不配合的经销商，固特异应当劝说和减少怀疑，极端情况可采取适度惩 罚的机制，减少为它们提供的服务。\n② 合伙：\nA.   与经销商建立长期合伙关系，分析与经销商的诉求，取得经销商信任。提出战略联 盟合作，签订长期营销合作框架协议。在战略联盟的设计中，一方面，固特异保证 向经销商提供部分特供商品，或者为经销商供货给予折扣。经销商能获得轮胎产品 的独占优势或成本优势，增强市场竞争力，间接促进固特异产品的销售。另一方面， 经销商应当承担保证销售固特异轮胎的责任，承诺固特异产品在其总销售产品中占 有较高比例，这样固特异在一定时期内，避免陷入失去经销商的困境。\nB.    正式联盟协议能产生比销售合同更强的约束力，促使生产商和销售商之间优势互补， 在正式战略联盟的基础上成立交叉持股联盟，更够结成更深的利益共同体。\n③  分销规划：\n建立一个有计划的专业化市场营销系统，确定与经销商的交易目的、存货水平、陈列计 划、广告与促销计划，将经销商的销售纳入固特异的整体规划中来，充分考虑经销商的 意见。改变经销商的不利看法如“销售其他轮胎，而不总是固特异”,让固特异相信经销 商和生产者本是一体赚钱的，而不是让经销商联合消费者对抗固特异。\n结合时代背景可以联想全球市场饱和，材料体现了竞争对手通过并购增强实力、消费者消费 习惯改变等因素，还需要考虑固特异本身的实力不足和战略决策问题。\n◎","knowledge":["国际商务管理"]},{"id":"2017_1","year":2017,"num":1,"type":"简答","question":"简述特定要素模型的主要内容以及和国际贸易的关系。","answer":"要素在短期内具有不可流动性，只能限制在某一部门，故称为“特定要素”。短期内，特 定要素将影响国际贸易的收入分配格局。萨缪尔森和琼斯等人发展了HO 模型的理论，提出 了特定要素模型。\n(1)模型假设：\n①一国能生产两种产品，一种是制成品机器 (M),   另一种是农产品 (F);\n②该国有三种生产要素，劳动 L ( 工资),资本K (利率),土地T ( 租金);\n③农产品用土地和劳动生产(不用资本),制成品用资本和劳动生产(不用土地);\n④劳动同质，可以跨部门流动，劳动充分就业；土地和资本是特定要素，不能跨部门流动；\n⑤规模报酬不变；\n⑥市场结构是完全竞争市场。\n(2)理论内容\n① 【 选 答 】生产要素增长的影响\n特定要素土地增加以后，粮食部门边际产值上升，劳动力L 流向粮食部门，粮食部门产 量提高，均衡工资上涨。流动要素劳动增加，两个部门所用劳动都增加，两个部门产量都随 之提高，但劳动力边际产值下降，均衡工资下降。\n②贸易对相对价格的影响\n本国是资本丰裕国，开放经济下两国形成统一市场，机器的相对价格上涨，粮食的相对 价格下降，本国机器产量上升，出口机器，粮食的产量减少，进口粮食。\n③贸易的收入分配效应\n本国出口机器，机器相对价格上升使资本边际产量增加，资本价格上涨，资本所有者受 益；与之相反，由于粮食相对价格下降，土地边际产量下降，土地所有者受损。由此表明， 贸易会提高出口部门特定要素的实际收入，降低与进口竞争部门特定要素的实际收入，而对 流动要素的实际收入的影响不确定。\n(3)与国际贸易的关系\n①特定要素模型是对HO 模型的发展，更适用于解释国际贸易的短期影响。HO 模型要素 可跨部门流动，长期内，两部门要素的实际报酬趋于相同，国际贸易对收入分配的影响 是按要素所有者划分的(即斯托尔珀-萨缪尔森定理),但短期内要素不可流动，国际贸 易对收入分配的影响是按出口与进口替代部门划分的。\n②特定要素模型的收入分配效应具有强烈的政策内涵：尽管贸易使居民整体福利增加，但 自由贸易会造成部分居民的福利水平绝对下降。因此，出口部门的利益集团会要求自由 贸易，而来自进口替代部门的利益集团则会极力鼓动政府采取贸易限制措施。【选答】 现实中，正是由于土地是典型的特定要素，欧洲、美国都倾向于保护本国农业。\n相同在于新古典贸易模型和研究收入分配效应。不同在于HO 模型要素流动，两部门要素投 入比相同，要素价格相同，是长期收入分配效应；特定要素模型要素特定，两部门要素投入 比不同，要素价格不等，是短期收入分配效应。这是复试H 老师问的题目，所以不排除成为 初 试 题 目 的 可 能 。","knowledge":["国际贸易理论"]},{"id":"2017_2","year":2017,"num":2,"type":"简答","question":"什么是“资本外逃”?一国政府应对资本外逃应采取什么措施?","answer":"(2)资本外逃的原因主要是资本看衰在本国投资，影响因素包括政治动荡、经济恶化、汇 率贬值、利率下跌，另一原因是转移非法所得；资本外逃的实现方式包括贸易中高报进口和 低报出口转移资产，投资中伪造对外投资，或通过地下黑市交易转移资产；\n(3)资本外逃的影响是冲击宏观经济，损失外汇储备，造成金融市场波动，加剧贬值压力 甚至形成危机；遏制方式主要是外汇管制和利率扭转操作，但长期看来，要求宏观经济向好、 金融市场完善、投资者信心强，还需要打击洗钱和腐败。\n资本外逃的问题是2020年强势美元影响的答题要点之一，强势美元会造成新兴经济体的资 本流出，如果一个国家实行资本账户管制，那么资本会以“外逃”的形式流出，威胁新兴经 济体的国际收支健康，加剧新兴经济体的货币贬值压力。\n(2)题目问的是含义和措施，但措施和原因有对应关系，因此也要展开分析资本外逃的原  因，由原因推措施：如利率低→利率扭转，本币走弱→稳定币值，通胀恶化→稳定通胀，政  策变动→政策连续，法制不健全→ 完善体制，转移非法所得→加强监管，这是答案形成的过  程。此外.要区分资本外逃和资本外流.对资本外逃的定性必须是负面的，可以答负面影响。","knowledge":["国际金融"]},{"id":"2017_3","year":2017,"num":3,"type":"简答","question":"如果国际贸易发生在一个大国和一个小国之间，那么贸易后，国际相对价格更接近哪一 个国家在封闭条件下的价格水平?哪个国家在国际贸易中福利改善程度更为明显?","answer":"(1)   贸易后，国际价格更接近与大国在封闭条件下的相对价格水平\n大国在国际贸易中是价格的制定者(price  maker), 因为大国进出口规模巨大，对某一产品 的进出口变动会直接影响该产品的世界市场价格，而小国在这方面的影响可以忽略不计，是 国际市场价格的接受者 (price   taker),不能决定国际市场的价格。\n(2)  贸易后小国获利更多\n由于贸易后国际相对价格更接近大国在封闭条件下的相对价格水平，所以与大国相比，小国 的消费者可以从大国购买到相对便宜得多的外国具有比较优势的产品，以相对较高的价格出 口本国具有比较优势的产品，从而提高本国福利水平；而对大国来说，国际价格更接近与大 国在封闭条件下的相对价格水平，产品相对价格变动较少，从进出口产品中获利也较少。\n提示：注意区分大国和小国的概念，大国与小国不是发达与发展中国家，不是政治强国与弱 国，也不是国土面积大小，而是指生产消费和进出口规模大小。大国生产和消费大，可以影  响世界整体的均衡价格。如果一国为大国，出口产品扩张会导致该产品在世界市场上供过于  求出现滞销，进而均衡价格下跌，这个问题在最优关税理论、关税的经济学效应中都有提到。 审题和思路：审题两问比较清晰，可以在答案前面先解释大国与小国的概念，而后再答这两 问。这道题不用强求写满一页，几行字就能表达清楚。曾经17年经院专业课第二师姐说这  道题只答了五行字，推断当年判卷没有因为答得少而给低分。\n要素积累导致经济增产偏向出口部门，对大国来说， 一方面可以促进国民收入的提高，另一 方面会造成贸易条件恶化，经济增长净福利取决于两种效应对比。小国则不存在贸易条件恶 化 ， 经 济 增 长 产 生 积 极 效 果 ， 贸 易 福 利 提 高 。","knowledge":["综合"]},{"id":"2017_4","year":2017,"num":4,"type":"简答","question":"简述企业海外市场进入模式中股权模式和非股权模式的优势和劣势。","answer":"(1)股权模式，指企业以资本作为投资，在国外公司中占有一定股权份额，并拥有所有权 和控制权，主要是对外直接投资形式。对外直接投资是企业跨国经营的高级形式，要 求企业拥有雄厚的技术和资金实力，同时具备国际经营人才。主要包括合资与独资经 营两种形式。\n股权模式的优点：\n①  股权型模式以子公司的方式参与市场，市场控制力更强；\n② 通过内部化降低交易风险；\n③直接参与东道国的经营，能够积累经验曲线实现规模经济；\n④相较于技术授权，能够更大程度保护技术； 股权模式的缺点：\n①控股企业资金投入大，投资成本高；\n②投资失败造成高额损失；\n③合资企业面临文化整合困难，运营管理等风险较高；\n④独资企业容易遭到东道国政府和居民的抵制与歧视；\n⑤面临投资保护主义的限制。\n(2)非股权模式，又称契约式合营，指不成立股权实体，投资者对东道国企业不采取股权 占有的形式投资，而是通过对与股权投资有直接联系的技术、管理、销售渠道等各种资源的 控制，并签订合同为东道国提供各种服务，以从中获取利益的一种灵活投资形式。具体包括 钥匙工程、技术授权和特许专营等方式。\n非股权模式的优点：\n①成本较低，投入较少；\n②承担风险较对外直接投资低，合作失败损失相对较小；\n③能够充分利用技术、品牌等资产获得收益；\n④投资壁垒的制约作用小。\n非股权模式的缺点：\n①市场控制力弱，无法长期深入参与东道国合作；\n②合同关系复杂，容易产生违约问题；\n③契约合作可能造成技术泄露，不利于技术保护，甚至培育潜在的竞争对手。\n(2)答题注意详略，在解释非股权模式的时候，需要指明包括贸易型和契约型，然后对二 者的具体模式划分，但交钥匙工程、技术授权的概念属于选答内容，看在考场上的时间分配 以及默写的速度能不能跟上。\n中小企业规模小，资金实力弱，承担风险能力差，因此相较于高风险的股权模式，采用出口 模式或者技术授权模式更加贴合实际。合资经营也对，但独资经营就不妥了。","knowledge":["跨国公司与国际化"]},{"id":"2017_5","year":2017,"num":5,"type":"简答","question":"中国企业到“一带一路”沿线国家投资面临什么政治风险?如何防范政治风险?","answer":"(1)“一带一路”倡议即“21世纪海上丝绸之路和丝绸之路经济带”,是中国2013年提出的和 平发展倡议。\n政治风险：一带一路为中国企业创造了大量的海外投资机遇，然而，沿线途经中亚、西亚、 非洲等国家地区，这些地区政局动荡，政策不稳定，如果未能预期一带一路沿线国家的政治  因素变化，会给国际投资带来损失，这就是政治风险。主要包括国有化风险、战争风险、政  策变动风险和转移风险。\n①  国有化风险是指东道国政府对外国资本实行国有化、征用或者没收政策，进而给外国投 资者带来损失。\n②战争风险是指东道国由于领导层变动、社会各阶层利益冲突、民族纠纷、宗教矛盾等情 况，使东道国境内发生战争而造成的投资损失。\n③政策变动风险是指东道国土地、税收、市场、产业政策变动给外国投资者带来的风险。\n④转移风险指东道国政府实行外汇管制或其他资本汇回限制，使得外国投资者无法将获得 收益汇回国内造成的投资损失。\n⑤  【选答】同沿线国家双边关系突然恶化，出现紧张对峙局面，东道国对母国企业进行制 裁、冻结资产，造成项目停摆甚至终止。\n(2)中国企业应对一带一路政治风险的策略。\n①  前期防范\nA.    进行政治风险评估。利用评分法、风险指数法对投资东道国的政治、经济、社会状况进 行评估，做好投资环境分析和风险研究；\nB.    办理海外投资保险，通过对外投资保险降低政治风险的损失；\nC.    保持良好的政府关系，投资前同东道国政府谈判，减少政治风险发生的可能。\n②投资中的应对\nA.    与东道国投资者成立合资企业，减少歧视性政策的影响；\nB.   合理利用融资和现金流管理策略，如利用东道国银行进行掩护贷款，在东道国融资，会 影响东道国金融机构的利益，因此能够防范国有化征用；\nC.    制定正确的生产经营战略，使得东道国进行国有化之后无法正常维持原公司运转运转。 如严格控制原材料和零部件供应、掌握机密技术、控制产品的出口和分销渠道。\nD.    【选答】积极承担就业、环保等社会责任， 树立良好的企业形象，减少东道国内部冲突 带来的影响。\nE. 【  选答】寻求政府帮助， 通过政府外交对东道国施压，迫使东道国放弃国有化征用。\n(1)题干问到了一带一路，所以引入部分需要结合一带一路投资的特点分析(也是2019 年的论述题材料),一带一路国家不发达，政治风险尤为突出。\n(2)在表述上采取的是杨大楷《国际投资学》的内容，但是除了国有化、战争之外，双边 关系恶化等因素也属于政治风险，如中国和印度曾经爆发边境冲突(洞朗事件，且这种情况 2020年重演),可能影响一带一路项目的推进。\n( 3 ) 政 治 风 险 的 防 范 措 施 应 当 有 4 - 5 条 ， 每 条 一 两 句 话 。","knowledge":["中国对外经济"]},{"id":"2017_6","year":2017,"num":6,"type":"论述","question":"英镑年利率为1%,英镑兑美元为1:1.25。美国国债利率为0.6%。如果用100万英镑投 资美国国债，一年后，英镑兑美元升贴水率是多少，银行才不会亏本?这时美元的升贴水率 是多少?(保留小数点后三位)。\n\n(2)计算的时候首先结合利率平价结论，高利率国家的货币贴水，判断升水和贴水的方向。 不管用方法一还是方法二.最好把理论基础利率平价说答上，有公式则要写公式和字母","answer":"方法一：\n根据利率平价理论，在一价定律基础上，同一资产用同一货币表示时应当价格相同，也就是 说在本国投资与外国投资获得的收益应当相等。\n用100万英镑在英国投资一年的本利和为100×(1+1%) =101万英镑 在美国投资一年的本利和为100×1.25×(1+0.6%) =125.75万美元\n如果银行不亏本，那么125.75万美元至少可以兑回101万英镑，此时的英镑兑美元的汇率 为101:125.75,即1:1.245。\n英镑兑美元即期汇率为E1=$1.25,  远期汇率为为E1=$1.245 英镑兑美元的升贴水率=\n即英镑兑美元的贴水率为0.4%\n美元兑英镑的即期汇率为$1=£,远期汇率为$1=£ 美元兑英镑的升贴水率=\n美元兑英镑的升水率为0.402% 方法二：\n记本国英国为A 国，外国美国为 B国 ，E。为英镑兑美元汇率，E  为远期汇率，I。为英国利率， Ig为美国利率\nE。为$1=£0.8, IA=1%,I=0.6%\n根据无抛补利率平价，高利率国家的货币在期汇市场上贴水，而低利率国家的货币在期汇市 场上升水，且利率差=升贴水率。公式为\nE=E。(IA-Ig)+E。,  带入求得 E=0.8032\n英国利率高于美国，则英镑贴水，美元升水。远期汇率为$1=E0.8032 =0.4%,美元兑英镑的升水率为0.4%。\n【或升水率=la-Ib=0.4%】 同理：远期英镑汇率E1=$\n英镑兑美元贴水率：=0.398%\n(2)计算的时候首先结合利率平价结论，高利率国家的货币贴水，判断升水和贴水的方向。 不管用方法一还是方法二.最好把理论基础利率平价说答上，有公式则要写公式和字母含义。","knowledge":["国际金融"]},{"id":"2017_7","year":2017,"num":7,"type":"论述","question":"简述国际分工理论的演进和发展脉络。","answer":"(1)古典国际分工理论\n古典国际分工理论以完全竞争市场为假设前提，主要分析产业间贸易，属于静态或比较 静态的国际贸易模型。\n①绝对优势理论\n亚当斯密的绝对优势理论认为各国应生产并出口本国具有绝对优势的产品，进口本国不 具对势的产品。国际分工对双方都有利，各国应倡导自由贸易。斯密首次从生产领域提出了 分工意义，但无法说明一国不具备任何绝对优势的情况能否参与国际分工。\n② 比较优势理论\n李嘉图模型认为一国应生产并出口具有比较优势的产品，进口本国不具有比较优势的产 品，两利相权取其重，两弊相权取其轻。比较优势论说明，贸易动机是比较优势而不是绝对 优势，比斯密的分工理论接近实际，但未能解释国际交换的比价问题，也没有说明比较优势 的来源。\n(2)新古典国际贸易理论\n新古典国际贸易理论考虑了多种要素的存在，并运用一般均衡的方法分析国际贸易与要 素变动的相互影响。\n①相互需求理论\n穆勒的相互需求方程式认为，交换价格停留在使两国贸易达到平衡的那个交换比例上， 是由两国对彼此的商品需求强度决定的。相互需求理论解释了国际交换价格确定的问题，因 此填补了古典分工理论的不足。\n②  要素禀赋论\nH-O 模型认为技术水平相同而要素禀赋不同也能产生国际贸易，一国应出口密集使用其 丰裕要素生产的产品，进口密集使用其稀缺要素生产的产品。H-O 理论指出了比较优势的 来源，且在此基础上形成了要素价格均等化定理、斯托尔珀萨缪尔森定理、雷布津斯基定理 和特定要素模型，但理论强调静态结果，缺乏对技术进步、社会因素和需求因素的考虑。\n③  【选答】 里昂惕夫之谜及解释\n里昂惕夫对美国的进出口贸易进行检验，想要验证HO 模型的正确性，即美国资本充裕 且出口资本密集型产品，但结果恰好相反，美国出口劳动密集型产品而进口资本密集型产品， 这称为“里昂惕夫之谜”。研究者先后提出了有效劳动论、需求逆转、要素密集度逆转等迷内 解释，又发展形成了迷外解释——新要素理论。\n(3)新国际贸易理论\n①  产业内贸易理论。\n60年代，国际分工出现了两个倾向：产业内贸易越来越多、发达国家之间的贸易越来 越多。原有理论已不能解释这些趋势，产业内贸易理论应运而生。林德从需求偏好的角度， 解释了收入发展水平相近国家的产业内贸易。克鲁格曼等人突破了传统贸易理论的假定，在 不完全竞争的框架下，从产品异质、规模经济等角度解释产业内贸易。布兰德采用寡头模型 解释了相互倾销在同质化产品上的产业内贸易。法尔维、基尔考斯基引入了收入分配不平均 导致需求多样性，用比较优势理论解释了纵向差异产品的产业内贸易。戴维斯则将李嘉图模 型和HO 模型结合，认为产业内贸易可以发生在有质量差异的同类产品中，产品质量取决于 各国之间技术或资源禀赋差别。\n产业内贸易理论没有完全否定比较成本说，而是根据市场结构对贸易功能进行重新定位， 认为在不完全竞争市场结构框架中，规模经济、产品差异等是IDL 发生的主要解释变量。不  仅从供给方面，更从需求的角度进行了考察，对国际贸易的解释更贴近实际；但理论包含模  型过多过于繁琐，每个模型只能解释一部分贸易现象，且无法解释企业内贸易问题。\n②动态贸易理论\n波斯纳和弗农从技术创新和转移的角度解释国际贸易的动态变化，弥补了HO 模型假定技术 静态的不足。\nA.    技术差距论认为，国家间存在的静态和动态技术差距，构成了国际贸易的基础。贸易模  式是创新国出口模仿国进口；技术差距消失后，国际贸易动机重回比较优势或规模经济。\nB.    产品生命周期理论将产品生命周期分为四个阶段：投入期、成长期、成热期和衰退期。 在新产品阶段，是美国创新国出口产品，随着产品成长成熟及进入标准化阶段，生产和  出口转移到一般发达国家和新兴经济体，创新国退出生产成为净进口国。\n③  【选答】新要素理论\n舒尔茨、格鲁伯等人受到里昂惕夫之谜的启发，提出了新要素理论，将HO 理论中的生 产要素扩展至人力技能、技术、研发、管理等方面，用以解释战后的科技革命与国际贸易问 题，代表有人力资本学说、研究开发说、管理决策论、信息要素论。\n(4)国家竞争优势\n迈克尔波特的国家竞争优势论又称钻石模型，认为企业或者产业的国际竞争优势是国家 竞争优势的体现。国家竞争优势来源包括四个基本因素(生产要素、需求因素、支撑产业因 素、企业组织战略竞争因素)以及两个辅助因素(政府和机遇)。钻石模型考虑了多种因素 的综合作用，将研究视角从产业内贸易中观层面上升到国家宏观层面，具有进步意义。\n(5)新新贸易理论\n梅里茨等人基于企业异质假设，提出新新贸易理论，认为生产效率高低是国际化的基础。\n①异质性企业贸易理论表明，生产率水平最高的企业会选择FDI 或者出口，而生产率最低 的企业则会被挤出市场，  生产率居中的企业只能选择在国内市场销售。\n②  【选答】企业内生边界模型表明，高生产率的企业选择在外国生产中间产品，而低生产 率企业只能在本国生产产品。组织形式选择上，低生产率企业倾向于外包形式，而高生 产率企业倾向于垂直一体化形式。\n新新贸易理论能否成为独立阶段目前仍然存在争议，但其研究深入微观领域，分析了以 往研究未涉及的企业内贸易问题。\n(6)【选答，建议不答】国际服务贸易\n传统贸易理论分析的是商品贸易现象，随着战后服务贸易的兴起，迪尔道夫、伯格斯、 塔克等人在HO模型基础上，对传统贸易模型进行了部分修正，认为HO 模型对国际服务贸  易依然有着适用性，解释了国际服务贸易现象。\n(2)原则上韩书的理论都要答到，几条注意事项：①里昂惕夫之谜尽管不是独立的贸易理 论，但在国际贸易中地位非常重要，建议答。②新要素理论可以放在新古典时期作为迷外解  释，也可以放在新国际贸易理论部分，从出现的时期和研究的问题看，新要素理论都具备战 后国际贸易的新特点。③产业内贸易进一步展开重点应放在三大支柱，新张伯伦模型、新  HO 模型和相互倾销模型注意取舍详略，戴维斯模型、谢科德-萨顿模型建议不答(太偏),  这一部分综述用的是《国际贸易学》第121-122页的综述版本，涉及的生僻理论基本提及了；\n④新新贸易模型主要答梅里茨异质性企业贸易模型， Antras  模型几乎不在教材里出现，企\n业内生边界模型可不答。答新新贸易模型时，需要指明这个模型依然有争议， H 老师上课强 调过这一点。⑤国际服务贸易建议不答， 一是对服务贸易理论的解析不够确凿，二是写完新 新贸易模型之后，边际得分收益非常低，不值得；当然，想要展示知识储备可以写上去。","knowledge":["国际贸易理论"]},{"id":"2017_8","year":2017,"num":8,"type":"论述","question":"什么是新HO 模型? HO 模型能解释产业内贸易现象吗?为什么?","answer":"(1)新HO 模型又称法尔维-基尔考斯基模型。法尔维等人在HO 模型的假定基础上，引入 了产品垂直差异和收入需求因素，以解释发达国家和发展中国家之间的产业内贸易，形成了 新 HO 模型。\n① 理 论 假 设 ：\nA.2×2×2     模型：两个国家A 和 B,   两种商品X 和 Y,   两种要素资本K 和劳动 L。\nB.    要素禀赋差异：A、B两国在资本报酬率和劳动报酬率上存在差异，A  国资本丰富，资 本回报率低，B国劳动丰富，工资率低。\nC.   要素流动性：劳动力可以跨部门流动，资本不能跨部门流动。\nD.    产品差异：两种产品， 一种是同质无差别产品；另一种是垂直差异产品，存在高质量和 低质量之分，质量差别来自于与劳动投入相关的资本量。高质量产品是资本密集型，低 质量产品是劳动密集型。\nE.    对质量不同产品的需求取决于产品价格和购买者的收入。消费者在初期选择低质产品， 随着收入增加，高质量产品消费量会提高，低质产品则会下降。\n②  理论内容\n在不同质量的产品中，必然存在一个边际质量，产品的单位成本在两国相同。A国在质 量高于边际质量的产品方面有比较优势，在质量低于边际质量的产品方面处于相对劣势；B 国则相反。\n因此，只要同时存在对高质量和低质量产品的需求，产业内贸易就有可能发生。资本丰 裕的国家出口高质量产品，劳动相对丰裕的国家出
