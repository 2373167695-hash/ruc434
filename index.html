function sm2NextInterval(prev, quality) {
  var n = prev.n || 0, ef = prev.ef || 2.5, interval = prev.interval || 1;
  if (quality < 1) { interval = 1; n = 0; }
  else if (n === 0) interval = 1;
  else if (n === 1) interval = 3;
  else interval = Math.round(interval * ef);
  ef = Math.max(1.3, ef + (0.1 - (3-quality) * (0.08 + (3-quality) * 0.02)));
  return {n: n+1, ef: ef, interval: interval, date: new Date().toISOString().slice(0,10)};
}
function getDueWrongCount() {
  var now = new Date(); var c = 0;
  for (var id in wrongReview) {
    var r = wrongReview[id]; if (!r.date) { c++; continue; }
    if ((now - new Date(r.date)) > r.interval * 86400000) c++;
  }
  return c;
}

function loadCloudData(token) {
  if (!token) return;
  fetch(SYNC_URL + '/data', {
    headers: {'Authorization': 'Bearer ' + token}
  }).then(function(r) { return r.json(); }).then(function(data) {
    if (data.error) return;
    // Restore marks
    if (data.marks && Object.keys(data.marks).length) {
      Object.assign(marks, data.marks);
      try { localStorage.setItem('r434', JSON.stringify(marks)); } catch(e) {}
    }
    // Restore knowledge views
    if (data.kv && Object.keys(data.kv).length) {
      Object.assign(knowledgeViews, data.kv);
      try { localStorage.setItem('r434_kv', JSON.stringify(knowledgeViews)); } catch(e) {}
    }
    // Restore chat
    if (data.chat && data.chat.length) {
      chatHistory = data.chat;
      try { localStorage.setItem('r434_chat', JSON.stringify(chatHistory)); } catch(e) {}
    }
    // Show sync status
    var ss = document.getElementById('syncStatus');
    if (ss && data._lastSync) { ss.style.display = 'block'; ss.textContent = '已恢复云端数据 · ' + new Date(data._lastSync).toLocaleString(); setTimeout(function(){ss.style.display='none'},3000); }
  }).catch(function() {});
}

function syncToCloud() {
  var token = getToken();
  if (!token) return;
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(function() {
    fetch(SYNC_URL + '/sync', {
      method: 'POST',
      headers: {'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json'},
      body: JSON.stringify({marks: marks, knowledgeViews: knowledgeViews, chatHistory: chatHistory.slice(-20)})
    }).catch(function() {});
  }, 2000);
}

var navStack = [];
try { navStack = JSON.parse(localStorage.getItem('r434_nav') || '[]'); } catch(e) { navStack = []; }

function pushNav(p) {
  if (navStack.length === 0 || navStack[navStack.length-1] !== p) {
    navStack.push(p);
    if (navStack.length > 20) navStack.shift();
    try { localStorage.setItem('r434_nav', JSON.stringify(navStack)); } catch(e) {}
  }
}

function goBack() {
  if (navStack.length > 1) {
    navStack.pop();
    navigate(navStack[navStack.length-1], undefined, true);
  } else {
    navigate('', undefined, true);
  }
}

function clearNavStack() {
  navStack = [];
  try { localStorage.removeItem('r434_nav'); } catch(e) {}
}
function toggleSidebar() {
  var sb = document.querySelector('.sidebar');
  if (!sb) return;
  if (sb.classList.contains('open')) { closeSidebar(); } else { openSidebar(); }
}
function openSidebar() {
  var sb = document.querySelector('.sidebar');
  if (sb) sb.classList.add('open');
}
function closeSidebar() {
  var sb = document.querySelector('.sidebar');
  if (sb) sb.classList.remove('open');
}
function navigateByKnowledge(name) {
  if (!name) return;
  var key = name;
  // Try exact key match first
  if (!KNOWLEDGE[key]) {
    for (var k in KNOWLEDGE) {
      if (k === name || k.indexOf(name) === 0 || name.indexOf(k) === 0) { key = k; break; }
    }
  }
  if (KNOWLEDGE[key]) {
    navigate('kn:' + key, name);
  }
}

function navigate(p, topicName, skipHistory) {
  // Clean up AI fullpage if navigating away from it
  if (p !== 'aichat') {
    var aip = document.getElementById('ai-fullpage');
    if (aip) { aip.remove(); }
    var ct = document.getElementById('ct');
    if (ct) ct.style.display = '';
    var bc = document.getElementById('bc');
    if (bc) bc.style.display = '';
  }
  closeSidebar();
  // Push to history (skip when going back)
  if (!skipHistory && p !== undefined) pushNav(p);
  var bb = document.getElementById('backBtn');
  // Show back button when NOT on home page
  if (bb) bb.style.display = (p && p !== '') ? 'block' : 'none';
  curPath = p; saveState();
  if (p && p.indexOf('kn:') === 0) {
    var kn = p.substring(3);
    knowledgeViews[kn] = (knowledgeViews[kn] || 0) + 1;
    try { localStorage.setItem('r434_kv', JSON.stringify(knowledgeViews)); } catch(e) {}
  }
  setActive(p);
  if (!p && p !== '') return;
  var ct = document.getElementById('ct');
  if (!ct) return;
  // Render new content immediately
  try {
    if (p === '') { showHome(); }
    else if (p === 'answerbank') { showAnswerBank(); }
    else if (p === 'stats') { showStats(); }
    else if (p === 'cards') { showCards(); } else if (p === 'hot') { showHotTopic(); }
    else if (p === 'graph') { showGraph(); }
    else if (p === 'aichat') { showAI(); }
    else if (p === 'mockexam') { showMockExam(); }
    else if (p === 'allquestions') { showAllQuestions(); }
    else if (p === 'wrongbook') { showWrongBook(); }
    else if (p.indexOf('kn:') === 0) { showKnContent(p.substring(3), topicName || ''); }
    else if (p === 'macro') { showMacro(); }
    else if (p === 'predictions') { showPredictions(); }
    else if (p === 'professors') { showProfessors(); }
    else if (p.indexOf('year:') === 0) { doShowExamYear(parseInt(p.substring(5))); }
    else if (p.indexOf('cat:') === 0) { showCat(p.substring(4)); }
    else if (p.indexOf('sub:') === 0) { showSub(p.substring(4)); }
    else if (topicName === 'qz') { showTopic(p, 'knQuestions'); }
    else { showTopic(p); }
  } catch(err) {
    var ct2 = document.getElementById('ct');
    if (ct2) ct2.innerHTML = '<div style="padding:40px;text-align:center"><h3>⚠️ 页面加载出错</h3><p style="color:var(--r);margin:8px 0">' + err.message + '</p><button class="btn btn-gen" onclick="navigate(\'' + p + '\')">重试</button></div>';
    console.error('Page render error:', err);
  }
  ct.scrollTop = 0;
  ct.style.opacity = '';
  ct.style.transition = '';
}

function renderLatex(text) {
  if (typeof katex === 'undefined') return text;
  text = text.replace(/\$\$([\s\S]*?)\$\$/g, function(_, formula) {
    try { return '<div style="text-align:center;margin:8px 0">' + katex.renderToString(formula.trim(), {throwOnError: false, displayMode: true}) + '</div>'; }
    catch(e) { return '$$' + formula + '$$'; }
  });
  text = text.replace(/\$([^\$]+?)\$/g, function(_, formula) {
    try { return katex.renderToString(formula.trim(), {throwOnError: false, displayMode: false}); }
    catch(e) { return '$' + formula + '$'; }
  });
  return text;
}

function renderMarkdown(text) {
  text = renderLatex(text);
  if (!text) return '';
  // Split into lines for block-level parsing
  var lines = text.split('\n');
  var html = '';
  var i = 0;
  while (i < lines.length) {
    var line = lines[i];
    var trimmed = line.trim();
    // Empty line
    if (!trimmed) { i++; continue; }
    // Table
    if (trimmed.startsWith('|') && trimmed.endsWith('|')) {
      var tableLines = [];
      while (i < lines.length && lines[i].trim().startsWith('|') && lines[i].trim().endsWith('|')) {
        tableLines.push(lines[i].trim());
        i++;
      }
      var rows = tableLines.map(function(l) {
        return l.split('|').slice(1, -1).map(function(c) { return c.trim(); });
      });
      // Skip separator row
      rows = rows.filter(function(r) { return !r.every(function(c) { return /^[-:]+$/.test(c); }); });
      html += '<table style="border-collapse:collapse;width:100%;font-size:12px;margin:8px 0">';
      rows.forEach(function(row, ri) {
        html += '<tr>';
        row.forEach(function(cell) {
          cell = cell.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
          if (ri === 0) {
            html += '<th style="border:1px solid #d0cdc6;padding:5px 8px;background:#f5f3ef;text-align:left;font-size:11px">' + cell + '</th>';
          } else {
            html += '<td style="border:1px solid #e0ddd6;padding:5px 8px;font-size:12px">' + cell + '</td>';
          }
        });
        html += '</tr>';
      });
      html += '</table>';
      continue;
    }
    // Headings
    if (/^#{1,6}\s+/.test(trimmed)) {
      var hm = trimmed.match(/^(#{1,6})\s+(.*)/);
      if (hm) {
        var level = hm[1].length;
        var sizes = {1:18,2:16,3:15,4:14,5:13,6:12};
        var tag = level <= 2 ? 'h3' : 'h4';
        var mts = {1:16,2:14,3:12,4:10,5:8,6:6};
        var mbs = {1:10,2:8,3:8,4:6,5:4,6:4};
        html += '<' + tag + ' style="margin:' + (mts[level]||10) + 'px 0 ' + (mbs[level]||6) + 'px;font-size:' + (sizes[level]||13) + 'px;font-weight:600">' + hm[2].replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>') + '</' + tag + '>';
        i++; continue;
      }
    }
    // Horizontal rule
    if (/^---+$/.test(trimmed) || /^\*\*\*$/.test(trimmed)) { html += '<hr style="border:none;border-top:1px solid #e0ddd6;margin:12px 0">'; i++; continue; }
    // Block quote
    if (/^&gt;\s+/.test(trimmed) || /^>\s+/.test(trimmed)) { html += '<blockquote style="border-left:3px solid var(--pu);padding-left:10px;margin:6px 0;color:#666">' + trimmed.replace(/^&gt;\s+/, '').replace(/^>\s+/, '') + '</blockquote>'; i++; continue; }
    // Lists - collect consecutive list items
    if (/^(\d+[\.、])\s+/.test(trimmed) || /^[-•·]\s+/.test(trimmed)) {
      var listItems = [];
      while (i < lines.length) {
        var tl = lines[i].trim();
        if (/^(\d+[\.、])\s+/.test(tl) || /^[-•·]\s+/.test(tl)) {
          listItems.push(tl);
          i++;
        } else if (tl === '') { i++; break; }
        else break;
      }
      html += '<ul style="margin:4px 0;padding-left:18px;list-style:none">';
      listItems.forEach(function(item) {
        var content = item.replace(/^(\d+[\.、])\s+/, '').replace(/^[-•·]\s+/, '');
        content = content.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        var prefix = item.match(/^(\d+[\.、])/);
        html += '<li style="margin:3px 0;font-size:13px;line-height:1.7">' + (prefix ? '<strong>' + prefix[1] + '</strong> ' : '· ') + content + '</li>';
      });
      html += '</ul>';
      continue;
    }
    // Image (block-level)
    if (/^!\[([^\]]*)\]\(([^)]+)\)$/.test(trimmed)) {
      var m = trimmed.match(/^!\[([^\]]*)\]\(([^)]+)\)$/);
      html += '<div style="margin:8px 0;text-align:center"><img src="' + m[2] + '" alt="' + (m[1]||'') + '" style="max-width:100%;border-radius:8px;max-height:400px;object-fit:contain"></div>';
      i++; continue;
    }
    // Regular paragraph
    var para = trimmed;
    para = para.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" style="max-width:100%;border-radius:6px;vertical-align:middle">');
    para = para.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    para = para.replace(/\*(.+?)\*/g, '<em>$1</em>');
    para = para.replace(/`(.+?)`/g, '<code style="background:#e8e8e8;padding:2px 4px;border-radius:3px;font-size:12px">$1</code>');
    html += '<p style="margin:4px 0;font-size:13px;line-height:1.7">' + para + '</p>';
    i++;
  }
  return html;
}

function sendAIMessage() {
  var input = document.getElementById('ai-chat-input');
  if (!input) return;
  var q = input.value.trim();
  if (!q) return;
  input.value = '';
  var chatBody = document.getElementById('ai-chat-body');
  if (!chatBody) return;
  chatBody.innerHTML += '<div class="ai-msg ai-msg-user">' + q + '</div>';
  var loadingId = 'ai-loading-' + Date.now();
  chatBody.innerHTML += '<div id="' + loadingId + '" class="ai-loading"><span class="ai-dot"></span><span class="ai-dot"></span><span class="ai-dot"></span> 思考中...</div>';
  chatBody.scrollTop = chatBody.scrollHeight;
  chatHistory.push({role: 'user', content: q});
  var ctx = buildAIContext(q);
  var sys = RUC434_STYLE + "\n你是人大434国际商务考研AI助手。你的数据库中已包含完整的历年真题和标准答案，你随时可以引用任何一道真题。请严格遵循以上写作风格，参考数据库中的真题答案、知识点和热点素材回答问题。公式请用$...$包裹。\n" + ctx + "\n\n要求：必须参考数据库中的真实真题和答案来回答；贴合人大434风格、结构化、分点作答、术语中英文对照、结尾有考点提示。";
  var msgs = [{role: 'system', content: sys}];
  chatHistory.slice(-10).forEach(function(h) { msgs.push({role: h.role, content: h.content}); });
  fetch(DS_URL, {
    method: 'POST',
    headers: {Authorization: 'Bearer ' + getAPIKey(), 'Content-Type': 'application/json'},
    body: JSON.stringify({model: 'mimo-v2.5', messages: msgs, stream: true, temperature: 0.3})
  }).then(function(r) {
    if (!r.ok) throw Error('HTTP ' + r.status);
    return r.body.getReader();
  }).then(function(rd) {
    var b = '', t = '', d = new TextDecoder();
    var responseId = 'ai-response-' + Date.now();
    var loadingEl = document.getElementById(loadingId);
    if (loadingEl) { loadingEl.id = responseId; loadingEl.className = 'ai-msg ai-msg-bot'; loadingEl.innerHTML = ''; }
    function n() {
      rd.read().then(function(r) {
        if (r.done) {
          var respEl = document.getElementById(responseId);
          if (respEl) respEl.innerHTML = renderMarkdown(t);
          chatHistory.push({role: 'assistant', content: t});
          saveState();
          chatBody.scrollTop = chatBody.scrollHeight;
          return;
        }
        b += d.decode(r.value, {stream: true});
        var ls = b.split('\n');
        b = ls.pop() || '';
        ls.forEach(function(l) {
          if (l.startsWith('data: ')) {
            var dd = l.substring(6);
            if (dd == '[DONE]') return;
            try {
              var p = JSON.parse(dd);
              if (p.choices && p.choices[0].delta) {
                var x = p.choices[0].delta.content || '';
                if (x) {
                  t += x;
                  var respEl = document.getElementById(responseId);
                  if (respEl) respEl.innerHTML = renderMarkdown(t);
                  chatBody.scrollTop = chatBody.scrollHeight;
                }
              }
            } catch(e) {}
          }
        });
        n();
      });
    }
    n();
  }).catch(function(err) {
    var loadingEl = document.getElementById(loadingId);
    if (loadingEl) loadingEl.innerHTML = '<div class="ai-msg-err">请求失败：' + err.message + '</div>';
  });
}

// Initialize Chart.js charts for macro dashboard
function initMacroCharts() {
  if (typeof Chart === 'undefined' || !MACRO_DATA || !MACRO_DATA.dashboard) return;
  
  try {
    var indicators = MACRO_DATA.dashboard.indicators;
    if (!indicators || !indicators.length) return;
    
    // Helper to find indicator by name
    function findInd(name) {
      for (var i = 0; i < indicators.length; i++) {
        if (indicators[i].name.indexOf(name) >= 0) return indicators[i];
      }
      return null;
    }
    
    // Helper to get labels and data
    function getSeries(ind) {
      if (!ind) return {labels: [], data: []};
      return {
        labels: ind.data.map(function(d) { return d.date.substring(5); }),
        data: ind.data.map(function(d) { return d.value; })
      };
    }
    
    // Common options
    function lineOpts(color) {
      return {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: true, labels: {font: {size: 10}, boxWidth: 12, padding: 8} } },
        scales: {
          x: { ticks: {font: {size: 9}, maxTicksLimit: 12}, grid: {display: false} },
          y: { ticks: {font: {size: 9}}, grid: {color: '#f0ede8'} }
        }
      };
    }
    
    // Chart 1: CFETS Index
    var cfets = findInd('CFETS');
    if (cfets) {
      var ctx1 = document.getElementById('chartCfets');
      if (ctx1) {
        var s = getSeries(cfets);
        new Chart(ctx1, {
          type: 'line',
          data: {
            labels: s.labels,
            datasets: [{
              label: 'CFETS人民币汇率指数',
              data: s.data,
              borderColor: '#7c3aed',
              backgroundColor: 'rgba(124,58,237,0.1)',
              fill: true,
              tension: 0.3,

    // Chart 2: USD/CNY middle rate + spot

      var s1 = getSeries(usdcny);

        type: 'line',

          labels: s1.labels,
          datasets: [
            { label: '中间价 USD/CNY', data: s1.data, borderColor: '#2563eb', tension: 0.3, pointRadius: 3, pointBackgroundColor: '#2563eb', fill: false },
            { label: '即期 USD/CNY', data: s2.data, borderColor: '#d97706', tension: 0.3, pointRadius: 3, pointBackgroundColor: '#d97706', fill: false, borderDash: [5,3] }
          ]

        options: lineOpts()
      });

    // Chart 3: CPI + PPI
    var cpi = findInd('CPI');

      var sc = getSeries(cpi);

        type: 'line',
        data: {
          labels: sc.labels,
          datasets: [
            { label: 'CPI同比(%)', data: sc.data, borderColor: '#c41e3a', tension: 0.3, pointRadius: 3, pointBackgroundColor: '#c41e3a', fill: false },
            { label: 'PPI同比(%)', data: sp.data, borderColor: '#059669', tension: 0.3, pointRadius: 3, pointBackgroundColor: '#059669', fill: false }
          ]
        },
        options: lineOpts()
      });
    }
    
    // Chart 4: PMI + M2
    var pmi = findInd('PMI');
    var m2 = findInd('M2');
    var ctx4 = document.getElementById('chartPmiM2');
    if (ctx4) {
      var spmi = getSeries(pmi);
      var sm2 = getSeries(m2);
      new Chart(ctx4, {
        type: 'line',
        data: {
          labels: spmi.labels,
          datasets: [
            { label: '制造业PMI', data: spmi.data, borderColor: '#d97706', tension: 0.3, pointRadius: 3, pointBackgroundColor: '#d97706', fill: false, yAxisID: 'y' },
            { label: 'M2同比(%)', data: sm2.data, borderColor: '#7c3aed', tension: 0.3, pointRadius: 3, pointBackgroundColor: '#7c3aed', fill: false, yAxisID: 'y1' }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { labels: {font: {size: 10}, boxWidth: 12, padding: 8} } },
          scales: {
            x: { ticks: {font: {size: 9}, maxTicksLimit: 12}, grid: {display: false} },
            y: { type: 'linear', position: 'left', ticks: {font: {size: 9}}, grid: {color: '#f0ede8'}, title: {display: true, text: 'PMI', font: {size: 9}} },
            y1: { type: 'linear', position: 'right', ticks: {font: {size: 9}}, grid: {display: false}, title: {display: true, text: 'M2 %', font: {size: 9}}, min: 5, max: 9 }
          }

    // Chart 5: Trade Balance
    var trade = findInd('贸易');

          labels: st.labels,
          datasets: [{
            label: '贸易差额(亿美元)',

function aiPredictExam() {
  var div = document.getElementById('aiPredict');
  var content = document.getElementById('aiPredictContent');
  div.style.display = 'block';
  var ld = aiLoading('AI正在分析13年真题规律和你的学习进度...'); content.innerHTML = ''; content.appendChild(ld);
  content.scrollIntoView({behavior:'smooth'});
  // Build context: year×module frequency
  var modules = ['国际贸易','国际投资与跨国公司','国际金融','新兴议题'];
  var ymMap = {};
  [2011,2012,2013,2014,2015,2016,2017,2018,2019,2020,2021,2022,2023].forEach(function(y){ymMap[y]={};modules.forEach(function(m){ymMap[y][m]=0;});});
  DATA.forEach(function(q){
    (q.knowledge||[]).forEach(function(k){
      var mod='';
      if(k.indexOf('国际贸易')>=0)mod='国际贸易';
      else if(k.indexOf('跨国')>=0||k.indexOf('国际商务')>=0)mod='国际投资与跨国公司';
      else if(k.indexOf('国际金融')>=0)mod='国际金融';
      else mod='新兴议题';
      if(ymMap[q.year]&&ymMap[q.year][mod]!==undefined)ymMap[q.year][mod]++;
    });
  });
  var trendStr = modules.map(function(m){
    var recent = ymMap[2021][m]+ymMap[2022][m]+ymMap[2023][m];
    return m+':近3年'+recent+'次';
  }).join('；');
  var doneQ = DATA.filter(function(q) { return marks[q.id] && marks[q.id].done; }).length;
  var viewedKN = Object.keys(knowledgeViews).length;
  var weakModules = modules.filter(function(m){
    var viewed = 0, total = 0;
    for(var k in KNOWLEDGE){if((KNOWLEDGE[k].module||'').indexOf(m)>=0){total++;if(knowledgeViews[k])viewed++;}}
    return total>0 && viewed/total < 0.5;
  });
  var sys = '你是人大434国际商务考研命题预测专家。请基于以下数据生成2027年考试预测：\n\n【历年命题趋势】\n'+trendStr+'\n\n【考生当前进度】\n已做真题：'+doneQ+'/'+DATA.length+'\n已浏览知识点：'+viewedKN+'/48\n薄弱模块：'+(weakModules.join('、')||'无')+'\n\n【学术热点】\n'+PREDICTIONS.map(function(p){return p.topic+':'+p.predicted_q;}).join('；')+'\n\n请生成5个2027年最可能考察的方向，每个包含：\n1.考向名称 2.概率(高/中/低) 3.理由(结合趋势) 4.建议复习优先级(1-5星) 5.关联知识点\n\n用表格输出，最后给出冲刺建议。';
  callDS([{role:'system',content:'你是考研命题预测专家，擅长从历年真题规律和学术热点中预测未来考向。请用中文回复。'},{role:'user',content:sys}],'aiPredictContent');
}

function showExamQ(qid) {
  var q = null;

function toggleM(id, type) {
  if (!marks[id]) marks[id] = {};
  marks[id][type] = !marks[id][type];
  localStorage.setItem("r434", JSON.stringify(marks));
  // When marking a question as done, boost related flashcard priority
  if (type === 'done' && marks[id].done) {
    var q = null; DATA.forEach(function(x) { if (x.id === id) q = x; });
    if (q && q.knowledge && q.knowledge.length) {
      var cardLog = JSON.parse(localStorage.getItem('r434_cards') || '{}');
      q.knowledge.forEach(function(kn) {
        if (cardLog[kn]) {
          // Reset interval to 1 day so it appears in "due" cards soon
          cardLog[kn].interval = 1;
          cardLog[kn].date = new Date(Date.now() - 86400000).toISOString().slice(0,10);
          cardLog[kn]._source = 'auto-from-wrong';
        }
      });
      localStorage.setItem('r434_cards', JSON.stringify(cardLog));
    }
  }
  // Re-render current page to update all marks
  if (curPath && curPath !== '') navigate(curPath);
  else showHome();
}

function aiGradeQuestion(qid, qid2) {
  var q = null; DATA.forEach(function(x) { if (x.id == qid) q = x; });
  if (!q) return;
  var answer = document.getElementById('ta-' + qid2).value.trim();
  if (!answer) { alert('请先输入你的作答'); return; }
  var result = document.getElementById('result-' + qid2);
  result.style.display = 'block';
  var ld = aiLoading('AI正在批改...'); result.innerHTML = ''; result.appendChild(ld);
  // Build knowledge context with RAG
  var ragCtx = (typeof buildAIContext === 'function') ? buildAIContext(q.question) : '';
  var ctx = '';
  var ktags = q.knowledge || [];
  ktags.forEach(function(k) {
    var item = KNOWLEDGE[k];
    if (item) {
      ctx += '\n【' + k + '】';
      if (item.key) ctx += '\n要点: ' + item.key.slice(0, 5).join('; ');
    }
  });
  var sys = RUC434_STYLE + '\n你是人大434国际商务考研阅卷老师，批改标准严格。请严格按照以上评分标准批改。';
  if (typeof EXAM_PATTERN !== 'undefined' && EXAM_PATTERN && EXAM_PATTERN.exam_rules) {
    sys += '\n\n【评分标准】\n答题规范: ' + EXAM_PATTERN.exam_rules['答题规范'].join('; ');
  }
  sys += '\n\n【题目】（' + q.year + '年 第' + q.num + '题 ' + q.type + '）\n' + q.question;
  if (q.answer) sys += '\n\n【参考答案】\n' + q.answer;
  sys += '\n\n【相关知识点】' + ctx;
  sys += '\n\n【RAG检索：相关真题范例与语料】' + ragCtx;
  sys += '\n\n【学生作答】\n' + answer;
  sys += '\n\n请按以下结构输出（用markdown）：\n## 一、评分\n总分XX/10分。各维度打分：知识点覆盖(X/4)、逻辑结构(X/3)、术语准确(X/2)、实际联系(X/1)\n\n## 二、遗漏知识点\n用表格列出：| 遗漏要点 | 应该这样写 |\n\n## 三、优化重写（85分水平）\n保留学生原有思路，但补全结构、术语和遗漏点，重写一份85分水平的答案。\n\n## 四、对照分析\n| 你的版本 | 优化版本 | 差异说明 |\n\n要求：客观、具体、可操作。';
  fetch(DS_URL, {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + getAPIKey(), 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: 'mimo-v2.5', messages: [{ role: 'user', content: sys }], stream: true, temperature: 0.3, max_tokens: 4096 })
  }).then(function(r) { if (!r.ok) throw Error('HTTP ' + r.status); return r.body.getReader(); })
    .then(function(rd) {
      var b = '', t = '', d = new TextDecoder();
      function n() { rd.read().then(function(r) {
        if (r.done) { result.innerHTML = renderMarkdown(t); return; }
        b += d.decode(r.value, { stream: true }); var ls = b.split('\n'); b = ls.pop() || '';
        ls.forEach(function(l) {
          if (l.startsWith('data: ')) {
            var dd = l.substring(6); if (dd === '[DONE]') return;
            try { var p = JSON.parse(dd);
              if (p.choices && p.choices[0].delta) {
                var x = p.choices[0].delta.content || '';
                if (x) { t += x; result.innerHTML = renderMarkdown(t); }
              }
            } catch(e) {}
          }
        });
        n();
      }); }
    n();
  }).catch(function(err) { result.innerHTML = '<span style="color:var(--r)">批改失败：' + err.message + '</span>'; });
}

function startQuiz() {
  var pool = DATA;
  quizWrong = [];
  quizSeconds = 0;
  if (quizTimer) clearInterval(quizTimer);
  quizTimer = setInterval(function(){ quizSeconds++; updateQuizTimer(); }, 1000);
  if (curPath && curPath.indexOf("cat:") != 0 && curPath.indexOf("sub:") != 0 && curPath != "predictions" && curPath != "professors" && curPath != "") {
    var ids = TQM[curPath] || [];
    if (ids.length) {
      pool = [];
      ids.forEach(function(id) { DATA.forEach(function(q) { if (q.id == id) pool.push(q); }); });
    }
  }
  // Fisher-Yates shuffle for true randomness
  pool = pool.slice();
  for (var i = pool.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = pool[i]; pool[i] = pool[j]; pool[j] = tmp;
  }
  // Mild weighting: move undone/unviewed questions slightly earlier, done questions slightly later
  var undone = [], viewed = [], done = [];
  pool.forEach(function(q) {
    if (marks[q.id] && marks[q.id].done) { done.push(q); }
    else {
      var hasNew = (q.knowledge || []).some(function(k) { return !knowledgeViews[k]; });
      if (hasNew) undone.push(q); else viewed.push(q);
    }
  });
  // Interleave: undone first (60%), viewed (30%), done (10%)
  var selected = [];
  var target = Math.min(15, pool.length);
  var nUndone = Math.min(Math.ceil(target * 0.6), undone.length);
  var nViewed = Math.min(Math.ceil(target * 0.3), viewed.length);
  var nDone = Math.min(target - nUndone - nViewed, done.length);
  if (nUndone + nViewed + nDone < target) {
    // Fill remaining from other pools
    var remain = target - nUndone - nViewed - nDone;
    var extraUndone = Math.min(remain, undone.length - nUndone);
    nUndone += extraUndone; remain -= extraUndone;
    var extraViewed = Math.min(remain, viewed.length - nViewed);
    nViewed += extraViewed;
  }
  selected = selected.concat(undone.slice(0, nUndone), viewed.slice(0, nViewed), done.slice(0, nDone));
  // Shuffle selected again to mix the groups
  for (var i = selected.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = selected[i]; selected[i] = selected[j]; selected[j] = tmp;
  }
  quizQs = selected.slice(0, target);
  quizIdx = 0;
  renderQuiz();
}

function renderQuiz() {
  if (quizIdx >= quizQs.length) {
    if (quizTimer) clearInterval(quizTimer);
    var elapsed = Math.floor(quizSeconds/60) + '分' + (quizSeconds%60) + '秒';
    // Save wrong answers + SM-2 scheduling
    var wlog = JSON.parse(localStorage.getItem('r434_wrong')||'{}');
    quizWrong.forEach(function(id){ wlog[id] = (wlog[id]||0) + 1; });
    localStorage.setItem('r434_wrong', JSON.stringify(wlog));
    // Schedule wrong questions for SM-2 review
    quizWrong.forEach(function(id) {
      if (!wrongReview[id]) wrongReview[id] = {n:0, ef:2.5, interval:1};
    });
    try { localStorage.setItem('r434_wrong_review', JSON.stringify(wrongReview)); } catch(e) {}
    var wrongCount = quizWrong.length;

function filterAllQuestions() {
  var yr = (document.getElementById('aqYear')||{}).value || '';
  var tp = (document.getElementById('aqType')||{}).value || '';
  var st = (document.getElementById('aqStatus')||{}).value || '';
  var kw = ((document.getElementById('aqSearch')||{}).value || '').toLowerCase();
  var wlog = JSON.parse(localStorage.getItem('r434_wrong')||'{}');
  var filtered = DATA.filter(function(q){
    if (yr && q.year != yr) return false;
    if (tp && q.type != tp) return false;
    if (st === 'done' && !(marks[q.id] && marks[q.id].done)) return false;
    if (st === 'star' && !(marks[q.id] && marks[q.id].star)) return false;
    if (st === 'wrong' && !wlog[q.id]) return false;
    if (st === 'unseen' && (marks[q.id] && (marks[q.id].done || marks[q.id].star))) return false;
    if (kw && q.question.toLowerCase().indexOf(kw) < 0) return false;
    return true;
  });
  var h = '<div style="margin-bottom:8px;font-size:12px;color:var(--ts)">共 ' + filtered.length + ' 道</div>';
  filtered.forEach(function(q){ h += qCard(q); });
  document.getElementById('aqList').innerHTML = h;
}

function reviewCard(kn, quality) {
  var log = JSON.parse(localStorage.getItem('r434_cards')||'{}');
  var prev = log[kn] || {n:0, ef:2.5, interval:1};
  var interval;
  if (quality < 1) interval = 1;
  else if (prev.n === 0) interval = 1;
  else if (prev.n === 1) interval = 6;
  else interval = Math.round(prev.interval * prev.ef);
  prev.ef = Math.max(1.3, prev.ef + (0.1 - (3-quality) * (0.08 + (3-quality) * 0.02)));
  prev.interval = interval;
  prev.date = new Date().toISOString().slice(0,10);
  prev.n = prev.n + 1;
  log[kn] = prev;
  localStorage.setItem('r434_cards', JSON.stringify(log));
  navigate('cards');
}

function doSearch() {
  var kw = document.getElementById("gs").value.trim();
  if (!kw) { navigate(curPath); return; }
  var kwl = kw.toLowerCase();
  document.getElementById("bc").innerHTML = '🔍 搜索：<span>' + kw + '</span>';
  var qResults = [], knResults = [], hotResults = [], abResults = [], profResults = [];

  // 1. Search knowledge points FIRST (highest priority)
  for (var k in KNOWLEDGE) {
    var item = KNOWLEDGE[k], score = 0, sn = '';
    if (k === kw) { score += 50; sn = k; }
    else if (k.indexOf(kw) >= 0) { score += 30; sn = k; }
    else if (k.toLowerCase().indexOf(kwl) >= 0) { score += 20; sn = k; }
    if (item.overview && item.overview.indexOf(kw) >= 0) { score += 8; sn = sn || item.overview.substring(0, 80); }
    if (item.key) item.key.forEach(function(x) { if (x.indexOf(kw) >= 0) score += 5; });
    if (score > 0) knResults.push({name: k, score: score, module: item.module || '', snippet: sn});
  }
  knResults.sort(function(a, b) { return b.score - a.score; });

  // 2. Search questions (title weighted more than answer)
  DATA.forEach(function(q) {
    var score = 0;
    if (q.question.indexOf(kw) >= 0) score += 15;
    else if (q.question.toLowerCase().indexOf(kwl) >= 0) score += 8;
    if (q.answer && q.answer.indexOf(kw) >= 0) score += 5;
    if (q.knowledge) q.knowledge.forEach(function(k) { if (k.indexOf(kw) >= 0 || kw.indexOf(k) >= 0) score += 3; });
    if (score > 0) qResults.push(Object.assign({score: score}, q));
  });
  qResults.sort(function(a, b) { return b.score - a.score; });

  // 3. Search professors
  if (typeof PROFESSORS !== 'undefined') {
    for (var name in PROFESSORS) {
      var p = PROFESSORS[name], score = 0;
      if (name.indexOf(kw) >= 0) score += 20;
      if (p.research) p.research.forEach(function(r) { if (r.indexOf(kw) >= 0) score += 10; });
      if (p.recent && p.recent.indexOf(kw) >= 0) score += 5;
      if (p.exam_link && p.exam_link.indexOf(kw) >= 0) score += 8;
      if (score > 0) profResults.push({name: name, score: score, data: p});
    }
    profResults.sort(function(a, b) { return b.score - a.score; });
  }

  // 4. Search hot topics
  if (typeof HOT_TOPICS !== 'undefined' && HOT_TOPICS && HOT_TOPICS.categories) {
    HOT_TOPICS.categories.forEach(function(cat) {
      (cat.cards || []).forEach(function(s) {
        var score = 0;
        if (s.topic.indexOf(kw) >= 0) score += 10;
        if (s.news_brief && s.news_brief.indexOf(kw) >= 0) score += 5;
        if (s.predicted_question && s.predicted_question.indexOf(kw) >= 0) score += 8;
        if (score > 0) hotResults.push({title: s.topic, score: score, snippet: s.news_brief});
      });
    });
    hotResults.sort(function(a, b) { return b.score - a.score; });
  }

  // 5. Search answer bank
  if (ANSWER_BANK && ANSWER_BANK.categories) {
    ANSWER_BANK.categories.forEach(function(c) { c.items.forEach(function(it) {
      if (it.name.indexOf(kw) >= 0 || (it.content && it.content.indexOf(kw) >= 0)) abResults.push(it);
    });});
  }

  var total = qResults.length + knResults.length + hotResults.length + abResults.length + profResults.length;
  var h = '<div class="hero"><h1>🔍 搜索「' + kw + '」</h1><div class="desc">共找到 <strong>' + total + '</strong> 条结果（知识点' + knResults.length + ' · 真题' + qResults.length + ' · 导师' + profResults.length + ' · 热点' + hotResults.length + ' · 语料' + abResults.length + '）</div></div>';

  // Knowledge results with snippets
  if (knResults.length) {
    h += '<div class="pcard"><div class="pcard-hdr"><h3>📖 知识点（' + knResults.length + '个）</h3></div><div class="pcard-body">';
    knResults.slice(0, 15).forEach(function(r) {

      if (data.marks) localStorage.setItem('r434', JSON.stringify(data.marks));
      if (data.knowledgeViews) localStorage.setItem('r434_kv', JSON.stringify(data.knowledgeViews));

function getPageContext() {
  var ctx = {type:'home',label:'首页'};
  if(!curPath)return ctx;
  if(curPath===''){ctx.type='home';ctx.label='首页'}
  else if(curPath==='answerbank'){ctx.type='answerbank';ctx.label='答题语料库'}
  else if(curPath==='macro'){ctx.type='macro';ctx.label='宏观数据'}
  else if(curPath==='predictions'){ctx.type='predictions';ctx.label='学术预测'}
  else if(curPath==='professors'){ctx.type='professors';ctx.label='导师研究'}
  else if(curPath.indexOf('kn:')===0){
    ctx.type='knowledge';ctx.knowledge=curPath.substring(3);
    ctx.label='知识点: '+ctx.knowledge;
    var kn=KNOWLEDGE[ctx.knowledge];
    if(kn&&kn.overview)ctx.preview=kn.overview.substring(0,200);
  }else if(curPath.indexOf('/')>0){
    ctx.type='topic';ctx.path=curPath;
    var parts=curPath.split('/');ctx.knowledge=parts[parts.length-1];ctx.label='真题: '+ctx.knowledge;
    var bc=document.getElementById('bc');if(bc)ctx.breadcrumb=bc.textContent;
    // Get associated question IDs
    if(TQM&&TQM[curPath])ctx.question_ids=TQM[curPath].slice(0,5);
  }
  return ctx;
}

function reviewWrongCard(id, quality) {
  if (!wrongReview[id]) wrongReview[id] = {n:0, ef:2.5, interval:1};
  var r = sm2NextInterval(wrongReview[id], quality);
  wrongReview[id] = r;
  try { localStorage.setItem('r434_wrong_review', JSON.stringify(wrongReview)); } catch(e) {}
  if (!marks[id]) marks[id] = {};
  marks[id].done = true;
  marks[id].date = new Date().toISOString().slice(0,10);
  saveState();
  showWrongReview();
}

function showWrongReview() {
  var ids = Object.keys(wrongReview);
  if (!ids.length) { document.getElementById('ct').innerHTML = '<div class="hero" style="text-align:center"><h2>🎉 没有待复习的错题</h2><p style="color:var(--ts)">做完测验后，答错的题目会自动加入复习队列</p></div>'; return; }
  var now = new Date();
  var dueIds = [], laterIds = [];
  ids.forEach(function(id) {
    var r = wrongReview[id];
    if (!r.date || (now - new Date(r.date)) > r.interval * 86400000) dueIds.push(id);
    else laterIds.push(id);
  });
  document.getElementById('bc').innerHTML = '<span>📋 错题复习</span>';
  var h = '<div class="hero"><h1>📋 错题·间隔复习</h1><div class="desc">SM-2 算法调度 · 待复习 <strong>' + dueIds.length + '</strong> 道 | 已安排 ' + laterIds.length + ' 道</div></div>';
  dueIds.forEach(function(id) {
    var q = DATA.find(function(x){return x.id===id;});
    if (!q) return;
    var r = wrongReview[id] || {}, nextDays = r.n > 0 ? (r.interval || 1) + '天' : '首次';
    h += '<div class="pcard" style="margin-bottom:12px"><div class="pcard-body">' +
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px"><div style="flex:1"><div style="font-size:14px;line-height:1.8;margin-bottom:8px">' + q.question + '</div>' +
      '<div class="qa" style="max-height:300px">' + (q.answer || '暂无答案') + '</div></div>' +
      '<div style="text-align:center;min-width:60px"><div style="font-size:11px;color:var(--ts);margin-bottom:4px">下次：' + nextDays + '</div></div></div>' +
      '<div style="display:flex;gap:6px;justify-content:center;margin-top:12px">' +
      '<button onclick="reviewWrongCard(\'' + id + '\',0)" class="btn" style="background:#f44336;color:#fff;font-size:12px;padding:6px 14px">不认识</button>' +
      '<button onclick="reviewWrongCard(\'' + id + '\',1)" class="btn" style="background:#FF9800;color:#fff;font-size:12px;padding:6px 14px">模糊</button>' +
      '<button onclick="reviewWrongCard(\'' + id + '\',3)" class="btn" style="background:#4CAF50;color:#fff;font-size:12px;padding:6px 14px">掌握</button></div></div></div>';
  });
  if (!dueIds.length) h += '<p style="text-align:center;color:var(--ts);padding:40px">✅ 所有错题都在复习计划中，暂无到期题目</p>';

  fetch(DS_URL, {method:'POST', headers:{Authorization:'Bearer '+getAPIKey(),'Content-Type':'application/json'},
