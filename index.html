var ANSWER_BANK = {"categories":[{"title":"国际贸易理论·标准化表述","icon":"📐","items":[{"name":"绝对优势理论（亚当·斯密）","content":"定义：绝对优势理论是最早主张自由贸易的理论，由英国经济学家亚当·斯密提出。他批判了重商主义的观点，认为国际贸易和分工的原因和基础是各国间存在的劳动生产率和生产成本的绝对差别。各国应生产并出口其具有绝对优势的产品，进口不具有绝对优势的产品，贸易的结果是使双方获益。\n核心要点：\n  · 理论提出：亚当·斯密创立，批判重商主义零和博弈观点，形成国际分工理论\n  · 核心观点：劳动生产率高即具有绝对优势，这是贸易的动因\n  · 贸易模式：专业化生产具有绝对优势的产品并出口，进口不具有绝对优势的产品\n  · 贸易利益：专业化生产使总产出增加，贸易交换使两国消费水平提升，实现双赢\n核心假设（8条）：\n  (1) 2×2×1模型：仅考虑两个国家、两种产品、一种同质生产要素（劳动）\n  (1) 生产技术差异：两国在不同产品上的生产技术不同，存在劳动生产率的绝对差异\n  (1) 劳动价值论：劳动决定商品价值，且所有劳动都是同质的\n  (1) 要素流动：生产要素供给固定，国内部门间自由流动，国际间完全不流动，且充分利用\n  (1) 生产特征：规模报酬不变\n优点：是最早的国际分工理论，也是历史上第一次从生产领域出发解释国际贸易的原因、模式和利益，为之后的国际贸易理论奠定了基础\n局限：条件苛刻：不能解释一国在任何一种商品的生产上都不具有绝对优势时进行的国际分工和交换，局限性大（比较优势理论解决了此问题）\n历年考察：2015年新贸易理论新的表现（需与绝对优势、比较优势对比）；2023年机会成本计算题（需区分绝对优势与比较优势）"},{"name":"比较优势理论（大卫·李嘉图）","content":"定义：比较优势理论由大卫·李嘉图提出，继承并发展了亚当·斯密的绝对优势理论。核心观点：国际贸易的基础是比较优势而非绝对优势。一国应按照两利相权取其重、两弊相权取其轻的原则，出口其具有比较优势的产品，进口其不具有比较优势的产品，贸易结果是使双方获利。该理论揭示了国际分工的动因是比较优势而非绝对优势，具有重要的进步意义。\n核心要点：\n  · 贸易动因：国际贸易的基础不仅在于劳动生产率的绝对差异，即使一国所有产品都有绝对优势、另一国都有绝对劣势，只要存在生产效率的相对差异（机会成本差异），仍可进行互利贸易\n  · 贸易模式：按照两利相权取其重、两弊相权取其轻的原则，出口比较优势产品，进口不具有比较优势的产品\n  · 贸易利益：参与双方都从专业化生产和贸易中获利\n  · 机会成本：比较优势由机会成本的差异决定，一国在机会成本较低的产品上具有比较优势\n核心假设（9条）：\n  (1) 2×2×1模型：两个国家、两种产品、一种生产要素（劳动）\n  (1) 生产技术差异：两国在不同产品上的生产技术不同，存在着劳动生产率的相对差异\n  (1) 劳动价值论：劳动决定商品价值，且所有劳动都是同质的\n  (1) 要素流动：生产要素给定且充分利用，可以在国内不同部门之间自由流动，但在国家之间不能流动\n  (1) 规模报酬不变\n优点：符合实际：解释了国际贸易的基础是比较优势而不是绝对优势，更贴近实际贸易情形\n局限：未说明比较优势来源：没有解释一国为什么具有比较优势，比较优势从何而来（要素禀赋理论H-O对此进行了补充）\n历年考察：2011年比较优势vs规模经济；2015年比较优势与要素禀赋的区别联系；2023年机会成本计算题（比较优势的量化分析）"},{"name":"比较优势陷阱","content":"定义：比较优势陷阱是指发展中国家完全按照静态比较优势，生产并出口初级产品和劳动密集型产品，在与以技术和资本密集型产品出口为主的发达国家贸易中，虽能获得短期利益，但贸易结构不稳定，长期处于不利地位，落入比较利益陷阱。分为初级产品比较优势陷阱和制成品比较优势陷阱两种类型。\n核心要点：\n  · 初级产品陷阱：发展中国家运用劳动力和自然资源优势参与国际分工，比较优势战略的实施反而强化了这种低端分工形式，使发展中国家长期陷入低附加值环节，贸易条件不断恶化\n  · 制成品陷阱：发展中国家虽然开始进入制造业生产和出口，但过度依赖技术引进，自主创新能力长期得不到提高，无法发挥后发优势，只能依赖发达国家的技术进步，陷入技术依赖型陷阱\n  · 产生原因一：比较优势不等于竞争优势。比较优势产品是本国产品间的比较，在国际竞争中不一定具有竞争优势，而竞争优势才是产品通过市场检验的资格\n  · 产生原因二：市场假设与要素收益。比较优势理论假设完全竞争市场，但现实中市场为非完全竞争，不能如实反映一国的比较优势，导致贸易福利分配不均衡。发展中国家劳动力和自然资源要素生产的初级产品带来的收益远少于发达国家技术和资本带来的收益\n优点：实质是告诫人们不要静止和僵化地看待比较优势理论，并没有否定比较优势理论的基本思想\n历年考察：2012年简述比较优势陷阱及其产生原因（直接考查）"},{"name":"相互需求理论（穆勒）","content":"定义：比较优势理论分析了贸易的发生和互利性，但没有说明贸易条件（国际交换比率）是如何确定的。穆勒的相互需求理论补充了这一不足：商品的国际价值停留在使两国贸易达到平衡的那个交换比例上，这个比例由两国对彼此商品的需求强度决定。\n核心要点：\n  · 贸易条件由需求强度决定：当两国贸易达到平衡时，交换比例即为均衡贸易条件。需求强度越大的一方在谈判中越被动\n  · 相互需求方程式：出口商品价格 × 出口量 = 进口商品价格 × 进口量\n  · 利益分配原则：如果A国对B国商品的需求强度大于B国对A国的需求强度，则交换比例更接近A国国内的交换比率，A国获得的贸易利益越少\n  · 核心推论：交换比率越接近哪个国家的国内交换比率，该国从贸易中获得的利益就越少\n公式：出口商品价格 × 出口量 = 进口商品价格 × 进口量\nA国需求强度 > B国需求强度 → 交换比例接近A国国内比率 → A国获利较少\n历年考察：理论本身尚未直接出题，但与比较优势理论和贸易条件有内在联系。2023年考察了比较优势理论，可能在未来结合贸易条件计算出题。"},{"name":"要素禀赋理论(H-O)（赫克歇尔-俄林）","content":"定义：要素禀赋理论（H-O理论，赫克歇尔-俄林理论）从要素禀赋差异解释贸易模式，属于新古典贸易理论。核心观点：一国应出口密集使用本国相对丰裕要素生产的产品，进口密集使用本国相对稀缺要素生产的产品。与比较优势理论不同，H-O使用双要素模型（资本+劳动），认为国内交换规律可适用于国际交换。\n核心要点：\n  · 核心概念：要素禀赋=一国可利用生产要素的总量；要素密度=产品生产中某要素投入比例；要素丰裕度=一国生产要素的相对比例（如K/L比率）\n  · 贸易动因链：不同国家的资源禀赋不同 → 要素成本差异 → 相对价格差异 → 国际贸易发生\n  · 贸易模式：出口密集使用本国丰裕要素的产品，进口密集使用本国稀缺要素的产品\n  · 与比较优势对比：相同点——都是传统贸易理论，主张自由贸易、发挥比较优势；不同点——产生原因（劳动生产率差异 vs 要素禀赋差异）、要素数量（单要素 vs 双要素）、交换规律（国内不适用 vs 适用于国际）\n核心假设（8条）：\n  (1) 2×2×2模型：两个国家(A和B)、两种商品(X,Y)、两种要素(劳动力L和资本K)\n  (1) 生产函数相同：两国生产方法、技术、劳动生产率相同\n  (1) 要素禀赋不同：一国K相对丰裕，另一国L相对丰裕，两国K/L不同\n  (1) 产品要素密集度固定：一种劳动密集型，一种资本密集型\n  (1) 要素价格不同：K丰裕的国家利率低，L丰裕的国家工资率低\n优点：理论贡献：指出了比较优势的来源——要素禀赋差异。即使两国生产技术完全相同，只要要素禀赋不同也能发生国际贸易\n局限：自然禀赋不是贸易发生的充分条件，忽略了社会因素（制度、教育、文化等）在对外开放中的重要地位\n历年考察：2012年H-O计算题；2014年要素价格均等化；2015年与比较优势理论的区别联系；2019年H-O理论评析；2023年要素价格均等化应用"},{"name":"要素价格均等化(HOS)（萨缪尔森）","content":"定义：H-O-S理论（萨缪尔森补充）阐述了国际贸易对要素价格的反作用。核心观点：商品的跨国自由流动可以代替生产要素的流动，使各贸易国之间的要素报酬趋于一致。分为相对均等化和绝对均等化两个层次。\n核心要点：\n  · 相对均等化：原先要素价格比率不一致的两国，在发生贸易后比率逐渐趋于相等\n  · 绝对均等化：原先同一种要素的绝对价格在不同国家不相等，贸易后逐渐趋于相等\n  · 本质逻辑：商品自由贸易 → 商品价格均等 → 要素价格均等\n  · 现实中难以实现的原因：贸易壁垒导致相同产品价格不同、生产要素不能完全自由流动（如中国二元户籍制度限制劳动力流动）、各国技术不同且变化\n核心假设（3条）：\n  (1) 自由贸易，所有商品价格相同\n  (1) 生产要素能在不同产业间自由流动\n  (1) 各国技术相同且不变\n局限：贸易壁垒的存在使相同产品在不同国家的价格不可能完全相同\n历年考察：2014年考察要素价格均等化定理；2023年要素价格均等化应用"},{"name":"S-S定理（斯托尔帕-萨缪尔森）","content":"定义：斯托尔帕-萨缪尔森定理（S-S定理）分析了国际贸易对要素收入分配的影响。核心内容：某一产品相对价格上升，会导致该产品密集使用的生产要素实际报酬提高，另一种生产要素实际报酬下降。国际贸易提高丰裕要素所有者的实际收入，降低稀缺要素所有者的收入。S-S定理为贸易保护提供了理论依据。\n核心要点：\n  · 价格传导机制：关税/贸易保护 → 受保护产品价格上升 → 该产品密集使用的要素价格提高（幅度更大），另一种要素价格下降\n  · 贸易的分配效应：国际贸易 → 丰裕要素所有者收入提高，稀缺要素所有者收入降低\n  · 放大效应：要素价格变动幅度大于产品价格变动幅度。因为要素价格由产品价格提升和要素生产率提升两部分共同构成\n  · 政策含义：不是所有人都从国际贸易中获益——受损者往往强烈反对贸易自由化，政府应采取措施调节收入分配\n历年考察：2023年与要素价格均等化关联考察；2014年相关"},{"name":"罗伯津斯基定理（雷布津斯基）","content":"定义：罗伯津斯基定理（R理论）分析生产要素供给变化对产出结构的影响。在要素相对价格不变、规模报酬不变的条件下，生产要素单一增长会导致密集使用该要素生产的产品产量绝对增加，而另一种产品产量绝对减少。\n核心要点：\n  · 要素增长效应：劳动供给增加 → 密集使用劳动的产品产量绝对增加 → 密集使用资本的产品产量绝对减少\n  · 放大效应：产品价格不变时，某种要素的相对增加会导致密集使用该要素的产品产量以更大比例增长\n  · 荷兰病（Dutch Disease）案例：20世纪70年代荷兰大规模开发出口北海石油和天然气，劳动力和资本大量流向油气部门，造成制造业生产和出口相对萎缩。即一个产业的增长扩张导致其他产业的萎缩\n  · 政策启示：资源型国家需警惕资源繁荣对其他产业的挤出效应\n历年考察：2023年罗伯津斯基定理与荷兰病"},{"name":"贫困化增长","content":"定义：贫困化增长（Immiserizing Growth）是指国际贸易使一国福利绝对下降的情况。当大国出口产品密集使用的生产要素大幅增加时，出口产品供给急剧增加，国际价格大幅下跌，贸易条件恶化，贸易条件恶化的负面效应超过经济增长的正面效应，该国福利恶化。\n核心要点：\n  · 发生条件一：增长发生在出口部门，且该国在国际市场上份额很大，出口增加能够引起国际价格下跌\n  · 发生条件二：国际市场对该商品的需求价格弹性较低，需求不会因价格下降而增加多少，过剩商品使价格下降到很低水平\n  · 核心机制：出口要素增加 → 出口量大幅增加 → 国际价格大幅下跌 → 贸易条件恶化 → 福利下降\n历年考察：2023年贫困化增长条件分析"},{"name":"列昂惕夫之谜","content":"定义：列昂惕夫利用投入产出法检验H-O理论，预测美国作为资本丰裕国应出口资本密集型产品。但检验结果相反——美国出口的是劳动密集型产品，进口的是资本密集型产品。这一与H-O理论的矛盾即列昂惕夫之谜。\n核心要点：\n  · 核心发现：美国出口产品的劳动密集度高于进口替代产品，与H-O理论预测完全相反\n  · 六种解释（老子需要帽檐口诀助记）：老=劳动力非同质、子=自然资源说、需=需求逆转、要=要素密集度逆转、帽=贸易保护政策、檐=研究方法缺陷\n历年考察：2023年与H-O理论关联考察"},{"name":"新要素理论（舒尔茨/弗农）","content":"定义：二战后科技革命兴起，传统三要素（土地、劳动、资本）已不足以解释国际贸易新现象。舒尔茨、格鲁伯、弗农等提出新要素理论，将生产要素扩展为包括人力资本、技术研发、管理决策、信息等新要素，弥补了列昂惕夫之谜解释的不足。\n核心要点：\n  · 人力资本说：熟练劳动力是具有人力资本的要素，解释了发达国家在高技术产品上的比较优势\n  · 研究与开发说（R&D）：研发投入决定技术创新能力，研发密集型产品主要由发达国家出口\n  · 信息要素论：信息不仅能创造价值而且可以交换，成为独立的生产要素\n  · 管理决策论：在一定技术条件下最优地组织和调节生产要素之间的比例关系，管理也是生产要素\n历年考察：与列昂惕夫之谜和新贸易理论关联考察"},{"name":"特定要素模型（萨缪尔森-琼斯）","content":"定义：萨缪尔森和琼斯发展了H-O模型，引入特定要素分析短期内国际贸易对收入分配的影响。核心观点：与H-O假设所有要素可自由流动不同，现实中有些生产要素（如机器设备、土地）是特定要素，短期内无法跨部门流动。因此贸易虽使整体福利增加，但不意味着每个居民都受益。\n核心要点：\n  · 贸易对收入分配：出口产品价格上升 → 出口部门特定要素所有者受益；进口竞争品价格下降 → 进口部门特定要素所有者受损；流动要素（劳动）所有者影响不确定\n  · 特定要素增长影响（以土地增加为例）：土地增加 → 劳动边际生产率提高 → 劳动力从制造业流向农业 → 粮食产量增加、机器产量减少 → 劳动名义和实际收益上升，土地收益不确定\n  · 流动要素（劳动）增长影响：劳动增加 → 两部门产量都增加 → 名义工资和实际工资都下降 → 特定要素（资本和土地）名义和实际收益都增加\n  · 政策含义：自由贸易会造成部分居民福利绝对下降，这些受损者往往强烈反对贸易自由化，解释了贸易保护的政治经济学基础\n核心假设（5条）：\n  (1) 一国能生产两种产品：制成品M（机器）和农产品F（粮食）\n  (1) 三种生产要素：劳动L（流动要素）、资本K（特定要素，只用于制成品）、土地T（特定要素，只用于农产品）\n  (1) 农产品用土地和劳动生产，制成品用资本和劳动生产\n  (1) 土地和资本不能跨部门移动，劳动可以在两部门间自由流动\n  (1) 除要素流动性假设不同外，其他与H-O理论类似\n历年考察：2023年与特定要素模型相关的要素价格均等化对比"},{"name":"产业内贸易理论（克鲁格曼/兰卡斯特）","content":"定义：产业内贸易（Intra-Industry Trade）是指两国之间在同类产品上同时发生进口和出口的现象，也称为重叠贸易。以克鲁格曼和兰卡斯特为代表，用规模经济、不完全竞争和产品差异来解释产业内贸易，突破了传统理论完全竞争市场的分析框架。林德从需求偏好角度解释了收入相近国家间的产业内贸易，法尔维引入收入分配解释纵向差异产品。\n核心要点：\n  · 度量工具：G-L指数（格鲁伯-劳埃德指数）= 1 - |X-M|/(X+M)，指数越接近1说明产业内贸易程度越高。此外还有巴拉萨指数和边际产业内贸易指数\n  · 市场基础：不完全竞争（垄断竞争、寡头垄断）是产业内贸易的市场基础——克鲁格曼模型和相互倾销模型对此进行了分析\n  · 产生基础：产品差异是产业内贸易的基础。分为水平差异（同一属性的不同组合，如不同款式的服装）、技术差异（新技术产品）、垂直差异（不同质量档次，如不同价位的智能手机）\n  · 需求动因：需求偏好相似是产业内贸易的动因（林德假说）。两国经济发展水平越接近，消费需求偏好越接近，一国产品在另一国越有销路\n公式：G-L指数 = 1 - |Xj-Mj| / (Xj+Mj)\n当 Xj=Mj 时，G-L=1（完全产业内贸易）\n巴拉萨指数 = 1 - |X-M|/(X+M)\n边际产业内贸易指数 = 1 - |ΔX-ΔM|/(|ΔX|+|ΔM|)\n优点：认为一国开展国际贸易不仅为获取资源上的比较优势，还为获取规模经济报酬，解释了当前国际贸易的主要趋势\n局限：静态说服力强，动态说服力弱\n历年考察：2012年产业内贸易原因和度量；2013年与传统理论异同；2016年理论基础；2024年三种指数计算"},{"name":"规模经济（克鲁格曼）","content":"定义：规模经济（规模报酬递增）是新贸易理论的核心概念，指随着生产规模扩大，单位成本下降的现象。克鲁格曼证明：规模经济与产品差异化共同构成产业内贸易的基础——即使两国在技术和要素禀赋上完全相同，规模经济也能成为国际贸易的独立原因，是对传统比较优势理论的重要补充。\n核心要点：\n  · 内部规模经济：企业自身扩大生产规模，单位产品成本降低。大企业获得成本优势\n  · 外部规模经济：整个产业规模扩大使所有企业成本降低。产业集聚带来外部效应\n  · 贸易意义：规模经济是独立于比较成本之外的又一引发对外贸易的决定因素。企业为获得规模经济需要更大的市场，国际贸易扩大了市场容量\n  · 福利效应：规模经济降低成本不仅包括生产成本，还包括运输、销售和信息成本，社会资源利用效率提高，消费者剩余增加\n公式：规模报酬递增：产量扩大 → 平均成本下降\n内部规模经济：企业产量↑ → 企业AC↓\n外部规模经济：产业规模↑ → 所有企业AC↓\n历年考察：2011年比较优势vs规模经济；2012年产业内贸易原因中的规模经济解释"},{"name":"熊彼特创新理论","content":"定义：熊彼特创新理论分析创新与经济周期之间的关系。创新是经济发展的根本动力，由企业家推动。创新不仅是技术发明，更涵盖经济活动中的各种新组合。该理论为后来的技术差距论和产品生命周期理论奠定了基础。\n核心要点：\n  · 五种创新方式：产品创新（采用新产品或新特性）、技术创新（采用新生产方法）、市场创新（开辟新市场）、资源配置创新（掠取新供应来源）、组织创新（实现新工业组织，如垄断或打破垄断）\n  · 创新由企业家推动，是经济发展的核心引擎\n  · 创新 → 模仿 → 普及 → 经济周期波动\n  · 与国际贸易的关系：解释了为什么创新国能在特定时期垄断新产品生产并出口"},{"name":"技术差距论（波斯纳）","content":"定义：波斯纳等人基于熊彼特创新理论，从创新和技术差距的动态关系分析国际贸易的基础和格局变化。创新产品在工业发达国家最先问世并在国内销售后进入国际市场，创新国具备初期比较优势。其他国家因技术差距需一段时间才能模仿生产。随着进口国仿制成功，技术差距消失，贸易分工重回比较优势。\n核心要点：\n  · 需求时滞：创新国出现新产品时，后进国未意识到其替代价值，需要一段时间才产生需求。影响因素包括两国收入水平差异和模仿国收入分配的公平程度\n  · 反应时滞：进口国意识到竞争威胁后开始模仿生产。影响因素包括后进国企业家的投资意识、风险意识、规模效应、贸易壁垒和市场大小\n  · 掌握时滞：从开始模仿到完全掌握技术、达到创新国同一水平的时间。取决于创新国的技术转移意愿、后进国的研发经费、技术基础和生产条件\n  · 模仿时滞 = 需求时滞 + 反应时滞 + 掌握时滞。贸易持续时间 = 模仿时滞\n历年考察：与产品生命周期理论对比考察"},{"name":"产品生命周期理论（弗农）","content":"定义：弗农提出产品生命周期理论，用以解释国际贸易和国际投资的基本规律。该理论将产品生命周期分为新产品阶段、成长成熟阶段和标准化阶段，将国家分为创新国（美国）、其他发达国家和欠发达国家。不同阶段产品的生产要素密集度不同，比较优势在国家间动态转移。这是工业制成品贸易的动态贸易理论。\n核心要点：\n  · 新产品阶段：产品为技术密集型，生产非标准化，厂商拥有垄断地位，只有发达国家间小规模贸易\n  · 成长成熟阶段：产品转为资本密集型，规模经济效应明显，竞争加剧。企业在本国生产出口、对外直接投资和技术转让之间选择最优方式服务国外需求\n  · 标准化阶段：产品完全标准化，转为劳动密集型，劳动成本成为决定因素。发展中国家扩大生产并向发达国家出口，创新国从出口转为进口，着手研发新产品\n优点：启示一：发展中国家可以承接发达国家转移出来的产业，并发挥后发优势\n历年考察：2011年内部化理论与技术授权；2014年与FDI关系；2024年国际化阶段与产品生命周期"},{"name":"国家竞争优势理论（波特）","content":"定义：迈克尔·波特提出国家竞争优势理论（钻石模型），从企业参与国际竞争的微观角度来解释国际贸易。国家是企业或产业参与国际竞争的基础，企业或产业的竞争优势是国家竞争优势的体现。竞争优势取决于四个基本要素（生产要素、需求要素、相关与支撑产业、企业战略与竞争状态）和两个辅助要素（政府、机遇）。\n核心要点：\n  · 生产要素：包括初级要素（自然资源、非熟练劳动力）和高级要素（研发设施、人力资本）。高级要素通过长期投资创造，是竞争力的关键\n  · 需求要素：国内市场需求状况和特征影响国际竞争力。通过市场的全球性、需求层次、需求超前性和市场成长速度四个渠道发挥作用\n  · 相关与支撑产业：国内存在有国际竞争力的供应商和相关产业。波特认为竞争优势来自产业聚集，本地企业组成的上下游产业链条形成的国际竞争优势最稳定可靠\n  · 企业组织、战略与竞争：激烈的国内竞争是创造和保持国际竞争优势最有力的刺激因素\n优点：突破了以往国际贸易理论对单一因素的考察，综合权衡了国内要素、市场、产业和政策等因素\n局限：对产业的选择基于已存在的产业，在已结构化的产业中取得领先地位相当困难\n历年考察：2023年国家竞争优势理论；2012年与比较优势对比"},{"name":"产业集聚理论（波特）","content":"定义：产业集聚是国家竞争优势产业的共同特征。经营同一产业的一群企业在地理上的集中，通过外部经济效应、空间交易成本节约、学习与创新效应、品牌与广告效应四种机制获取竞争优势。\n核心要点：\n  · 外部经济效应：集聚区域内企业众多，分工协作高度细化，生产率大大提高，产品不断出口到区外和国际市场，获得外部规模经济\n  · 空间交易成本节约：包括运输成本、信息成本、寻找成本以及合约谈判和执行成本，地理邻近的企业容易建立信誉机制和信赖关系\n  · 学习与创新效应：企业彼此接近，竞争压力、自尊需求及高级顾客需求迫使企业不断进行技术创新和组织管理创新\n  · 品牌与广告效应：产业集聚影响力扩大后在消费者中形成良好品牌形象，增强购买欲望\n历年考察：与国家竞争优势理论关联考察"},{"name":"贸易引力模型（丁伯根）","content":"定义：经济学家丁伯根将物理学中的万有引力定律引入经济学研究，提出利用引力模型来预测任意两国之间的贸易规模。该模型认为，两个经济体之间的双边贸易额与两者的经济体量（GDP）成正比，与两者的地理距离成反比。\n核心要点：\n  · 核心公式：Tij = A × GDPi × GDPj / Dij。A为常量，Tij为i国和j国的双边贸易额，Dij为两国间的距离\n  · 内在逻辑：大国经济体收入高，能大量进口产品；有能力生产更多品种的系列产品满足其他国家的需求，能大量出口。任一方的经济规模越大，双方贸易量就越大\n  · 距离越远，运输成本越高、信息获取越困难、贸易壁垒可能越高\n  · 实证检验效果很好，但理论基础较弱\n公式：Tij = A × GDPi × GDPj / Dij\n历年考察：2023年贸易引力模型"},{"name":"新新贸易理论（梅里兹）","content":"定义：新新贸易理论是新贸易理论的深化，以企业异质性（生产率差异）为核心，研究微观企业层面的贸易行为。代表模型包括梅里兹异质性企业模型和安特拉斯企业内生边界模型。研究视角从国家/产业层面下沉到微观企业层面。\n核心要点：\n  · 梅里兹异质性企业模型：企业因生产率差异而做出不同贸易选择。生产率最高的企业进入出口市场并扩大份额，生产率居中的企业继续在本土生产，生产率最低的企业因无法应对竞争退出市场。贸易开放引发产业内资源重新配置，产业总体生产率因此提高\n  · 安特拉斯企业内生边界模型：基于不完全契约和产权理论，解释企业在中间品生产上的组织形式选择。生产率从低到高：国内外包 → 国内一体化 → 国外外包 → 国外一体化（FDI）\n  · 与新贸易理论的区别：研究内容（产业内贸易vs企业形式选择）、理论假设（企业同质vs异质）、利益来源（规模经济vs资源再配置）、政策指导（政府干预vs降低贸易成本）\n历年考察：2024年大纲新增内容"},{"name":"国际分工","content":"定义：国际分工（IDL）是指世界各国之间的劳动分工，是国际贸易和世界市场的基础。贸易理论的演进反映了国际分工从宏观到微观的不断深化。\n核心要点：\n  · 古典贸易理论 → 产业间分工：不同产业之间的贸易，基于劳动生产率的绝对或相对差异\n  · 新古典贸易理论 → 产业间分工：引入多要素（资本、劳动、土地），基于要素禀赋差异\n  · 新贸易理论 → 产业内分工：同一产业内的双向贸易，基于规模经济、不完全竞争和产品差异\n  · 新新贸易理论 → 产品内分工/企业间分工：微观企业层面的资源配置，基于企业异质性\n历年考察：2023年全球价值链与国际分工"}]},{"title":"国际贸易政策与体制·标准化表述","icon":"🚢","items":[{"name":"关税效应分析","content":"定义：关税是进出口商品在经过一国关境时，由海关向进出口商征收的税赋。具有透明性、稳定性、市场调节性、非歧视性和保证国家利益五大特征。关税按不同标准有多种分类方式。\n核心要点：\n  · 按商品流向分类：进口税、出口税、过境税\n  · 按征收目的分类：财政关税（增加财政收入）、保护关税（保护国内产业）\n  · 按差别待遇分类：进口附加税（反补贴税、反倾销税）、差价税、特惠税、普惠税制\n  · 按征收方法分类：从量税、从价税、复合税、选择税、滑准税\n公式：有效保护率 = (V'-V)/V × 100%\nV = 自由贸易下每单位产品的增加值\nV' = 征收关税后每单位产品的增加值\n历年考察：2016年关税计算；2019年有效保护率计算；2020-2022年连续考关税计算"},{"name":"非关税壁垒","content":"定义：非关税壁垒是关税以外的一切限制外国商品进口的各种措施。由于当前关税已降到很低水平，现代贸易保护主义主要以非关税壁垒为主要武器。主要功能包括限制进口数量、提高进口价格、影响需求弹性和制造不确定性。\n核心要点：\n  · 直接性非关税壁垒：进口配额（绝对配额包括全球配额和国别配额、关税配额）、自愿出口限制、进口许可证\n  · 间接性非关税壁垒：进口歧视性政府采购、歧视性国内税、最低限价、海关估价制、进口押金制、外汇管制、技术壁垒、绿色壁垒、社会标准壁垒（SA8000）等\n  · 与关税相比的四个特点：更大的灵活性和针对性、更强的隐蔽性和歧视性、更大的复杂性和广泛性、更明显的有效性\n历年考察：2015年非关税壁垒措施；2023年非关税壁垒新形式"},{"name":"国际贸易政策","content":"定义：政府干预国际贸易的政策措施体系，包括关税、非关税壁垒、鼓励出口措施、出口管制以及WTO规则下的相机保护措施（反倾销、反补贴、紧急保障）。\n核心要点：\n  · WTO相机保护措施：反倾销（三条件：倾销存在+实质损害+因果关系）、反补贴（三条件同上）、紧急保障措施（进口大量增加+不可预见+贸易自由化结果+严重损害）\n  · 鼓励出口措施：出口信贷、出口信贷国家担保制、外汇倾销（货币贬值促进出口的三个条件：贬值程度大于国内通胀、其他国家不采取同样措施、符合马歇尔-勒纳条件）\n  · 出口管制：经济原因（维持低价、保障供应、保持技术优势）、政治原因、保护历史文化原因\n  · 战略性贸易政策：在不完全竞争市场下，政府通过补贴帮助本国企业获取垄断利润，布兰德-斯潘塞模型揭示了利润转移机制\n历年考察：2013年贸易保护政治经济学；2015年非关税壁垒；2024年战略性贸易政策"},{"name":"补贴与反补贴","content":"定义：补贴是政府为支持特定产业或企业提供的财政支持，分为生产补贴和出口补贴（直接和间接补贴）。反补贴是WTO允许的贸易救济措施，前提与反倾销类似。出口补贴使一国总体福利下降（不论大国小国），且可能引发进口国征收反补贴税。\n核心要点：\n  · 出口补贴效应：小国——消费者损失 + 财政支出 > 生产者收益，净福利下降；大国——除此之外，贸易条件恶化\n  · 反补贴三条件：补贴存在 + 对进口国产业实质损害或威胁 + 补贴与损害之间有因果关系\n  · 布兰德-斯潘塞模型：在双寡头市场中，政府出口补贴可以将垄断利润从外国企业转移至本国企业，为本国带来超过补贴成本的净福利\n历年考察：2019年有效保护率与补贴；2023年战略性贸易政策与补贴"},{"name":"WTO规则","content":"定义：WTO（世界贸易组织）是管理全球贸易的多边机构，继承并扩展了GATT的基本规则。核心原则包括最惠国待遇（一国给另一国的优惠应无条件给予所有成员）、国民待遇（进口产品在进口国应享有不低于本国产品的待遇）和透明度原则。\n核心要点：\n  · 反倾销三条件：倾销存在（出口价格低于正常价值）+ 对进口国产业造成实质损害或威胁 + 倾销与损害之间存在因果关系\n  · 紧急保障措施条件：进口产品大量增加 + 由不可预见的情况和贸易自由化造成 + 对国内生产者造成严重损害。一般不超过4年，延长后总期不超过8年\n  · 反补贴：前提条件同反倾销（补贴存在 + 实质损害 + 因果关系）。补贴分为生产补贴和出口补贴\n  · WTO当前困境：上诉机构瘫痪导致争端解决机制失灵，多哈回合谈判长期停滞，多边贸易体制面临严峻挑战\n历年考察：2011年保障措施；2015年WTO相关；2022年最惠国待遇；2023年WTO改革"},{"name":"贸易保护理论","content":"定义：贸易保护理论为政府干预国际贸易提供了理论依据。主要包括重商主义、幼稚产业保护理论（李斯特）、最优关税理论、国际贸易乘数理论、战略性贸易政策理论、中心外围理论（普雷维什）、不平等交换论和依附论等。\n核心要点：\n  · 重商主义：最早的贸易保护思想，主张通过贸易顺差积累金银财富\n  · 幼稚产业保护理论（李斯特）：对处于发展初期、有发展潜力的产业进行暂时保护，保护收益需大于保护成本。三个条件：有发展潜力、保护期后能自主发展、保护收益大于成本\n  · 最优关税理论：大国可通过征收适当关税改善贸易条件，关税收益可能大于生产和消费扭曲损失\n  · 战略性贸易政策理论：布兰德-斯潘塞模型证明，在双寡头市场中政府出口补贴可将利润从外国企业转移至本国企业\n历年考察：2013年贸易保护政治经济学；2024年战略性贸易政策；2023年贸易保护新形式"},{"name":"贸易谈判","content":"定义：多边贸易谈判是GATT/WTO推动贸易自由化的核心机制。GATT共完成八轮谈判，大幅降低了全球关税水平。当前多哈回合长期停滞，区域贸易协定（RTA）与多边贸易体制并存，形成多边主义与区域主义的互动格局。\n核心要点：\n  · GATT八轮谈判：从关税削减逐步扩展到非关税措施和服务贸易等领域\n  · WTO多哈回合：2001年启动，因农业和非农产品市场准入等核心议题分歧长期停滞\n  · 区域贸易协定兴起：RCEP、CPTPP等大型区域协定的签署标志着区域主义的发展\n  · 多边vs区域的争论：区域协定到底是多边自由化的垫脚石还是绊脚石尚存争议\n历年考察：2022年WTO最惠国待遇vs双边FTA异同；2023年贸易谈判模型"},{"name":"区域经济一体化","content":"定义：两个或两个以上国家通过协定实现经济联合的形式。按一体化程度由低到高分为六个阶段：优惠贸易安排 → 自由贸易区 → 关税同盟 → 共同市场 → 经济同盟 → 完全经济一体化。关税同盟理论是分析区域经济一体化经济效应的核心框架。\n核心要点：\n  · 六个阶段：优惠贸易安排（降低关税但不取消）→ 自由贸易区（取消内部关税）→ 关税同盟（统一对外关税）→ 共同市场（要素自由流动）→ 经济同盟（政策协调）→ 完全经济一体化（统一经济政策）\n  · 关税同盟静态效应：贸易创造（从高成本国内生产转向低成本伙伴国进口，福利增加）和贸易转移（从低成本非成员转向高成本成员进口，福利减少）\n  · 关税同盟动态效应：规模经济效应、竞争促进效应、投资刺激效应\n  · 当前热点：RCEP（全球最大自贸区）、CPTPP等\n公式：净效应 = 贸易创造 - 贸易转移\n历年考察：2022年区域经济一体化对全球化的影响；2021年RCEP分析"},{"name":"服务贸易","content":"定义：国际服务贸易是指跨境提供服务的交易活动。GATS将服务贸易分为四种模式：跨境交付（如在线咨询）、境外消费（如出国旅游）、商业存在（如在海外设立分支机构）、自然人流动（如专业人员出国服务）。中国已成为全球服务贸易第二大国，数字化服务贸易是增长新引擎。\n核心要点：\n  · GATS四种模式：跨境交付、境外消费、商业存在、自然人流动\n  · 服务贸易特征：无形性、不可储存性、生产消费同时性\n  · 中国服务贸易发展现状：全球第二大国地位巩固，可数字化服务贸易成为增长新引擎，但仍存在逆差\n  · 主要动因：世界经济发展、产业结构调整与服务业跨国投资增加、科学技术发展、经济全球化促进\n历年考察：2021年服务贸易趋势和动因"}]},{"title":"国际金融·标准化表述","icon":"💰","items":[{"name":"汇率理论","content":"定义：汇率理论是国际金融的核心内容。四大汇率决定理论包括购买力平价说(PPP)、利率平价说(IRP)、国际收支说和资产市场说。汇率也会反过来影响贸易、资本流动、物价和就业。影响汇率变化的因素有十个之多。人大434几乎每年必考。\n核心要点：\n  · 购买力平价说(PPP)：长期中汇率由两国物价之比决定。绝对PPP：e=P/P*（P为国内物价，P*为国外物价）。相对PPP：汇率变动率=两国通胀率之差\n  · 利率平价说(IRP)：抛补利率平价CIRP——远期升贴水率=两国利差。F/S=(1+id)/(1+if)。非抛补利率平价UIRP——预期汇率变动率=两国利差\n  · 资产市场说：弹性价格货币模型（汇率由货币供求决定）、粘性价格货币模型（汇率超调Dornbusch）、资产组合平衡模型（本外币资产不完全替代）\n  · 影响汇率变化的十个因素：国际收支、通货膨胀率、利率、经济增长率、财政政策、央行干预、市场预期、政治因素、投机行为、外汇储备\n公式：绝对PPP：e = P/P*\n相对PPP：Δe/e = π - π*\n利率平价：F/S = (1+id)/(1+if)\n远期升贴水率 = (F-S)/S × 100%\n汇率传递系数 = 进口价格变动率/汇率变动率\n历年考察：几乎每年必考：2014-2023年连续考汇率计算、利率平价、PPP"},{"name":"国际收支","content":"定义：国际收支（BOP）是一定时期内一国居民与非居民之间全部经济交易的系统记录。按复式簿记原则编制，包含经常账户(CA)、资本与金融账户(KA)和误差与遗漏三个部分。BOP失衡可分为临时性、周期性、收入性、货币性、产业结构性和环境变化六种类型。\n核心要点：\n  · 经常账户(CA)：货物贸易、服务贸易、初次收入（报酬收入）、二次收入（经常转移）\n  · 资本与金融账户(KA)：资本账户（资本转移）+ 金融账户（直接投资、证券投资、其他投资、储备资产）\n  · 借贷原则：引起外汇收入增加/资产减少/负债增加 → 记贷方（+）。引起外汇支出增加/资产增加/负债减少 → 记借方（-）\n  · 三大调节理论：弹性论（马歇尔-勒纳条件，|dX+dM|>1）、吸收论（B=Y-A，逆差因A>Y）、货币论（BOP=Md-DCE，逆差因货币供给>需求）\n公式：CA + KA + 误差与遗漏 = 0\nBOP = Y - A（吸收论）\nBOP = Md - DCE（货币论）\n马歇尔-勒纳条件：|dX + dM| > 1\n历年考察：2013年弹性法分析法；2014年蒙代尔-弗莱明模型"},{"name":"蒙代尔-弗莱明模型","content":"定义：蒙代尔-弗莱明模型将IS-LM模型扩展到开放经济，分析不同汇率制度和资本流动性条件下财政政策和货币政策的有效性。核心结论：固定汇率+资本完全流动下财政政策有效（货币政策无效）；浮动汇率+资本完全流动下货币政策有效（财政政策无效）。三元悖论是核心推论。\n核心要点：\n  · 固定汇率+资本完全流动：扩张性财政政策 → 利率上升 → 资本流入 → 本币升值压力 → 央行买入外汇增加货币供给 → 收入上升。货币政策则因资本流动完全抵消而无效\n  · 浮动汇率+资本完全流动：扩张性货币政策 → 利率下降 → 资本流出 → 本币贬值 → 净出口增加 → 收入上升。财政政策因挤出效应而无效\n  · 三元悖论（不可能三角）：货币政策独立性、资本自由流动、固定汇率三者不能同时实现，只能选其二\n  · 中国选择：有管理的浮动汇率制度 + 渐进的资本账户开放 + 保持货币政策独立性\n历年考察：2014年蒙代尔-弗莱明模型基本内容与局限性"},{"name":"金融衍生工具","content":"定义：金融衍生工具是从基础金融资产派生的金融合约，主要包括远期、期货、期权和互换。在跨国公司风险管理中用于对冲汇率、利率和价格波动风险。\n核心要点：\n  · 远期合约：锁定未来汇率，非标准化，场外交易\n  · 期货合约：标准化合约，交易所交易，有保证金制度\n  · 期权合约：买方支付期权费获得选择权。买入看涨/看跌期权——买方收益无限、损失有限（期权费）\n  · 互换合约（Swap）：货币互换和利率互换，双方按约定条件交换现金流\n历年考察：2022年四种防范汇率风险的方法（远期、期货、期权、互换）"},{"name":"资本流动与风险","content":"定义：国际资本流动包括直接投资(FDI)、证券投资(FPI)和其他投资。资本外逃是在恐慌或不确定性增加时资本大规模流出。短期资本（热钱）具有高度不稳定性，可能引发货币危机。资本账户开放需要满足健全的金融监管、稳健的宏观经济和灵活的汇率制度三个条件。\n核心要点：\n  · 资本流动类型：直接投资（控制权、持久收益）、证券投资（股息利息和买卖差价）、其他投资（贷款、存款等）\n  · 资本外逃(Capital Flight)：非正常的资本大规模流出，通常由经济危机、政治动荡、本币贬值预期触发\n  · 短期资本风险：热钱流入→资产泡沫和本币升值压力；热钱流出→资产价格暴跌和货币危机\n  · 资本账户开放条件：健全的金融监管体系 + 稳健的宏观经济基本面 + 灵活的汇率制度。中国选择渐进开放路径\n历年考察：2017年资本外逃分析"}]},{"title":"跨国公司与企业国际化·标准化表述","icon":"🏢","items":[{"name":"跨国公司理论","content":"定义：跨国公司理论解释企业为何以及如何进行对外直接投资(FDI)。五大经典理论：垄断优势理论（海默）、内部化理论（巴克利/卡森）、国际生产折衷理论OLI（邓宁）、产品生命周期理论（弗农）、比较优势投资论（小岛清）。\n核心要点：\n  · 垄断优势理论（海默）：FDI在不完全竞争市场中形成，因为跨国公司拥有垄断优势（技术、品牌、规模经济等），足以克服在东道国经营的额外成本\n  · 内部化理论（巴克利/卡森）：企业通过FDI将外部市场交易转为内部交易，避免市场不完全带来的交易成本（信息不对称、机会主义等）\n  · 国际生产折衷理论OLI（邓宁）：FDI需同时满足三个条件——所有权优势(O)、区位优势(L)、内部化优势(I)。缺一则选择出口或许可经营\n  · FDI三大分类：水平型（横向，同产品在不同国家生产销售）、垂直型（纵向，不同生产阶段在不同国家）、混合型（完全不同产品）\n公式：OLI范式：FDI = O + L + I\nO=所有权优势（技术/品牌/规模）\nL=区位优势（市场/资源/成本）\nI=内部化优势（交易成本内部化）\n历年考察：2011年内部化理论；2013年垄断优势理论；2014年FDI类型；2024年国际化阶段"},{"name":"进入模式","content":"定义：企业进入国际市场的六种主要方式，按控制力和资源投入由低到高排序：出口 → 许可经营 → 特许经营 → 合资企业 → 跨国并购 → 绿地投资。选择哪种进入模式取决于企业资源能力、风险偏好、目标市场特征等因素。\n核心要点：\n  · 出口：风险低、成本低，但控制力弱，易受贸易壁垒影响\n  · 许可经营：授权国外企业使用无形资产（技术、品牌），收益有限但风险也小\n  · 特许经营：提供全套经营体系（如麦当劳），比许可模式控制力更强\n  · 合资企业：与当地企业共同成立新公司，共享资源和风险，但管理协调成本高\n历年考察：2014年FDI类型；2016年合资vs独资；2021年海外并购风险对策"},{"name":"绿地投资与并购","content":"定义：绿地投资（Greenfield Investment）是在东道国新建工厂或子公司，从零开始建立运营。跨国并购（M&A）是收购或合并海外现有企业。两者是外商直接投资（FDI）的两种主要方式，各有优劣，选择取决于行业特点、目标市场和企业战略。\n核心要点：\n  · 绿地投资优点：控制力强、完全按需定制、利于技术保密和品牌建设。缺点：投资大、周期长、建设风险和不确定性高\n  · 跨国并购优点：快速获取市场和资源、获得现成客户基础和生产能力。缺点：整合难度大（文化冲突、管理层整合）、尽职调查风险、可能支付过高溢价\n  · 选择考量：目标市场发达程度、行业壁垒、企业核心能力（技术优势→绿地，市场经验→并购）、时间紧迫性\n  · 中国企业海外并购风险：政治风险（审查被拒）、文化差异整合困难、对当地规章制度不熟悉、融资风险\n历年考察：2016年合资vs独资方式比较；2021年海外并购风险与对策"},{"name":"OEM与价值链","content":"定义：OEM（原始设备制造商/贴牌生产）是跨国公司不直接生产产品，而是利用关键核心技术负责设计和开发、控制销售渠道，将加工任务交给代工企业完成并贴上自己商标的模式。OEM→ODM（设计制造）→OBM（自有品牌）是发展中国家企业进入全球价值链并实现产业升级的典型路径。\n核心要点：\n  · OEM模式：跨国公司掌握核心技术和品牌，将制造环节外包给低成本国家企业，代工企业按规格生产并贴牌\n  · 升级路径：OEM（代工生产）→ ODM（参与设计，附加值提升）→ OBM（自有品牌，附加值最高）\n  · 微笑曲线：研发和品牌端附加值高（曲线两端），制造组装端附加值低（曲线底端）。产业应朝两端发展——加强研发创造知识产权，加强营销与客户服务\n  · 全球价值链（GVC）：跨国公司从全球角度利用不同国家区位优势，将价值链各环节分散配置于最优区位。中国从低端制造向中高端攀升是GVC升级的典型案例\n历年考察：2014年宜家OEM案例；2016年格兰仕品牌升级路径；2024年品牌与OEM关系分析"},{"name":"区位经济","content":"定义：区位经济（Location Economy）是邓宁OLI范式中的核心要素之一。区位优势（L）是指东道国具有的、令跨国公司受益的区位特定优势，是FDI的三个必要条件之一。包括经济优势（生产要素数量质量、市场规模）、政策优势（投资政策、贸易壁垒）和集聚优势（产业配套、基础设施）。\n核心要点：\n  · 经济优势：生产要素（劳动力成本与素质、自然资源）、市场规模与增长潜力、经济发展水平与稳定性\n  · 政策优势：外资政策（税收优惠、准入限制）、贸易政策（关税水平）、法律制度与政府效率\n  · 集聚优势：产业配套程度（上下游供应链）、基础设施（交通、通信、能源）、人才集中度\n  · 区位选择逻辑：制造基地→低劳动力成本；研发中心→人才集聚与创新环境；销售公司→市场规模与消费能力\n历年考察：2011年OLI范式中的区位优势；2014年FDI类型与区位选择"},{"name":"投资环境评估","content":"定义：投资环境评估是对东道国投资环境的系统性分析方法，帮助企业决定是否进入某国市场及选择最佳进入方式。主要方法包括：冷热比较法（7个因素）、等级尺度法（分等级评分综合比较）、多因素评估法和PESTEL宏观环境分析框架。\n核心要点：\n  · PESTEL框架：从政治(Political)、经济(Economic)、社会(Social)、技术(Technological)、环境(Environmental)、法律(Legal)六个维度系统评估\n  · 冷热比较法（罗伯特）：选取对投资环境有最直接影响的因素进行评分，总分高低反映投资环境优劣\n  · 六类评估因素：自然地理（位置、气候、资源）、经济环境（发展水平、市场潜力）、基础设施（交通通讯）、法律环境（法规健全度）、政治环境（稳定性）、社会文化（习俗差异）\n  · 多因素评估法：综合多个维度系统评价，进投资环境交叉比较，按得分高低排序\n历年考察：2012年赞比亚PEST案例分析；2019年一带一路沿线国家投资环境评估；2024年五种评估方法"},{"name":"跨文化管理","content":"定义：研究不同文化背景下管理行为的差异，核心框架为霍夫斯泰德文化维度理论。文化距离是影响跨国公司经营模式选择、人力资源管理方式和国际化成败的关键因素。\n核心要点：\n  · 霍夫斯泰德六维度：权力距离（对不平等的接受程度）、个人主义vs集体主义、不确定性规避（对模糊的容忍度）、男性化vs女性化（成就导向vs生活质量导向）、长期导向vs短期导向、放纵vs克制\n  · 文化距离公式：= Σ(维度得分差异²)\n  · 跨文化管理三种策略：本土化适应（因地制宜）、标准化输出（全球统一）、融合策略（取长补短）\n  · 文化冲突是企业国际化失败的重要原因，跨文化培训是降低文化冲突的有效手段\n公式：文化距离 = Σ(维度得分差异²)\n历年考察：2011年霍夫斯泰德模式；2013年日美企业文化对比；2025年中华传统美德与管理"},{"name":"供应链管理","content":"定义：全球供应链是从原材料到最终消费者的完整链条，包括供应商、制造商、分销商、零售商到消费者各环节。核心挑战包括牛鞭效应（需求信息沿供应链逐级放大导致上游过度反应）、供应链韧性不足和地缘政治风险。2022年以来企业开始重视供应链多元化（China+1策略）。\n核心要点：\n  · 供应链构成：供应商 → 制造商 → 分销商 → 零售商 → 消费者\n  · 牛鞭效应：终端需求波动沿供应链向上游逐级放大，导致库存积压和资源浪费\n  · 供应链韧性：企业在面对中断（疫情、自然灾害、地缘政治）时的恢复能力\n  · 供应链数字化：利用大数据、AI等技术提高供应链可见性和响应速度\n公式：供应链效率 = 产出价值 / 总供应链成本\n历年考察：2012年供应链管理内容；2022年供应链危机分析"},{"name":"品牌与营销","content":"定义：国际营销4P策略（产品Product、价格Price、渠道Place、促销Promotion）是跨国公司国际市场进入和运营的核心框架。标准化vs本土化是核心战略选择。OEM→ODM→OBM是发展中国家企业品牌升级的典型路径。\n核心要点：\n  · 4P策略：产品（品质、设计、包装）、价格（定价策略）、渠道（分销网络）、促销（广告、公关）\n  · 标准化vs本土化：标准化降低成本维持全球统一形象，本土化适应各地文化和消费习惯\n  · 品牌定位：在消费者心中建立独特地位，品牌是企业的核心无形资产\n  · 市场细分标准：地理、人口、心理、行为四大维度\n历年考察：2013年品牌与产品关系；2014年宜家OEM案例；2016年格兰仕品牌升级；2024年品牌定位作用"},{"name":"跨国研发","content":"定义：跨国研发是跨国公司在全球范围内配置研发资源的重要战略。模式从传统的\"总部研发、全球推广\"中心化模式，演进为\"分布式创新\"的全球网络化协同模式。研发中心选址取决于东道国的人才资源、市场需求及产业集群优势。\n核心要点：\n  · 模式演进：中心化（母国集中研发）→ 区域化（区域研发中心）→ 全球化（全球分布式创新网络）\n  · 技术寻求型研发：在技术先进国家设立研发中心，获取当地先进技术和人才\n  · 市场寻求型研发：靠近目标市场进行本土化创新，适应本地需求\n  · 研发国际化价值：整合全球智力资源、贴近市场、共享创新成果、缩短产品上市时间\n历年考察：与研发国际化和全球创新网络相关的新兴议题"}]},{"title":"中国对外经济·标准化表述","icon":"🇨🇳","items":[{"name":"中国对外经济·通用模板","content":"定义：中国在国际贸易投资中的地位、政策和挑战。改革开放以来中国外贸战略经历了从比较优势导向到竞争优势导向的转变。当前面临的重大议题包括中美贸易摩擦、全球价值链重构、竞争中性原则、负面清单管理和RCEP/一带一路等区域经济合作。\n核心要点：\n  · 中美贸易摩擦：经济、政治、制度三重原因。关税博弈对中国出口和产业链造成冲击\n  · 全球价值链（GVC）：中国从低端制造向中高端升级，GVC参与度提升但面临去风险化压力\n  · 竞争中性原则：要求国企和民企在市场准入、融资条件等方面公平竞争\n  · 负面清单管理：外商投资准入制度创新，清单之外的外资项目由核准制改为备案制\n历年考察：2020年贸易逆差；2022年供应链危机与中国应对；2023年竞争中性、负面清单、GVC、去风险化"},{"name":"中美贸易摩擦","content":"中美贸易摩擦：经济、政治、制度三重原因。关税博弈对中国出口和产业链造成冲击"},{"name":"全球价值链（GVC）","content":"全球价值链（GVC）：中国从低端制造向中高端升级，GVC参与度提升但面临去风险化压力"},{"name":"竞争中性原则","content":"竞争中性原则：要求国企和民企在市场准入、融资条件等方面公平竞争"},{"name":"负面清单管理","content":"负面清单管理：外商投资准入制度创新，清单之外的外资项目由核准制改为备案制"},{"name":"贸易发展战略演进","content":"贸易发展战略演进：改革开放初期以比较优势理论为主 → 90年代中期转向竞争优势理论 → 当前兼顾二者"}]},{"title":"高频对比模板","icon":"⚖️","items":[{"name":"比较优势理论 vs H-O理论","content":"相同点：(1) 二者都是传统国际贸易理论，主张自由贸易，承认贸易具有互利性；(2) 二者都是比较利益论，都要发挥比较优势。\n\n不同点：(1) 贸易产生的原因不同：比较优势理论认为是劳动生产率差异，H-O理论认为是要素禀赋差异。(2) 使用要素不同：比较优势理论是单要素生产模型（仅有劳动），H-O理论是双要素生产模型（资本+劳动）。(3) 交换规律不同：比较优势理论认为国内交换规律不能适用于国际交换，而H-O理论认为国内交换规律可适用于国际交换。"},{"name":"绿地投资 vs 跨国并购","content":"绿地投资优点：控制力强、完全按需定制、利于技术保密和品牌建设。缺点：投资大、周期长、建设风险和不确定性高。\n\n跨国并购优点：快速获取市场和资源、获得现成客户基础和生产能力。缺点：整合难度大（文化冲突、管理层整合）、尽职调查风险、可能支付过高溢价。"},{"name":"新贸易理论 vs 传统贸易理论","content":"新贸易理论的核心突破：(1) 市场结构：从完全竞争转向不完全竞争；(2) 贸易基础：从比较优势转向规模经济+产品差异+不完全竞争；(3) 贸易类型：从产业间贸易转向产业内贸易；(4) 政策含义：从自由贸易转向战略性贸易政策。\n\n新贸易理论没有完全否定比较优势理论，而是根据市场结构对贸易功能进行了重新解释。"},{"name":"产业间贸易 vs 产业内贸易","content":"产业间贸易：不同产业之间的贸易，基于要素禀赋差异（H-O理论解释），发生在要素禀赋不同国家之间（如发展中国家出口劳动密集型产品，发达国家出口资本密集型产品）。\n\n产业内贸易：同一产业内双向贸易，基于规模经济+产品差异+不完全竞争（新贸易理论解释），发生在要素禀赋相似、收入水平相近国家之间。\n\n度量指标：G-L指数 = 1 - |X-M|/(X+M)。"}]},{"title":"万能论证框架","icon":"🏗️","items":[{"name":"论述题标准框架（背景-理论-分析-对策）","content":"第一段（背景引入）：随着[全球化/数字化/贸易摩擦]的深入发展，[问题/现象]日益成为国际商务领域的重要议题。\n\n第二段（理论支撑）：根据[理论名称]，[核心观点]。该理论为分析[问题]提供了重要的分析框架。\n\n第三段（深入分析）：从以下三个角度来看：(1) [经济角度]...；(2) [制度角度]...；(3) [战略角度]...。\n\n第四段（对策/结论）：基于以上分析，提出以下建议：(1) ...；(2) ...；(3) ...。"},{"name":"案例分析题标准框架","content":"第一步（识别理论）：通读案例，识别涉及的2-3个核心理论点（如：FDI进入方式、微笑曲线、竞争优势理论）。\n\n第二步（理论联系案例）：运用[理论名称]分析，[案例企业]的[具体行为]体现了[理论观点]。具体表现为：[引述案例中的1-2个关键事实]。\n\n第三步（多维度分析）：从理论角度、战略角度和风险角度综合分析。每个维度都要做到理论+案例事实结合。\n\n第四步（结论启示）：该案例对[行业/中国企业]的启示是：(1) ...；(2) ...；在[实践/政策]方面，还应考虑..."},{"name":"理论评价的万能结构","content":"任何理论评价都可以用以下框架：\n(1) 理论贡献/优点：该理论揭示了[什么规律]，回答了[什么问题]，为[什么领域]奠定了基础。\n(2) 理论局限/批评：但该理论存在[假设过于理想化/静态分析/忽略某因素]等局限，[后续理论]对此进行了补充和发展。\n(3) 现实意义：尽管有局限，该理论在[政策制定/企业战略/学术研究]中仍有重要的指导意义。"}]},{"title":"答题衔接句与高频用语","icon":"🔗","items":[{"name":"理论引入","content":"根据[理论名称]的核心观点，国际贸易/国际投资的动因在于...\n从[理论视角]出发，可以解释...\n该理论揭示了...的内在运行机制"},{"name":"分析过渡","content":"具体而言，这体现在以下三个方面：\n进一步分析可以发现...\n在此基础上，我们还需要考虑..."},{"name":"对策引出","content":"基于以上分析，应从以下方面着手：\n针对上述挑战，提出以下建议：\n为实现此目标，需要多管齐下"},{"name":"结论总结","content":"综上所述，[核心观点]从根本上解释了[问题本质]。\n总之，[理论]与[实践]的结合表明，[核心结论]。\n以上分析表明，[对策]是解决[问题]的关键路径。"}]},{"title":"新兴议题","icon":"🔮","items":[{"name":"数字经济","content":"定义：数字经济是以数字技术为基础的经济活动形态，涵盖跨境电商、数字服务贸易、平台经济等新兴领域。数字经济正在重塑国际贸易的模式和格局，是人大434国际商务的新兴议题和考试增长点。中国数字经济发展迅速，跨境电商降低了中小企业参与国际贸易的门槛。\n核心要点：\n  · 跨境电商：降低国际贸易门槛，中小企业可以直接触达海外消费者，促进国际分工参与度的提升\n  · 数字服务贸易：软件、数据、云服务等可数字化交付的服务成为贸易增长新引擎\n  · 数字税：针对跨国数字企业（如Google、Amazon）征税的国际税收新议题\n  · 数据跨境流动：数据安全与开放的平衡，各国数据本地化要求日益增多\n历年考察：2024年新兴议题；与数字贸易和跨境电商相关"}]}]};

模式：通过数字化系统实时捕捉全球时尚趋势，以极小批量（100-200件）测试市场反应，爆款快速追单生产。SHEIN将设计、供应链管理、数据平台控制中心设在中国，同时在主要市场设立海外仓和本地化运营团队，但从未开设线下门店。2023年SHEIN估值超过660亿美元。\n\n（1）从全球价值链角度，分析SHEIN「小单快反」模式如何重塑传统服装产业的微笑曲线。\n（2）分析SHEIN采用跨境电商模式而非传统海外开店模式进入国际市场的优势。\n（3）从数字经济的角度，论述数字技术对传统国际贸易模式的改变。","knowledge":["OEM与价值链「, 」进入模式「, 」数字经济「, 」供应链管理"],"hint":"数据替代库存→需求预测→快速响应；跨境电商→低风险进入→触达消费者；数字经济→降低交易成本"}]}]},{"id":"mock_2025_C","title":"人大434模拟卷 · C卷","subtitle":"侧重：中国对外经济 + 国际金融 + 新贸易理论","total_score":150,"time":180,"sections":[{"type":"简答题","count":5,"score_per":10,"questions":[{"num":1,"question":"简述国家竞争优势理论（波特钻石模型）的六大要素，并分析政府在其中的作用。","knowledge":["国家竞争优势理论"],"hint":"四基本要素+两辅助要素→政府培育高级要素、提升需求标准、影响竞争环境"},{"num":2,"question":"简述国际收支弹性论（弹性分析法）的核心内容及马歇尔-勒纳条件的含义。","knowledge":["国际收支"],"hint":"贬值改善贸易收支的条件→进出口需求弹性之和>1→J曲线效应"},{"num":3,"question":"简述新新贸易理论中梅里兹异质性企业模型的核心观点，并说明其与克鲁格曼新贸易理论的区别。","knowledge":["新新贸易理论「, 」产业内贸易理论"],"hint":"企业异质性→高生产率企业出口/低生产率退出→资源再配置；新贸易→同质企业/规模经济"},{"num":4,"question":"简述中国改革开放以来对外贸易发展战略的演进逻辑（比较优势导向→竞争优势导向）。","knowledge":["中国对外经济「, 」比较优势陷阱"],"hint":"改革开放初期→比较优势；90年代中期→竞争优势；当前→二者兼顾→为什么转变"},{"num":5,"question":"什么是竞争中性原则？简述其对完善中国外商投资环境的意义。","knowledge":["中国对外经济「, 」投资环境评估"],"hint":"国企民企公平竞争→市场准入/融资条件/政策优惠→吸引外资→优化营商环境"}]},{"type":"论述题","count":3,"score_per":20,"questions":[{"num":6,"question":"论述比较优势陷阱的内涵及其产生原因，并结合中国制造业的转型升级，分析发展中国家如何突破比较优势陷阱。","knowledge":["比较优势陷阱「, 」比较优势理论「, 」国家竞争优势理论「, 」中国对外经济"],"hint":"初级产品陷阱+制成品陷阱→三原因→突破路径：技术创新+品牌建设+竞争优势导向"},{"num":7,"question":"论述贫困化增长的实现条件，并结合当前中国某些出口行业面临的「量增价跌」现象，分析是否存在贫困化增长的风险及防范对策。","knowledge":["贫困化增长「, 」中国对外经济"],"hint":"大国效应+需求弹性低→出口增加→价格下跌→福利恶化→分析中国行业（钢铁/光伏）→对策"},{"num":8,"question":"论述区域经济一体化的六个阶段及其经济效应（关税同盟理论的贸易创造与贸易转移），并结合RCEP分析区域经济一体化对中国外贸的影响。","knowledge":["区域经济一体化「, 」贸易谈判「, 」贸易保护理论"],"hint":"六阶段递进→贸易创造（+）/贸易转移（-）→净效应→RCEP→规模经济+投资刺激"}]},{"type":"案例分析题","count":2,"score_per":20,"questions":[{"num":9,"question":"【案例】2021-2023年，全球供应链多次出现中断：苏伊士运河堵塞、上海港因疫情封闭、红海航线因胡塞武装袭击受阻。苹果公司因供应链中断导致iPhone 14 Pro机型在2022年圣诞季严重缺货，损失数十亿美元。此后，苹果加速推进供应链多元化战略：将部分产能从中国大陆转 function setActive(p) {
  document.querySelectorAll(".ni").forEach(function(n) { n.classList.remove("active"); });
  var a = document.querySelector('.ni[data-p="' + p + '"]');
  if (a) a.classList.add("active");

function navigate(p, topicName) {
  curPath = p; saveState();
  // Track knowledge views
  if (p && p.indexOf('kn:') === 0) {
    var kn = p.substring(3);
    knowledgeViews[kn] = (knowledgeViews[kn] || 0) + 1;
    try { localStorage.setItem('r434_kv', JSON.stringify(knowledgeViews)); } catch(e) {}
  }
  setActive(p);
  if (!p && p !== '') return;
  if (p === '') { showHome(); }
  else if (p === 'answerbank') { showAnswerBank(); }
  else if (p === 'mock') { showMockExams(); }
  else if (p === 'stats') { showStats(); }
  else if (p === 'cards') { showCards(); }
  else if (p === 'aichat') { openAIPanel(); }
  else if (p.indexOf('kn:') === 0) { showKnContent(p.substring(3), topicName || ''); }
  else if (p === 'macro') { showMacro(); }
  else if (p === 'predictions') { showPredictions(); }
  else if (p === 'professors') { showProfessors(); }
  else if (p.indexOf('cat:') === 0) { showCat(p.substring(4)); }
  else if (p.indexOf('sub:') === 0) { showSub(p.substring(4)); }
  else if (topicName === 'qz') { showTopic(p, 'knQuestions'); }
  else { showTopic(p); }
}

function renderMarkdown(text) {
  if (!text) return '';
  // Split into lines for block-level parsing
  var lines = text.split('\n');
  var html = '';
  var i = 0;
  while (i < lines.length) {
    var line = lines[i];
    var trimmed = line.trim();
    // Empty line
    if (!trimmed) { i++; continue; }
    // Table
    if (trimmed.startsWith('|') && trimmed.endsWith('|')) {
      var tableLines = [];
      while (i < lines.length && lines[i].trim().startsWith('|') && lines[i].trim().endsWith('|')) {
        tableLines.push(lines[i].trim());
        i++;
      }
      var rows = tableLines.map(function(l) {
        return l.split('|').slice(1, -1).map(function(c) { return c.trim(); });
      });
      // Skip separator row
      rows = rows.filter(function(r) { return !r.every(function(c) { return /^[-:]+$/.test(c); }); });
      html += '<table style="border-collapse:collapse;width:100%;font-size:12px;margin:8px 0">';
      rows.forEach(function(row, ri) {
        html += '<tr>';
        row.forEach(function(cell) {
          cell = cell.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
          if (ri === 0) {
            html += '<th style="border:1px solid #d0cdc6;padding:5px 8px;background:#f5f3ef;text-align:left;font-size:11px">' + cell + '</th>';
          } else {
            html += '<td style="border:1px solid #e0ddd6;padding:5px 8px;font-size:12px">' + cell + '</td>';
          }
        });
        html += '</tr>';
      });
      html += '</table>';
      continue;
    }
    // Headings
    if (/^###\s+/.test(trimmed)) { html += '<h4 style="margin:12px 0 6px;font-size:14px">' + trimmed.replace(/^###\s+/, '') + '</h4>'; i++; continue; }
    if (/^##\s+/.test(trimmed)) { html += '<h3 style="margin:14px 0 8px;font-size:15px">' + trimmed.replace(/^##\s+/, '') + '</h3>'; i++; continue; }
    if (/^#\s+/.test(trimmed)) { html += '<h2 style="margin:16px 0 10px;font-size:16px">' + trimmed.replace(/^#\s+/, '') + '</h2>'; i++; continue; }
    // Horizontal rule
    if (/^---+$/.test(trimmed) || /^\*\*\*$/.test(trimmed)) { html += '<hr style="border:none;border-top:1px solid #e0ddd6;margin:12px 0">'; i++; continue; }
    // Block quote
    if (/^&gt;\s+/.test(trimmed) || /^>\s+/.test(trimmed)) { html += '<blockquote style="border-left:3px solid var(--pu);padding-left:10px;margin:6px 0;color:#666">' + trimmed.replace(/^&gt;\s+/, '').replace(/^>\s+/, '') + '</blockquote>'; i++; continue; }
    // Lists - collect consecutive list items
    if (/^(\d+[\.、])\s+/.test(trimmed) || /^[-•·]\s+/.test(trimmed)) {
      var listItems = [];
      while (i < lines.length) {
        var tl = lines[i].trim();
        if (/^(\d+[\.、])\s+/.test(tl) || /^[-•·]\s+/.test(tl)) {
          listItems.push(tl);
          i++;
        } else if (tl === '') { i++; break; }
        else break;
      }
      html += '<ul style="margin:4px 0;padding-left:18px;list-style:none">';
      listItems.forEach(function(item) {
        var content = item.replace(/^(\d+[\.、])\s+/, '').replace(/^[-•·]\s+/, '');
        content = content.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        var prefix = item.match(/^(\d+[\.、])/);
        html += '<li style="margin:3px 0;font-size:13px;line-height:1.7">' + (prefix ? '<strong>' + prefix[1] + '</strong> ' : '· ') + content + '</li>';
      });
      html += '</ul>';
      continue;
    }
    // Regular paragraph
    var para = trimmed;
    para = para.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    para = para.replace(/\*(.+?)\*/g, '<em>$1</em>');
    para = para.replace(/`(.+?)`/g, '<code style="background:#e8e8e8;padding:2px 4px;border-radius:3px;font-size:12px">$1</code>');
    html += '<p style="margin:4px 0;font-size:13px;line-height:1.7">' + para + '</p>';
    i++;
  }
  return html;
}

// Initialize Chart.js charts for macro dashboard
function initMacroCharts() {
  if (typeof Chart === 'undefined' || !MACRO_DATA || !MACRO_DATA.dashboard) return;
  
  try {
    var indicators = MACRO_DATA.dashboard.indicators;
    if (!indicators || !indicators.length) return;
    
    // Helper to find indicator by name
    function findInd(name) {
      for (var i = 0; i < indicators.length; i++) {
        if (indicators[i].name.indexOf(name) >= 0) return indicators[i];
      }
      return null;
    }
    
    // Helper to get labels and data
    function getSeries(ind) {
      if (!ind) return {labels: [], data: []};
      return {
        labels: ind.data.map(function(d) { return d.date.substring(5); }),
        data: ind.data.map(function(d) { return d.value; })
      };

    // Common options

      return {
        responsive: true,

        scales: {
          x: { ticks: {font: {size: 9}, maxTicksLimit: 12}, grid: {display: false} },

function navigateByKnowledge(knName) {
  // Try exact match in KNOWLEDGE first
  if (KNOWLEDGE[knName]) { navigate('kn:' + knName, knName); return; }
  // Try KNOWLEDGE_NAV topics
  if (KNOWLEDGE_NAV && KNOWLEDGE_NAV.sections) {
    for (var si=0;si<KNOWLEDGE_NAV.sections.length;si++) {
      for (var ci=0;ci<KNOWLEDGE_NAV.sections[si].chapters.length;ci++) {
        for (var gi=0;gi<KNOWLEDGE_NAV.sections[si].chapters[ci].groups.length;gi++) {
          for (var ti=0;ti<KNOWLEDGE_NAV.sections[si].chapters[ci].groups[gi].topics.length;ti++) {
            var tp = KNOWLEDGE_NAV.sections[si].chapters[ci].groups[gi].topics[ti];
            if (tp.name === knName) { navigate('kn:' + tp.key, tp.name); return; }
          }
        }
      }
    }
  }
  // SIDEBAR fallback
  for (var i=0;i<SIDEBAR.length;i++)
    for (var j=0;j<SIDEBAR[i].subs.length;j++)
      for (var k=0;k<SIDEBAR[i].subs[j].topics.length;k++) {
        var t = SIDEBAR[i].subs[j].topics[k];
        if (t.name === knName) { navigate(t.path); return; }
      }
  // Fuzzy match in KNOWLEDGE
  for (var k in KNOWLEDGE)
    if (knName.indexOf(k)>=0 || k.indexOf(knName)>=0) { navigate('kn:'+k, knName); return; }
}

// Tab switching
function switchKnTab(evt, tabId) {
  var tabs = evt.target.parentElement.querySelectorAll('.kn-tab');
  tabs.forEach(function(t) { t.classList.remove('active'); });
  evt.target.classList.add('active');
  document.getElementById('knContent').classList.add('hidden');
  document.getElementById('knQuestions').classList.add('hidden');
  document.getElementById(tabId).classList.remove('hidden');
}

function qCard(q) {
  var m = marks[q.id] || {};
  var tc = q.type == "简答" ? "ts" : q.type == "论述" ? "tl" : q.type == "计算" ? "tj" : "ta";
  var qid = q.id.replace(/[^a-zA-Z0-9]/g,'_');
  return '<div class="qc"><div class="qh" onclick="this.nextElementSibling.classList.toggle(\'open\')">' +
    '<span class="qn">' + q.num + '</span><span class="qt t-' + tc + '">' + q.type + '</span>' +
    '<span class="qtx">' + q.question + '</span><span class="qyr">' + q.year + '年</span>' +
    '<div class="qa2">' +
    '<button class="' + (m.star ? "star" : "") + '" onclick="event.stopPropagation();toggleM(\'' + q.id + '\',\'star\')">⭐</button>' +
    '<button class="' + (m.done ? "done" : "") + '" onclick="event.stopPropagation();toggleM(\'' + q.id + '\',\'done\')">✅</button>' +
    '</div></div><div class="qb"><div class="qa">' + (q.answer || '<em style="color:#999">暂无答案</em>') + '</div>' +

function aiGradeQuestion(qid, qid2) {
  var q = null; DATA.forEach(function(x) { if (x.id == qid) q = x; });
  if (!q) return;
  var answer = document.getElementById('ta-' + qid2).value.trim();
  if (!answer) { alert('请先输入你的作答'); return; }
  var result = document.getElementById('result-' + qid2);
  result.style.display = 'block';
  result.innerHTML = '⏳ AI正在批改...';
  // Build knowledge context
  var ctx = '';
  var ktags = q.knowledge || [];
  ktags.forEach(function(k) {
    var item = KNOWLEDGE[k];
    if (item) {
      ctx += '\n【' + k + '】';
      if (item.key) ctx += '\n要点: ' + item.key.slice(0, 5).join('; ');
    }
  });
  var sys = '你是人大434国际商务考研评分老师。请批改学生的答题。';
  sys += '\n\n【题目】（' + q.year + '年 第' + q.num + '题 ' + q.type + '）\n' + q.question;
  if (q.answer) sys += '\n\n【参考答案】\n' + q.answer;
  sys += '\n\n【相关知识点】' + ctx;
  sys += '\n\n【学生作答】\n' + answer;
  sys += '\n\n请给出：1.评分(0-10分) 2.指出遗漏的知识点 3.改进建议。200字内。';
  fetch('https://api.xiaomimimo.com/v1/chat/completions', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + getAPIKey(), 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: 'mimo-v2.5-pro', messages: [{ role: 'user', content: sys }], stream: true, temperature: 0.3, max_tokens: 1024 })
  }).then(function(r) { if (!r.ok) throw Error('HTTP ' + r.status); return r.body.getReader(); })
    .then(function(rd) {
      var b = '', t = '', d = new TextDecoder();
      function n() { rd.read().then(function(r) {
        if (r.done) { result.innerHTML = renderMarkdown(t); return; }
        b += d.decode(r.value, { stream: true }); var ls = b.split('\n'); b = ls.pop() || '';
        ls.forEach(function(l) {
          if (l.startsWith('data: ')) {
            var dd = l.substring(6); if (dd === '[DONE]') return;
            try { var p = JSON.parse(dd);
              if (p.choices && p.choices[0].delta) {
                var x = p.choices[0].delta.content || '';
                if (x) { t += x; result.innerHTML = renderMarkdown(t); }
              }
            } catch(e) {}
          }
        });
        n();
      }); }
    n();
  }).catch(function(err) { result.innerHTML = '<span style="color:var(--r)">批改失败：' + err.message + '</span>'; });
}

function startQuiz() {
  var pool = DATA;
  quizWrong = [];
  quizSeconds = 0;
  if (quizTimer) clearInterval(quizTimer);
  quizTimer = setInterval(function(){ quizSeconds++; updateQuizTimer(); }, 1000);
  if (curPath && curPath.indexOf("cat:") != 0 && curPath.indexOf("sub:") != 0 && curPath != "predictions" && curPath != "professors" && curPath != "") {
    var ids = TQM[curPath] || [];
    if (ids.length) {
      pool = [];
      ids.forEach(function(id) { DATA.forEach(function(q) { if (q.id == id) pool.push(q); }); });
    }
  }
  // Adaptive scoring: prioritize questions from unviewed/undone knowledge
  pool = pool.slice().sort(function(a, b) {
    var scoreA = 0, scoreB = 0;
    var ka = a.knowledge || [], kb = b.knowledge || [];
    // Prefer questions with unviewed knowledge
    ka.forEach(function(k) { if (!knowledgeViews[k]) scoreA += 3; });
    kb.forEach(function(k) { if (!knowledgeViews[k]) scoreB += 3; });
    // Penalize already-done questions
    if (marks[a.id] && marks[a.id].done) scoreA -= 5;
    if (marks[b.id] && marks[b.id].done) scoreB -= 5;
    // Random factor
    scoreA += Math.random() * 2;
    scoreB += Math.random() * 2;
    return scoreB - scoreA;
  });
  quizQs = pool.slice(0, Math.min(15, pool.length));
  quizIdx = 0;
  renderQuiz();
}

function renderQuiz() {
  if (quizIdx >= quizQs.length) {
    if (quizTimer) clearInterval(quizTimer);
    var elapsed = Math.floor(quizSeconds/60) + '分' + (quizSeconds%60) + '秒';
    // Save wrong answers
    var wlog = JSON.parse(localStorage.getItem('r434_wrong')||'{}');
    quizWrong.forEach(function(id){ wlog[id] = (wlog[id]||0) + 1; });
    localStorage.setItem('r434_wrong', JSON.stringify(wlog));
    var wrongCount = quizWrong.length;
    document.getElementById("ct").innerHTML = '<div class="quiz-box" style="margin:40px auto;text-align:center">' +
      '<h3>🎉 完成！</h3><p>共 ' + quizQs.length + ' 题 | 用时 ' + elapsed + '</p>' +

      '</div></div>';

  }
  var q = quizQs[quizIdx];

  var min = Math.floor(quizSeconds/60), sec = quizSeconds%60;

function reviewCard(kn, quality) {
  var log = JSON.parse(localStorage.getItem('r434_cards')||'{}');
  var prev = log[kn] || {n:0, ef:2.5, interval:1};
  var interval;
  if (quality < 1) interval = 1;
  else if (prev.n === 0) interval = 1;
  else if (prev.n === 1) interval = 6;
  else interval = Math.round(prev.interval * prev.ef);
  prev.ef = Math.max(1.3, prev.ef + (0.1 - (3-quality) * (0.08 + (3-quality) * 0.02)));
  prev.interval = interval;
  prev.date = new Date().toISOString().slice(0,10);
  prev.n = prev.n + 1;
  log[kn] = prev;
  localStorage.setItem('r434_cards', JSON.stringify(log));
  navigate('cards');
}

  if (!kw) { navigate(curPath); return; }
  var kwl = kw.toLowerCase();
  document.getElementById("bc").innerHTML = '🔍 搜索：<span>' + kw + '</span>';
  
  // Search questions
  var qResults = [];
  DATA.forEach(function(q) {
    var score = 0;
    if (q.question.indexOf(kw) >= 0) score += 10;
    else if (q.question.toLowerCase().indexOf(kwl) >= 0) score += 5;
    if (q.answer && q.answer.indexOf(kw) >= 0) score += 3;
    if (q.knowledge) q.knowledge.forEach(function(k) { if (k.indexOf(kw) >= 0 || kw.indexOf(k) >= 0) score += 2; });
    if (score > 0) qResults.push(Object.assign({score: score}, q));
  });
  qResults.sort(function(a, b) { return b.score - a.score; }).slice(0, 30);
  
  // Search knowledge
  var knResults = [];
  for (var k in KNOWLEDGE) {
    var item = KNOWLEDGE[k], score = 0;
    if (k.indexOf(kw) >= 0) score += 20;
    else if (k.toLowerCase().indexOf(kwl) >= 0) score += 10;
    var text = JSON.stringify(item).toLowerCase();
    if (text.indexOf(kwl) >= 0) score += 3;
    // keyword match in overview
    if (item.overview && item.overview.indexOf(kw) >= 0) score += 8;
    // keyword match in key points
    if (item.key) item.key.forEach(function(x) { if (x.indexOf(kw) >= 0) score += 5; });
    if (score > 0) knResults.push({name: k, score: score, module: item.module || ''});
  }
  knResults.sort(function(a, b) { return b.score - a.score; }).slice(0, 10);
  
  var h = '<div class="hero"><h1>🔍 搜索「' + kw + '」</h1>' +
    '<div class="desc">共找到 <strong>' + qResults.length + '</strong> 道真题、<strong>' + knResults.length + '</strong> 个知识点</div></div>';
  
  // Knowledge results
  if (knResults.length) {
    h += '<div class="pcard"><div class="pcard-hdr"><h3>📖 相关知识点</h3></div><div class="pcard-body" style="display:flex;flex-wrap:wrap;gap:8px">';
    knResults.forEach(function(r) {
      h += '<span class="rt" style="cursor:pointer" onclick="navigateByKnowledge(\'' + r.name.replace(/'/g,"\\'") + '\')">' + r.name + '</span>';
    });
    h += '</div></div>';
  }
  
  // Question results
  if (qResults.length) {
    h += '<h3 style="margin-top:20px">📝 匹配真题（' + qResults.length + '道）</h3>';
    qResults.forEach(function(q) { h += qCard(q); });
  }
  
  if (!knResults.length && !qResults.length) {
    h += '<p style="text-align:center;color:#999;padding:60px;font-size:16px">没有找到匹配的内容，试试换个关键词</p>';
  }
  
  // Also search answer bank
  var abResults = [];
  if (ANSWER_BANK && ANSWER_BANK.categories) {
    ANSWER_BANK.categories.forEach(function(cat) {
      cat.items.forEach(function(item) {
        var score = 0;
        if (item.name.indexOf(kw)>=0) score += 15;
        if (item.content && item.content.indexOf(kw)>=0) score += 5;
        if (score > 0) abResults.push({name: item.name, cat: cat.title, content: item.content.substring(0, 150)});
      });
    });
  }
  if (abResults.length) {
    h += '<div class="pcard" style="margin-top:16px"><div class="pcard-hdr"><h3>📝 答题语料库匹配（' + abResults.length + '条）</h3></div><div class="pcard-body">';
    abResults.slice(0, 5).forEach(function(r) {
      h += '<div style="margin:8px 0;padding:8px;background:#fafaf7;border-radius:6px"><strong style="color:var(--pu)">' + r.name + '</strong><span style="font-size:11px;color:var(--ts);margin-left:8px">' + r.cat + '</span><div style="font-size:12px;color:#666;margin-top:4px">' + r.content + '...</div></div>';
    });
    h += '</div></div>';
  }
  
  document.getElementById("ct").innerHTML = h;
}

function exportData() {
  var data = {
    marks: JSON.parse(localStorage.getItem('r434')||'{}'),
    knowledgeViews: JSON.parse(localStorage.getItem('r434_kv')||'{}'),
    cardLog: JSON.parse(localStorage.getItem('r434_cards')||'{}'),
    wrongLog: JSON.parse(localStorage.getItem('r434_wrong')||'{}'),
    dailyLog: JSON.parse(localStorage.getItem('r434_dailylog')||'{}'),
    chatHistory: JSON.parse(localStorage.getItem('r434_chat')||'[]'),
    exported: new Date().toISOString()
  };
  var blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  var a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'r434_backup_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
}

function importData(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    try {
      var data = JSON.parse(ev.target.result);
      if (data.marks) localStorage.setItem('r434', JSON.stringify(data.marks));
      if (data.knowledgeViews) localStorage.setItem('r434_kv', JSON.stringify(data.knowledgeViews));
      if (data.cardLog) localStorage.setItem('r434_cards', JSON.stringify(data.cardLog));
      if (data.wrongLog) localStorage.setItem('r434_wrong', JSON.stringify(data.wrongLog));
      if (data.dailyLog) localStorage.setItem('r434_dailylog', JSON.stringify(data.dailyLog));
      if (data.chatHistory) localStorage.setItem('r434_chat', JSON.stringify(data.chatHistory));
      alert('数据导入成功！刷新页面生效。');
      location.reload();
    } catch(err) { alert('导入失败：' + err.message); }
  };
  reader.readAsText(file);
}

function getPageContext() {
  var ctx = {type:'home',label:'首页'};
  if(!curPath)return ctx;
  if(curPath===''){ctx.type='home';ctx.label='首页'}
  else if(curPath==='answerbank'){ctx.type='answerbank';ctx.label='答题语料库'}
  else if(curPath==='mock'){ctx.type='mock';ctx.label='模拟试卷'}
  else if(curPath==='macro'){ctx.type='macro';ctx.label='宏观数据'}
  else if(curPath==='predictions'){ctx.type='predictions';ctx.label='学术预测'}
  else if(curPath==='professors'){ctx.type='professors';ctx.label='导师研究'}
  else if(curPath.indexOf('kn:')===0){
    ctx.type='knowledge';ctx.knowledge=curPath.substring(3);
    ctx.label='知识点: '+ctx.knowledge;
    var kn=KNOWLEDGE[ctx.knowledge];
    if(kn&&kn.overview)ctx.preview=kn.overview.substring(0,200);
  }else if(curPath.indexOf('/')>0){
    ctx.type='topic';ctx.path=curPath;
    var parts=curPath.split('/');ctx.knowledge=parts[parts.length-1];ctx.label='真题: '+ctx.knowledge;
    var bc=document.getElementById('bc');if(bc)ctx.breadcrumb=bc.textContent;
    // Get associated question IDs
    if(TQM&&TQM[curPath])ctx.question_ids=TQM[curPath].slice(0,5);
  }
  return ctx;
}
