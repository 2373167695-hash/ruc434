<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人大434备考系统</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
:root{--r:#c62828;--bg:#f8f7f4;--card:#fff;--t:#1a1a1a;--ts:#777;--bdr:#eae7e1;--bl:#1a56db;--gn:#057a55;--or:#b45309;--pu:#6d28d9;--sidebar-bg:#f1f0ec;--sidebar-hover:#e5e3dd;--sh:0 1px 3px rgba(0,0,0,.06);--panel-bg:#fbfbfa}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--t);line-height:1.7;font-size:15px;display:flex;height:100vh;overflow:hidden}

/* ===== SIDEBAR ===== */
.sidebar{width:260px;background:var(--sidebar-bg);color:#444;overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid #e0ded8}
.sidebar-hdr{padding:18px 18px 14px;border-bottom:1px solid #e0ded8}
.sidebar-hdr h2{color:#222;font-size:15px;font-weight:700}
.sidebar-hdr p{font-size:11px;color:#999;margin-top:4px}
.sidebar-nav{padding:6px 0;flex:1;overflow-y:auto}
.sidebar-section-label{padding:10px 18px 4px;font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.8px;margin-top:4px}
.sidebar-tabs{display:flex;padding:4px 10px;gap:4px;border-bottom:1px solid #e0ded8}
.sidebar-tabs button{flex:1;padding:7px 4px;border:none;background:transparent;color:#999;border-radius:6px;font-size:12px;cursor:pointer;transition:.15s;font-weight:600}
.sidebar-tabs button:hover{background:#e5e3dd;color:#444}
.sidebar-tabs button.active{background:var(--pu);color:#fff}
.kn-tree{display:none}.kn-tree.active{display:block}
.qz-tree{display:none}.qz-tree.active{display:block}
.ni{display:flex;align-items:center;gap:8px;padding:7px 16px;cursor:pointer;font-size:13px;transition:.1s;border-left:3px solid transparent;border-radius:0 6px 6px 0;margin:0 6px}
.ni:hover{background:var(--sidebar-hover);color:#222}
.ni.lv0{font-weight:600;color:#333;padding:9px 14px;font-size:13px;margin:2px 8px 0}
.ni.lv1{padding-left:28px;font-size:12px;color:#666;margin-left:8px}
.ni.lv2{padding-left:44px;font-size:12px;color:#888;margin-left:8px}
.ni.active{color:var(--t);background:#e8e5df;border-left-color:var(--pu);font-weight:600}
.ni .badge{margin-left:auto;background:#ddd;color:#888;font-size:10px;padding:2px 7px;border-radius:8px;font-weight:600}
.sidebar-btm{padding:8px 10px;border-top:1px solid #e0ded8;display:flex;gap:4px}
.sidebar-btm button{flex:1;padding:8px;border:none;background:#e8e5df;color:#666;border-radius:6px;font-size:12px;cursor:pointer;transition:.15s;font-weight:600}
.sidebar-btm button:hover{background:#ddd;color:#333}
.sidebar-btm button.active{background:var(--r);color:#fff}

/* ===== MAIN ===== */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:var(--card);padding:10px 24px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:12px;flex-shrink:0}
.bc{font-size:13px;color:var(--ts)}.bc span{color:var(--r);font-weight:600}
.topbar input{border:1px solid var(--bdr);border-radius:8px;padding:7px 14px;font-size:13px;width:220px;outline:none;margin-left:auto;background:var(--bg)}
.topbar input:focus{border-color:var(--pu)}
.content{flex:1;overflow-y:auto;padding:28px 32px}

/* ===== CARDS ===== */
.hero{background:var(--card);border-radius:14px;padding:28px 32px;box-shadow:var(--sh);margin-bottom:20px;border:1px solid var(--bdr)}
.hero h1{font-size:22px;font-weight:800;margin-bottom:8px}
.hero .desc{font-size:14px;line-height:1.8;color:var(--ts)}
.hero .sts{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
.hero .st{background:#f5f3ef;padding:5px 14px;border-radius:16px;font-size:12px}
.hero .st strong{color:var(--r)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-top:16px}
.gc{background:var(--card);border-radius:12px;padding:20px;box-shadow:var(--sh);cursor:pointer;transition:.15s;border:1px solid var(--bdr)}
.gc:hover{box-shadow:0 2px 12px rgba(0,0,0,.08);transform:translateY(-1px)}
.gc h4{font-size:15px;margin-bottom:6px;font-weight:700}
.gc p{font-size:13px;color:var(--ts);margin-bottom:8px}
.gc .bar{height:4px;background:#f5f3ef;border-radius:2px;overflow:hidden}
.gc .bi{height:100%;border-radius:2px;background:var(--gn)}
.rel{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0}
.rt{padding:5px 14px;border-radius:16px;background:#f0ede8;font-size:12px;cursor:pointer;transition:.15s;color:#555}
.rt:hover{background:var(--pu);color:#fff}
.pcard{background:var(--card);border-radius:12px;box-shadow:var(--sh);margin-bottom:16px;overflow:hidden;border:1px solid var(--bdr)}
.pcard-hdr{padding:16px 24px;border-bottom:1px solid #f0ede8}
.pcard-hdr h3{font-size:16px;font-weight:700;margin:0}
.pcard-body{padding:16px 24px}
.pcard-section{margin-bottom:14px}
.pcard-section h4{font-size:14px;font-weight:600;color:var(--t);margin-bottom:6px;cursor:pointer}
.pcard-section p{font-size:13px;line-height:1.8;color:var(--ts)}
.pcard-section ul{padding-left:18px}
.pcard-section li{font-size:13px;margin-bottom:4px;color:#444}
.pcard-q{background:#fef9ee;padding:12px 14px;border-radius:8px;font-size:13px;border:1px solid #fcd34d;line-height:1.8}
.pcard-refs{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.pcard-ref{padding:3px 10px;border-radius:12px;background:#f3f1ed;font-size:11px;cursor:pointer;transition:.15s}
.pcard-ref:hover{background:var(--bl);color:#fff}

/* ===== KNOWLEDGE PAGE ===== */
.kn-hero{background:var(--card);border-radius:14px;box-shadow:var(--sh);overflow:hidden;margin-bottom:20px;border:1px solid var(--bdr)}
.kn-hero-hdr{padding:24px 28px;border-bottom:1px solid #efede9}
.kn-hero-hdr h2{font-size:20px;font-weight:800;color:var(--t);margin-bottom:6px}
.kn-hero-hdr .kn-path{font-size:12px;color:var(--ts);margin-bottom:8px}
.kn-hero-hdr .kn-overview{font-size:14px;line-height:1.9;color:#444;padding:8px 0}
.kn-hero-body{padding:8px 0}
.kn-section{margin:0 28px 8px;border-left:4px solid var(--bl);padding:4px 0 8px 18px}
.kn-section h4{font-size:14px;font-weight:700;color:var(--t);margin-bottom:10px}
.kn-section ul{margin:0;padding-left:0;list-style:none}
.kn-section ul li{padding:5px 0 5px 20px;position:relative;font-size:14px;line-height:1.8;color:#444;border-bottom:1px solid #f5f3ef}
.kn-section ul li:before{content:"";position:absolute;left:0;top:14px;width:8px;height:8px;border-radius:50%;background:var(--bl);opacity:.4}
.kn-formula-box{margin:10px 28px;padding:16px 20px;background:var(--panel-bg);border-radius:10px;border:1px solid #efede9;font-size:14px;line-height:1.9;font-family:"SF Mono","Courier New",monospace;color:var(--t)}
.kn-eval-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:10px 28px}
.kn-eval-pros{padding:14px 18px;background:#f0fdf4;border-radius:10px;border:1px solid #dcfce7}
.kn-eval-pros h5{font-size:13px;color:#16a34a;margin-bottom:8px}
.kn-eval-pros li{font-size:13px;line-height:1.7;color:#166534;padding:3px 0}
.kn-eval-cons{padding:14px 18px;background:#fef2f2;border-radius:10px;border:1px solid #fecaca}
.kn-eval-cons h5{font-size:13px;color:#dc2626;margin-bottom:8px}
.kn-eval-cons li{font-size:13px;line-height:1.7;color:#991b1b;padding:3px 0}
.kn-exam-link{margin:10px 28px 20px;padding:12px 18px;background:#fefce8;border-radius:10px;border:1px solid #fef08a;font-size:13px;line-height:1.8;color:#92400e}
.kn-fulltext{margin:10px 28px;padding:14px 18px;background:var(--panel-bg);border-radius:10px;border:1px solid #efede9}
.kn-fulltext pre{margin:0;font-family:"PingFang SC","Microsoft YaHei",sans-serif;font-size:13px;line-height:1.9;color:#444;white-space:pre-wrap}
.kn-tabs{display:flex;gap:0;margin-bottom:18px;background:var(--card);border-radius:10px;overflow:hidden;box-shadow:var(--sh)}
.kn-tab{flex:1;padding:12px 16px;text-align:center;font-size:13px;font-weight:600;cursor:pointer;transition:.15s;border-bottom:3px solid transparent;color:var(--ts)}
.kn-tab:hover{background:var(--panel-bg)}
.kn-tab.active{border-bottom-color:var(--pu);color:var(--t);background:#f5f0ff}
.kn-tab .count{font-size:11px;font-weight:400;color:var(--ts);margin-left:4px}
.kn-content{display:block}.kn-content.hidden{display:none}

/* ===== QUESTIONS ===== */
.qc{background:var(--card);border-radius:10px;box-shadow:var(--sh);margin-bottom:8px;overflow:hidden;border:1px solid var(--bdr)}
.qh{padding:14px 18px;cursor:pointer;display:flex;align-items:center;gap:10px}
.qh:hover{background:var(--panel-bg)}
.qn{background:var(--r);color:#fff;font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;min-width:28px;text-align:center}
.qt{font-size:11px;padding:3px 9px;border-radius:6px;font-weight:600;flex-shrink:0}
.ts{background:#ecfdf5;color:#065f46}.tl{background:#faf5ff;color:#6b21a8}.tj{background:#eff6ff;color:#1d4ed8}.ta{background:#fff7ed;color:#9a3412}
.qyr{font-size:11px;color:var(--ts);margin-left:auto}
.qtx{flex:1;font-size:14px}
.qb{display:none;padding:0 18px 18px 62px}.qb.open{display:block}
.qa{font-size:14px;line-height:1.9;color:#444;padding:14px 18px;background:var(--panel-bg);border-radius:8px;border:1px solid #efede9;max-height:400px;overflow-y:auto;white-space:pre-wrap}
.qa strong{color:var(--r)}
.qa2{display:flex;gap:6px;margin-left:8px}
.qa2 button{border:none;background:none;cursor:pointer;font-size:15px;padding:3px;border-radius:4px}
.qa2 button:hover{background:#e8e5df}
.qa2 .star{color:#f59e0b}.qa2 .done{color:var(--gn)}

/* ===== QUIZ ===== */
.quiz-box{background:var(--card);border-radius:12px;box-shadow:var(--sh);padding:28px;max-width:720px}
.quiz-q{font-size:16px;line-height:1.9;margin:18px 0}
.quiz-a{display:none;font-size:14px;line-height:1.9;color:#444;padding:16px;background:var(--panel-bg);border-radius:8px;border:1px solid #efede9;white-space:pre-wrap}
.quiz-a.show{display:block}
.quiz-nav{display:flex;gap:10px;margin-top:18px}
.btn{padding:9px 18px;border-radius:8px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:.15s}
.btn-r{background:var(--r);color:#fff}.btn-r:hover{background:#8b1523}
.btn-b{background:var(--bl);color:#fff}.btn-b:hover{background:#1447e6}
.btn-gen{background:var(--pu);color:#fff}.btn-gen:hover{background:#5b21b6}

/* ===== AI PANEL (slide from right) ===== */
.ai-panel-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.2);z-index:9990}
.ai-panel-overlay.show{display:block}
.ai-panel{position:fixed;top:0;right:-440px;width:440px;height:100vh;background:var(--card);z-index:9999;display:flex;flex-direction:column;transition:right .3s ease;box-shadow:-4px 0 24px rgba(0,0,0,.1)}
.ai-panel.open{right:0}
.ai-panel-hdr{padding:16px 20px;border-bottom:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:center}
.ai-panel-hdr h3{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}
.ai-panel-hdr button{background:none;border:none;font-size:18px;cursor:pointer;color:var(--ts);padding:4px 8px;border-radius:6px}
.ai-panel-hdr button:hover{background:#f5f3ef}
.ai-panel-body{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:8px}
.ai-panel-input{padding:12px 16px;border-top:1px solid var(--bdr);display:flex;gap:8px}
.ai-panel-input input{flex:1;padding:10px 14px;border:1px solid var(--bdr);border-radius:10px;font-size:14px;outline:none;background:var(--bg)}
.ai-panel-input input:focus{border-color:var(--pu)}
.ai-panel-input button{padding:10px 18px;background:var(--pu);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap}
.ai-panel-input button:hover{background:#5b21b6}

/* ===== CHAT MESSAGES ===== */
.chat-msg{max-width:90%;margin:4px 0;line-height:1.8;font-size:13px;word-break:break-word}
.chat-msg.user{align-self:flex-end;background:var(--pu);color:#fff;padding:10px 16px;border-radius:14px 14px 4px 14px;margin-left:auto}
.chat-msg.assistant{align-self:flex-start;background:#f5f3ef;padding:12px 16px;border-radius:14px 14px 14px 4px}
.chat-msg.assistant p{margin:4px 0}
.chat-msg.assistant strong{color:#333}
.chat-msg .chat-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#bbb;margin:0 2px;animation:dotPulse 1.4s infinite}
.chat-msg .chat-dot:nth-child(2){animation-delay:.2s}
.chat-msg .chat-dot:nth-child(3){animation-delay:.4s}
@keyframes dotPulse{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1.2)}}

/* ===== UTILITIES ===== */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes chat-bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
.loading{text-align:center;padding:60px;color:var(--ts)}
.loading .spinner{display:inline-block;width:30px;height:30px;border:3px solid #e5e2db;border-top-color:var(--r);border-radius:50%;animation:spin 1s linear infinite}
@media(max-width:1024px){.sidebar{width:220px}.grid{grid-template-columns:1fr}}
@media(max-width:768px){.sidebar{width:180px;font-size:12px}.sidebar-hdr h2{font-size:14px}.ni.lv1,.ni.lv2{padding-left:16px;font-size:11px}.ni.lv2{padding-left:26px}.content{padding:14px}.hero h1{font-size:20px}.hero .desc{font-size:12px}.sts{gap:6px}.st{font-size:11px;padding:6px 10px}.grid{grid-template-columns:1fr;gap:8px}.qc .qh{flex-wrap:wrap}.qtx{font-size:12px}.kn-hero h2{font-size:18px}.kn-eval-grid{grid-template-columns:1fr}.ai-panel{width:100vw;right:-100vw}.pcard-body{padding:10px}}
@media(max-width:480px){.sidebar{position:fixed;left:-240px;top:0;bottom:0;width:240px;z-index:1000;transition:left .25s;box-shadow:2px 0 16px rgba(0,0,0,.15)}.sidebar.open{left:0}.main{margin-left:0!important}.topbar{gap:8px;padding:8px 12px}.topbar .bc{font-size:12px}.content{padding:10px}.hero h1{font-size:17px}.hero .desc{font-size:11px}.grid{grid-template-columns:1fr}.gc{padding:12px}.gc h4{font-size:13px}.gc p{font-size:11px}.sts{gap:4px}.st{font-size:10px;padding:4px 8px}.qc .qh{flex-direction:column;align-items:flex-start}.qn{font-size:14px}.qt{font-size:10px}.qtx{font-size:11px;flex:auto}.qyr{font-size:10px}.qa2{margin-left:0}.kn-hero{padding:16px}.kn-hero h2{font-size:16px}.kn-section h4{font-size:13px}.kn-eval-grid{grid-template-columns:1fr}.pcard-hdr h3{font-size:13px}.ai-panel{width:100vw;right:-100vw}.chart-container{max-height:200px}.btn{padding:6px 14px;font-size:12px}}
.mobile-menu-btn{display:none;position:fixed;top:10px;left:10px;z-index:1001;background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:8px 10px;font-size:16px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.1)}
@media(max-width:480px){.mobile-menu-btn{display:block}}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#ccc}

/* ===== ACCORDION ===== */
.kn-accordion{margin:0 28px 6px;border:1px solid #efede9;border-radius:10px;overflow:hidden;background:var(--card)}
.kn-accordion.open .kn-acc-body{display:block}
.kn-acc-hdr{padding:14px 18px;cursor:pointer;font-size:14px;font-weight:600;color:var(--t);display:flex;align-items:center;gap:8px;user-select:none;transition:background .15s}
.kn-acc-hdr:hover{background:#fafaf7}
.kn-acc-arrow{transition:transform .2s;display:inline-block;color:var(--ts);font-size:11px}
.kn-accordion.open .kn-acc-arrow{transform:rotate(90deg)}
.kn-acc-body{display:none;padding:0 18px 14px;font-size:13px;line-height:1.8;color:#444}
.kn-acc-body ul{padding-left:18px;margin:0;list-style:none}
.kn-acc-body li{padding:4px 0 4px 20px;position:relative;border-bottom:1px solid #f8f6f3}
.kn-acc-body li:before{content:"";position:absolute;left:0;top:12px;width:7px;height:7px;border-radius:50%;background:var(--bl);opacity:.35}
.kn-acc-body ol{padding-left:18px;margin:0}
.kn-acc-body ol li{padding:4px 0;list-style-type:decimal;font-size:13px;border-bottom:1px solid #f8f6f3}

/* ===== KNOWLEDGE PAGE ACTIONS ===== */
.kn-actions{display:flex;gap:10px;margin:0 0 20px}
.kn-page .kn-hero-hdr .kn-path{font-size:11px;color:var(--ts);margin-bottom:4px;letter-spacing:.3px}
.kn-page .kn-hero-hdr h2{font-size:22px;margin-bottom:14px}
.kn-section-open{border-left-color:var(--gn)!important}
.kn-section-open h4{color:var(--gn)}

/* ===== PAGE TRANSITION ===== */
.content{transition:opacity .2s}
.content.loading-page{opacity:.5}

/* ===== FULLTEXT SIMPLE ===== */
.kn-fulltext-simple{padding:8px 0}
.kn-fulltext-simple pre{margin:0;font-family:"PingFang SC","Microsoft YaHei",sans-serif;font-size:13px;line-height:1.9;color:#444;white-space:pre-wrap}


/* ===== MACRO DASHBOARD ===== */
.dash-hero{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.dash-metric{background:var(--card);border-radius:12px;padding:18px;box-shadow:var(--sh);text-align:center;border:1px solid var(--bdr)}
.dash-metric .label{font-size:11px;color:var(--ts);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.dash-metric .value{font-size:24px;font-weight:800;color:var(--t);margin-bottom:4px}
.dash-metric .change{font-size:11px;font-weight:600}
.dash-metric .change.up{color:var(--r)}.dash-metric .change.down{color:var(--gn)}
.dash-charts{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.dash-chart-card{background:var(--card);border-radius:12px;box-shadow:var(--sh);padding:20px;overflow:hidden;border:1px solid var(--bdr)}
.dash-chart-card h4{font-size:14px;font-weight:700;margin-bottom:6px;color:var(--t)}
.dash-chart-card .subtitle{font-size:11px;color:var(--ts);margin-bottom:14px}
.dash-chart-card canvas{max-height:260px}

/* Macro Daily */
.macro-card{background:var(--card);border-radius:12px;box-shadow:var(--sh);margin-bottom:16px;overflow:hidden;border:1px solid var(--bdr)}
.macro-card-hdr{padding:16px 24px;border-bottom:1px solid #f0ede8;display:flex;justify-content:space-between;align-items:center}
.macro-card-hdr h3{font-size:16px;font-weight:700;margin:0}
.macro-date{font-size:12px;color:var(--ts);background:#f5f3ef;padding:3px 10px;border-radius:8px}
.macro-card-body{padding:16px 24px}
.macro-section{margin-bottom:16px}
.macro-section h4{font-size:14px;font-weight:600;color:var(--pu);margin-bottom:8px}
.macro-item{padding:12px 16px;background:var(--panel-bg);border-radius:8px;margin-bottom:8px;border:1px solid #efede9}
.macro-item h5{font-size:13px;font-weight:600;margin-bottom:6px}
.macro-item p{font-size:13px;color:var(--ts);line-height:1.7;margin:0}
.macro-item .tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}
.macro-item .tag{padding:2px 8px;border-radius:8px;font-size:10px;background:#f5f3ef;color:var(--ts)}
.macro-item .tag.link{background:var(--bl);color:#fff;cursor:pointer}
.macro-data-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:8px}
.macro-data-item{flex:1;min-width:120px;padding:12px;background:var(--panel-bg);border-radius:8px;border:1px solid #efede9;text-align:center}
.macro-data-item .label{font-size:11px;color:var(--ts);margin-bottom:4px}
.macro-data-item .value{font-size:18px;font-weight:700;color:var(--t)}
.macro-data-item .sub{font-size:10px;color:var(--ts)}
.macro-data-item .up{color:var(--r)}.macro-data-item .down{color:var(--gn)}
.macro-highlight{padding:14px;background:linear-gradient(135deg,#fef9ee,#fef3c7);border:1px solid #fcd34d;border-radius:8px;margin-bottom:16px}
.macro-highlight li{font-size:13px;line-height:1.8;color:#92400e;margin-bottom:4px}
.macro-exam-box{background:#f0f9ff;padding:14px;border-radius:8px;border:1px solid #bae6fd}

var DATA = [{"id":"2011_1","year":2011,"num":1,"type":"简答","question":"内部化理论是如何解释在技术授权高度发达的今天还存在国际直接投资的?","answer":"","knowledge":["跨国公司与国际化"]},{"id":"2011_2","year":2011,"num":2,"type":"简答","question":"简述保障措施在WTO法律体系中的作用，并列举5种WTO保障措施。","answer":"","knowledge":["国际贸易政策"]},{"id":"2011_3","year":2011,"num":3,"type":"简答","question":"在国际会计中涉及到跨国公司母公司与子公司之间的财务报表合并问题，假设1家美国 公司于某年年初投资1800万日元用于在日本设立一家公司，该子公司分别在年初和年中购 买了各900万日元的固定资产和存货。假设年初和年中美元兑日元的汇率分别是1美元=100 日元和1美元=80日元。年终时该子公司的资产负债表(局部)包含以下内容，此时汇率为 1美元=90日元。 年终在与母公司进行报表合并时，分别根据现行汇率法和时限法对上述子公司会计表格进行 调整，调整的结果添在下表中，并说明两种方法各自的缺点。","answer":"","knowledge":["国际金融","跨国公司与国际化"]},{"id":"2011_4","year":2011,"num":4,"type":"简答","question":"简述世界文化差异的霍夫斯泰德模式的主要内容。","answer":"","knowledge":["国际商务管理"]},{"id":"2011_5","year":2011,"num":5,"type":"简答","question":"在下述四个例子中，决定贸易模式的主要是比较优势还是规模经济?为什么? (1)加拿大是主要的新闻纸出口国 (2)英特尔生产世界上半数以上的CPU (3)美国和日本相互出口小轿车 (4)中国是电视机的主要出口国","answer":"","knowledge":["国际贸易理论"]},{"id":"2011_6","year":2011,"num":6,"type":"论述","question":"美国近期采取的量化宽松政策对美元汇率和全球通货膨胀有怎样的影响?","answer":"","knowledge":["国际金融"]},{"id":"2011_7","year":2011,"num":7,"type":"论述","question":"论述比较优势理论和H-0 理论的基本内容及主要异同点，并结合中国对外贸易发展的现 实，论述中国对外贸易发展所依据的主要国际贸易理论。","answer":"","knowledge":["国际贸易理论"]},{"id":"2011_8","year":2011,"num":8,"type":"论述","question":"根据产品生命周期理论，试述企业进出国际市场的不同阶段及其特点。","answer":"","knowledge":["国际贸易理论"]},{"id":"2011_10","year":2011,"num":10,"type":"案例","question":"Diebold 公司国际化 Diebold 公司是总部位于美国俄亥俄州的具有150多年历史的金融设备制造商主要产品 之一为自动柜员机(ATM 机)。该公司20世纪80年代开始走出国门，与荷兰公司Philips 达 成协议，运用后者的全球分销渠道进行销售。1990年该合作无疾而终，Diebold 转而与 IBM 公司成立合资公司Interbold, 该合资公司充分整合了Diebold 的研发优势和 IBM 全球销售 网络优势。随后，Diebold 海外销售稳步上升。与此同时，美国 ATM机行业日益饱和，新兴 发展中国家市场蓬勃发展。1997年，出于 IBM公司对ATM 机销售长期不重视，Diebold 回购 了Interbold 中 IBM公司的股份，从而完全掌握了Interbold 的全球销售渠道，同时，Diebold 意识到本土化生产的重要性：比如亚洲消费者喜欢在ATM 机上支付水电费，消费者希望能用 ATM 机存现金等。1999年，Diebold 并购了巴西的Procomp 司，该公司销售额为40亿美元， 且在ATM 机市场上实力雄厚。紧接着还收购了法国的Groupe Bull的和荷兰的Getronics,","answer":"这两个巨头的欧洲市场销售额达10亿美元。在中国，没有现成的公司可收购， Diebold 于 是在上海建立了一家由其控股的公司，负责生产和销售AT机、金库门、保险柜、和警械柜 等产品，其中ATM 机中国市场占有率50%,中国TM机市场目前仍由舶来品主导，但是市场 重心正向国产品牌倾斜。2006年，国产品牌仅占据二成份额，到2009年，已经占据近四成 份额。而Diebold 在一些重点城市如天津和重庆的销售业绩并不佳。 根据案例内容回答下列问题： (1) Diebold 在国际化过程中，采取了哪些市场进入模式，为何采取不同模式?(6分) (2)该公司主要采取了哪两类国际化经营战略，简要评价之。(6分) (3)用波特五力模型对该公司所处中国市场的竞争情况进行分析(6分) (4)结合中国市场和外资政策近几年变化，从营销4P角度制定营销策略(7分)","knowledge":["跨国公司与国际化","国际商务管理"]},{"id":"2012_1","year":2012,"num":1,"type":"简答","question":"简述比较优势陷阱，并分析其产生的原因。","answer":"","knowledge":["国际贸易理论"]},{"id":"2012_2","year":2012,"num":2,"type":"简答","question":"比较绿地投资和跨国并购的优缺点。","answer":"","knowledge":["跨国公司与国际化"]},{"id":"2012_3","year":2012,"num":3,"type":"简答","question":"简述产业内贸易发生的原因和度量指数。","answer":"","knowledge":["国际贸易理论"]},{"id":"2012_4","year":2012,"num":4,"type":"简答","question":"简述避免国际双重征税的方法。","answer":"","knowledge":["综合"]},{"id":"2012_5","year":2012,"num":5,"type":"简答","question":"简述供应链管理的内容。","answer":"","knowledge":["国际商务管理"]},{"id":"2012_6","year":2012,"num":6,"type":"论述","question":"综述欧洲货币一体化理论与发展实践，对当前欧洲债务危机发生的根源进行评析。","answer":"","knowledge":["综合"]},{"id":"2012_7","year":2012,"num":7,"type":"论述","question":"综述影响汇率变化的因素，并评估人民币被低估的观点。","answer":"","knowledge":["国际金融","中国对外经济"]},{"id":"2012_8","year":2012,"num":8,"type":"论述","question":"假设A、B 两国生产技术相同且在短期内不变，生产1单位衣服需要的资本为1单位，需 要的劳动为3单位；生产1单位食品需要的资本为2单位，所需要的劳动为2单位。 A国拥 有240单位劳动和150单位资本； B国拥有180单位劳动和120单位资本。则： (1)哪个国家为资本充裕的国家?哪种产品为劳动密集型产品? (2)假设所有要素都被充分利用，且A 国的劳动与资本的价格分别为5和10,B国劳动与 资本的价格分别为10和4,则A、B 两国最多生产多少衣服和多少食品?两国的衣服和食品 的价格各是多少?","answer":"(3)假设两国偏好相同，两国间进行贸易，且衣服与食品的国际交换价格为1(( Pc/Pf=1), 哪个国家会出口衣服?哪个国家出口食品?两国从贸易中获取的利益谁会相对稍多一些? (4)随着A、B 两国贸易的开展，两国劳动力和资本价格是否发生趋同趋势，为什么?并结 合中美贸易的现实，说明要素价格均等化理论与现实出现偏离的原因。","knowledge":["国际贸易理论"]},{"id":"2012_9","year":2012,"num":9,"type":"案例","question":"LH 公 司 二十世纪末，欧洲LH公司进入了中国市场。LH曾经一度拥有2000多个品牌，是快速 消费品市场的国际性企业。LH的产品包括茶叶，其“Lipton” 袋装红茶全球年销售额达数 十亿美元，进入中国后，LH公司并购了北京茶叶总公司，希望通过公司的国际化品牌包装 能力和袋装红茶的经验，在中国开发推广袋装绿茶。但是，大部分中国人喝的茶不是在超市 买的，而是在茶店买。中国人对绿茶的消费讲究茶艺和原产地。很快，LH公司发现在中国 推广袋装绿茶很困难。","answer":"LH的另一个产品是冰淇淋，它收购了在华南地区很有名气的冰淇凌品牌“蔓登琳”。 冰淇淋必须在冷冻时运输，它的销售渠道也因此变得与众不同。当时蔓登琳在华南地区铺点 已经相当成功，为了节约资金，加速销售网络建设，收购蔓登琳成了拓展市场最快捷的方式。 收购之后，LH针对中国冰淇淋消费者对价格的偏好，推出一系列2元低价位的自有品牌冰 淇淋，彻底取代了蔓登琳的市场地位。蔓登琳在完成了渠道网点的转接任务后，逐渐在市场 上销声匿迹，目前LH的冰淇凌己经在全国畅销。根据案例内容回答下列问题： (1)跨国公司选择国际目标市场战略时应考虑哪些因素?如何评价LH在中国的表现?(7 分) (2)新产品有哪些类型?评价LH公司的新产品选择和市场推广战略。(5分) (3) LH公司在中国茶叶和冰淇淋市场上分别来用了怎样的市场策略? ( 6 分 ) (4)公司拥有众多品牌，会面临哪些品牌管理的问题?如何在中国做好品牌管理?(7分)","knowledge":["跨国公司与国际化","国际商务管理"]},{"id":"2012_10","year":2012,"num":10,"type":"案例","question":"赞比亚投资 赞比亚商业、贸易与工业部长Felix Mutati 于2010年9日宣布，赞比亚最大的能源公 司Zesco 将与中国水利水电建设集团公司合作开发15亿美元的发电站项目。赞比亚亟需资 金，中国企业对其大规模投资非常重要。 赞比亚国民经济对矿产资源(主要是铜矿资源)的依赖度高达55%。二十世纪60年代， 中国政府无偿援助修建了坦赞铁路，使赞比亚的铜矿石不用经过不友好国家而可直接出口。 中国企业在赞比亚的活动主要集中在铜产业，中国投资占赞比亚全国总投资额的20%。2006 年胡锦涛主席与赞比亚总统 Levy Mwanawasa签订90亿美元合作协议以后，十三家中国大型 国有企业在赞比亚建立了第一个经济特区，主要从事铜矿加工，雇佣了6000本地员工及150 中国员工。 Felix Mutati 部长盛赞中国企业，称其将大部分利润进行赞比亚当地再投资， 促进了就业；经济特区使一部分人先富起采，扩大了内需，带动了建筑业和旅游业的发展； 帮助赞比亚建立铜深加工产业，有助于赞比亚摆脱对资源出口的严重依赖，降低国际市场波 动的风险，实现经济平衡发展。但是，西方国家对于中国企业在非洲经营的非议颇多，如“新 殖民主义论”、“就业挤出论”等。中国大型国有企业在赞比亚的经营面临新考验。","answer":"根据案例内容回答下列问题： ( 1 ) 在PEST框架内，对中国资源能源型国有企业在赞比亚投资环境进行分析。(12分) ( 2 ) 在PEST分析基础上讨论中国资源能源型国有企业在赞比亚投资的战略。 (13分)","knowledge":["综合"]},{"id":"2013_1","year":2013,"num":1,"type":"简答","question":"简述厂商垄断优势理论的内容。该理论为什么适用于发达国家，而不适用于发展中国家?","answer":"","knowledge":["国际贸易理论"]},{"id":"2013_2","year":2013,"num":2,"type":"简答","question":"XX 年 X 月 X 日，在某著名外汇市场上，E1=$1.4761/4;£1=$1.9733/77; 那么英镑 兑欧元的套算汇率是多少(不考虑汇兑成本)?若某交易商给出的报价(平均价)为 f1=E1.3395, 上下浮动2个点，那么该汇率与上述汇率是否构成三角套汇?","answer":"","knowledge":["国际金融"]},{"id":"2013_3","year":2013,"num":3,"type":"简答","question":"简述品牌与产品的关系、品牌与商标的关系。","answer":"","knowledge":["国际商务管理"]},{"id":"2013_4","year":2013,"num":4,"type":"简答","question":"简述国际收支调节的弹性法的主要内容、意义和缺陷。","answer":"","knowledge":["国际金融"]},{"id":"2013_5","year":2013,"num":5,"type":"简答","question":"试比较以解释产业内贸易现象为主的新贸易理论和传统国际贸易理论的异同。","answer":"","knowledge":["国际贸易理论"]},{"id":"2013_6","year":2013,"num":6,"type":"论述","question":"假定本国与外国均生产和消费以下四种产品，每种产品的单位劳动投入如下： (1)外国在哪种产品上拥有绝对优势? (2)本国在哪种产品上拥有最大的比较优势?在哪种产品上生产优势最低? (3)假如外国工资是本国工资的8倍，本国将生产哪些产品?外国将生产哪些产品? (4)说明专业化生产及由此产生的贸易是怎样使两国获益的? (5)假如外国工资变成本国工资的6 倍，专业化模式与贸易模式是否会改变?新的模式是 怎样的?","answer":"","knowledge":["国际贸易理论"]},{"id":"2013_7","year":2013,"num":7,"type":"论述","question":"试从贸易保护的政治经济学角度，评析目前各种贸易保护政策盛行的原因。","answer":"","knowledge":["国际贸易政策"]},{"id":"2013_8","year":2013,"num":8,"type":"论述","question":"美国某啤酒公司在调查中发现，占30%的狂欢者大约消耗啤酒销量的80%,于是，该公司 在针对狂欢者的广告中展示了石油钻井并成功后两个狂欢镜头，还有年轻人在沙滩冲浪后， 开怀畅饮的镜头，塑造了一个“精力充沛”的形象，从而成功占据了啤酒豪饮者的市场达十 年之久。综合该公司的做法，阐述有效细分的条件及市场定位的步骤。","answer":"","knowledge":["综合"]},{"id":"2013_9","year":2013,"num":9,"type":"案例","question":"中国光伏产业反补贴 中国光伏产业在短短十年内经历了从无到有、由小到大、盛极而衰而衰的过程。2005 年底到2008年，仅尚德公司的产能从10多兆瓦增至1000多兆瓦，跃升至全球第一。尚德 的掌舵人施正荣2006年被“福布斯”评定为中国首富。2012年，美国参议员致奥巴马总统 的信中提及，中国产品在可再生能源市场中越发占据主要地位，中国光伏组件量在 2006-2010年间增加了1593%,占据了全球60%总量，但市场预测，包括尚德公司在内的中 国企业将大幅倒闭，预计2013年后中国三线光伏组件企业将基本消失，市场被一、二线品","answer":"牌占据有专业人士认为，中国光伏产品制造还是一个相对初级的行业，依赖于大规模扩张和 低价获得现在的行业地位，多年来总体技术方法都没有改变过，现在市场正逐步走向成熟， 对研发和技术创新能力的要求提高了，没有品质和技术含量的就算价格低也很难找到顾客， 在众多企业纷纷倒闭之时，浙江某企业却与美国光伏组件商业系统解决方案商 Solar Planet Power 公司达成高效供应协议，该公司推出的高瑞产品深受国外市场喜爱。中国企 业还要面对美国的贸易壁垒，Solar World Industrie s America Inc 联合其它6家美国光 伏企业，向美国商务部和国际贸易委员会提起诉讼，称中国政府向国内生产企业提供非法补 贴，要求对中国的光伏产品展开双反调查。在反倾销调查终栽结果中，尚德被判定倾销幅度 为31.73%,在反补贴方面，尚德被判定接受补贴14.78%。 但是，美国政府对光伏发电却同样采用了投资补贴、税收优惠和“净电表法”等支持措 施。美国37个州给予光伏发电项目投资补贴或电价补贴，在26个州有税收优惠政策，对于 居民房屋的光伏项目，减免比例为10%-100,最高减免额度可以到20000美元。金融危机后， 美国启动8000亿美元的救市计划，其中包括960亿美元用于可再生能源的税收补偿金，希 望通过税收补偿刺激可再生能源发电的市场。 (1)什么是反补贴措施?美国政府大量补贴了美国光伏产业，为什么还对中国企业实施反 补贴措施?中国政府应如何应对?(10分) (2)受到中国政府支持的光伏企业为什么这么快进入了破产期。(8分) (3)请你为尚德公司提供战略转型的建议。(7分)","knowledge":["国际贸易政策","跨国公司与国际化"]},{"id":"2013_10","year":2013,"num":10,"type":"案例","question":"日本和美国的企业文化 日本电子产业在世界各地建立跨国公司，如美国、欧洲等。但文化差异产生了问题，如 美国人注重眼前利益，日本人注重长远利益。以及日本公司怎样与当地经营策合，发展终身 雇佣制等等。 (1)日本文化和美国文化有什么不同?(8分) (2)日本在美国等地推行终身雇佣制度，是否会成功?为什么? ( 5 分 ) (3)结合以上案例，说明国际贸易和国际投资的关系。(6分) (4)中国进行对外投资建立跨国公司应从日本借鉴什么?(6分)","answer":"","knowledge":["跨国公司与国际化"]},{"id":"2014_1","year":2014,"num":1,"type":"简答","question":"简述蒙代尔一弗莱明模型的基本内容，并指出其局限性。","answer":"","knowledge":["国际金融"]},{"id":"2014_2","year":2014,"num":2,"type":"简答","question":"简述对外直接投资的类型和特点。","answer":"","knowledge":["跨国公司与国际化"]},{"id":"2014_3","year":2014,"num":3,"type":"简答","question":"简要说明要素价格均等定理的意义及实现机制；在现实中，各国的劳动工资存在持续的 差异，请结合要素价格均等化的条件说明其原因。","answer":"","knowledge":["国际贸易理论"]},{"id":"2014_4","year":2014,"num":4,"type":"简答","question":"简要说明外资大量流入对东道国贸易条件和比较优势的影响。","answer":"","knowledge":["国际贸易理论"]},{"id":"2014_5","year":2014,"num":5,"type":"简答","question":"列举四种国际人力资源绩效管理的方法，并简要解释。","answer":"","knowledge":["国际商务管理"]},{"id":"2014_6","year":2014,"num":6,"type":"论述","question":"2013年12月1日，某外汇市场上美元的汇率为1欧元元兑1.3586美元，预期一年后的 汇率为1欧元兑1.4129美元(中间价),那么美元兑欧元年预期贬值率为多少?一名外汇交 易员若对此情况用升贴水向客户报价，那么他给出的1年期美元报价(中间价)应是多少?","answer":"","knowledge":["国际金融"]},{"id":"2014_7","year":2014,"num":7,"type":"论述","question":"请结合麦当劳在中国的实践来论企业跨国经营管理中如何处理好本地化战略与标准化战 略的关系。","answer":"","knowledge":["综合"]},{"id":"2014_8","year":2014,"num":8,"type":"论述","question":"2003年以来，围绕人民币汇率问题，国内很多学者主张，随着进口成本上升和国内投资 需求的增加，中国通货膨胀压力不断加大，宏观经济出现过热苗头。为了抑制通货膨胀压力 和提高货币政策的独立性，应对人民币进行升值，并走向浮动汇率制。随着美国对华贸易逆 差的不断增加，2003年以来，众多美国官员和学者以不同方式提出了人民币升值的要求。 进入2005年，要求人民币升值的呼声逐渐减弱，要求中国政府提高汇率制度弹性和采取扩 张财政政策的呼声越来越大。请运用国际经济学及汇率的基础理论，尝试分析如下问题：","answer":"(1)分析国内学者主张的理论基础。 (2)为什么美国的政策主张从要求人民币升值转向要求中国增加汇率弹性和采取扩张的财 政政策。","knowledge":["国际金融","中国对外经济"]},{"id":"2014_9","year":2014,"num":9,"type":"案例","question":"中国商业银行“走出去” 自2004年的商业银行股份制改革至今，中国银行行业的规模与实力经历了爆发式的增 长，在世界金融舞台上占有一席之地。以市值为例，根据bloomberg的数据，截止2012年， 全球市值前10位的银行中，中国拥有4席，与美国持平。工商银行按市值曾为全球最大的 银行。2013《福布斯》全球企业200强，亦将工行置于榜首。然而，庞大的市值与全球化程 度极不相称，中资银行境外资产份额较低，普遍不及5%,利润贡献率更低，不足1%。而以 外资银行中的花旗银行为例，其海外资产占比近50%,更是贡献了60%的利润。2012年11 月 ，Basel 委员会公布的28家全球系统性重要银行中，中国一家入选，与市值和资产规模","answer":"的排名相差甚远。 近几年来，随着自身实力的提高和中国企业“走出去”步伐加快，中资银行也意识到地 强全球布局性的必要性。无论是大型国有行业银行股份制商业银行还是政策性银行，都积极 推进全球化的战略，在完善全球网点的基础上，参与多起跨国并购，交易的阶段以2006年 为界，此前主要集中在大中华地区以及东南亚等周边地区，规模不大和程度较低，2006年 后，并购的范围扩展到美洲、非洲、欧洲等地区规模和频率均有较大程度的提高。海外并购 无疑极大推动了中国银行全球化的进程。然而，由于不熟悉国际环境，缺乏相应的经验和人 才，加之并购本身具有的风险和复杂性，中资银行并非每一个并购项目上都取得了预期的效 果，还存在部分不完全成功的案例。根据案例内容回答以下问题。 (1)中资银行在国际化进程中采取了哪些市场进入模式?请讨论其海外市场进入模式的理 由 ? ( 1 0 分 ) (2)请从国际商务战略的角度讨论，中资银行在国际化进程中存在的问题和可行的应对策 略。(15分)","knowledge":["跨国公司与国际化"]},{"id":"2014_10","year":2014,"num":10,"type":"案例","question":"宜家的OEM 宜家家居经过短短的60多年的时间，已经在全球36个国家拥有商场，在9个国家设立 35个家具生产部门，宜家成功的秘诀归于成本路线与品牌差异路线之外开辟第三条路，即 控制品牌又控制成本，宜家通过纵向一体化和严格的OEM 管理来实现品牌与成本双管齐下， 从而控制着整条价值链。 宜家鼓励全球范围的多家供应商展开自由竞争，只有保证质量的同时能达到低成本的供 应商才有可能得到大额订单。随着亚洲市场特别是中国市场所占的比重扩大，宜家正把越来 越多的产品放在中国等亚洲国家生产，这大大降低了运费对成本的影响。2007年，宜家在 中国的供应商为370家，但是国内为宜家代工的企业利润率在5%左右，而非代工企业利润 率可以达到40%以上，低的也在15%左右，宜家经常和代工企业发生冲突。宜家家居以消费 者需求为导向，鼓励消费者在卖场进行亲身体验，比如拉开抽屉，在地毯上走走，试试沙发 是否舒适等。宜家还实施了“一块钱”冰激凌策略，希望来宜家的人不要空手而回，哪怕是 买一个冰激凌也好。根据案例回答下列问题：","answer":"(1)列举说明宜家的市场营销方法。 ( 7 分 ) (2)什么是跨国公司的纵向一体化模式?跨国公司采取纵向一体化可获得哪些优势?(8 分) (3)什么是0EM? 中国企业如何突破在全球价值链上0EM的定位角色?(10分)","knowledge":["跨国公司与国际化","中国对外经济","国际商务管理"]},{"id":"2015_1","year":2015,"num":1,"type":"简答","question":"简述比较优势理论和要素禀赋理论的区别和联系。","answer":"","knowledge":["国际贸易理论"]},{"id":"2015_2","year":2015,"num":2,"type":"简答","question":"简述新贸易理论的“新”的主要表现。","answer":"","knowledge":["国际贸易理论"]},{"id":"2015_3","year":2015,"num":3,"type":"简答","question":"非关税壁垒成为新贸易保护政策的原因。","answer":"","knowledge":["国际贸易政策"]},{"id":"2015_4","year":2015,"num":4,"type":"简答","question":"购买力平价理论的前提条件和主要内容。","answer":"","knowledge":["国际金融"]},{"id":"2015_5","year":2015,"num":5,"type":"简答","question":"简述海外市场进入模式的类别和特点。","answer":"","knowledge":["跨国公司与国际化"]},{"id":"2015_6","year":2015,"num":6,"type":"论述","question":"欧元兑美元即期汇率为1.21,一年期远期汇率为1.1,欧元存款利率为10%,美元存款 利率为6%。EUR=1.21USD (1)如果你持有1000欧元，并且只对欧元计价的资产感兴趣，那么在上述条件下，你更愿 意用欧元存款还是美元存款? (2)若一笔外汇兑换交易收取5%的手续费，你是否会改变第一问的结论?","answer":"","knowledge":["国际金融"]},{"id":"2015_7","year":2015,"num":7,"type":"论述","question":"根据所学国际贸易理论，分析中美的贸易结构和贸易利益格局，论述中国进行国际贸易 的现实意义。","answer":"","knowledge":["综合"]},{"id":"2015_8","year":2015,"num":8,"type":"论述","question":"(英文)过去二十年间，国际贸易的动力是欧美国家和中国的劳动力价格差异，这种差异 使发达国家的产业转移到中国。现在由于中国等发展中国家工资水平的提高，已经达到美国 的二分之一以上，劳动力成本优势逐渐丧失。而能源价格不断降低，所以现在国际贸易动力 变成了能源资源。如国际油价大幅下跌，OPEC 主要石油生产国难以承担，而一些幸运的富 裕国家，特别是美国，能一次从两个方面受益。根据以上内容，结合所学国际贸易理论，解 释经济全球化动力转变的潜在因素，以及对国际投资战略的影响。","answer":"","knowledge":["综合"]},{"id":"2015_9","year":2015,"num":9,"type":"案例","question":"中国铁建的国际化进程 随着“一带一路”国家战略的推进，为中国高铁走出去迎来前所未有的发展机遇中国支 持高铁海外投资，推动一带一路建设，拿出400亿美元作为丝路基金。墨西哥高铁项目指连 接起首都墨西哥城和第三大城市克雷塔罗的一条高速铁路项目，全场210公里，设计时速 300公里，单程运行时间58分钟，预计年日均客运量2.7万人次预计投资约43亿美元，该 项目估计将提供两万个直接就业岗位和4.1万个间接就业岗位。这对墨西哥来说是一项及极 其重要的基础设施项目，将极大的拉动相关产业的发展，增加就业和便利国民的出行。墨西 哥高铁项目一开始时就吸引了包括中国公司在内的17家公司竞争，但是由于其要求竞标和 建造时间期限短，随后日本三菱公司、加拿大庞巴迪公司、德国西门子公司、法国阿尔斯通 公司等16家公司放弃了竞标，中标自然而然地落在以中国铁建股份有限公司为首的联合体","answer":"头上，如果顺利完成合同，这将是第一条中国在海外设计、承建并采用中国标准和设备的高 铁，对中国企业走出去具有里程碑的意义可是，天有不测风云，出人意料的是墨西哥在宣布 中铁建联合体中标后的第三天单方面取消了中标结果。中铁建联合体还未高兴完就被当头一 击，按照项目投标成本占项目金额0.5%计算，上亿元人民币打了水花。在眼看着第二次重 新启动招标程序时，墨西哥政府又发布公告宣布无限期搁置该高铁项目，这让中铁建联合体 被“接着忽悠”了。中国铁建公司与墨西哥的牵头人有过丑闻，幸好与这笔订单取消没有直 接关系，中国铁建保留关于这笔订单取消的法律诉讼权利。中国和非洲签订的高铁协议，由 于中方公司透明度较小问题引发了热议，非洲国家对待中国企业的投资的态度，既欢迎又谨 慎。中国企业在非洲的投资项目的合同中经常包括中国政府机构设立的对外投资机构(如国 家开发银行)等的贷款资金，但是这些贷款并不一定能得到确认。非洲某国央行行长提醒说， 要正确看待中国和非洲的浪漫关系，中国可能是帮助，也可能是竞争。 (1)试述中国铁建国际化进程中面临的问题(20分) (2)如果你是中国铁建的战略管理部人员，结合所学，从行业、资源、制度三个角度分析 如何解决现有问题?(20分)","knowledge":["中国对外经济"]},{"id":"2016_1","year":2016,"num":1,"type":"简答","question":"简述贸易条件，并说明一国出口生产率提高其他不变的情况下贸易条件是改善还是恶化， 说明原因。","answer":"","knowledge":["国际贸易理论"]},{"id":"2016_2","year":2016,"num":2,"type":"简答","question":"简述产业内贸易和产业间贸易的理论基础。","answer":"","knowledge":["国际贸易理论"]},{"id":"2016_3","year":2016,"num":3,"type":"简答","question":"简述波特的国家竞争优势理论。","answer":"","knowledge":["国际贸易理论"]},{"id":"2016_4","year":2016,"num":4,"type":"简答","question":"说明国际投资中国家风险的表现形式并简述预防措施。","answer":"","knowledge":["综合"]},{"id":"2016_5","year":2016,"num":5,"type":"简答","question":"简述名义汇率和实际汇率的区别和联系。","answer":"","knowledge":["国际金融"]},{"id":"2016_6","year":2016,"num":6,"type":"论述","question":"中国对某产品的需求和供给函数分别为Dc=3000-0.03P,Sc=1800+0.05P 。 美国对该产品 的需求和供给函数分别为Dus=2400-0.03P,Sus=2000+0.05P (1)求贸易前，两国的均衡价格和产量 (2)自由贸易后，国际市场的均衡价格、各国产量和贸易量为多少(无运输成本)。并说明 自由贸易对消费者和生产者福利的影响。 (3)如果中国对美国征收1000美元单位商品税，求两国的价格、产量与贸易量和关税对中 国生产者、消费者和政府福利影响，以及关税的净福利变化(与自由贸易相比)","answer":"","knowledge":["国际贸易政策"]},{"id":"2016_7","year":2016,"num":7,"type":"论述","question":"分析生产分割和外包的理论基础，并举例说明。","answer":"","knowledge":["综合"]},{"id":"2016_8","year":2016,"num":8,"type":"论述","question":"现今各界对于中国对外投资以合资企业和独资企业的方式那种比较好各执一词，请你谈 谈你对于合资企业和独资企业的理解和看法。","answer":"","knowledge":["综合"]},{"id":"2016_9","year":2016,"num":9,"type":"案例","question":"从贴牌到创牌，格兰仕的品牌“蝶变”【案例由小鹿学姐整理，素材来自网络】 2015年9月，代表全球最高水平的柏林国际电子消费品展览会首次设立中国品牌馆， 格兰仕展台前人头攒动，设计颖、功能强大、技术前卫的格兰仕系列产品，引起了欧洲客商 和消费者的浓厚兴趣，除了欧洲，在北美市场，格兰仕微波炉已经布满了传统卖场最显耀位 置。经济进入新常态，正处于新动能转换阶段格兰仕总裁梁昭贤认为，对于家电业来说，改 变过去代工“贴牌”生产方式，实施品牌“走出去”战略，是适应“新常态”的最好应对。","answer":"从鸡毛掸子到家电全系列 记者来到格兰仕位于中山的生产基地，新落成的智能化工厂展现了全新的生产能力，分 装、总装、打包、入库…… ·生产的全过程实现了高度自动化，从这里下线的微波炉及各类家 电产品销往全球200多个国家和地区。“可能很少有人知道，格兰仕的前身就是一群不愿意 挨饿的人在1978年办起来的一个乡镇企业，当时的产品是鸡毛掸子。”梁昭贤介绍说。格 兰仕微波炉生活电器外贸公司总经理李淑玲清楚地记得1996年第一次参加广交会的情景， 她一个人扛着一台微波炉、两个电饭煲进了展馆，展台还是“借用”别的外贸公司的一个角 落。尽管如此，那一届广交会格兰仕还是获得了两三台订单，撬开了世界市场一条门缝”。 以此为起点，格兰微波炉在国内国外两个市场迅猛发展，1997年格兰第一次拿到了出口南 非的直接订单，1999年出口新西兰的订单实现了以自主品牌“格兰仕”的首次出口，也同 样是在1999年，格兰仕成为全球最大的微波炉生产企业同时格兰向空调、冰箱，洗衣机、 小家电等白色家电全线拓展，凭借优异的性价比和可靠的质量，格兰仕成为家电业“世界工 厂”里的一个标志企业“与改革开放同行，格兰仕抓住了发展机遇。”梁贤感慨地说：“过 去求生存、求发展是这样：现在转型升级，从中国制造走向中国品牌，从局部领先发展到综 合领先，也同样要抓住机遇。 以自有品牌布局全球 北美市场，全球品牌竞争最激烈的市场，有的企业不敢轻易涉足，怕陷入泥潭，有的企 业则视为“走出去”必须攻克的高地。“当初开拓北美市场说起来特别心酸，当地主要超市 里摆满了各种外国品牌的微波炉很多都是格兰仕多年为他们贴牌生产的但与当道商和超市 接触一谈到格兰仕品牌进超市的合作计划，对方均断然说NO” 格兰仕海外市场管理部副部 长刘清字表示，这从一个侧面说明了国外市场对中国企业品牌经营的怀疑，他们不相信中国 品牌能够在北美市场站住脚跟。梁昭贤说，目前中国品牌“走出去”正面临一个前所未有的 机遇，过去粗放的发展方式正转向质量的发展模式，创新驱动成为企业发展的共识，“一带 一路”建设带来新的机遇，也迫使企业提升“走出去”的水平和层次。 从以标准化OEM ( 贴牌生产)及ODM( 自主设计生产)方式服务欧美消费者，到以自主 品牌输出中东、非洲等新兴市场，格兰仕不断寻求与行业先进技术和有实力的国外品牌进行 深度合作，并通过建立海外营销分公司、和客户合资等多样化的形式进行自主品牌的开拓。 通过把当地品牌转化为格兰仕制造，格兰仕在北美市场站住了脚跟。在此基础上，格兰仕进 一步完善品牌经营支撑体系，自主品牌顺理成章走进了北美市场。几轮竞争下来，格兰仕已 经在北美市场牢牢扎下了根。格兰仕目前除了在北市场外，在欧洲市场也逐步亮出自主品牌， 中东市场自有品牌达到40%,东南亚、非洲市场以自有品牌为主，格兰仕还在全球10多个 国家和地区建立了商务机构，自主品牌已在全球60多个国家和地区进行销售。 给未来插上飞翔的翅膀 格兰仕集团企划部部长游丽敏介绍，格兰仕注册了产业互联网品牌“UU” 这个专供网售、 专注年轻人需求的品牌，成了格兰仕互联化的一张“名片”。“UU”只是格兰仕创新发展的 一个小小的例子，绕制造自动化、管理信息化、品牌国际化、企业人性化，将兰仕正在加快 企业的转型升级步伐。仅在研发投入、技术装备更新和智能化工厂建设方面，格兰仕近年来 的投入就超过了过去30多年的总和，各项发展战略已经全面铺开。 格兰仕联合中国科学院计算技术研究所开发的“G+智慧家居平台”已经投入使用，依托 该平台，格兰仕相继开发出成系列的智能家居产品，互联网正在深刻地改变着格兰仕依托 “G+”平台和理念，格兰仕无论是线上还是线下，都打开了广阔空间目前格兰仕已经将北美 办事处搬到硅谷，利用硅谷的学术团队和人才优势，规划未来。梁昭贤表示，创新的速度是 真正的竞争力，现在强调自主创新，更强调分工合作，要集中力量整合全球最顶尖的人才和 创新团队，把全球最前沿的技术以最快的速度产业化、商业化。“给梦想插上翅膀，未来就 会飞。”梁昭贤表示，无论怎样飞翔，格兰将始终不忘提升中国制造的责任。 (1)格兰仕为创立自有品牌做了哪些努力?(5分) (2)你如何看待格兰仕创立自有品牌? ( 7 分 ) (3)格兰仕品牌国际战略中，还将遇到哪些风险?谈谈如何解决。(8分)","knowledge":["跨国公司与国际化","新兴议题","国际商务管理"]},{"id":"2016_10","year":2016,"num":10,"type":"案例","question":"固特异轮胎的分销变革 【案例由小鹿学姐整理，素材来自网络】 固特异轮胎暨橡胶公司通过其强大的固特异独立经销商网络独家销售备用轮胎已有60 多年的历史，固特异和它的2500家经销商都受益，经销商们拥有享有盛誉的固特异轮胎产 品独家销售权。但是，在1992年，固特异开始打破传统，宣布它将通过西尔斯公司的汽车 中心销售固特异牌轮胎。无疑，这是对固特异原有经销商们的一次沉重打击，因为这使他们 处于和零售商巨人西尔斯公司直接竞争的地位。这次对原先神圣不可动摇的经销商网络的背 弃，使许多经销商感到震惊和愤怒。 一位固特异经销商说：“就像是结婚35年之后，你的 ‘爱人’在做不忠于你的事。”另一位则说：“我感觉就像他们在我背后捕了一刀”。","answer":"有好几个因素导致了固特异销售系统的变化80年代末期，大规模的国际合并浪潮重组 了轮胎行业，最后只剩下了5个竞争者。例如，日本的石桥( Bridgestone) 公司兼井了凡 士通公司( Firestone), 德国的大陆(Continental) 收购了通用轮胎公司( General Tire), 意大利派利公司 ( Pivelli) 吞并了阿姆斯特朗公司 ( Armstrong), 还有法国的米其林 (Michelin) 公司兼并了UG公 司(Uniroyal Goodrich60)。年来一直位居世界轮胎制造业老大 的固特异公司已经落在米其林公司之后而屈居第二。作为惟一幸存者的一家美国轮胎公司， 固特异发现它在与强大的、新近补充了能量的国际竞争者争夺美国市场份额时已不能再像对 付国内较小的竞争者那样随心所欲。 雪上加霜的是，消费者对怎样及到哪儿购买轮胎的观点正在发生变化。与以前相比，买 轮胎更具冲动性，并且在意价值的轮胎购买者越来越多地从更便宜的多品牌折扣商店、百货 商店和仓库俱乐部中购买轮胎。这些商店所占有的市场份额在过去5年中增长了30%,而轮 胎经销商的市场份额却下降了4%。由经销商包销，固特异就不能把轮胎放在许多消费者购 买轮胎的地方。消费者购买方式的转变也给经销商造成了很多问题。尽管固特异为其经销商 提供充足的各色溢价轮胎产品，但是却不能提供许多消费者需求的低价轮胎。进入90年代， 固特异这座大厦开始坍塌。尽管在美国它仍位居第一，但是它在美国备用轮胎市场中的份额 仅在5年之内便下降了3%。在与持久的经济衰退和来自米其林公司和桥石公司的各种价格 竞争的博斗中，固特异公司产生了自大萧条以来的和一个亏损年，因此急需补救办法市场营 销、销售以及相关变革使固特异公司重新进入良性运转状态。在高特领导下的第一年，固特 异的销售量和利润直线上升，市场份额增加了1%,股票价格翻了4番到了1993年和1994 年，固特异创造的利润比它的直接竞争者的利润总和还多。拓展销售系统成了固特异公司的 一个重要的促进因素，例如西尔斯公司独自控制着10%的美国备用轮胎市场，对固特异公司 来说，只要在西尔斯轮胎业务中占20%便意味着每年可多售300万只轮胎，足以挽回公司先 前丢失掉的一半以上的市场份额。 但是，从长远来看，开发新渠道有失去固特异包销商网络忠诚和效益的危险——这是公 司最珍贵的主要竞争资产之一。为了实现尽可能大的效益，固特异公司应该与其经销商进行 协调、合作。但是，固特异与西尔斯及其他零售商们的达成的协议引起了经销商们的强烈不 满。一些气愤的经销商开始采取报复性手段——经营并大规模促销更便宜的私有品牌的轮胎， 这些私有品牌的产品能带给经销商更多的利润，同时对一些注重价值的消费者更具有吸引力。 经销商的这些做法最无疑会削弱固特异的名声，并减少固特异公司所要求的溢价。固特异采 取了一些行动来支持这些处于焦急状态中的经销商。例如，它开始向经销商提供急需的低价 固特异轮胎系列。固特异衷心地希望扩大后的销售渠道能更多地帮助它的经销商而不是伤害 他们。最后，高特认为通过西尔斯的销售能使固特异的名声更大，销售渠道的拓宽为经销商 可以带来更多的盈利，但许多经销商表示怀疑。从长远来看，经销商的不合作将减弱固特异 的市场力量，并抵消从新渠道中获得的销售收益。例如，在和西尔斯宣布合作之后不久，固 特异在佛罗里达的一位大经销商就接受了几种低价私有品牌的轮胎产品，使固特异的轮胎销 量减少了20%,但利润却增加了。这位提出挑战的经销商说：“我们现在只卖我们认为能给 顾客提供最好价值的产品，因此并不总是固特异。”所以，尽管固特异公司可能又在滚滚前 行，但是行程却并没有结束，前方路上还有许多障碍。 所幸的是从2003年底开始，固特异公司的总经理罗伯特在逐步将公司从原先的财务困 境中扭转过来，开始深刻地意识到与经销商之间的关系的重要性，也明白是需要好好整顿的 时候了该公司承认自己忘记了一个不可颠扑的事实，那就是公司的利益应该是和经销商的成 功息息相关的。经销商经营不善，公司也不可能蒸蒸日上。有了深刻的认识，下一步就是实 际的行动了。现在固特异的经销商们通过一部分批发商来统一价格，供货率也得到了一定的 提高。更重要的是，固特异给旗下的经销商提供了一个只供应给他们的热门产品：含有保修 保证的轮胎。顾客在通常的折扣店、大卖场或是网上，是无法购得这样的产品的，他们必须 到固特异指定的经销商那里购买。这一产品上市后，销售量超过了公司的预测。固特异尝到 了甜头，准备扩充产量以满足市场需求，而且，更让经销商们惊奇的是固特异也开始重视起 他们的意见。有一个经销商很激动地说，固特异已经邀请他参加了4次座谈会，这在过去是 闻所未闻的。 (1)简述4P理论并结合固特异案例分析。(8分) 9 (2)用产品创新理论分析固特异的产品创新策略(5分) (3)如何解决固特异因为开发新渠道而失去传统分销商的困境(7分)","knowledge":["国际商务管理"]},{"id":"2017_1","year":2017,"num":1,"type":"简答","question":"简述特定要素模型的主要内容以及和国际贸易的关系。","answer":"","knowledge":["国际贸易理论"]},{"id":"2017_2","year":2017,"num":2,"type":"简答","question":"什么是“资本外逃”?一国政府应对资本外逃应采取什么措施?","answer":"","knowledge":["国际金融"]},{"id":"2017_3","year":2017,"num":3,"type":"简答","question":"如果国际贸易发生在一个大国和一个小国之间，那么贸易后，国际相对价格更接近哪一 个国家在封闭条件下的价格水平?哪个国家在国际贸易中福利改善程度更为明显?","answer":"","knowledge":["综合"]},{"id":"2017_4","year":2017,"num":4,"type":"简答","question":"简述企业海外市场进入模式中股权模式和非股权模式的优势和劣势。","answer":"","knowledge":["跨国公司与国际化"]},{"id":"2017_5","year":2017,"num":5,"type":"简答","question":"中国企业到“一带一路”沿线国家投资面临什么政治风险?如何防范政治风险?","answer":"","knowledge":["中国对外经济"]},{"id":"2017_6","year":2017,"num":6,"type":"论述","question":"英镑年利率为1%,英镑兑美元为1:1.25。美国国债利率为0.6%。如果用100万英镑投 资美国国债，一年后，英镑兑美元升贴水率是多少，银行才不会亏本?这时美元的升贴水率 是多少?(保留小数点后三位)。","answer":"","knowledge":["国际金融"]},{"id":"2017_7","year":2017,"num":7,"type":"论述","question":"简述国际分工理论的演进和发展脉络。","answer":"","knowledge":["国际贸易理论"]},{"id":"2017_8","year":2017,"num":8,"type":"论述","question":"什么是新HO 模型? HO 模型能解释产业内贸易现象吗?为什么?","answer":"","knowledge":["国际贸易理论"]},{"id":"2017_9","year":2017,"num":9,"type":"案例","question":"互联网+图书【小鹿学姐考试回忆版】 过去是作者出书，读者读书，传统出版社处境艰难，最好的形式就是办读书会、签售会 这样的方式，成本高效率低。现在出版商通过互联网把二者链接起来，比如作者给读者留作 业，读者可以通过扫描二维码来获得增值服务，或者获得与作者直接交流的机会，一般书上 包含80%的内容，通过微信等网上渠道可以获得另外20%的内容。 (1)什么叫“互联网+”?(2分) ( 2 ) 根 据 4P 理论对图书产品营销提出建议。 ( 9 分 )","answer":"(3)结合案例，探讨出版业的商业模式创新，除了案例提到的，谈谈你的理解。 ( 9 分 )","knowledge":["新兴议题","国际商务管理"]},{"id":"2017_10","year":2017,"num":10,"type":"案例","question":"宝洁是否老了? 始创于1837年的宝洁公司，是世界最大的日用化学品公司。上世纪八九十年代，是宝 洁扩张最激烈的时期，对外并购成为公司常态不断推陈出新的产品，随之而来的是商业上的 巨大成功。1980年，宝洁150年大庆在即，公司为迅猛的发展做好准备。通过收购 Norwich Eaton 制药公司(1982), Rechardson Vick 公司(1985),公司活跃于个人保健用品行业；80 年代末90年代初又收购了Noxell, 密丝佛陀，Ellen Betrix公司，宝洁在化妆品和香料行 业扮演着重要角色，这些收购项目加快了宝洁全球化的进程，为了充分发挥跨国公司的优势， 宝洁建立了全球性的研究开发网络，研究中心遍布美国、欧洲、日本、拉美等地。2005年， 宝洁公司收购了吉列( Gillete), 开辟了男士剃须用品市场，也是宝洁公司历史上最大的一 次收购，自此，宝洁打造出囊括美容美发、居家护理、家庭健康用品等领域的最全的产品线。","answer":"2008年，宝洁公司是世界上市值第6大公司，世界上利润排名第14的公司。 它同时是财富500强中第十大最受赞誉的公司。1987年，正值公司成立150周年纪念 之际，宝洁公在广州成立了在中国的第一家合资企业—广州宝洁有限公司，从此开启了其中 国业务发展的历程宝洁大中华区总部位于广州，在广州、北京、上海、成都、天津、东莞及 南平等地设有多家分公司及工厂，员工总数超过七千人，在华投资总额超过十七亿美元。二 十多年来，宝洁在中国的业务发展取得了飞速的发展，宝洁公司是中国最大的日用消费品公 司。海飞丝、飘柔、舒肤佳、玉兰油、帮宝适、汰渍及吉列等品牌在各自的产品领域内都处 于领先的市场地位，中国宝洁是宝洁全球业务增长速度最快的区域市场之一，宝洁大中华区 的销售量已位居宝洁全球区域市场中的第二位，销售额也已位居第四位。伴随着公司的业务 发展，宝洁的中国员工得到了迅速的成长，如今，在宝洁大中华区，越来越多的中国籍员工 担任起重要的管理职位，中国籍的员工占员工总数的98%以上，宝洁大中华区已成为向宝洁 其他市场的人才输出地。无论是在品牌输出、业务增长以及人才培养上，宝洁都取得了突出 的成就。 然而，近几年，宝洁却渐渐显出苍老迹象。这只巨无霸，不再对市场敏感，不再及时满 足消费者需要，变得笨重和反应迟缓。数据不会骗人，自2012年以来，宝洁的收入维持在 800亿美元左右，几乎增长停滞；去年更是同比下跌了5.3%,收入只有762.8亿美元。其实 从2009年来，宝洁的净利润在大部分时候就是下滑的，2015年更是暴跌39.5%至70.4亿美 元，这水平“瞬间”倒退了十年以上2006年宝洁的净利润可是有86.8亿美元。如今的宝洁， 在深耕多年的中国也遭遇了前所未有的困境。由于移动互联网、大数据、电子商务快速发展， 人们的个性化需求逐渐被唤醒，越来越多的小众化产品开始满足不同人群的需求，消费者选 择的空间越来越大，加上中国本土品牌强势崛起，日韩日用品逐渐打入中国市场，竞争对手 在不断蚕食宝洁的地盘儿。直接表现就是旗下所有产品在中国市场的销售量均出现下降，旗 下5个重要的品类甚至出现了双位数跌幅。与此同时，宝洁也频频传出高层被中国企业挖角 的消息。宝洁CEO大卫 ·泰勒终于开始承认错误：宝洁一直把中国当成一个发展中市场，而 实际上中国已经成为全世界消费者最挑剔的市场。面对这一切，宝洁并非无动于衷，采取了 各种自救措施，比如4次更换CEO、裁员、砍掉一百多个小品牌、削减广告预算等，包括转 向电商渠道、利用社交网络进行营销，不遗余力地力挽颓势，然而在中国市场的业绩仍未见 进展。只是，宝洁的沦落真得只是因为世界变化快而看不明白吗?消费者变得越来越精明， 可以选择的商品也越来越多，可以比较的越来越多，而在这比较当中，宝洁的口碑越来越差。 到底是消费者变了还是宝洁老了? (1)宝洁在全球扩张的主要方式是什么?宝洁昔日成功有什么意义? ( 5 分 ) (2)宝洁在中国遭遇困境的原因是什么。(5分) (3)请对宝洁在中国的经营提出建议。(5分) (4)如何看待宝洁的品牌收缩战略 ( 5 分 )","knowledge":["跨国公司与国际化","新兴议题","国际商务管理"]},{"id":"2018_1","year":2018,"num":1,"type":"简答","question":"什么是有效汇率?影响有效汇率的因素包括哪些?","answer":"","knowledge":["国际金融"]},{"id":"2018_2","year":2018,"num":2,"type":"简答","question":"简述马克思经典学派的不等价交换理论","answer":"","knowledge":["综合"]},{"id":"2018_3","year":2018,"num":3,"type":"简答","question":"金砖国家的货币崛起挑战了美元欧元的地位吗?为什么?","answer":"","knowledge":["综合"]},{"id":"2018_4","year":2018,"num":4,"type":"简答","question":"全球治理存在什么问题?“一带一路“为全球治理提供了什么动能?","answer":"","knowledge":["中国对外经济"]},{"id":"2018_5","year":2018,"num":5,"type":"简答","question":"资本资产定价模型 ( CAPM)。","answer":"","knowledge":["综合"]},{"id":"2018_6","year":2018,"num":6,"type":"论述","question":"新兴经济体对外直接投资的动因是什么?与传统对外投资理论存在什么区别?请结合案 例说明。","answer":"","knowledge":["跨国公司与国际化"]},{"id":"2018_7","year":2018,"num":7,"type":"论述","question":"什么是产品管理?什么是产品创新?企业如何进行产品创新?请举例说明。","answer":"","knowledge":["综合"]},{"id":"2018_8","year":2018,"num":8,"type":"论述","question":"持有期收益率。计算国债收益，三年期年利率4%,不到期提前兑取时，不满6个月不计 息；满6个月不满24个月，扣除前180天的利息；满24个月，扣除90天的利息。投资者 本金10万元，投资200天后提前兑取，计算利息和持有期收益率。(结果保留两位小数)","answer":"","knowledge":["国际金融"]},{"id":"2018_10","year":2018,"num":10,"type":"案例","question":"日本7-11 日本的7-11便利店有其经营和发展的独到之处。众所周知，流通行业始终是随着经济 结构、消费生活的变化而变化的。上世纪60年代初至70年代中期，正值日本的经济高速增 长期，日本的超市就是在大量生产、大量销售的背景下，因采取低价位销售的经营措施而得 到了迅速的发展。到了70年代后半期的经济低迷期，随着消费生活的多样化，日本开始出 现24小时便利店。便利店便捷快速的服务能满足人们24小时都在忙碌的需要，受到了日本 国民的热烈欢迎。1969年，第一家便利店诞生，之后短短十几年的时间，便利店在日本迅 速推广。7-11便利店就是其中的佼佼者， 一跃而成为日本最大的24小时便利店。","answer":"日本7-11是日本大零售企业集团伊藤洋华堂的子公司之一。1973年，伊藤洋华堂与当 时经营7-11便利店连锁集团——美国南陆公司签订在日本开展地区特许经营的合同，将 7-11便利店引进了日本，开始创建适合日本人消费生活习惯的便利店。在伊藤洋华堂的支 持下，1974年5月，日本的7-11开设了特许1号店，当年即有15家加盟便利店开业，经 营额达到7亿日元。 一年后，7-11在日本国内的加盟店发展至69家，经营业绩也远胜于美 国。而伊藤洋华堂更是因拓展市场的骄人成绩，入主美国南陆公司并控股70%,成为7-11 品牌的实际控制者。 便利店的开发需要考虑五个主要因素：店址、时间、备货、便民和管理，日本7-11在 这五方面做得非常出色。7-11便利店平均购物时间仅1分55秒，即一个顾客从进店选购到 选中商品再到结账，整个过程历时不超过1分55秒。7-11拥有世界上最先进的便利店运营 系统，特别是在商品制造和物流配送方面，日本7-11率先在零售业市场创立了联网在线订 货系统和信息分析系统，上千种商品的清单在几秒钟内就能一目了然。 随着互联网时代到来，便利店模式受到营业面积限制、陈列商品有限，已经无法满足消 费者挑选的需要。但是，日本7-11便利店提前预见到了网络的无形市场潜力，率先转变经 营战略，将市场开拓的重点从有形的店铺市场转向无形的电子市场——电子商务。1999年， 7-11便利店设立名为e-shopping books的网上书店，以销售图书为开端进入电商领域。2000 年，7-11便利店与索尼等日本跨国公司企业共同组建了“7梦幻”(seven dream)的网络商 店，销售各类商品和提供服务。凭借这些契机，7-11便利店成功地建立起线上渠道，除了 传统零售业务，在网上还开展了诸多旅行、照相、礼品、票务销售代理、汽车服务、信息提 供服务等电子商务服务项目。 7-11便利店认识到便利店新的利润增长点一一物流服务。随着电子商务计划的启动， 7-11的业务扩展到物流业，利用7-11强大的零售网络和配送功能为网上商店提供物流服务。 例如，7-11与网络书店合作，令9600多家店铺成为53家网络书店的图书配送处，有力地 保证了图书的及时订货和送货，实现了24小时都能取书的突破，同时也大大减少了组建这 些必要设施的费用。电子商务开展并没有改变消费者对地区性店铺的信任感，相反还给地区 性店铺带来了更多的商机。现在，7-11便利店解决了电子商务的物流问题，顾客通过网络 订购商品，等待商家把货物送至最近的便利店后，再亲临便利店付款并取走货物。这种方式 很符合日本的实际情况。便利店在日本非常普及，无论你居住在什么地方，都可在附近找到 一家便利店，收取从网上订购的货物。7-11日本公司是日本最大的便利连锁店，在市区， 大多数人从家步行5分钟就可找到一家7-11便利店，顾客可以选择附近的任何一家付款取 货。因此，7-11便利店理所当然地充当起了物流角色，开辟物流服务市场使7-11便利店成 为信息时代网络购物的大赢家。 7-11便利店的电商战略实现了线上线下渠道融合，将成千上万种商品真正搬到网上， 运用“网络”放大其小小的经营店铺，通过线上线下“虚”与“实”的结合，突破便利店商 品品种的限制，将其商品经营范围扩大到几万甚至几十万种。这样，既可以凭借其丰富的商 品与便利的服务和大型商场、超市展开正面竞争，又可以凭借其管理、顾客、物流、信誉等 优势与纯网络商店竞争，从而全面提升自身的竞争力。 (1)分析竞争与合作的关系(5分) (2)什么是蓝海战略?蓝海战略是否重塑行业边界?请举例说明(7分) (3)什么是线上渠道与线下渠道融合?谈谈对中国线上线下渠道融合的理解，并举例说明 (8分)","knowledge":["跨国公司与国际化","新兴议题","国际商务管理"]},{"id":"2019_1","year":2019,"num":1,"type":"简答","question":"简述利率平价理论","answer":"","knowledge":["国际金融"]},{"id":"2019_2","year":2019,"num":2,"type":"简答","question":"什么是关税的有效保护率?如何提高对一国最终产品的有效保护率?","answer":"","knowledge":["国际贸易政策"]},{"id":"2019_3","year":2019,"num":3,"type":"简答","question":"对 HO 理论进行评析","answer":"","knowledge":["综合"]},{"id":"2019_4","year":2019,"num":4,"type":"简答","question":"简析规模经济对国际分工和贸易的影响","answer":"","knowledge":["国际贸易理论"]},{"id":"2019_5","year":2019,"num":5,"type":"简答","question":"结合期货期权互换的内涵，说明国际金融衍生工具产生的动机和主要作用","answer":"","knowledge":["综合"]},{"id":"2019_6","year":2019,"num":6,"type":"论述","question":"运用等级评分法和冷热比较法评估一带一路沿线国家投资环境并不好。结合我国一带一 路建设，论述为什么我国鼓励投资?分析企业投资的动因。","answer":"","knowledge":["中国对外经济"]},{"id":"2019_7","year":2019,"num":7,"type":"论述","question":"结合要素价格均等化理论评述当前中国产品的国际竞争力。 8 、跨国指数 (1)什么是跨国公司国际经营?跨国公司如何进行国际经营?(10分) (2)以下为某跨国公司的主要财务和经营指标(单位：百万美元或人),计算该企业2017 年、2018年的跨国指数。","answer":"","knowledge":["国际贸易理论","跨国公司与国际化"]},{"id":"2019_9","year":2019,"num":9,"type":"案例","question":"新七星集团 有研究表明，在中国民营企业中，80%以上为家族企业。这些企业一般具有家族管理和 企业管理融为一体的特点。作为底层草根家族企业一员的中国江西新七星集团，由朱家七兄 弟共同建立，现由第二代也是七兄弟担当要职。特别与众不同的是，该公司在从上到下、从 里到外的各个管理层面，都深深打上了儒家传统文化的印记。经过十余年的创业与发展，现 已成长为一家集贸易、饲料产销及粮食收储、物流等为一体的大型多元化民营企业。企业曾 获“江西省2004年度诚信企业”、“樟树市2003-2004年度金融信用企业”“宣春市 2015-2018年农业产业化市级龙头企业”等荣誉。集团旗下品牌产品主要包括猪料、鸭料、 鸡料等养殖饲料、饲料原料销售方面以玉米、豆粕、麦麸为主。集团现有员工306人，有 10家分(子)公司，11个直营事业部，分布在樟树、临江、南昌、莲塘、新余、宜春、吉 安、上高、高安、新干、八都等地。集团年生产能力达30万吨，各种饲料原料年销售量达 60万吨。 2015年，集团销售收入20.55亿元，近年来，集团主营业务从粮食收储、销售、 饲料加工，逐步拓展至酒店、矿产、林业、仓储物流等行业，呈现出全方位快速健康发展态","answer":"势。 特别值得一提的是，七兄弟的老母亲有自己的政治经济学。 第一条：“家和万事兴”不能闹不团结 1967年文革期间，全家下放农村7年。1974年回城后，60岁的老父亲去世，兄弟姐妹 9人也一直在一起生活，他们的第二代、第三代也都在一起长大父亲去世后，老母亲龚清莲 成了全家的主心骨。饱经风霜的老太太立下三条家规。落实政策从农村回城后，大哥朱金根、 四哥朱春根从事竹制品加工工作，二哥朱梅放五哥朱庆生烧砖瓦，当时全家4人出力，弟妹 小，都在读书，生活不算富裕。哥哥们各自成家后，虽然增加了新成员(嫂子),但全家仍 在一起生活。1981年，母亲主持，为7兄弟建造了一个共同生活的两层楼。而且，在房屋 分配上，特别采取了门栋交叉居住的办法。用老母亲的话说，就是要重视亲情，不能老人走 了就散了。要团结，团结就是力量。母亲的良苦用心没有白费。后来条件改善，建了一栋 16层楼，大家也还住在一起。在企业和每一个小家庭里，都挂有2014年全家67人的合影 照片。现在，几兄弟包括下代人虽在全国各地奔忙，但每年春节、清明、中秋、国庆都尽量 回家团聚。 第二条：要共谋发展，“不能让一个孩子落下” 在分配上要讲多劳多得，但更要兼顾大家。在家族会议中，老母亲有极大的权利。她通 常只是坐在一边旁听，并不过问公司业务，但她特别注重公平分配，遇到分配不合理就会督 促调整。按老母亲定下的规矩，颇有点“吃大锅饭”的意思。就是分配差距不能过大。即便 有人为公司赚了1000万元，也就是奖励2、3万元，而不是按比例提成。从长远看，这样 做可能会影响工作积极性，但它却有效保障了大家庭的和谐发展。公司现任董事长曾独立开 过公司，也赚了点钱，但几年后还是回归了家族企业，因为，对他来讲，钱固然重要，但亲 情更加可贵。用他自己的话说，“家族气氛是一种享受，就是要在享受亲情中快乐地工作” (1)用跨文化管理相关理论阐述家族企业管理模式的主要依据(6分) (2)先吃亏方可得利的舍得价值观是否符合市场竞争赢家通吃的基本原则。(4分) (3)我国这种家族企业管理模式与西方现代企业管理模式的异同(5分) (4)你对这种家族企业管理模式的评价(5分)","knowledge":["国际商务管理"]},{"id":"2019_10","year":2019,"num":10,"type":"案例","question":"索尼的跨国并购 2003 年，好莱坞大片《蜘蛛侠》上映，这个能够凭借蜘蛛丝在高楼大厦中穿行的银幕 形象，迅速得到了观众的喜爱，随着电影《蜘蛛侠》风靡全球，影片背后的蜘蛛侠也跃然而 出，它就是日本的著名电子企业——索尼。并购美国哥伦比亚电影公司，让索尼成功登陆美 国，它的产品也开始全面抢占美国市场。 索尼历史资料馆是记录辉煌的地方，这里保存着世界上第一台晶体管收音机、第一台电 子显像管彩电、第一台随身听、第一部小型家用摄像机，正是索尼创造了这一个个世界第一。 即使在强手如林的日本企业中，索尼的技术实力也一直难以超越。然而，在1989年9月27","answer":"日，这家公司的命运陡然发生了转变。索尼对外宣布了一个惊人消息：斥资46 亿美元，收 购美国哥伦比亚电影公司。索尼是全球知名电子产品制造商，哥伦比亚是好莱坞八大制片商 之一。两家看似毫不相干的企业，走到一起，无论是在外界，还是索尼公司内部，都引起了 轩然大波。 做出这个重大决定的，正是索尼公司创始人盛田昭夫。在日本，盛田昭夫被称为经营之 圣。他用40多年时间，把一家做录音带的小工厂，打造成一张日本最闪亮的经济名片。这 样一位经营大师为什么在他68岁那年做出一生中最受争议的选择呢?这也是索尼公司一 次至关重要的生死抉择。这是1975 生产的 BETAMAX SL6300 家用录像机的一号机，这台录 像机把全世界带进了一个家用录像机时代，可这个市场却并不属于索尼。就在它诞生一年之 后，松下公司阵营的 JVC紧接着推出了 VHS 录像系统。但是， 由于大量影视制作公司加入 到松下阵营中去，VHS 录像机以三倍于 Beta 的速度迅速扩张市场。1988年， BETA 录像 机退出了民用市场。一场持续了十四年的商业大战以索尼全面失利而告终。索尼的这场惨败 让盛田昭夫深受震动，他清醒地认识到，未来竞争中如果不被打倒，就绝不能只做技术的领 导者。 并购哥伦比亚电影公司之后，由于用人不当，管理失控，索尼一度造成账面损失 27 亿 美元，创下日本企业亏损的历史记录。即使索尼公司内部，也不禁对并购再次打上了问号。 2003年第三季度，电影《蜘蛛侠》从这里走向全球，索尼电影公司一举创造纯利1254 亿 日元，超过整个索尼公司一年的利润总额。盛田昭夫的并购决策结出了第一颗丰厚的果实。 蜘蛛侠不仅成为美国文化的符号，也成为索尼最受欢迎的产品。2005年，索尼再度出击好 莱坞，买下米高梅电影公司，同时收购了数千部电影版权。这次并购三年后，索尼主推的蓝 光光盘在又一场标准大战中全面胜出。这些战略都是在(盛田昭夫)大脑中清晰地考虑过的， 现在不但是日本，中国和其他国家也能生产(电子产品),在这个转移过程中，索尼现在还 能有内容制作这一块，可以增强它的实力。 建立一个自由、豁达的世界级企业，这是索尼创始人在1946年写下的成立宣言。2011 年6月，新的《蜘蛛侠》正在纽约拍摄外景。神奇的蜘蛛侠，依然在借助蜘蛛丝的力量， 在高楼大厦间穿行。而在现实的商业世界里，越来越多的跨国企业借助并购的力量，超越发 展之路上的一道道障碍，飞奔在全球化时代的经济地球上。 (1)用跨国经营理论，阐述索尼并购电影公司的主要依据。(6分) (2)有哪些可能的挑战，结合案例和理论讨论如何应对。(7分) (3)对我国企业国际化发展的启示。(7分)","knowledge":["跨国公司与国际化"]},{"id":"2020_1","year":2020,"num":1,"type":"简答","question":"用国际贸易理论解释美国对中国的贸易逆差。","answer":"","knowledge":["中国对外经济"]},{"id":"2020_2","year":2020,"num":2,"type":"简答","question":"评价中国在全球价值链的地位。","answer":"","knowledge":["中国对外经济"]},{"id":"2020_3","year":2020,"num":3,"type":"简答","question":"说明反对自由贸易的经济学理由。","answer":"","knowledge":["国际贸易政策"]},{"id":"2020_4","year":2020,"num":4,"type":"简答","question":"简述以产业内贸易为主要内容的新贸易理论与传统贸易理论有什么异同。","answer":"","knowledge":["国际贸易理论"]},{"id":"2020_5","year":2020,"num":5,"type":"简答","question":"强势美元的好处与坏处。","answer":"","knowledge":["综合"]},{"id":"2020_6","year":2020,"num":6,"type":"论述","question":"产品原价10万元(不含税),征收20%的关税，产品原料6万元(不含税),征收10%的 关税。计算名义关税率和有效关税率，并说明二者为什么存在区别。","answer":"","knowledge":["国际贸易政策"]},{"id":"2020_7","year":2020,"num":7,"type":"论述","question":"中央银行突然增加货币供给，外币货币供给不变，本币汇率如何变化?(10分)什么是 汇率超调?汇率超调的实现机制是怎样的?(10分)","answer":"","knowledge":["国际金融"]},{"id":"2020_8","year":2020,"num":8,"type":"论述","question":"中科院院士团队研发了二氧化碳制冷设备，获得了技术专利，系列产品用于冰箱、冷库 设备，可替代氟利昂，有利于保护臭氧层，制冷效果好，热量传导速度快，排放全球变暖气 体少。国家支持成立公司研发该系列产品，现向资本市场进行天使轮投资，请写出商业计划 书，并列举搜集哪方面的数据和资料，会引起投资人兴趣。","answer":"","knowledge":["跨国公司与国际化"]},{"id":"2020_9","year":2020,"num":9,"type":"案例","question":"中国机电产品 一家中国机电企业以直接出口、间接出口等方式进入国际市场，产品又以经销、代销等 方式进入国际市场。目前，由于中美贸易摩擦，该机电企业销量受到极大冲击。 (1)该企业通过哪些渠道进入国际市场? ( 5 分 ) (2)产品通过哪些方式进入国际市场?经销和代理有什么不同?(5分) (3)中美贸易战对机电企业造成了哪些风险?该机电企业应采取哪些方法应对中美贸易战 带来的冲击?(10分)","answer":"","knowledge":["国际商务管理"]},{"id":"2020_10","year":2020,"num":10,"type":"案例","question":"传音手机凭什么在非洲市场称王 在当今的手机市场上，iPhone 、三星、华为、小米、OPPO、Vivo等品牌可谓家喻户晓， 然而有一个国产手机品牌虽然在国内默默无名，却以全球出货总量达到亿部的数量级，占领 了非洲40%的市场，成为中国出口手机的销量之王。它就是“传音 ( Tecno)”。 传音成立于2006年，创始团队来自TCL。2015年，南非的商业杂志African Business 发布年度“非洲消费者最喜爱品牌100强”,传音力压谷歌、微软等国际科技巨头，成为非 洲中高端机的代表。","answer":"传音凭什么在非洲卖得这么好?非洲消费者为什么这么喜欢传音手机?其实，最根本的 原因在于传音解决了非洲人民自拍的难题。对于肤色较深的人种，大部分手机拍摄很难做到 面部识别，尤其是在光线不佳的情况下，更难以取得理想的效果，而传音手机恰恰抓住了这 一手机拍照的痛点。 为了更好的解决非洲消费者的需求，传音分别在非洲人口大国尼日利亚和肯尼亚的首都 设立了研发中心，大量搜集当地黑人照片，通过眼睛和牙齿来定位，加强面部其他区域的曝 光，帮助消费者获得更加满意的照片，提升了用户体验。 非洲有50多个国家和地区，超过11亿人口。早在2012年，非洲就成为全球第二大移 动通信市场，仅次于亚太地区，传音为了避开国内和发达地区市场的激烈竞争，曾专门对非 洲手机市场做了调查，发现当时只有三星、诺基亚等少数手机品牌。于是将国内外手机厂商 关注较少的非洲市场作为自己主攻目标市场。 2007年11月，传音首度试水非洲市场，推出第一款Tecno品牌的双卡双待手机，当时 手机在当地的普及率不高，在非洲市场，传音充分借鉴了国产手机厂商多年市场运作积累下 来的经验教训，在多数国产手机还在比拼硬件时，传音手机把焦点放在用户上。传音手机根 据非洲消费者在肤色排汗等方面的特征。开发出了特种美颜、防出汗、防摔等符合非洲消费 者特定需求的产品，深受消费者喜爱。2012年，非洲人普遍使用功能机时，推出高端智能 手机品牌 Infinix 并以出色的质量征服广大非洲消费者，很多非洲人把传音手机误认为是德 国制造。2017年3月，传音正式推出采用最新的“四象合成”成像技术的Camon CX,该 机 定位于年轻人，主打黑皮肤用户的自拍功能，在非洲、中东与拉美41国发售。目前，传音 以 Tecno,Itel,Infinix 等自主品牌占据了手机市场40%的份额，2015年手机出货量超过 5000万部，2016年出货量超过8000万部。 除了贴近非洲消费者生活特点之外，传音还能够真正了解非洲人民的特殊需求，传音手 机推出了主打音乐功能，音效奇佳的音乐手机，而且买手机送大耳麦。 非洲用户大多有两张以上的SIM 卡，大部分人因为经济问题只能买一部手机，双卡手机 在非洲成为刚需，传音推出的双卡甚至四卡手机大受欢迎。 在非洲市场的营销渠道开发与扩展，采取了中国企业擅长的“农村包围城市”战略，从 三星和诺基亚这些品牌较少关注的贫困落后地区入手，奠定了自己的市场地位和影响力，赢 得了良好的口碑。目前，传音的全球销售已覆盖尼日利亚、肯尼亚、坦桑尼亚、印度、巴基 斯坦、越南等58个国家。 在非洲，传音是第一个在本地建立售后服务网络的外国手机企业。传音耗资数亿人民币， 在非洲建立世界级售后服务中心，超过1000个售后维修点，拥有1100名专业技术人员，是 非洲最大的用户服务网。 在促销宣传方面传音采用了大面积、广覆盖的策略。传音遍布各街道的店面海报、公告 牌铺天盖地，留下深刻的印象。传音的售后服务中心在内罗毕开张时，曾邀请当时的内罗毕 市长剪彩，盛况空前，甚至导致封路。 可以说，传音的成功并不是偶然的，对市场需求的精准把握，以及精准而务实的产品策 略、渠道策略、品牌策略、营销策略在非洲市场取得了骄人的成绩。 (1)传音为什么选择非洲市场(5分) (2)传音在非洲成功的原因是什么(5分) (3)传音手机面临怎样的挑战?如何应对? ( 1 0 分 )","knowledge":["跨国公司与国际化","中国对外经济","国际商务管理"]},{"id":"2021_1","year":2021,"num":1,"type":"简答","question":"在本土成功的企业到国际上还能成功吗?为什么?","answer":"","knowledge":["综合"]},{"id":"2021_2","year":2021,"num":2,"type":"简答","question":"分析人民币汇率变化的趋势和原因。","answer":"","knowledge":["国际金融","中国对外经济"]},{"id":"2021_3","year":2021,"num":3,"type":"简答","question":"企业海外并购的风险和对策。","answer":"","knowledge":["综合"]},{"id":"2021_4","year":2021,"num":4,"type":"简答","question":"上半年全球直接投资指数大幅下降，但是中国吸引外资保持平稳，根据外商投资理论以 及现实情况分析原因，并解释中国扩大吸引外资规模，提高外资利用质量的政策。","answer":"","knowledge":["综合"]},{"id":"2021_5","year":2021,"num":5,"type":"简答","question":"进口替代工业化是什么?为什么大多数采取进口替代工业化的发展中国家经济并没有快 速增长?","answer":"","knowledge":["综合"]},{"id":"2021_6","year":2021,"num":6,"type":"论述","question":"请论述服务贸易在国际贸易发展中的趋势和动因。","answer":"","knowledge":["综合"]},{"id":"2021_7","year":2021,"num":7,"type":"论述","question":"请从国际经济学角度分析RCEP 的贸易促进效应。","answer":"","knowledge":["综合"]},{"id":"2021_8","year":2021,"num":8,"type":"论述","question":"在中美贸易摩擦的过程中，有人宣称：“美国对价值500亿美元的中国产品征收25%的 关税，对我们的经济起到了促进效果，但事实上，美国征收关税对美国生产成本的影响很小， 征收关税后的损失也是由中国来承担的”。以下为美国对中国食糖征收25%关税前后的价格 变化： (1)计算美国征收中国商品关税后福利变动情况。(10分) a. 消费者福利损失；b. 生产者福利增加； c. 政府财政收入； d. 国民净福利影响","answer":"(2)用国际贸易理论分析，指出“有人宣称”发言中存在的问题，并结合上一题计算结果 分析对美国福利造成损失的原因。 ( 1 0 分 )","knowledge":["国际贸易政策"]},{"id":"2022_1","year":2022,"num":1,"type":"简答","question":"试分析区域经济一体化对全球经济一体化的正面和负面影响。","answer":"","knowledge":["综合"]},{"id":"2022_2","year":2022,"num":2,"type":"简答","question":"美国是一个进口和出口都非常多的国家，为什么进口对美国也很重要?","answer":"","knowledge":["综合"]},{"id":"2022_3","year":2022,"num":3,"type":"简答","question":"离岸外包是什么?为什么有些企业没有选择离岸外包?","answer":"","knowledge":["综合"]},{"id":"2022_4","year":2022,"num":4,"type":"简答","question":"汇率传递系数是什么?(5分)美元兑人民币汇率为1:5,美国从中国进口一个玩具为 10美元。后来美元汇率发生变化，为美元兑人民币汇率为1:4,此时，美国进口价格一个玩 具随之变成11美元，计算汇率传递系数。","answer":"","knowledge":["国际金融","中国对外经济"]},{"id":"2022_5","year":2022,"num":5,"type":"简答","question":"今年部分发达经济体出现“供应链危机”,对此你怎么看，有什么办法可以解决?","answer":"","knowledge":["国际商务管理"]},{"id":"2022_6","year":2022,"num":6,"type":"论述","question":"WTO 框架下的一般最惠国待遇和双边自由贸易协定下的最惠国待遇有什么异同?分析两 者对贸易自由化效率的影响。","answer":"","knowledge":["国际贸易政策"]},{"id":"2022_7","year":2022,"num":7,"type":"论述","question":"跨国企业对外贸易经常会面临汇率波动风险，写出四种防范汇率波动风险的汇率管理方 法，并简单举例进行说明(20分，每个5分)","answer":"","knowledge":["国际金融"]},{"id":"2022_8","year":2022,"num":8,"type":"论述","question":"封闭状态下供给和需求曲线公式： D=40-P/2 S=-5/3+P/3。产品国际市场价格为40。求 以下问题： (1)国内消费多少产品?有多少是本国生产的? ( 5 分 ) (2)现在对进口商品征收10%的关税，求此时政府的关税收入是多少? ( 5 分 ) (3)试分析上述举措以后社会福利变化情况。 ( 1 0 分 )","answer":"","knowledge":["国际贸易政策"]},{"id":"2022_9","year":2022,"num":9,"type":"案例","question":"对外贸易高质量发展的中国经济 外贸规模再创历史新高 根据海关总署公布的数据，2020年我国对外贸易逆势上扬，全年进出口总值达32.16 万亿元人民币，同比增长1.9%。其中，出口17.93万亿元，增长4%,进口14.23万亿元， 比2019年下降0.7%。进出口从6月开始，连续7个月实现正增长，全年进出口总额和出口 额创历史新高，展现了强大的韧性和综合竞争力。2020年前三季度，我国出口增速比世界 高9 .6个百分点，由此我国的世界市场份额大幅提高，货物贸易第一大国的地位更加巩固。","answer":"除了增速保持稳定增长，外贸结构也进一步优化。2020年，我国民营企业进出口增速 比同期我国外贸整体增速高出9.2个百分点，成为我国外贸进出口增长的重要推动力量。一 般贸易进出口占比持续提升，比2019年高出0.9个百分点。外贸区域发展更加平衡，中西 部承接东部产业转移取得新进展，进出口增长了11%,占全国进出口比重达17.5%,比2019 年提高了1.4个百分点。我国对主要贸易伙伴进出口实现增长，东盟首次成为我国第一大贸 易伙伴，同我国贸易额增长了7%。欧盟、美国为我国第二、三大贸易伙伴，同我国贸易额 分别增长了5.3%和8.8%。 国际贸易新业态新模式蓬勃发展 我国对外贸易之所以能交上令人满意的答卷，重要的推动力量之一便是外贸新业态新模 式的蓬勃发展。近年来，我国外贸创新能力持续增强，外贸新业态新模式活力充沛，形态多 样。一是网络信息等新技术、新工具孕育产生了跨境电商；二是传统业态转型升级，形成了 市场采购贸易；三是贸易分工进一步细化，外贸综合服务企业等新型主体深受市场欢迎，离 岸贸易也同总部经济在同步成长；四是各类业态之间融合发展，外贸功能进一步集成联动。 跨境电商、市场采购、外贸综合服务企业、保税维修、离岸贸易、海外仓等新业态新模式， 成为传统外贸模式的重要补充。例如，传统的一般贸易与跨境电商结合，形成了B2B2C的海 外仓模式，终端配送服务效率的快速提升，也带来了更好的终端客户体验；市场采购这一业 态开辟了出口的新渠道，在政策支持下，解决了商户、中小微企业从事外贸“不会干”“干 不起”“不愿干”的问题，吸纳了越来越多的国内贸易主体成为外贸的主力军，并与跨境电 商等新业态融合发展，优势互补；保税维修这种业务形态，也正处于规范成长和发展过程中。 力争实现更高质量贸易发展 尽管我国对外贸易在2020年取得了较好的成绩，但疫情变化和外部环境存在诸多不确 定性，我国的外贸发展依然面临困难和挑战。新的一年，我们要不断开拓创新，巩固良好成 绩，实现更高质量的贸易发展，推动国民经济的全面高质量发展。 重视研发、推动创新，加快对外贸易的转型升级。传统行业要巩固已经在全球价值链中 确立的优势地位，提高产品竞争力，维护出口市场份额，并进一步开拓市场。而解决外贸领 域核心中间产品受制于人的问题，不仅涉及对外开放领域本身，还涉及全社会的自主研发能 力。未来我们应更加重视基础科学、加大研发投入，争取产出更多原创性领先技术。 积极参与并利用好新型自由贸易协定，推动企业更好地参与国际分工。中央经济工作会 议提出，要积极考虑加入《全面与进步跨太平洋伙伴关系协定》。同时，我们要通过运用好 《区域全面经济伙伴关系协定》《中欧投资协定》等重要协定，大力开拓东盟、日韩、澳新 等区域市场，进一步加强同“一带一路”沿线国家的贸易合作。 加强自由贸易试验区和自由贸易港建设，增强对外贸易发展的内生动力。要主动适应国 际经贸规则重构新趋势，充分学习借鉴国际先进经营方式、管理方法和制度安排。加强内陆 沿边地区口岸和基础设施建设，开辟跨境多式联运交通走廊，发展外向型产业集群，形成各 有侧重的对外开放基地，提高边境经济合作区、跨境经济合作区发展水平，力争形成全方位、 多层次的立体对外贸易发展新格局。 (1)什么是一般贸易与加工贸易，二者有何异同(4分) (2)什么是“市场采购贸易”?你还知道哪些创新的贸易形式?(4分) (3)综合保税区、自由贸易试验区、自由贸易港三者的异同(4分) (4)中国对外贸易在疫情之下逆势增长的原因? ( 8 分 )","knowledge":["国际贸易理论","国际贸易政策","跨国公司与国际化","中国对外经济","国际商务管理"]},{"id":"2022_10","year":2022,"num":10,"type":"案例","question":"文化整合——联想与IBM公司的并购管理 联想集团有限公司成立于1984年，主要生产台式电脑、服务器、笔记本电脑、打印机、 掌上电脑、主机板、手机等商品。1996年开始，联想电脑销量位居中国国内市场首位。2004 年12月，联想与美国国际商用机器公司 ( International Business Machine,IBM) 达成收 购协议，并购IBM公司。联想“以蛇吞象”式海外并购一度引起各界热议，成为中国企业走 出去收购西方跨国公司的经典。然而，并购后的文化管理却成为新联想面临的难题。","answer":"【文化差异】 中国和美国各自的民族文化存在巨大的差异， 这种差异也在联想集团和 IBM自身的企 业文化中有着鲜明的体现。 一是决策方式的差异。在IBM的企业文化中，上下各部门只有分工不同，老板和下属地 位平等，一视同仁。在纽约州阿蒙克的 IBM 公司里，每间办公室，每张桌子上都没有任何 头衔字样，没有主管专用餐厅，每个人都同样受到尊敬。为了听取员工的意见，做出民主 的决策， IBM 设立了四条双向沟通的通道：与高层管理人员面谈、员工意见调查、直言不 讳、申诉。IBM 这种民主的决策方式充分体现了美国低权力距离的民族文化特征。 联想集团具有权力集中的特点，“官本位”在联想集团的决策方式上体现为“唯上现 象”,在决策会议上， 发言顺序和发言内容都很有讲究，先是与讨论问题相关的高级副总 裁、 副总裁、助理总裁依次发言，最后是总裁定调，会上大家都要从对方的话语和语气上 揣测对方的意图。联想的决策方式是“上级下命，下级执行”。这种决策方式时间短，面对 外部变化的反应速度快，但很难听到基层的声音，高层管理者的决策也无法真实地代表员工 的意志。有报道称，有不少联想在美国招聘的有美国教育背景的中国员工和接手的前 IBM 员工在为联想工作三个月后纷纷辞职，这正是这种决策方式的冲突导致的一种不良影响。 二是管理理念的差异。“以人为本”是 IBM 企业文化的精髓，这也体现了美国民族文 化推崇个人主义的特点。IBM 尊重员工的个人利益，重视他们的价值和人性需要， “从不 因钱而失去一位好职工，任何一位付出辛勤劳动的员工也不会因为得不到适当的物质奖励 而感到失望。”其次，自由的工作环境也是IBM 企业文化的一大特点， 员工都习惯于美国 硅谷那种灵活松散的工作作风。IBM 的人才理念中指出公司需要“野鸭子”一被驯化的野 鸭子就失去了它的野性。IBM视每一位员工为公司增值的重要财产，让他们独当一面。IBM 就 是要千方百计地避免驯化员工，给员工宽松自由的工作环境，让他们发挥个性。 联想管理理念最突出的特点是规范、标准、纪律严明。联想创始人柳传志一直提倡联想 的“家文化”,老一代企业家像家长一样。以强大的管理权威成为企业的象征和勿庸置疑的 权力制高点，所有的人就像家族成员一样感受‘慈父’关怀的同时，必须服从‘严父’的 教诲和权威，不仅对成员的工作进行管理，对员工个人行为也进行细致的关注和规范。对新 员工的培训， 联想形象地称为“入模子”。“它的原理是不管你原来是方的还是圆的，到 我这来就用一个统一的模具，强行压制成一模一样的一堆坯子来。联想对员工的严格要求无 孔不入，连什么时候可以换夏装，都要由公司发文决定，“一切行动听指挥”,这种严格的量 化管理可操作性强，整齐划一的要求强化了员工的集体意识，但又在一定程度上抑止了创新 精神，公司工作氛围过于僵化。 【新联想文化】 新联想能否顺利实现文化融合影响着联想的跨国并购及重组的成败，也是关系新联想能 否在海外市场站稳脚跟的重要一步。 事实上，新联想两部分的企业文化都处于成熟阶段，且已根深蒂固，并取得了巨大的成 功。如此一来，新联想文化整合只有采取隔离模式了，即在整合后的新联想中同时保留联想 IBM的优势文化，实行“一企两制”允许它们保持自己的特色、个性以及相互的独立性。这 种整合形式遇到的阻力会相对较小，但这对新联想管理层的协调和沟通能力提出了较高的要 求。联想和 IBM 在并购前双线独立运行，双方的人员没有真正在一个架构下工作的经历。收 购后联想并没有将公司的整体架构进行大规模的整合，从形式上依旧保持了分开运行。在文 化的整合当中，联想是以比较低的姿态出现。 一向强硬的联想原CEO杨元庆退居了二线，将 CEO让给了来自IBM的沃德，这是在一般收购案中比较少见的收购方不担任CEO的情况。不 仅如此，在比较重要的职位上，来自IBM的人占据了多数，联想的人员基本上还是负责中国 业务。这一方面反映了联想缺少国际管理人才。柳传志对于整合强调最多的是不要引起争斗， 他的态度是调和，为了稳定这个目的，联想甚至可以妥协一些。 联想公司的做法达到了稳定IBM 原有人才的目的，在短期内完成了整合，2005年11月 联想集团第一阶段的整合工作已经顺利完成提前步入了以获得盈利增长为目标的第二阶段。 在业绩方面联想集团成功地保留住客户，有效地激励员工获得了世界级的产业规模和更大的 协同优势。 长久看来，两种文化并存的模式并不是解决并购后文化整合的治本之策。杨元庆在多个 不同的场合说过：“一个‘大杂烩’的公司不可能成为一个伟大的公司，联想在中国成功的 文化基础和业务模式基础是联想未来的根。”取联想和 IBM 两家文化所长，通过两种文化的 融合来生成“第三文化”,并诞生新联想的文化，文化融合成为新联想的重要任务。 在融合过程中，联想提出“坦诚、尊重、妥协”的六字方针，并且将 IBM 讲究创新、 尊重员工、服务客户、追求卓越等因素吸收进来。另外，联想为树立统一的价值观，放弃部 分中国特色的企业家习性，倡导职业化和职业精神。关于联想文化融合比较有说服力的例子 发生在2006年6月，联想启动“文化鸡尾酒”活动，在联想内部讨论提高中国团队的国 际化能力、加强同国际同事沟通等方面的问题，这项活动一直延续至今，并发展为多形式、 多领域的讨论与沟通，许多联想老员工的工作心态和方式都发生了很大的转变。并购之后， 在第一任 CEO 史蒂夫 ·沃德 ( Steve Ward) 离职、第二任CEO 威廉 · 阿梅里奥 ( William Amelio) 接替之后，联想将自身的文化与 IBM 文化、戴尔文化三者合一，融合成“赢文化”, 所有人都为联想的国际化成功积极行动，乐于沟通和分享。杨元庆说：“这就是我们的源泉， 也是我们对未来的信心所在。”2009年杨元庆重回 CEO 的位置之后，联想重新追寻“根文 化”, 提倡“说到做到，尽心尽力”。。 人大国商历年真题(可模拟用) 招 财 猫 国 商 考 研 编 写 ， 请 勿 盗 用 (1)运用霍夫斯泰德文化维度理论，分析中美两国企业的文化差异(10分) (2)“新联想文化”理念体现了文化整合的什么原则?(10分)","knowledge":["跨国公司与国际化","国际商务管理"]},{"id":"2023_1","year":2023,"num":1,"type":"简答","question":"简述“竞争中性“规则对中国对外经贸合作的影响","answer":"","knowledge":["中国对外经济"]},{"id":"2023_2","year":2023,"num":2,"type":"简答","question":"今年以来，美联储加息过程中，人民币兑美元出现一定程度的贬值，但是人民币汇率指数 (CFETS) 稳定。如何解读这一现象?","answer":"","knowledge":["国际金融","中国对外经济"]},{"id":"2023_3","year":2023,"num":3,"type":"简答","question":"什么是区位经济(Location economies)?( 5 分)。哪种组织形式和经营战略能够实现 区位经济?(5分)","answer":"","knowledge":["跨国公司与国际化"]},{"id":"2023_4","year":2023,"num":4,"type":"简答","question":"全球价值链( Global Value Chain) 存在的原因是什么?(5分)新冠肺炎疫情对全球 价值链有什么主要影响?(5分)","answer":"","knowledge":["中国对外经济"]},{"id":"2023_5","year":2023,"num":5,"type":"简答","question":"简述外商直接投资负面清单的含义及其对全球经济的影响。","answer":"","knowledge":["中国对外经济"]},{"id":"2023_6","year":2023,"num":6,"type":"论述","question":"运用要素价格均等化的有关定理，说明中国产品的竞争优势和变化趋势","answer":"","knowledge":["国际贸易理论"]},{"id":"2023_7","year":2023,"num":7,"type":"论述","question":"利率计算 (1)开放经济条件下，A国第一年一年期平均年化利率6%,同期B国一年期平均年化利率 为2%。你认为，哪个国家通货膨胀率水平更高?两国通货膨胀率的差额是多少?(5分)如 果一价定律成立，长期看来，两国货币的汇率会发生什么变化?( 5 分 ) (2) A国第一年平均年化利率同第(1)问不变，已知A国两年期平均年化利率7%,根据利 率期限结构理论，A国第二年平均年化利率为多少?(10分)","answer":"","knowledge":["国际金融"]},{"id":"2023_8","year":2023,"num":8,"type":"论述","question":"贸易谈判 (1)如果两国各自独立制定贸易政策，他们将会选择什么政策?(5分) (2)如果两国可以通过贸易谈判对贸易政策进行调整，又将会采取什么政策? ( 5 分 ) (3)根据以上推理过程说明 WTO 多边机制在推进贸易自由化过程中所发挥的作用。(5 分 ) (4)当前 WTO 多边机制面临的困境如何解决?(5分)","answer":"","knowledge":["国际贸易政策"]},{"id":"2023_9","year":2023,"num":9,"type":"案例","question":"中国正在成为跨国公司的研发创新中心。 (参考资料： ①《<中国外商投资发展报告(2022)>:中国实际使用外商直接投资在结构调整中稳步增长》, 商务部，2022年12月 ② 《关于进一步鼓励外商投资设立研发中心的若干措施》,商务部，2022年1月) 随着中国创新能力的提升和创新环境的优化，越来越多的创造资产寻求型外国直接投资 (FDI) 进入中国市场。2012年至2021年，高技术产业吸收外商投资占比从2012年的14.1% 上升到2021年的30.2%,规模以上外商投资工业企业研发投入从1763亿元增加到3377亿","answer":"元，增长91.5%。数百家跨国公司陆续在中国建立研发中心，中国正在成为新的全球创新高 地。 外资研发中心的研发投入资金和人力都不可少，以医药企业默沙东为例，2022年它在 中国有1700名研发人员，位居同期中国本土医药企业前十。麦肯锡 Mckinsey 最近一份报 告显示，去年，制药公司在中国的研发投入超过20 亿美元，报告称中国研发基地的开设和 增长速度几乎与欧美研发基地关闭或缩减的速度一样快。 美国科技巨头苹果公司在北京和深圳均设立研发中心，苹果发言人罗森斯托克表示，研 发中心的设立使我们的工程团队和制造伙伴更紧密地合作，深圳中心与北京中心还旨在加强 与当地合作伙伴和大学的关系，以支持全国各地的人才发展。富士康是苹果公司最大的代工 厂，其郑州制造中心占全球 iPhone 产能的近一半，中国研发中心与制造中心的结合，将有 效降低苹果公司的综合成本。 德国汽车制造商戴姆勒公司计划在北京建立第二个研发中心，以帮助加速梅赛德斯奔驰 车型在中国本土化，戴姆勒在一份声明中表示，新的技术中心将位于戴姆勒在北京的发动机 和汽车组装中心附近，中国是全球最大的汽车市场，也是戴姆勒在全球最大的单一市场，“我 们仍然看好中国进一步增长的市场机会，并将继续在这里投资”。 不仅如此，外资研发中心的战略定位也在发生转变，曾经跨国公司研发中心的主要目标 是“ in China for China”, 如今越来越向“in China for Global”的目标延伸，强调利 用中国研发中心服务其全球竞争力提升。 (1)跨国公司在中国建立研发中心的原因有哪些?(8分) (2)跨国公司研发中心的设立对中国市场有哪些影响? ( 6 分 ) (3)从广义来看，跨国企业在新兴经济体(不限于中国)建立研发中心有哪些机遇和挑战? (6 分 )","knowledge":["跨国公司与国际化"]},{"id":"2023_10","year":2023,"num":10,"type":"案例","question":"数字化转型 近些年，我国贸易数字化进程明显加速，2021年我国跨境电商综合试验区达到132个， 以跨境电商为代表的数字化新外贸正在成为外贸业态创新中最具活力的部分和外贸增长的 新引擎，以某公司为例，该公司作为服装制造业的龙头企业，在传统制作行业里走出了属 于自己的独特发展之道。2005年在国际资本上市后不久，公司立即投入大量资金用于提升 技术与模块化生产，正是由于率先采用国际前沿3D 数字化技术，某品牌样品开发周期缩 短了60%,通过数字化赋能建设多元化的生态基地，企业不断采用新技术提高自动化程度， 提高劳动生产率，通过产业链数字化及作业流程标准化，该公司国内基地能为海外工厂建 立管理共享模式，以发挥国内基地人力资源优势，减轻海外工厂的管理压力，依托数字化 生产管理的预警功能和信息反馈实时性，企业的快速反应能力也得到显著提升，在线上平 台持续上升的趋势下，企业与客户、供应商的信息交换与互动得到进一步加强。该公司通 过数字化赋能， 供应链的创新能力，加速反应能力，和供应链的稳定性显著提高，疫情干 扰下，该公司仍然实现了较好的经营业绩，请回答下列问题。","answer":"(1)何谓数字化转型?企业为什么要进行数字化转型?(每问3分，计6分) (2)何谓生产型外贸企业?它与贸易型外贸企业有何不同?(每问3分，计6分) (3)你认为该公司数字化转型有何示范意义? ( 8 分 )","knowledge":["新兴议题","国际商务管理"]}];
