口低质量产品。\n③   理论评价 贡献：\nA.   新 H-O 模型对 HO 模型的假设前提的调整，在对传统贸易理论的最小偏离下，解释了 垂直型差异产品的产业内贸易现象。\nB.    如果考虑到非熟练与熟练工人、体力和智力劳动、简单和复杂劳动的差异，即存在人力 资本这一要素的区别，则新H-O 模型仍然具有相当的适用性。\n缺陷：存在手工制作的高质量产品，而且目前的趋势是手工制作产品的价格更高。\n(2) HO 模型不能解释产业内贸易现象。\nHO 理论即赫克歇尔、俄林提出的要素禀赋理论，HO 理论认为， 一国应生产并出口相 对密集使用其相对丰裕要素生产的产品，进口相对密集使用其相对稀缺要素生产的产品。\n产业内贸易指贸易双方进出口同类产品的贸易，又称为重叠贸易。20世纪60年代以来， 产业内贸易和发达国家之间的贸易越来越多，成为国际贸易两大新现象。HO 模型不能解释 产业内贸易，原因在于：","knowledge":["国际贸易理论"]},{"id":"2017_9","year":2017,"num":9,"type":"案例","question":"互联网+图书【小鹿学姐考试回忆版】 过去是作者出书，读者读书，传统出版社处境艰难，最好的形式就是办读书会、签售会 这样的方式，成本高效率低。现在出版商通过互联网把二者链接起来，比如作者给读者留作 业，读者可以通过扫描二维码来获得增值服务，或者获得与作者直接交流的机会，一般书上 包含80%的内容，通过微信等网上渠道可以获得另外20%的内容。 (1)什么叫“互联网+”?(2分) ( 2 ) 根 据 4P 理论对图书产品营销提出建议。 ( 9 分 )","answer":"过去是作者出书，读者读书，传统出版社处境艰难，最好的形式就是办读书会、签售会 这样的方式，成本高效率低。现在出版商通过互联网把二者链接起来，比如作者给读者留作 业，读者可以通过扫描二维码来获得增值服务，或者获得与作者直接交流的机会， 一般书上 包含80%的内容，通过微信等网上渠道可以获得另外20%的内容。\n(1)  什么叫“互联网+”?(2分)\n“互联网+”是指传统产业依托互联网，改变传统经营模式，实现互联网和其他行业的深 度融合，进而提高传统产业的生产效率，推动传统行业转型，促进产业结构调整升级。“互联网+”是一种新的经济形态，2015年政府工作报告提出“互联网+”行动计划，在经济 新常态背景下，互联网+能够为中国经济创造新的增长点。\n(3)  结合案例，探讨出版业的商业模式创新，除了案例提到的，谈谈你的理解。(9分)\n熊彼特创新理论提出，创新就是建立一种新的生产函数，即把一种从未有过的生产要素 的新组合引进到生产体系中去。创新有五种模式：产品创新、技术创新、市场创新、组织创 新和资源配置创新。基于“互联网+图书”的商业模式创新是图书行业资源和要素的重新组合 与配置，具体表现在：\n①互联网+图书产生了更多的阅读内容，更多的作品能够被关注和出版，丰富了出版产品；\n②发掘了新的图书市场，更多出版书籍能够在线上线下渠道销售，扩大了市场边界；\n③  重构了出版社、书店、作者、读者之间的关系，创造出更大的行业价值；\n④出版业的变革呼吁新的组织形式，如出版商、电商平台之间合作更加密切。\n总之，“互联网+图书”模式能够提高行业运行效率，促进行业繁荣。消费者也能够获得多 样化的阅读产品和增值服务，消费者福利得到提高。然而，“互联网+图书”的商业模式也面临 一系列发展问题和瓶颈。\n①这一模式依托互联网基础设施，如大数据平台、APP 终端，图书行业很难实现高度信息 和数据的互通，制约了图书行业与互联网的结合；\n②必须大规模投入资金扩大影响，增加用户数量获得流量，如果盈利模式和发展规划不合 理，反而会造成资源的浪费；\n③ “互联网+图书”的模式会衍生新的问题，如传统出版和网络文学的产权纠纷，出版商、 电商平台之间的利益纠纷，需要新的制度加以规范完善；\n④  商业模式创新的结果可能是垄断，随着竞争加剧，规模大、竞争力强的出版企业会赢者  通吃，而不能充分利用互联网的中小出版社可能退出市场；垄断反而会降低消费者福利。 因此，社会应当鼓励出版业商业模式创新，也要推动互联网时代图书行业的健康发展。\n①生产者角度：互联网为传统行业赋能，新的资源组合提高了生产效率，产生了新的盈利 模式和盈利空间，能获得超额利润。\n②消费者角度：有助于获得更加便捷的服务和优质多样的产品，增加消费者福利。(如果 没有图书行业的繁荣，则不会有丰富的各类读物，如果没有共享单车，则不会有“最后 一公里”的便利，如果没有美团，就没有送餐和各类服务。)\n③  资源配置角度：充分利用闲置资源，优化整个社会的资源配置；生产能力提高使供给曲 线向外平移，增加额外需求使需求曲线向外平移，因此提高了整个社会的福利水平。\n④宏观经济角度：“互联网+”模式创新出现会吸引投资，行业繁荣，就业增加，经济增长， 即熊彼特经济周期理论描述的内容。\n商业模式扩张和“烧钱大战”的逻辑在于：模式创新促使要素重新配置，新的商业机会出现 →规模扩张，产生网络效应，积累客户和市场→达到一定规模，排挤竞争者，产生垄断和进 入壁垒，获得垄断利润(“马太效应”)。尽管材料没有提及，但如果把出版社延伸到售书、 听书、读书平台，当当网、喜马拉雅和微信阅读也有类似情况。因此，互联网模式存在相应 的问题，表现在如下方面。\n①网络基础设施：互联网+建立在云计算、大数据、APP 和客户终端基础上，必须要有对 应的资源和平台及基础设施的跟进，而现实中这些资源并未完全互通。比如，很多人不 会或不习惯使用网络阅读渠道，出版社并不能充分接触消费者；阅读数据归平台所有而 不是出版社所有，出版社无法利用互联网数据。\n②模式迅速扩张会浪费资源：模式更新需要大量资金投入，同时，吸引新的竞争者进入， 蓝海变为红海，如果规划不合理，则造成资源浪费。\n③互联网+的结果是寡头垄断：互联网+背景下资源和市场不断整合，最终输家出局，保留 少数寡头，形成“马太效应”。(移动支付领域的微信和支付宝，网络视频领域爱奇艺、 优酷和腾讯，手游领域网易和腾讯，短视频领域抖音和快手，外卖领域饿了么和美团， 诸如此类)寡头垄断市场结构厂商拥有一定定价权，消费者需要付出额外价格，损害消 费者福利，这是外卖和APP 打车越来越贵的原因之一，反应在“互联网+图书”领域，  付费阅读内容也可能越来越贵。\n④产权制度和伦理问题：商业模式会伴随产权和伦理层面的灰色地带，比如网络图书的版 权归作者还是腾讯平台?再如，丰巢快递柜不经用户许可就收费是否合理?根据科斯定 理，政府和社会应当不断完善制度让产权明晰，降低交易成本，这样才能推动行业健康 发展。\n⑤  社会治理难题：传统治理方式制约互联网经济发展，图书出版建立在一种“审批制”的 治理思维下，图书出版要层层论证并报主管部门批准，效率低下。很多传统行业存在类 似问题，政府部门怕担责，互相推诿，不利于互联网为传统行业赋能。\n⑥  重要前提：商业模式成功必须建立在盈利模式正确的基础上，消费者的需求价格弹性足 够小(“刚性需求”)。比如，出版社利用互联网营销图书，但如果取消对读者的奖励或 补贴，读者就不买账了，那么这种模式很难最终获利。\n以上是互联网+的答题角度，把“互联网+图书”换成“互联网+任意行业”,都能找到类似的 要点，供思考吸收。\n和案例题逻辑基本一致：生产者提高生产效率获得超额利润，消费者享受更多商品与服务， 社会优化了教育和医疗资源、提高了福利，行业获得了增长动能、投资增加而行业繁荣。问 题在并没有真正建立起广泛普及的“云、网、端”,扩张可能浪费资源，产生产权纠纷和社 会治理问题。\n共享单车比较符合近几年商业模式创新的规律：模式出现→烧钱大战→激烈竞争，剩下少数 赢家(青桔、摩拜、美团)。考互联网+方向的同学尤其要理解类似逻辑，复试出现概论高。 案例总结：案例主题是“互联网+”。建议三问都结合“互联网+”作答，关键应理解互联网 对 传 统 行 业 的 影 响 、 互 联 网 是 如 何 促 进 图 书 行 业 变 革 的 。","knowledge":["新兴议题","国际商务管理"]},{"id":"2017_10","year":2017,"num":10,"type":"案例","question":"宝洁是否老了? 始创于1837年的宝洁公司，是世界最大的日用化学品公司。上世纪八九十年代，是宝 洁扩张最激烈的时期，对外并购成为公司常态不断推陈出新的产品，随之而来的是商业上的 巨大成功。1980年，宝洁150年大庆在即，公司为迅猛的发展做好准备。通过收购 Norwich Eaton 制药公司(1982), Rechardson Vick 公司(1985),公司活跃于个人保健用品行业；80 年代末90年代初又收购了Noxell, 密丝佛陀，Ellen Betrix公司，宝洁在化妆品和香料行 业扮演着重要角色，这些收购项目加快了宝洁全球化的进程，为了充分发挥跨国公司的优势， 宝洁建立了全球性的研究开发网络，研究中心遍布美国、欧洲、日本、拉美等地。2005年， 宝洁公司收购了吉列( Gillete), 开辟了男士剃须用品市场，也是宝洁公司历史上最大的一 次收购，自此，宝洁打造出囊括美容美发、居家护理、家庭健康用品等领域的最全的产品线。\n\n(3)请对宝洁在中国的经营提出建议。(5分)引入波士顿矩阵分析宝洁在中国的经营管理。波士顿矩阵的横轴是市场占有率，纵轴是 市场增长率，建立2×2的四象限矩阵。","answer":"始创于1837年的宝洁公司，是世界最大的日用化学品公司。上世纪八九十年代，是宝 洁扩张最激烈的时期，对外并购成为公司常态不断推陈出新的产品，随之而来的是商业上的 巨大成功。1980年，宝洁150年大庆在即，公司为迅猛的发展做好准备。通过收购 Norwich  Eaton 制药公司(1982), Rechardson Vick 公司(1985),公司活跃于个人保健用品行业；80 年代末90年代初又收购了Noxell,  密丝佛陀，Ellen Betrix公司，宝洁在化妆品和香料行业 扮演着重要角色，这些收购项目加快了宝洁全球化的进程，为了充分发挥跨国公司的优势， 宝洁建立了全球性的研究开发网络，研究中心遍布美国、欧洲、日本、拉美等地。2005年， 宝洁公司收购了吉列 ( Gillete),开辟了男士剃须用品市场，也是宝洁公司历史上最大的一\n次收购，自此，宝洁打造出囊括美容美发、居家护理、家庭健康用品等领域的最全的产品线。 2008年，宝洁公司是世界上市值第6大公司，世界上利润排名第14的公司。\n它同时是财富500强中第十大最受赞誉的公司。1987年，正值公司成立150周年纪念 之际，宝洁公在广州成立了在中国的第一家合资企业—广州宝洁有限公司，从此开启了其中 国业务发展的历程宝洁大中华区总部位于广州，在广州、北京、上海、成都、天津、东莞及 南平等地设有多家分公司及工厂，员工总数超过七千人，在华投资总额超过十七亿美元。二 十多年来，宝洁在中国的业务发展取得了飞速的发展，宝洁公司是中国最大的日用消费品公 司。海飞丝、飘柔、舒肤佳、玉兰油、帮宝适、汰渍及吉列等品牌在各自的产品领域内都处 于领先的市场地位，中国宝洁是宝洁全球业务增长速度最快的区域市场之一，宝洁大中华区 的销售量已位居宝洁全球区域市场中的第二位，销售额也已位居第四位。伴随着公司的业务 发展，宝洁的中国员工得到了迅速的成长，如今，在宝洁大中华区，越来越多的中国籍员工 担任起重要的管理职位，中国籍的员工占员工总数的98%以上，宝洁大中华区已成为向宝洁 其他市场的人才输出地。无论是在品牌输出、业务增长以及人才培养上，宝洁都取得了突出 的成就。\n然而，近几年，宝洁却渐渐显出苍老迹象。这只巨无霸，不再对市场敏感，不再及时满 足消费者需要，变得笨重和反应迟缓。数据不会骗人，自2012年以来，宝洁的收入维持在 800亿美元左右，几乎增长停滞；去年更是同比下跌了5.3%,收入只有762.8亿美元。其实 从2009年来，宝洁的净利润在大部分时候就是下滑的，2015年更是暴跌39.5%至70.4亿美 元，这水平“瞬间”倒退了十年以上2006年宝洁的净利润可是有86.8亿美元。如今的宝洁，\n在深耕多年的中国也遭遇了前所未有的困境。由于移动互联网、大数据、电子商务快速发展， 人们的个性化需求逐渐被唤醒，越来越多的小众化产品开始满足不同人群的需求，消费者选  择的空间越来越大，加上中国本土品牌强势崛起，日韩日用品逐渐打入中国市场，竞争对手  在不断蚕食宝洁的地盘儿。直接表现就是旗下所有产品在中国市场的销售量均出现下降，旗  下5个重要的品类甚至出现了双位数跌幅。与此同时，宝洁也频频传出高层被中国企业挖角 的消息。宝洁CEO大卫 ·泰勒终于开始承认错误：宝洁一直把中国当成一个发展中市场，而  实际上中国已经成为全世界消费者最挑剔的市场。面对这一切，宝洁并非无动于衷，采取了 各种自救措施，比如4次更换CEO、裁员、砍掉一百多个小品牌、削减广告预算等，包括  转向电商渠道、利用社交网络进行营销，不遗余力地力挽颓势，然而在中国市场的业绩仍未  见进展。只是，宝洁的沦落真得只是因为世界变化快而看不明白吗?消费者变得越来越精明， 可以选择的商品也越来越多，可以比较的越来越多，而在这比较当中，宝洁的口碑越来越差。 到底是消费者变了还是宝洁老了?\n(1)宝洁在全球扩张的主要方式是什么?宝洁昔日成功有什么意义?(5分)\n宝洁全球扩张的主要方式是跨国并购。宝洁自80年代开始，通过先后并购 Norwich Eaton、Ellen Betrix、吉列等公司，建立涵盖几乎全部快消领域的最全产品线。跨国并购有 利于宝洁先发制人，快速建立起在全球营运设施，占领市场形成转换成本；以较低的成本进 入新快消领域，扩大产品种类形成范围经济。\n宝洁在中国的扩张方式是合资经营。合资经营有利于宝洁熟悉目标市场政治、经济、 文化等营商环境，分摊市场开发的投资与风险，减小东道政府对自身经营的干预。\n昔日宝洁成功的意义在于获得强大的价值链优势，以 5Cs模型分析：\n① Compete: 宝洁具备较强品牌、技术竞争力，从竞争获得价值；\n② Concentrate: 宝洁建立了完备全球供应商和销售商网络，从集中获得价值；\n③ Capture: 宝洁抓住了一批忠实消费者，从消费者获得价值；\n④ Create: 宝洁能够创造新的需求，从发现新市场中获得价值；\n⑤  Cooperate:    宝洁与不同国家的合作者和政府建立了良好关系，从合作中获得价值。\n(3)请对宝洁在中国的经营提出建议。(5分)\n引入波士顿矩阵分析宝洁在中国的经营管理。波士顿矩阵的横轴是市场占有率，纵轴是 市场增长率，建立2×2的四象限矩阵。\n① 明 星 产 品 ( Star):   具有高增长率、高占有率的特点。宝洁在中国市场缺乏快速增长的 明星产品，在中国市场呈现疲态。因此，宝洁需要进一步挖掘中国快消市场的机遇，加 大对潜力产品的研发，创造明星产品。\n② 问 题 产 品 (Question  Mark): 具有高增长率而低占有率的特点。宝洁推出的高端日用 品存在一系列定位问题，属于问题业务，宝洁应对这些品牌应当做出改进和调整，扩大 市场占有率。\n③ 金 牛 产 品 ( Cash Cow): 具有高占有率而低增长率的特点。目前在中国的快消日用品市  场，海飞丝等产品仍然保持高市场占有率，为宝洁中国贡献了大量利润，属于金牛产品， 针对主体大众日常市场，宝洁应采取巩固策略，防止对手蚕食。\n④ 瘦 狗 产 品 ( Dog):   具有低增长率、低占有率的特点。众多小品牌利润表现差，也没有 呈现增长趋势，属于瘦狗产品。宝洁应缩减这些产品，采取收缩或退出策略。\n解释分析要和案例结合。不会模型则不必牵强附会，正常分析问题并提出对策，不影响整体 得分。营销策略、新产品策略、本土化战略、人力资源和组织管理策略都是思考的角度。","knowledge":["跨国公司与国际化","新兴议题","国际商务管理"]},{"id":"2018_1","year":2018,"num":1,"type":"简答","question":"什么是有效汇率?影响有效汇率的因素包括哪些?","answer":"(1)含义：\n有效汇率指一国货币兑换其他货币的总体汇率水平，用以反映一国货币兑主要贸易伙伴 国货币时以贸易重要性为加权基础的整体汇率水平。通常以一国的主要贸易伙伴在其对外贸 易总额中所占比重作为权数，可分为名义和实际有效汇率。\n①名义有效汇率用公式表示为：E°=∑ E×T/T,     其中，E  表示某国货币的名义有效汇率， E表示某国货币对 i 国货币的汇率，T 和 T本别表示该国同i 国的贸易额和该国的全部对 外贸易额。\n【选答】有效汇率可以用来度量一国货币汇率在国际贸易中的总体竞争力和总体波动幅度， 研究货币危机的预警指标，还可以用于研究一国相对于另一国居民生活水平的高低。\n②实际有效汇率是用本国和国外物价水平对名义有效汇率进行调整之后的有效汇率，反映 一国在世界市场上成本或价格竞争力的变动。公式表示为： Er=EnPf/Pd,    其 中 ，Er° 是 实际有效汇率，Pf 为外国物价指数， Pd 为本国物价指数。\n【选答】实际有效汇率不仅考虑了一国双边名义汇率的变动情况，而且剔除了通货膨胀对货 币价值变动的影响，能够综合反映本国货币的对外价值和相对购买力。\n【选答】常用的有效汇率指标是国际清算银行( BIS) 的有效汇率指数 ( EER Index)。\n(2)影响有效汇率的因素\n由有效汇率公式可知，本国对各国的汇率水平Ei、作为权数的贸易额之比Ti/T、本国与 外国的通胀水平Pf/Pd都会影响有效汇率。具体影响因素有：\n①财政经济状况是币值的支撑因素。长期来看，高经济增长率会支持本币的升值趋势，进 而影响有效汇率。\n②国际收支是决定汇率走势的基本因素。国际收支改善或顺差，本币趋于升值。\n③利率水平影响汇率的短期走势。短期来看，如果利率升高，资本流入增加，外汇供给增 加，短期内形成货币升值。\n④经济政策。如财政政策影响本国就业和经济增长，货币政策会改变本国货币供应量，影 响本币币值。\n⑤  【选答】有效汇率的货币样本范围选择会影响有效汇率计算方式。\n⑥通货膨胀率影响货币的实际购买力，即本国与主要贸易伙伴国的物价指数之比会影响实 际有效汇率。\n⑦本国与主要贸易伙伴国的双边贸易额会导致有效汇率的计算权数变化。双边贸易额进而 受到两国的经济体量、两国地理距离、贸易互补性、双边贸易政策等因素影响。\n⑧其他因素：战争和突发事件、投资者预期会短期内影响汇率波动\n务》关于有效汇率解释较少，答案选了几段刘元春《国际金融市场和投融资》的解释加深理 解。有效汇率的常见参考是国际清算银行的有效汇率指数，每月更新，2020年5月的人民 币 EER 指数是116.62。\n(2)有效汇率的影响因素和影响汇率的因素有区别，因为本国货币对不同国家货币的汇率 变化不同，如人民币可能对美元贬值的同时对英国货币升值，要进一步考虑将哪些货币纳入 有效汇率计算范围，以及同这些国家的双边贸易额影响。测算有效汇率时，研究人员往往根 据自己的研究目的来选择样本货币范围、变量指标和加权平均数的计算方法及基期，样本货 币范围、变量指标和加权平均数计算方法及基期不同，计算有效汇率也会存在一定差异。","knowledge":["国际金融"]},{"id":"2018_2","year":2018,"num":2,"type":"简答","question":"简述马克思经典学派的不等价交换理论","answer":"“不等价交换”理论从马克思主义国际价值论出发，认为发达国家和发展中国家之间存 在国际不等价交换。理论包括埃曼纽尔的不平等交换论、弗兰克的不发展的发展论和萨米 尔 · 阿明的阶级斗争国际化论。\n(1)   马克思的“国际价值”论是不等价交换的基础。\n马克思认为，商品的国际价值不是由某个国家的平均劳动时间决定，而是由“世界劳动 的平均单位”决定，国际价值是国际交换的尺度。国家间国民劳动强度存在差异，拥有较高 国民劳动强度的国家，所包含的国别价值较低，却可按高于其国别价值的国际价值进行交换； 国家间劳动生产率存在差异，商品所含的国别价值也低于国际价值。国际价值论强调国际交 换应遵循价值规律，又突出这种交换的不等价性，将国际交换和国际剥削联系起来，揭示了 国际不等价交换的基础。\n(2)  弗兰克的不发达的发展论\n弗兰克认为，“未发展”( undeveloped) 是发展以前的阶段，“不发达”(underdeveloped) 是西方发达资本主义控制和剥削的发展，不是发展的“初始”阶段，也不是发展的“传统”阶段， 发达国家经历过“未发展”阶段，但没有经历“不发达”阶段。当代不发达国家“不发达的发展” 现状，并不是由于它们旧有的体制和资本匮乏造成的，而是由不发达的卫星国和发达的宗主   国之间过去和现在经济关系及其它关系发展造成的，归根到底是由世界资本主义体系造成的。\n(3)  埃曼纽尔的不平等交换论\n埃曼纽尔认为，发达国家与发展中国家工资率不同，引起国际间不平等交换。其它条件 一样时，工资水平决定剩余价值率，国民工资率差异导致剩余价值率差异，穷国工资低，可 以提供高剩余价值率。国际交换使部分剩余价值转移到高工资的发达国家，即发展中国家在 世界市场上用本身花费较多时间所生产的商品交换富国花费较少劳动时间生产的商品，不平 等交换实际上是发达国家的劳动者剥削穷国的劳动者。\n(4)   阿明的不平等发展理论\n阿明认为，外围国家对中心国家存在依附，这两类国家间存在不等价交换。发展中国家 生产力低下，在制成品上与发达国家难以竞争，故以生产为世界市场所用的初级产品和原料 性商品为主，出口发达国家；发达国家资本过剩，为追求利润向外输出资本，外围国吸收资 本后发展起来的仍是原料生产行业。由于国际市场价格的原因，外围国家的利润则向中心国\n家转移，从而产生财富的两极分化，中心与外围国家差距日益加大。\n马克思经典学派的不等价交换理论发展了马克思主义剩余价值学说，将其应用于国际交 换领域，指出不合理的国际资本主义体系造成了穷国越穷、富国越富的局面，表达了不发达  国家改变国际经济秩序的诉求。【选答】中国部分学者提出以马克思的国际价值论指导中国  对外贸易，通过国际交换，提高生产效率并节约社会劳动，获得更多的新价值来说明马克思  的国际价值理论是我国发展对外贸易的重要理论依据。\n(2)不等价交换理论是经院学硕选修课发展经济学的课程内容。当年经院国商换了出题老 师 ，H 老师的考试重点都没有出，命题人的研究方向和国商的考试方向不太一致。\n(2)当成单一理论题，完整答马克思的国际价值理论给分很高。另外，单独答伊曼纽尔的 理论也可行，把理论背景(战后自由贸易空前繁荣，但发展中国家和发达国家贫富差距扩大)、 主要假设(劳动无法跨国流动、发达和不发达国家工资率存在差异)、核心思想(富国剥削 穷国)以及评价写清楚。\n普雷维什的中心-外围格局是左翼发展经济学派的经典理论，认为不合理的分工格局形成了  战后的南北差距，外围国家面临贸易条件恶化的局面。中心-外围论和当下的“南北差距”、 “中美贸易格局”问题都有联系，作为国商大纲范围内的理论， 一定要掌握。\n【思考：不等价交换理论对中国国际贸易的启示】\n不等价交换论说明，依照传统贸易理论的分工格局是不合理的，国际交换可能存在着不等价 交换，那么需要通过产业结构调整和技术进步，使得本国产品的国别价值低于国际价值；要 减少对发达国家市场的依赖，着力扩大内需；要改变进出口产品的结构，避免出口产品的低 端 化 ， 警 惕 贸 易 条 件 恶 化 。","knowledge":["综合"]},{"id":"2018_3","year":2018,"num":3,"type":"简答","question":"金砖国家的货币崛起挑战了美元欧元的地位吗?为什么?","answer":"答案一： 金砖国家的货币挑战了美元欧元的地位。\n(1)外部因素：国际货币体系调整是世界经济发展的要求。\n①美元、欧元依然是主要的储备货币，垄断铸币税等好处。布雷顿森林体系解体后，形成 了牙买加体系这一“没有体系的体系”,但国际储备制度以美元为主。美元作为全球本位 货币，美国必须保持经常账户赤字，而新兴经济体保持经常账户盈余，形成全球经常账 户失衡局面。\n② 美元货币政策外溢效应冲击世界经济。美元是全球化货币，但美国货币政策的制定仅着  眼于国内经济，并不关注对全球经济的影响。2008年危机爆发后，美国开启量化宽松， 通过增发美元输出通胀，造成危机全球化。\n③美国在国际货币组织 ( IMF) 中的投票权过大，名义上的国际金融协调机构 IMF并不能\n有效约束发达国家，实际作用有限。\n综之，美元欧元的储备地位不利于世界经济，国际社会对改革货币体系的呼声越来越强， 从而削弱美元欧元的地位。\n(2)内部因素：金砖国家实力增强，货币国际化步伐加快\n金砖国家 (BRICS) 包括巴西、俄罗斯、印度、中国和南非。近年来，金砖国家的总体 实力大幅提升，与此同时，欧美的发展相对趋缓，相对实力下滑。人民币、巴西雷亚尔、俄 罗斯卢布等货币国际化程度提高，挑战了主导货币的地位。表现为：\n①金砖国家发起“去美元化”道路，在经贸合作中更多使用非美元结算，削弱美元本位；\n②金砖国家的货币改革，调整盯住美元的汇率制度，使得收支调节多样化，减少对美元欧 元的依赖；\n③人民币加入特别提款权 SDR 篮子，成为国际储备货币，改变了国际储备制度；\n④金砖国家通力合作，成立金砖复兴开发银行，在国际金融体系中话语权增强。\n(3)尽管如此，金砖货币未来也面临严峻挑战：\n①金砖国家面临经济下行压力，国内改革任重道远；\n②国际经济“黑天鹅”频发，影响金砖货币币值稳定；\n③美联储的政策对金砖货币冲击较大。\n答案二：金砖国家的货币不能动摇美元欧元的地位。\n(1)外部因素：美元强势，美元储备货币的地位稳固\n①美元欧元作为全球储备货币的地位稳固，垄断铸币税等特权。美国保持经常账户逆差格 局发行美元，新兴经济体持有美元外汇储备并购买美国国债，这一 “美元环流”格局是建 立在国际经济分工基础上的，国际分工格局尚未出现彻底改变的迹象，货币格局也不会 从根本上动摇。\n②世界各国持有美元欧元作为储备货币由来已久，更换储备货币转换成本高，除非出现新 的国际储备货币能够成为美元的长期替代品，各国很难将储备资产转化为其它货币。\n③现实情况是，世界未摆脱对美元的依赖，金砖国家为代表的新兴市场也难以走出“美元 强势，本国危机”逻辑。当美联储银根收紧(“加息\"缩表”),美元走强，引起资本回流美 国，新兴市场缺乏资金，需要紧缩财政货币政策，但新兴市场面临经济结构和增长问题， 更需要宽松政策，因此，金砖国家极易受美元政策影响出现货币危机。2017年至2018 年，委内瑞拉、土耳其爆发货币危机，金砖货币均面临对美元的贬值压力。美元强势汇 率走向说明，金砖国家货币短期内未能动摇美元的地位。\n(2)内部因素：金砖国家经济增速放缓，甚至部分陷入衰退\n①一国货币实力是经济实力的体现。尽管过数十年间金砖国家实力相对增强，但近年来金 砖国家增速放缓甚至出现衰退。俄罗斯、巴西经济2015年-2016年出现明显衰退；印 度虽保持较高的增长，但增速能否维持尚且存疑。金砖国家经济增长放缓，进入调整时 期，改革任重道远。\n②金砖国家金融体制不完善。\nA.   金砖国家金融开放程度较低。巴西实行较严的外汇管制，货币未实现自由兑换，中 国也未放开资本账户自由兑换，印度、俄罗斯形式上取消外汇管制，但货币流动还 存在各种限制，金融开放程度制约其货币成为国际货币。\nB.    金砖国家金融市场不够发达，金融体系脆弱。2017年，印度曾大规模废除旧钞， 一度引发金融体系动荡。\n③金砖国家各有诉求，政治上并非一条船，经济难以实现深度货币合作。\nA.   金砖国家地缘上分散在南北东西半球，经济发展水平不同，无法像欧元区一样达成\n货币一体化而增强谈判能力。\nB.    金砖国家政治关系复杂，2017年中印因边境问题爆发紧张局势，2018年巴西右翼\n亲美政府上台，金砖合作面临重重困难。\n综合现实考虑，金砖国家的货币暂且不能动摇美元欧元的地位。\n(2)答案二“无法动摇美元的地位”和近年的实际更加相符，美元走强而新兴经济体货币 走弱甚至出现危机，考虑到金砖国家2015年、2016年的经济表现和币值变化，没有动摇美 元地位的表现。理论支撑是全球经济没有摆脱“美元加息，他国衰退”现状。加息会引起资 本回流美国，导致新兴市场国家缺乏资金。新兴市场本身经济结构性问题较多，2008年危 机又造成全球普遍的不景气，这些国家需要相对宽松的财政货币政策，如果本国央行追随美 联储加息，紧缩的货币政策不利于刺激国内经济，造成增速放缓、失业问题，如果不追随， 则本币大幅贬值、资本外流、不得不动用外汇储备维持汇率稳定——这是国际金融经典理论 “内外均衡冲突”。美联储政策周期与新兴市场政策周期分离越明显，美元对新兴市场的冲 击越大，近年的土耳其货币危机和上个世纪80年代的拉美货币危机都属于类似逻辑。\n(3)答案二的分析还要对金砖国家要有充足了解。巴西和俄罗斯依赖石油等资源出口，近 年陷入衰退，没缓过来；中国从高速增长进入新常态；印度是全球增速最快经济体之一，但 增长方式粗放饱受诟病；而一般同学平常很难关注南非经济。答出这些要求很强的综合素质 和比较丰富的知识储备。\n(4)关于国际货币体系改革，笔记补充了一篇论文观点分析美元储备国际货币体系。①在 美元体系下，美元环流反映世界分工格局，“美元灾”和“美元荒”是两难悖论，国际收支 失衡成为常态；②美元作为世界货币，美国货币政策会引动全球经济，但美联储政策制定仅 关注美国国内，二者无法协调；③IMF是美国的 IMF,美国投票权过大，发展中国家的话语 权不足。这个角度看来，国际货币体系一定要改革，金砖国家将成为推动者。刘元春《国际 金融市场和投融资》有一节讲了“金砖四国”的改革诉求，是比较契合的补充观点。","knowledge":["综合"]},{"id":"2018_4","year":2018,"num":4,"type":"简答","question":"全球治理存在什么问题?“一带一路“为全球治理提供了什么动能?","answer":"(1)全球治理的问题\n当今世界正处于大发展大变革大调整时期，各国之间相互联系和依存日益加深。与此同 时，全球面临治理赤字、信任赤字、发展赤字与和平赤字等严峻挑战，世界经济增长动能不 足，逆全球化涌现，贫富分化日益严重，地区热点问题此起彼伏，恐怖主义、网络安全、重 大传染性疾病、气候变化等非传统安全威胁持续蔓延。全球治理体系亟待变革与完善，人类 社会的治理赤字需要弥补。\n(2)“一带一路”倡议与内涵\n“一带一路”倡议(The Belt and Road) 即“陆上丝绸之路经济带与21世纪海上丝绸之路”, 沿线覆盖欧亚非100多个国家。一带一路秉持“共商、共建、共享”的原则，以和平、开放、 文明、繁荣、创新为目标，实现政策沟通、设施联通、贸易畅通、资金融通和民心相通，打 造命运共同体、利益共同体和责任共同体。\n(3)一带一路提供的动能\n①  一带一路拓展了中国同沿线国家的经贸合作，有助于发展双边贸易、减少贸易壁垒， 实现各国的优势互补，进而增进各国福利。【贸易互利性】\n②  一带一路创造了新的投资机会，促进资本等要素在全球范围的高效配置与使用，为沿 线国家提供了所需的技术、资金和管理经验，带动当地经济增长，推动产业结构调整。\n③一带一路能够完善沿线国家的基础设施，增加就业，提高当地居民的收入，改善民生， 维持社会稳定。\n④一带一路能够推动区域货币合作，扩大人民币作为国际货币的使用范围，减轻沿线各国 对美元储备货币的依赖，优化国际收支和外债结构。\n⑤一带一路倡导开放、包容的新型国际合作范式，充分利用双边和诸边规则，为解决安全 问题、气候问题、地缘冲突提供了新思路与新方案，有助于完善全球治理体系。\n答案二：节选自论文《美国治下的多边贸易体系》。\n(1)全球化失衡是全球治理的问题\n在全球化演进的过程中，逆全球化的现象不断出现。时至2016年，发生了两起引人注 目的重要事件：一是英国脱欧，二是特朗普当选美国总统。这两件事情在西方发达国家的核 心区域发生，是对全球化的深刻颠覆，为全球治理带来了障碍。\n美国主导了当今的全球化，塑造了第二次世界大战后的全球体系，同时塑造了“美国治 下的和平”,特朗普上台后大规模推行贸易保护主义，意味着美国治下的多边贸易体系将面 临解体。英国脱欧意味着欧洲一体化事业的倒退，引发了对欧洲一体化前景的质疑。\n全球化出现逆流是因为全球化的福祉分配不均，国家之间、一国国内各阶层之间出现贫 富裂痕。特朗普应对全球化失衡的方案是接受逆全球化，确保“美国第一”。\n(2)一带一路全球治理的历史使命应该是使全球化均势发展，促进最多数国家的共同发展。\n中国以一带一路为把手丰富全球贸易治理理论，必须要回答的问题是：中国能为解决现 阶段全球性经贸问题提供怎样的公共产品?如何提供这些公共产品?全球治理的公共产品 包括：治理思想、治理目标、治理体系、规则设定等。一带一路贸易治理理论，应伴随一带 一路实践，着力提供有中国答案的公共产品。\n①  一带一路倡议是全球治理嵌入式多边主义的创新应用。一带一路倡议强调通过外交协调 方式使沿线各国的经济发展战略对接。从现有的多边体系中吸取营养，逐渐成长起来成 为一个新型的大区域经济合作。嵌入还表现为一带一路提出和沿线国家的经济发展战 略对接，是对各国主权的尊重，是对各国经济发展模式和道路选择的尊重。\n②一带一路倡议采取了差异化的制度构建路径。一带一路的制度构建路径与这种强势国家 主导型的路径有所不同，中国的准确定位就是核心倡导者。从制度构建角度看，一带一\n路更为包容、更为差异化，即先从成员的实际出发，摸索合作的路径，然后再总结出规 则制度。\n③一带一路实践会创造出一批经贸治理新术语。一带一路倡议在全球治理理念上，提出了 “命运共同体”的概念；在全球治理的经济目标方面，提出了“共同发展”,破解了全球经 贸治理的困境，注意到了发展中国家的本质需求。\n(2)全球治理的问题引用的是一带一路高峰论坛和十九大报告(2017年)的说法“全球治 理体系亟待变革与完善，人类社会的治理赤字需要弥补”。每年的国际政治经济形势可阅读 中央经济会议、中央政治局会议等官方文件，里面的提法比较经典。再如，2020政府工作  报告“受全球疫情冲击，世界经济严重衰退，产业链供应链循环受阻，国际贸易投资萎缩， 大宗商品市场动荡”很好归纳了疫情对世界经济的影响。\n(3)解决全球治理问题，需要的不仅是治理机制，也需要解决实际问题，经济增长动能不 足则需要投资贸易消费带动经济增长，解决贫富分化则需要给予共同的发展机会，缩小贫富  差距，解决保护主义则需要多边谈判。\n(4)答案二是本题考点出处经院教授论文，考场上很难把原文观点写出来。但一带一路的 作用都是与国际商务贸易、投资和金融紧密相关的，论文不会则结合国商内容答，影响不大。 审题与思路：表面是两问，问的全球治理的问题和一带一路的贡献，但是隐藏了一个题眼需  要解释“一带一路”的含义和理念。 一带一路的内涵可以放在最前引入，也可放在中间承上  启下。整体而言，这道题多少都有内容可以答，尽管是开放问题，但不算太难，注意增加观  点 的 多 样 性 。","knowledge":["中国对外经济"]},{"id":"2018_5","year":2018,"num":5,"type":"简答","question":"资本资产定价模型 ( CAPM)。","answer":"资本资产定价模型 (CAPM) 由夏普发展马科维茨最优资产组合选择的思想提出，是一  种风险资产的均衡定价理论。该模型对资产风险与其期望收益之间的关系给出了精准的预测。\n(1)模型假设\n①风险厌恶假设，即假设当预期收益率一定时，投资者将选择风险较低的资产。\n②不满足假设，即假设当风险一定时，投资者将选择预期收益率较高的资产。\n③投资者是价格接受者，对资产的期望收益率、方差和协方差的看法一致。\n④存在无风险资产，投资者可以按无风险利率自由借贷。\n⑤所有资产均可以自由买卖，且具有无限可分性。\n⑥投资者在进行证券交易时不需交纳税项，不存在交易费用。\n⑦有效市场假设，即资产的市场价格能反映资产的真实价值。\n(2)主要内容\n该模型认为，当市场处于均衡状态时，资产期望收益率是其β值的线性函数，公式为： E(r)=r+βI[E(r)-r.]\n其 中 ，E(r)      表示资产的期望收益率； r,表示市场无风险利率； E(rm)    表示市场证券组 合的期望收益率， 一般可以某种市场指数的收益率来表示；  βi 表示资产的β系数，反映资产 系统风险的大小。\n【选答】CAPM 计算的期望收益率可以用于贴现率计算、证券定价和资产组合配置等方面。 可以将证券的实际市场价格与均衡的期初价格进行比较，判断该证券是否被高估或低估，做  出投资选择。还能预测市场走势，选择不同β系数的证券或组合以获得较高收益或规避市场  风险。\n(3)模型评价\n优点：CAPM 模型是现代金融经济学的基石\n①  CAPM 简单、明确。它把任何一种风险证券的价格都划分为三个因素：无风险收益率、 风险的价格和风险的计算单位，并把这三个因素有机结合在一起。\n②  CAPM实用性强。投资者依据绝对风险对各种竞争报价的金融资产作出评价，来解决投 资决策中的一般性问题。\n缺点：\n① CAPM的假设前提难以实现。资本资产定价模型要求投资者投资期是单一的、投资者对 价格的预期一致、有效市场，显然这些在现实中是不可能。\n②  CAPM中的β值难以确定。某些证券由于缺乏历史数据，其β值不易估计。由于经济的不 断变化，β值也会产生相应的变化，因此，依靠历史数据估算出的β值指导意义有限。\n(2)重要的得分点是解释 CAPM 公式的含义“无风险利率+β×风险溢价”,对字母代表的 意思要解释清楚，另外β值需要留意反映的是系统性风险。\n二者都是重要的资产定价理论，APT比CAPM更接近实际，放宽了一些假设，区别体现在。","knowledge":["综合"]},{"id":"2018_6","year":2018,"num":6,"type":"论述","question":"新兴经济体对外直接投资的动因是什么?与传统对外投资理论存在什么区别?请结合案 例说明。\n\n(2)和传统投资理论的区别：传统投资理论包括海默的垄断优势论、巴克利的内部化理论、弗农的产品生命周期理论 和邓宁的国际生产折衷理论。\n(2)举例的题目一般举中国的例子，比较熟悉容易讲清楚，“一带一路”的基建投资、华为 等企业的全球投资都有代表意义。格式可以结合每个理论举例，也可以最后单独列小标题举 例。第一问、第二问纯默写，而第三问举例需要组织语言，考虑到先默写全部理论写字的效 率 比 较 高 ， 故 把 举 例 放 在 最 后 答 。","answer":"例说明。例说明。\n(1)新兴经济体的投资动因\n①发挥小规模技术优势。威尔斯的小规模技术论认为，发展中国家拥有在小规模生产技术、 民族产品生产、物美价廉等方面的优势，即使技术不够先进、经营规模不够大，仍然具  有参与国际竞争的动力。拉奥的技术地方化论认为，发展中国家跨国企业的标准化、劳  动密集技术的形成包含企业的内在创新活动，为企业带来了新的国际竞争优势。\n②积累技术和经验，促进国内技术创新和产业调整。坎特维尔和托伦蒂诺的技术创新产业 升级论认为，发展中国家首先在周边投资积累经验，而后向发达国家投资获得复杂技术， 直接投资活动促进技术积累和产业升级，提高发展中国家的工业化水平。\n③扩大市场，实现规模经济。由于发展中国家国内市场有限，追逐国外市场成为企业的重 要目标。在海外设立子公司能够实现规模经济效应，降低成本，规模经济效果大于海外 投资成本，则会产生国际投资；当原材料基地其它生产要素供给源在发达国家，母企业 在发展中国家，也会发生发展中国家向发达国家的直接投资。\n④服务国家利益和国家战略。国家利益优先论认为，发展中国家对外投资有其特殊性，尽  管按照比较优势理论，发展中国家并不具备对外投资的条件，但是为了获得资源转移效  应、产业结构调整效应等更加广泛的综合效益，国家将支持企业进行跨国投资经营活动。\n⑤【选答】对外净投资变化和经济发展水平紧密相关。邓宁的投资发展周期理论认为将投 资周期分为四个阶段，随着一国经济增长，发展中国家从外资净流入国逐渐成为净对外 投资国。发展中国家应充分利用外资，壮大本国经济实力，进而提高对外投资竞争力。\n(2)和传统投资理论的区别：\n传统投资理论包括海默的垄断优势论、巴克利的内部化理论、弗农的产品生命周期理论 和邓宁的国际生产折衷理论。\n①新兴经济体 FDI 理论强调发展中国家具有相对优势而不是传统优势理论认为的垄断优 势，小规模技术等相对优势也是FDI 动机。(依据主流优势理论，国际投资动机在于垄 断优势，但新兴市场并不具备技术、资金、规模经济等垄断优势。)\n②新兴经济体 FDI 理论强调发展中国家拥有的是动态优势和后发优势，发展中国家不是技 术的被动承接者，而是通过主动积累技术和吸收创新，成为国际投资的后起者。(产品\n生命周期认为，发展中国家的技术创新始终落后于发达国家，不具备向发达国家投资创 新产品的能力)\n【选答】数十年来，新兴经济体对外投资的增量占到世界整体增量比重越来高，包括对 发展中国家的投资和对发达国家的投资，包括传统行业和高技术行业。这些都是传统投资理 论无法解释的情形。\n(3)中国是新兴经济体对外投资的代表\n① 上个世纪，中国富商在欧美各大城市投资了大量的中餐馆，服务于华人华侨，也受西方 消费者喜爱。这是小规模技术论的体现。近年，海底捞火锅等中国餐饮企业成功海外上 市，且在英国、韩国、日本等地开设门店，体现了技术地方化的创新过程。\n②中国的通信行业实现了由引进到创新的改变，华为等科技公司通过对外投资，积累形成 了技术竞争力，促进中国产业升级。符合技术创新产业升级论。\n③联想为代表的中国企业，为了扩大产品的海外销量，实现规模经济，在全球建立了生产 和销售网络，不仅对发展中国家投资，甚至也收购美国 IBM公司的个人电脑业务。符 合规模经济论的观点。\n④中国路桥、中国铁建等国有企业到“一带一路”沿线投资基础设施建设，尽管项目收益低， 但能改善基础设施，促进经贸往来，发展双边友好关系。符合国家利益优先论的观点。\n⑤ 【选答】中国在对外开放初期以引进外资为主，是投资净流入国，随着经济发展， 投资 净流入逐渐缩小，最后开始向海外扩大投资，成为投资净流出国，体现了投资发展周期 的特点。\n(2)刘元春《国际金融市场和投融资》归纳的四个发展中国家投资理论是小规模技术、技 术地方化、技术创新产业升级论、投资发展周期，邓宁的投资发展周期虽然是发展中国家直 接投资理论，但其理论重点在于说明动态发展而不是投资动机，可选答。杨大楷《国际投资 学》归纳的是小规模技术、技术地方化、规模经济论、市场控制论、国家利益优先论，18 年商院第一147师姐考试答的这几个理论，参照这个思路比较可取。\n根据邓宁的跨国公司理论，寻求市场、寻求资源和寻求低要素成本能够同时适用于发达国家 与发展中国家的对外投资动机，解释了较发达国家向欠发达国家投资的现象。在新兴经济体 的投资动机中，邓宁无法解释的是发展中国家向发达国家的逆向投资，主要是技术寻求型投 资，但新兴经济体对欠发达地区的国际投资(寻求市场、寻求资源和寻求低要素成本)依然 能够适用。\n从审题技巧看，如果设问单纯问“新兴经济体对外投资的动机”,答寻求资源、寻求市场、 寻求效率、寻求技术，非常契合，正是企业战略管理归纳的答题要点。而如果设问是“发展 中国家和发达国家投资理论的区别”,那么需要结合发展中国家的投资理论分析，这是国际 投资学讲到的。\n(2)举例的题目一般举中国的例子，比较熟悉容易讲清楚，“一带一路”的基建投资、华为 等企业的全球投资都有代表意义。格式可以结合每个理论举例，也可以最后单独列小标题举 例。第一问、第二问纯默写，而第三问举例需要组织语言，考虑到先默写全部理论写字的效 率 比 较 高 ， 故 把 举 例 放 在 最 后 答 。","knowledge":["跨国公司与国际化"]},{"id":"2018_7","year":2018,"num":7,"type":"论述","question":"什么是产品管理?什么是产品创新?企业如何进行产品创新?请举例说明。","answer":"(1)产品管理指跨国公司对产品的上游研发设计、中游生产、下游分销与服务进行全流程、 全周期管理的过程，产品管理有助于企业提高生产效率、提高产品质量、满足客户需求，最  终达到增加企业利润效果。经典产品管理理念包括精益生产管理(6 σ)、及时生产管理(Just   in  time)和柔性生产管理等。\n根据波特的价值链理论，产品管理是价值创造的过程，创造差异化价值V, 或者降低成 本C。产品研发和生产流程的设计，促使产品性能优化和生产流程改进；产品生产能够降低 运营成本，提高产品品质；产品销售能够发现消费者需求和创造差异服务。\n【选答】产品管理需要人员和组织结构支撑：跨国公司可采取产品分部结构，给予不同产品 条线充分的自主决策权。对中高层经理的绩效考核应把产品质量等因素纳入绩效评价体系， 使其重视产品管理活动。\n(2)产品管理是动态过程，随着市场新情况出现，企业需要对产品进行性能改进、工艺调 整、市场再定位，甚至开发此前未出现的全新产品，这就是产品创新。\n熊彼特创新理论认为，创新的实质是对资源要素重新组合，建立新的生产函数，产品创 新指企业为消费者提供不熟悉的产品，是一种创新活动。\n(3)产品创新是指创造某种新产品或对原来产品进行创新。罗伯特 ·库珀对产品创新作出了 定义，认为产品创新可以归为六种类型：全新产品、新产品线、已有产品品种的补充、老产 品的改进、重新定位的产品、降低成本的产品。\n①全新产品：这些新产品是首次投放市场，真正创造了一个崭新的市场。\n②新产品线：这些产品虽然对于市场来说不是崭新的，但是对于特定的公司来说确实是崭 新的。它们使得公司可以第一次进人一个已经建立起来的产品种类或者市场。\n③  已有产品品种的补充：它们对于公司来说是新的，但是它们是公司已经存在的产品线上 可以制造的。它们也可能代表了一种市场上新出现的产品。\n④老产品的改进：这种不算很新的产品是公司现有产品线的一种替代。\n⑤  重新定位的产品：这是指对于已有产品的新的应用，经常包括将现有产品投放到新的目 标市场中或者一种新的应用。\n⑥  降低成本的产品：这是所有新产品种类中最不“新”的一种。它们是用来代替公司现有产 品的产品，但是它们以较低的成本创造了相同的收益和绩效。从市场的观点来看，它们 并不是新产品；但是从设计和生产的角度来看，它们可能代表了重大的改变。\n(4)举例：\n①  特斯拉汽车采用新的技术和材料，开发出电动智能汽车，创造出此前从未有的新型汽车 产品，属于全新产品。\n②  格兰仕成为全球最大的微波炉生产企业，同时空调、冰箱，洗衣机、小家电等白色家电 全线拓展，对于市场来说不是新的，但对于企业来说是新的产品线。\n③  印度制药企业针对欧美市场的新药品推出价格更低的仿制药品，向低端市场销售，占领 仿制药市场的主体，这种仿制是对已有产品的补充。\n④  传音手机调整机型，提供双卡双待、 黑皮肤人脸识别功能，满足非洲客户的特殊需求， 属于改进型新产品。\n⑤  宝洁公司对旗下等高端品牌进行市场再定位，主要面向高端消费者，增加了市场销售收 入而获得成功，属于再定位新产品。\n⑥可口可乐通过加强生产技术，推行全球标准化战略，大大降低饮料生产的成本，使得可 乐的全球生产价格不断降低，属于降低成本的新产品。\n⑦苹果手机不断对iPhone系列手机更新换代，从iPhone 6到 iPhone 11性能不断提升， 是 换 代 新 产 品 。","knowledge":["综合"]},{"id":"2018_8","year":2018,"num":8,"type":"论述","question":"持有期收益率。计算国债收益，三年期年利率4%,不到期提前兑取时，不满6个月不计 息；满6个月不满24个月，扣除前180天的利息；满24个月，扣除90天的利息。投资者 本金10万元，投资200天后提前兑取，计算利息和持有期收益率。(结果保留两位小数)","answer":"计算国债收益，三年期年利率4%,不到期提前兑取时，不满6个月不计息；满6个月不满 24个月，扣除前180天的利息；满24个月，扣除90天的利息。投资者本金10万元，投资 200天后提前兑取，计算利息和持有期收益率。(结果保留两位小数)\n投资200天利息：100000×4%/360×200=2222.22元\n提前兑取利息扣除：100000×4%/360×180=2000元\n即资本损益为-2000元，实际价格为本金1000000\n(利息收入+资本损益)/本金=(2222.22-2000)/100000=0.22%,持有期收益率=0.22%× 360/200=0.4%\n审题和思路：很简单，一步可以算出来。但记得做计算题的原则是答公式及解释，表明自己 学过这个知识点，公式可参考刘元春教材。整套试题最简单的就是这一题，就当年的反馈看， 计算题算错最后基本凉凉，总分不过线了。","knowledge":["国际金融"]},{"id":"2018_10","year":2018,"num":10,"type":"案例","question":"日本7-11 日本的7-11便利店有其经营和发展的独到之处。众所周知，流通行业始终是随着经济 结构、消费生活的变化而变化的。上世纪60年代初至70年代中期，正值日本的经济高速增 长期，日本的超市就是在大量生产、大量销售的背景下，因采取低价位销售的经营措施而得 到了迅速的发展。到了70年代后半期的经济低迷期，随着消费生活的多样化，日本开始出 现24小时便利店。便利店便捷快速的服务能满足人们24小时都在忙碌的需要，受到了日本 国民的热烈欢迎。1969年，第一家便利店诞生，之后短短十几年的时间，便利店在日本迅 速推广。7-11便利店就是其中的佼佼者， 一跃而成为日本最大的24小时便利店。","answer":"日本的7-11便利店有其经营和发展的独到之处。众所周知，流通行业始终是随着经济 结构、消费生活的变化而变化的。上世纪60年代初至70年代中期，正值日本的经济高速 增长期，日本的超市就是在大量生产、大量销售的背景下，因采取低价位销售的经营措施而 得到了迅速的发展。到了70年代后半期的经济低迷期，随着消费生活的多样化，日本开始 出现24小时便利店。便利店便捷快速的服务能满足人们24小时都在忙碌的需要，受到了 日本国民的热烈欢迎。1969年，第一家便利店诞生，之后短短十几年的时间，便利店在日 本迅速推广。7-11便利店就是其中的佼佼者，一跃而成为日本最大的24小时便利店。\n日本7-11是日本大零售企业集团伊藤洋华堂的子公司之一。1973年，伊藤洋华堂与当 时经营7-11便利店连锁集团——美国南陆公司签订在日本开展地区特许经营的合同，将 7-11便利店引进了日本，开始创建适合日本人消费生活习惯的便利店。在伊藤洋华堂的支 持下，1974年5月，日本的7-11开设了特许1号店，当年即有15家加盟便利店开业，经 营额达到7亿日元。一年后，7-11在日本国内的加盟店发展至69家，经营业绩也远胜于美 国。而伊藤洋华堂更是因拓展市场的骄人成绩，入主美国南陆公司并控股70%,成为7-11 品牌的实际控制者。\n便利店的开发需要考虑五个主要因素：店址、时间、备货、便民和管理，日本7-11在 这五方面做得非常出色。7-11便利店平均购物时间仅1分55秒，即一个顾客从进店选购到 选中商品再到结账，整个过程历时不超过1分55秒。7-11拥有世界上最先进的便利店运营 系统，特别是在商品制造和物流配送方面，日本7-11率先在零售业市场创立了联网在线订 货系统和信息分析系统，上千种商品的清单在几秒钟内就能一目了然。\n随着互联网时代到来，便利店模式受到营业面积限制、陈列商品有限，已经无法满足消 费者挑选的需要。但是，日本7-11便利店提前预见到了网络的无形市场潜力，率先转变经 营战略，将市场开拓的重点从有形的店铺市场转向无形的电子市场——电子商务。1999年， 7-11便利店设立名为e-shopping   books的网上书店，以销售图书为开端进入电商领域。2000 年，7-11便利店与索尼等日本跨国公司企业共同组建了“7梦幻”(seven dream)的网络商店，\n销售各类商品和提供服务。凭借这些契机，7-11便利店成功地建立起线上渠道，除了传统 零售业务，在网上还开展了诸多旅行、照相、礼品、票务销售代理、汽车服务、信息提供服 务等电子商务服务项目。\n7-11便利店认识到便利店新的利润增长点一一物流服务。随着电子商务计划的启动， 7-11的业务扩展到物流业，利用7-11强大的零售网络和配送功能为网上商店提供物流服务。 例如，7-11与网络书店合作，令9600多家店铺成为53家网络书店的图书配送处，有力地  保证了图书的及时订货和送货，实现了24小时都能取书的突破，同时也大大减少了组建这  些必要设施的费用。电子商务开展并没有改变消费者对地区性店铺的信任感，相反还给地区  性店铺带来了更多的商机。现在，7-11便利店解决了电子商务的物流问题，顾客通过网络  订购商品，等待商家把货物送至最近的便利店后，再亲临便利店付款并取走货物。这种方式  很符合日本的实际情况。便利店在日本非常普及，无论你居住在什么地方，都可在附近找到  一家便利店，收取从网上订购的货物。7-11日本公司是日本最大的便利连锁店，在市区， 大多数人从家步行5分钟就可找到一家7-11便利店，顾客可以选择附近的任何一家付款取  货。因此，7-11便利店理所当然地充当起了物流角色，开辟物流服务市场使7-11便利店成  为信息时代网络购物的大赢家。\n7-11便利店的电商战略实现了线上线下渠道融合，将成千上万种商品真正搬到网上， 运用“网络”放大其小小的经营店铺，通过线上线下“虚”与“实”的结合，突破便利店商品品种 的限制，将其商品经营范围扩大到几万甚至几十万种。这样，既可以凭借其丰富的商品与便 利的服务和大型商场、超市展开正面竞争，又可以凭借其管理、顾客、物流、信誉等优势与 纯网络商店竞争，从而全面提升自身的竞争力。\n(1)  分析竞争与合作的关系(5分) 竞争与合作是对立统一的关系。\n①竞争创造企业价值并提高社会福利，但排斥合作的竞争最终会陷入“红海陷阱”。波特竞 争优势论认为，企业采取差异化或低成本战略提高自己的竞争能力，扩大企业价值来源， 激烈的竞争使得企业改善经营管理，最终增加社会福利。然而，激烈的竞争最终导致行 业利润率缩减，成本抬高，销售停滞，企业生存艰难，阻碍企业和行业的发展。\n②合作能够实现优势互补，但排斥竞争的合作最终形成垄断，损害社会福利。上下游企业 的合作能释放更强的价值链潜力，同一地域内企业的合作能形成产业集聚，节约空间成 本，强化优势。然而，如果企业联合起来控制市场获得垄断利润，则可能会丧失改善经 营的动力，也会损害消费者福利。\n因此，竞争与合作不能分离，现实中企业常常是既竞争又合作的关系。\n(2)如果没有第二问，则正常分析企业竞争与合作的关系，不需要引用波特理论，更加简 洁 直 观 。 比 如 ：\n(2)至于蓝海具体是什么,比我们的理解更复杂，莫博涅用“十大红海陷阱”说明什么不 是“蓝海战略”:以顾客为导向不是蓝海，开发新技术不是蓝海，创新不是蓝海，低成本和 差异化不是蓝海，进入细分或利基市场不是蓝海。蓝海战略又是对以往很多理论的批判继承， 否定波特理论、熊彼特理论。适度理解蓝海的概念，不必深究。\n(2)举例可用上一个案例的共享单车，共享单车出现时是非常典型的蓝海，虽然它最后重 新 跌 入 红 海 了 。\n(3)  什么是线上渠道与线下渠道融合?谈谈对中国线上线下渠道融合的理解，并举例说\n明。(8分)\n①线上线下融合指企业凭借互联网和大数据平台，依托现代化供应链管理和物流配送，将  传统的线下实体门店和线上互联网电商平台进行整合，为顾客提供商品和服务的策略。\n②渠道融合的意义：\nA.   线上渠道的优势在于获客流量大、范围广、信息传播快，线下渠道的优势在于给予  客户更好的购物体验和增值服务，渠道融合能够将二者优势结合，扩大产品销量。\nB.    消费者能够更加便捷及时地获得商品，为消费者提供了便利；线上渠道增加了消费 者整体购买需求。\nC.   线上线下渠道融合提高了资源配置效率，消费者福利和生产者福利都增加，社会整 体福利提高。\nD.   线上线下渠道融合带来新的投资机会，行业增长繁荣，带动了经济增长。\nE.    特殊时期渠道融合能够畅通供应链，保障物资供应，维持社会稳定。\n③  渠道融合存在一定的风险：\nA.   开辟线上或线下渠道会面临竞争者，若作为渠道后入者，需要付出较高进入成本；\nB.    线上或线下渠道开拓需要投入资金，风险较高；规划和决策失误最终可能使得新渠 道变为沉没成本；\nC.   线上和线下渠道各自为战，没有产生协同效应，运营成本高。\n④中国渠道融合已经具备长足发展，以零售商超为例，渠道融合有三种类型：\nA.   传统的便利店、超市从线下实体渠道向线上电商平台延伸。如7-11、罗森便利店， 和饿了么、美团平台合作提供配送服务，甚至自主开发线上平台提供商品配送。\nB.    电子商务平台从线上渠道向线下实体门店延伸。如京东超市、盒马生鲜，都充分利 用京东或阿里的电商平台的优势，建立线下门店，促使客户的线上线下转化，满足 客户需求。\nC.   特定领域为实现线上线下渠道融合的平台。如美菜网，自成立之初的目的就是打通 农产品的线上线下渠道，实现农产品的商超对接和渠道下沉，提高农产品的供应效 率，解决农产品销售难题。\n相通。是重复考点 .答网络营销或大数据营销的特征。可以用4P模型说明：\nProduct: 结合产品生命周期配置线上和线下渠道；Price: 通过线上渠道的大数据分析消费 行为，进行差异化定价；Place: 将线上和线下结合，缩短渠道长度，直接面对消费者营销； Promotion: 借助线上渠道投放广告，而线下渠道进行活动促销。\n(2)这里推荐结合2017年案例题的解析用互联网+思路分析。好处包括四个方面：对生产 者、对消费者、对社会福利、对经济增长。问题包括：线上渠道建立在互联网基础设施上， 但云、网、端基础设施并没有普遍覆盖；盲目投入资金建立线上渠道会造成资源浪费；可能 产生新的产权和治理问题(线上配送放在丰巢快递柜引起广泛抵制);最终的结果可能是寡 头垄断，无力建设线上渠道的厂商被排挤出市场，取消补贴之后消费者支付越来越高的价格， 反而不利于福利提高。\n(2)目前，中国市场还有美宜佳、罗森、联华超市等连锁便利店，和7-11的商业逻辑相似。 零售便利店是蓬勃发展的行业，可思考7-11零售模式对中国的启示。\n能够充分利用7-11的无形资源，增强7-11的品牌形象，强化消费者认知，且成本和风险相 较 于 成 立 合 资 或 独 资 子 公 司 更 低 。","knowledge":["跨国公司与国际化","新兴议题","国际商务管理"]},{"id":"2019_1","year":2019,"num":1,"type":"简答","question":"简述利率平价理论","answer":"利率平价理论是由凯恩斯和艾因齐格提出的汇率决定理论。利率平价的含义为，汇率的 升贴水率等于两国的利率之差，分为抛补利率平价 (CIRP)  和无抛补利率平价 ( UIRP)。\n(1)   理论假设\n①一价定律：在完全竞争市场上，同一产品(资产、货币)的价格用同一种货币表示 应相等；\n②【选答】资本具有充分流动性、资金无限规模套利、不考虑交易成本。\n(2)  抛补的利率平价\n一价定律适用于国际金融市场。若1元本币在本国投资，假设本国年利率为i,   一年后 价值为1+i,   若以直接标价法的即期汇率e 换成外汇在外国投资，外国利率为i*,   同时在远 期外汇市场以远期汇率 f 卖出外汇，则最初1元本币一年后价值为(1+ i*)×f/e 。 由于无限 套利会使得两国收益相等，则1+i=(1+i*)×f/e。\n变形得：\n当外国利率i* 较小时，则：\n公式说明，远期汇率的升贴水率等于两国利差，高利率国家货币在期汇市场上必定贴水，低 利率国家货币在期汇市场上必定升水。\n(3)  无抛补的利率评价\n如果上述投资者没有在远期外汇市场上卖出远期外汇，则未来国外收益折算成本币时就 是未来的即期汇率。同理在外国市场投资收益为(1+i*)×E/e,E      为预期的未来即期汇率。 同理有：\n公式说明，预期即期汇率的变化等于本国利率与外国利率的差额。\n(4)  理论评价：\n优点：①从外汇市场投机套利(国际资本流动)的角度解释了汇率决定，指出了利率 与汇率之间的密切关系；②利率平价常常被作为一个基本理论运用到其他理论中(资产市 场说);③政策意义是培育发达的外汇交易市场，具有特别的实践价值。\n缺点：①一价定律要求处于完全竞争的外汇市场，即资金流动不受限制、交易成本忽 略不计、无限套利，现实中很难成立。②利率平价公式并不能表明是利率变动决定汇率， 还是汇率差异决定利率差异(没有对内生外生变量区分)。③利率平价理论忽略了利率结构 问题。\n(2)理论评价可以重新组织语言，如优点部分包括①地位：利率平价和购买力平价是资产 市场说的组成部分；②解释力：从资本流动的角度解读，解释力强；③政策含义：发展完善\n的外汇市场。\n(2)考场时间有限，策略可以重点把抛补的利率平价详细答，而无抛补利率平价说“同理”, 然后直接摆结论。\n购买力平价和利率平价从不同角度解释汇率决定。购买力平价反映汇率和物价的关系，实现 机制是国际贸易和商品交换，分析商品市场(而不考虑货币市场)。利率平价反映汇率和利 率之间的关系，实现机制是国际资金流动和套利交易，分析货币市场(而不考虑商品市场和 物价因素)。综合了商品和货币市场的是汇率决定的资产市场说。考试出现比较这两个理论 的 可 能 性 比 较 低 ， 但 是 通 过 对 比 可 以 记 评 价 。","knowledge":["国际金融"]},{"id":"2019_2","year":2019,"num":2,"type":"简答","question":"什么是关税的有效保护率?如何提高对一国最终产品的有效保护率?","answer":"(1)有效保护率\n有效保护率或实际保护率 (Te,Effective   Protection    Rate,EPR) 是指对产品附加值的 保护情况，即实行关税保护使本国某产业增值部分受保护的情况。\n①有效保护率EPR=(V'-V)/N\nV'为进口原料，中间产品及最终产品都含关税时的国内加工增值；V 为进口原料，中间 产品及最终产品都不含关税时的国内加工增值。\n②或有效保护率 EPR=(Tj-∑CijTi)/(1-∑Cij)\nCi表示i 原材料在j 产品中所占比重，Ti 表示i 原材料名义税率，Tj 表示j 产品的名义税 率\n【选答】例 如 ，征税前，产品售价为10000美元，产品生产成本为5000美元，如果对原材 料不征税，对最终产品征收20%的关税，则V=5000,V'=12000-5000=7000, 有效保护率为 (7000-5000)/5000=40%。\n(2)方法：\n①一国可以提高最终产品关税率，或降低原材料、中间产品的关税率，对价值增值部 分形成更强的保护。\n②一国实行“阶梯型”或“瀑布型”的关税结构，对原材料免税，中间产品低关税，最终 产品高关税，提高关税的实际保护效果。\n【选答】有效保护率是比名义保护率更具有资源流向意义的指标。由于有效保护率高的产业 资源的报酬高，所以国内生产和资源由保护率低的产业向保护率高的产业转移，由未受保护 的产业向受保护的产业转移。因此利用关税有效保护理论可以调节产业结构，促进产业技术 进 步 。\n政策含义就是降低原材料税率并提高最终产品税率，尽量具体解释。答完这些篇幅较少，如 果经院判卷压分，可以选答举例、政策意义或者和名义保护率的对比，看自己写字的速度和 熟 练 程 度 。","knowledge":["国际贸易政策"]},{"id":"2019_3","year":2019,"num":3,"type":"简答","question":"对 HO 理论进行评析","answer":"赫克歇尔和俄林继承并发展了李嘉图的比较优势理论，认为国际贸易的基础在于两国在 要素禀赋上的差异，提出了要素禀赋论，又称HO 模型。\n(1)理论假设\n①2×2×2  模型：假设只有两个国家、生产两种产品、使用劳动和资本两种生产要素；\n②技术、劳动生产率相同，即生产函数 一样，规模报酬不变；\n③ 一 国 的 K 相对丰裕，另一国L 相对丰裕，两国 K/L   不同，即单位劳动使用的资本不 同；\n④ 一种产品是劳动密集型产品， 一种产品是资本密集型产品，且要素密集度固定；\n⑤  K相对丰裕的国家利率 (i)  低 ，L 相对丰裕的国家工资率( w) 低；\n⑥产品和要素市场是完全竞争市场， K、L在国内可完全自由流动，在国际间不能自由流 动；\n⑦要素充分利用，不存在闲置资源；\n⑧两国消费者偏好相同，并且不变；\n⑨  完全自由贸易，商品在两国间流动没有运输成本和贸易壁垒等限制。\n(2)理论内容：如果两国要素存量的比例不同，即使两国的K 与 L 的劳动生产率一样，也 会使产品成本产生差异，两国亦可发生贸易。\n①  H-O 定理：一个国家会出口相对密集使用其相对丰裕的生产要素进行生产的产品，进 口相对密集使用其相对稀缺的生产要素进行生产的产品。\n②  【选答】要素价格均等化定理：原先要素绝对价格或相对价格不一致的两个国家在发生 贸易以后会逐渐趋于均等。\n③ 【选答】斯托尔珀一萨缪尔森定理：某一商品相对价格的上升，将导致该商品密集使用 的要素的实际报酬提高，另一种要素的实际报酬则下降。\n④  【选答】雷布津斯基定理：商品相对价格不变的前提下，某一要素的增加会导致密集使 用该要素部门的生产增加，而另一部门的生产则下降。\n(3)理论评价 理论贡献：\n①发展了李嘉图比较优势说，解释了比较优势的来源问题，表明在技术水平相同，要素禀 赋不同的情况下贸易也会发生；\n②  H-O 理论最基本的政策含义是所谓的“靠山吃山，靠水吃水”的思想，依照H-O 理论制 定的对外贸易政策，是多数发展中国家对外开放的出发点；\n③ 【选答】中国依照HO 理论，充分发挥廉价劳动力优势参与国际分工，自改革开放尤其 是入世以来，出口贸易得到飞速发展，成为第一货物贸易大国。\n局限\n①  只注重自然禀赋，忽略社会因素对一国对外开放战略制定的影响；\n②  强调静态结果，排除技术进步的影响，忽略由于社会经济发展产生的后发优势；\n③未考虑需求因素；\n④  HO 模型建立在严格的假设条件下，现实中难以完全成立。后里昂惕夫以美国出口产品 为例验证 HO 模型，却得出了恰恰相反的结论。里昂惕夫等人提出有效劳动、需求逆转、\n要素密集度逆转、贸易保护政策等因素解释这一现象，称为“里昂惕夫之谜”\n⑤ 【选答】HO 模型解释的是产业间贸易现象，但对战后兴起的发达国家之间的贸易和产 业内贸易无法解释。\n审题和思路：(1)这是简述单一理论题，尽管只问了评析，但必须从概述、假设、内容答到 评价，否则会丢相当一部分分值。重心应当放在评价部分，比如评价可以提里昂惕夫之谜， 可以提中国的对外贸易，都有分。\n(2) HO 理论可以仅答主要内容，也可答四大定理，如果答四大定理要精简语言，节省时间。\n(3)理论默写非常考验背书的熟练程度，默写假设的速度应该非常快，不然写不完。\n即 HO 模型的贡献与局限，和“评价HO 理论”的实际含义一致。指导作用是依照HO 理论的 思想参与国际分工，但是依靠静态和先天的优势容易忽视技术进步和产业结构调整，理论结 合 实 际 分 析 。","knowledge":["综合"]},{"id":"2019_4","year":2019,"num":4,"type":"简答","question":"简析规模经济对国际分工和贸易的影响","answer":"(1)规模经济指在一定的技术水平条件下，公司投入要素的比例不变及投入品的价格不变， 生产函数显示规模报酬递增的结果是平均成本下降。静态规模经济是指企业或行业达到帕累  托最优的生产规模，动态规模经济是指收益随规模的扩大呈报酬递增的趋势。规模经济分为 内部规模经济和外部规模经济：\n①内部规模经济主要来源于企业本身生产规模的扩大。由于生产规模扩大和产量增加，分 摊到每个产品上的固定成本会越来越少，从而使产品的平均成本下降。\n②外部规模经济主要来源于行业内企业数量的增加所引起的产业规模的扩大。由于同行业 内企业的增加和相对集中，在信息收集、运输、产品销售等方面的成本会降低。\n(2)传统贸易理论解释的是垂直分工与产业间贸易\n以李嘉图模型和HO 模型为代表的传统贸易理论建立在规模报酬不变和完全竞争市场的基 本假设之上，认为贸易动机在于技术水平和要素禀赋差异，较好解释了经济发展水平不同国 家的贸易和产业间贸易。\n(3)规模经济理论为代表的新贸易理论解释的是水平分工和产业贸易\n20世纪60年代以来，出现了同种产品的产业内贸易和发达国家之间的贸易越来越多的 趋势。克鲁格曼等人提出了基于不完全竞争、规模经济和产品异质的产业内贸易理论。理论 认为，不完全竞争使得生产要素价格偏离边际价值，商品价格大于边际成本和平均成本，不 能如实反映一国的比较成本优劣势，从而引起贸易福利不均等分配；在不完全竞争市场中， 规模经济是独立于比较成本之外的又一引发对外贸易的决定因素和经济变量。\n①因此，国际分工格局由先前的以比较优势和要素禀赋为依据的发展中国家与发达国家的 垂直型产业间分工模式，转变为以规模经济和产品差异为基础的发达国家间的水平型产 业内分工模式。\n②同时，国际分工格局的变化，又引起了国际贸易格局的变化，也促进了世界经济贸易的 发展。特别是随着世界经济贸易集团化的发展，各贸易集团间主要实行水平分工，各贸 易集团内部则以立体型网络状分工为典型特征。\n③  【选答】由于规模经济的存在，一些国家会采取进口保护或出口促进的战略性贸易政策，\n获得具有规模经济的部门的竞争优势，进而改变其在国际分工与贸易格局中的地位。\n尽管是复旦国商的早年真题，但这一题和人大国商的出题思路非常接近，考的是规模经济理 论，答题方法类似。","knowledge":["国际贸易理论"]},{"id":"2019_5","year":2019,"num":5,"type":"简答","question":"结合期货期权互换的内涵，说明国际金融衍生工具产生的动机和主要作用","answer":"(1)期货、期权、互换都是国际金融衍生工具。\n①期货是一种跨越时间的交易方式。买卖双方通过签订标准化合约，同意按指定的时间、 价格与其他交易条件，交收指定数量的现货。\n②期权是指一种合约，该合约赋予持有人在某一特定日期或该日之前的任何时间以固定价 格购进或售出一种资产的权利。\n③互换是一种约定两个或两个以上的当事人按照协议条件及在约定的时间内交换一系列 现金流的衍生工具，通常分为利率互换和货币互换两大类。\n(2)结算、避险、投机是衍生工具产生的主要动机 宏观动机：\n①  西方社会财富积累，投资者对高收益金融产品的需求增加，传统金融工具无法满足需求。\n②布雷顿森林体系瓦解后，各国实施浮动汇率制，国际收支经常项目和资本项目变动加剧， 对资金跨国流动的要求更高。\n③各国通货膨胀率急剧上升，全球利率、汇率和商品价格大幅度波动，企业及金融业营运 风险增大。特别是金融机构的敞口风险不断扩大，已经无法与资产和负债在期限结构上 保持精确的匹配。\n微观动机：金融机构竞争加剧，为了追逐利润、规避风险，新的保值技术和交易工具不断推 陈出新。\n【选答】文化因素：西方社会鼓励创新，以契约、合约的方式解决商业问题的传统由来已久。\n(3)主要作用\n① (融资)提高了资金的流动效率，宏观经济发展提供了资金来源；\n②  (结算) 提供了贸易和投资所需的清偿手段，促进了国际贸易和投资的发展；\n③  (避险)适当运用衍生工具进行风险管理，将风险转移给愿意承担风险的投机者，降低 利率、汇率等风险。\n④  (投机)投机者能够通过对市场的价格预判，运用衍生工具投机盈利，产生了新的投资\n机会。\n⑤ 【选答】互换是李嘉图比较优势论在国际金融领域的应用，不同国家能够实现货币和利 率等领域的优势互补，进而提高社会福利。\n【选答】消极作用：如果金融衍生工具过度泛滥，可能造成潜在的金融市场风险，增加监管 和调控的难度。\n【经院跨文化管理期末：运用跨文化管理理论分析国际期货期权市场产生的动机。】\n设问非常刁钻。先要思考跨文化管理理论(文化维度论、文化架构论、价值取向论)和西方 文化的特点。首先，金融衍生工具产生是一种创新的行为，和西方鼓励创新、反对权威、反 对因循守旧的文化土壤分不开；再者，期货期权是高风险的投机产品，对风险(不确定性) 的不同态度，是推动衍生工具创新的诱因；再次，衍生工具(尤其是远期等场外交易合约) 建立在合约的基础上，遵循契约精神，以谈判、合约的方式解决商业问题也是由来已久的传 统 。 诸如此类答案 ， 先写理论 ， 而后结合衍生工具创新分析 。","knowledge":["综合"]},{"id":"2019_6","year":2019,"num":6,"type":"论述","question":"运用等级评分法和冷热比较法评估一带一路沿线国家投资环境并不好。结合我国一带一 路建设，论述为什么我国鼓励投资?分析企业投资的动因。","answer":"(1)企业投资的动因\n解释企业投资动因的经典理论是邓宁的国际投资折中理论，又称OLI范式。该理论认为， 公司要到国外进行投资，应当在三个方面具有优势，即所有权优势O、区位优势 L和内部化 优势I。\n①所有权优势是指跨国公司特有的优势，如知识资产、规模经济优势等。凭借这些优势， 跨国公司能够拥有足够的市场影响力抵消在国外生产的劣势。所有权优势回答了为什么 跨国公司在当地设厂生产而非直接出口的问题。\n②东道国投资环境上具有的优势，解释了为什么到某个特定的国家和地区开展投资活动。 区位优势分为三种：经济优势，社会和文化优势，政治性优势。\n③  内部化优势指将企业优势保持在企业内部的能力。内部化优势解释了为什么一个公司会 选择跨国公司的组织形式。\n所有权优势解释企业进行海外投资的现实基础，区位优势解释企业为什么会特定的国家 或地区投资，内部化优势说明在跨国投资的过程中怎样来获得实际的经济收益。当跨国公司 同时具备三种优势时，则具备国际直接投资动机。\n(2)【选答】“一带一路”倡议即“21世纪海上丝绸之路和丝绸之路经济带”,是中国2013年提 出的和平发展倡议。一带一路秉持共商、共建、共享的理念，带来新的投资机遇，沿线途经 中亚、西亚、非洲等国家地区。\n通过等级评分法和冷热比较法分析，这些国家在政治稳定性、市场机会、经济发展和成就、 文化一体化、法令及实质阻碍等方面投资环境并不好，部分项目甚至可能产生亏损。依据邓  宁的折中理论的观点，企业缺乏到一带一路沿线国家投资的条件。尽管如此，我国却大力鼓  励到“一带一路”投资，因为一带一路投资项目会产生超出投资本身的效应，这符合国际投资  的国家利益优先取得论的观点。\n(3)结合“一带一路”建设分析我国鼓励投资的动因\n从国家利益的角度看，大多数发展中国家，特别是社会主义国家的企业，其对外投资有 其本身的特殊性，不仅使投资者保持着资本的所有权，还在于使投资者保持对资本运行的控 制权，获得比货币收益更广泛的综合收益。一带一路的特别收益具体如下方面。\n从国内经济角度看：\n①对一带一路沿线国家的直接投资能推动供给侧结构性改革，促进产业结构调整。由于中 国危机后的刺激性政策，钢铁等传统行业产能过程严重。加快对一带一路国家的基建投 资，有助于消化国内过剩产能，推动国内产业结构调整，形成内外市场的联动，谋求经 济结构转型的新机遇。\n②一带一路投资能带动国内协同产业发展，增加就业，带动经济增长。投资衍生出对设备 及其他产品等的需求，有助于拉动相关产业扩大生产，增加国内就业。\n③一带一路投资能为中西部地区创造更好的外部条件，促进区域经济协调发展。许多一带 一路国家与我国西北地区接壤或邻近，通过扩大对沿线基建投资，打通亚欧大陆桥交通 通道，为西部地区创造外部市场，改变区位条件，缩小东西部差距，实现协调发展。\n④一带一路投资有助于改善我国国际收支结构。我国长期保持经常项目的巨额顺差，积累 了近4万亿美元的外汇储备，对一带一路沿线投资，推动我国BOP平衡表向更合理的 结构调整，缓解经济失衡问题，把高额外汇储备用出去。\n⑤一带一路投资推动人民币国际化。一带一路投资及投资带来的贸易创造效应可以扩大人 民币境外使用和结算的范围，国际合作使用人民币结算，削弱美元储备的地位，推动区 域货币合作，加快人民币国际化进程。\n【①②③是经济方面，④⑤是金融方面】 从政治和安全角度看：\n①一带一路投资有利于维护我国经济安全和能源稳定。我国能源资源对外依存度高，中亚、 西亚等地是重要的能源和矿产资源产地，参与这些地区的能源开发，修建资源能源的陆 上运输通道，有助于维持我国经济安全；\n②“一带一路”倡议是对美国“亚太再平衡战略”的再平衡，一带一路投资有利于形成稳定的 周边环境。我国在南海和太平洋地区政治局势复杂，一旦形势恶化甚至爆发局部冲突， 会对东部海上通道产生威胁，因而扩大投资有助于同周边国家结成利益共同体的格局， 维护国家安全。\n从国际经济角度看：\n①一带一路投资能改善东道国基础设施和制度环境。一带一路国家多数基础设施落后，市 场经济不完善，居民收入不高，一带一路投资能改善沿线国家基础设施，提高居民收入， 为中国同沿线国家的经济、政治合作创造更好的环境。\n②一带一路投资具有贸易创造效应，激发东道国产业潜力、市场潜力，与我国开展双边贸 易，而经贸往来能实现优势互补，提高贸易双方的福利。\n企业投资的动机( OL1)→ 一带一路投资环境不好(不满足L)→ 中国依然鼓励“一带一路” 投资 →why?→特别收益(国际收支结构优化、产业结构调整去产能、人民币国际化、改善 双边关系和政治环境、促进经贸往来)。\n(2)选答“一带一路”的概念，不答“等级评分法”和“冷热比较法”的内容。当年考题\n“等级评分法”和“冷热比较法”是背景阅读材料，不是答题的要求，可能添色但不是关键\n得分点。况且这两条答案和后续两问并没有直接联系，也没有结合材料分析，不建议作为要   点。如果答“寻求市场”、“寻求资源”、“寻求效率”、“寻求战略资产”等，没有错，但存在   两个问题。一是脱离了“一带一路”实际情况。邓宁理论依然站在西方跨国公司的立场，那   么,西方跨国公司优势甚至强于中国，它们同样能够寻求市场、寻求资源、寻求效率到“一    带一路”投资，但事实却恰恰相反，西方国家并未这么做，中国是才是一带一路投资的主导   者，这是邓宁理论无法解释的问题。二是脱离了当年所给的材料。材料通篇在说“一带一路” 投资环境不好，但寻求市场、资源、效率等等都是说“一带一路”投资环境好，这么答当年   材料中没有可以用的素材，甚至和材料的含义完全相反，组织语言和论据非常困难。      试题变形：【经院国商期末： 一带一路倡议为中国企业投资海外带来了巨大机会。2016年，\n中国某投资公司准备在未来的3年内对沿线的P国进行基础设施投资，但对P国的投资环境， 尤其是政治风险进行分析，那么该公司应收集什么资料?又应从什么渠道收集?收集后应用 (建议用两种)什么方法来整理这些资料?】\n(1)和本题背景材料的考察内容有相通之处。背景材料提到了冷热比较法和等级评分法，\n相似的还有闵氏多因素评估法、道式动态分析法、三菱评价法等评估方法。收集资料的内容 有两个思路：①参考可国际投资环境的内容，笼统的答经济环境(地理条件，经济增长、通 胀、失业、消费、信贷、政府债务，财政货币政策、投资与外资政策，基础设施条件)、政 治环境(政治体制、政党与执政党、政局稳定性、双边关系)、社会环境(民族、人口、文 化),参考刘元春或者杨大楷的教材均可；②根据整理资料的方法确定内容，假设使用罗氏 等级评分法，则需要收集八大因素，包括资本抽回、外商股权、对外商的管制程度、货币稳\n定性、政治稳定性、给予关税保护的意愿、当地资金的可供程度、近五年的通货膨胀率。\n(2)收集整理资料途径根据自己积累答一些，这里提供部分参考：①《中国商务部国别投 资指南》(商务部官网可查),内容全面，含上百个国家地区；②世界银行数据库( IBRD·IDA)   及《世界银行营商环境报告》;③联合国贸易和发展会议 ( UNCTAD) 数据库；④各投资东道  国或区域组织的统计局；⑤各国政府部门的官网及政策文件，如外商投资方面的法律规定；  ⑥行业协会、智库等机构提供的研究报告。答案组织思路可分为一手资料(数据、政策规定、 法律文献)和二手资料(研究报告等),也可采取主体划分的思路，分为中国官方资料、东  道国官方资料和国际组织官方资料，增强答案的逻辑性。\n这一问和2020年商业计划书的题目考察方式类似，要求列出所需资料及查资料的方法，比 较符合国商考试更加注重能力导向的趋势。当然，除此之外，答Wind 和 Bloomberg  数据库 等都对，没有错。\n(3)整理资料的方法可选等级评分法或冷热比较法，简便易行，容易背诵；闵氏多因素评 估法则复杂一 点，需要根据实际情况进行权数调整，能够解释清楚也可答。\n【经院国商期末：试分析本轮新冠疫情是如何影响中国投资环境的?又是如何影响中国 FDI 和 OFDI 的 ? 】\n今年的热点话题，和上一题的考察内容基本相通。可采取分为短期和长期影响的答题逻辑， 结合国际投资环境理论分析。\n(1)短期内，投资、消费、出口“三驾马车”均受到不利影响，对投资环境产生负面效应。 从国内层面看：\n①  新冠疫情造成经济下滑(中国第一季度为负增长),部分行业(如餐饮、旅游、电影、 外贸、航空运输)受到重大冲击；\n②国民收入水平下降，居民消费意愿降低；\n③企业生产和重大工程项目受阻；\n④外贸企业供应链断裂，销售受阻，失去出口市场。\n从国际层面看：\n①新冠疫情导致全球治理步履艰难，全球陷入经济衰退；\n②美国等国以疫情为由指责中国，国际关系复杂，恶化中国发展的外部政治环境。 总之，短期内，新冠疫情从不同方面形成对中国投资环境的不利影响。\n(2)长期来看，在新冠疫情造成全球经济衰退的大背景下，中国政府采取有效的疫情防控 和经济政策，率先控制疫情和恢复经济，有利于改善本国投资环境，甚至获得新的发展机遇。\n①  中国实行强有力的防疫政策，迅速控制疫情；在“六稳”基础上做好“六保”工作，社 会和经济秩序快速恢复稳定；\n②  推行复工复产政策，保证供应链畅通；\n③通过适度降息降准，加强对中小微企业的信贷支持，及时为企业输血；\n④推出“新基建”计划，扩大新基础设施投资，带动就业；推行全面就业政策，尤其注重 解决农民工就业和大学生就业问题，保障基本民生；\n⑤  以“消费券”等方式鼓励消费；\n⑥  支持外贸企业出口转内销，扎实推进稳外资外贸政策；\n⑦  落实“五减”工作，改善营商环境；\n⑧此外，尽管疫情冲击了部分行业，但部分行业也获得了重要的发展机遇，如医疗医药、 电子娱乐(游戏和短视频)、电商物流等，促进了相关产业发展，带动传统行业数字化 转型。\n因此，结合长期趋势，这些均会增强中国市场对FDI 的吸引力。\n结合个人积淀和适当的逻辑，将以上内容要点化，不难得到答案。","knowledge":["中国对外经济"]},{"id":"2019_7","year":2019,"num":7,"type":"论述","question":"结合要素价格均等化理论评述当前中国产品的国际竞争力。 8 、跨国指数 (1)什么是跨国公司国际经营?跨国公司如何进行国际经营?(10分) (2)以下为某跨国公司的主要财务和经营指标(单位：百万美元或人),计算该企业2017 年、2018年的跨国指数。","answer":"(1)要素价格均等化理论\n①理论含义\n要素均等化定理即HOS 定理，也称广义要素禀赋理论，是萨缪尔森对HO 模型的结论 进行数学证明而得名的，是贸易对要素价格的反作用理论，认为国际贸易会使各国要素价格 或要素报酬的差异缩小，包括绝对和相对价格均等化。\nA.    要素价格相对均等化，即原先要素价格比率不一致的两个国家在发生贸易以后，会逐渐 趋于均等，最后达到完全相等。\nB.    要素价格绝对均等化，即原先同一种要素的绝对价格在不同国家不相等，在发生贸易后， 会逐渐趋于相等，最后达到完全相等。\n②实现机制\nHO 模型假定A 国是资本丰裕国，资本要素价格低，劳动要素价格高，B 国是劳动丰裕  国，劳动要素价格低，资本要素价格高。X 产品是资本密集产品，Y 产品是劳动密集产品。 两国进行贸易以后，根据HO 定理，A 国出口资本密集型产品到B 国，为生产更多X 产品， A国一部分原用于生产劳动密集型产品Y的要素会转而用于资本密集型产品X 生产。这一要  素转移过程会导致对资本的相对需求增加，对劳动的相对需求下降。由于A国的要素禀赋  是固定的，要素相对供给不变，资本-劳动相对需求的增加会导致资本-劳动的相对价格上涨。 即丰裕要素资本的价格上涨，稀缺要素劳动价格下降。B国则反之，贸易会导致资本-劳动  相对需求下降，资本要素价格下降，而劳动价格上升。这一调整过程会让两国资本劳动相对  价格完全相等。\n③ 【 选 答 】理论评价\nHOS定理证明了各国要素禀赋存在差异，生产要素不能跨国流动的前提下，贸易可替代 要素的国际流动，间接实现世界范围内资源的最佳配置。\n(2)中国产品的国际竞争力及变化趋势\n①过去，在改革开放初期，中国作为人口大国，劳动要素资源丰裕，劳动力廉价，相较于 欧美发达国家，中国资本要素稀缺。依据HO 定理，中国应当出口劳动密集型产品，从 欧美发达国家进口资本密集型产品。由此形成中国与发达国家的贸易分工格局。\n②随着国际贸易的产生，根据要素价格均等化定理，贸易使得对中国丰裕要素劳动的相对 需求增加，劳动要素价格上升，资本要素价格下降。【选答，建议答】同时，中国的计 划生育国策让中国的适龄劳动力相对减少，人口红利逐渐消失，刘易斯拐点到来，劳动 要素供给减少；而中国高储蓄的发展方式极大程度促进了资本积累，资本要素供给增加， 中国资本-劳动要素禀赋发生了变化。这一情况进一步改变了资本-劳动相对价格。\n最终，劳动力成本的上升导致劳动密集型产品价格竞争力削弱，而资本密集型产品价格 竞争力增强。\n③要素价格变化的结果是，劳动价格上涨使得劳动密集型产业逐步从中国转移到越南等劳 动价格更低的国家，中国劳动密集型产品出口减少，资本价格降低使得中国具备出口资 本密集型产品的相对价格优势，形成对其他发展中国家的资本密集型产品出口。\n(3)【选答】对中国产品国际竞争力的评述\n要素价格均等化定理建立在HO 模型的假设上，现实中存在不成立情况，所以简单以要 素价格变化衡量中国产品竞争力缺乏全面考虑。\n① HO 模型要求要素在一国国内充分流动。然而中国由于户籍制度、土地制度的限制，农 民工打工一段时间后回到各自家乡，劳动力优势并没有得到充分释放；\n② HO 模型假定技术水平相同，没有考虑劳动效率差异。相较于越南等国，中国劳动力受\n教育程度更高，考虑到人力资本和有效劳动，中国的产品竞争力依然具备优势；\n③ HO 模型假定规模报酬不变，但在现实中，规模经济优势也是产品竞争力的来源。历经\n数十年发展，中国沿海地区形成了较强的产业集聚效应，这也是越南等国不具备的。\n总之，未来中国需要根据要素价格的变化，参与国际分工的新格局；同时，要加快改革 步伐，促进要素市场化改革，培育人力资本优势、规模经济优势，推动中国产品竞争力的调 整，进而推动对外贸易转型发展。\n(2)对于中国对外贸易问题，要抓住从“国际大循环”到“国际双环流”的观点。最初 80年代，包括中国在内的发展中国家是“低海平面”,而欧美发达国家是“高海平面”,两 个海平面的分工和贸易形成对流。但是，中国的经济实力空前增强，逐渐成为了介于两个海 平面之间的“中间海平面”,相较于发达国家，中国的资本技术处于比较劣势，劳动力处于 比较优势，但相较于发展中国家，劳动力处于比较劣势，但资本技术处于比较优势，中国和 发达国家、发展中国家之间构成了“双环流”。这一思想反映的是比较优势的变化。\n(2)这里有潜藏的第三个要点“HOS 定理的不成立原因 ”,想到可以答。以要素价格均等化 定理评价产品竞争力真的合理吗?其一，要素价格均等化缺乏对劳动效率和技术水平的考虑 (里昂惕夫之谜),尽管相对于劳动力成本，我国相对于越南不具备劳动力比较优势，但考 虑到人力资本，我国生产效率更高，产品的竞争力反而更强，未来发展方向应当是追求高素 质劳动力而不是低成本劳动力。其二，缺乏对规模经济的考虑，由于我国具有更好的规模经 济 和 产 业 集 聚 水 平 ， 这 也 是 产 品 竞 争 力 的 来 源 之 一 。","knowledge":["国际贸易理论","跨国公司与国际化"]},{"id":"2019_9","year":2019,"num":9,"type":"案例","question":"新七星集团 有研究表明，在中国民营企业中，80%以上为家族企业。这些企业一般具有家族管理和 企业管理融为一体的特点。作为底层草根家族企业一员的中国江西新七星集团，由朱家七兄 弟共同建立，现由第二代也是七兄弟担当要职。特别与众不同的是，该公司在从上到下、从 里到外的各个管理层面，都深深打上了儒家传统文化的印记。经过十余年的创业与发展，现 已成长为一家集贸易、饲料产销及粮食收储、物流等为一体的大型多元化民营企业。企业曾 获“江西省2004年度诚信企业”、“樟树市2003-2004年度金融信用企业”“宣春市 2015-2018年农业产业化市级龙头企业”等荣誉。集团旗下品牌产品主要包括猪料、鸭料、 鸡料等养殖饲料、饲料原料销售方面以玉米、豆粕、麦麸为主。集团现有员工306人，有 10家分(子)公司，11个直营事业部，分布在樟树、临江、南昌、莲塘、新余、宜春、吉 安、上高、高安、新干、八都等地。集团年生产能力达30万吨，各种饲料原料年销售量达 60万吨。 2015年，集团销售收入20.55亿元，近年来，集团主营业务从粮食收储、销售、 饲料加工，逐步拓展至酒店、矿产、林业、仓储物流等行业，呈现出全方位快速健康发展态\n\n(2)在缺乏对比思考角度的时候，可以参考麦肯锡7S 模型比较企业管理的软件和硬件。企 业的组织管理逃不开制度、组织结构、员工、价值观等方面，参考战略模型有一定的角度， 但不必要。出自经院课程跨文化管理，比较美日管理模式。\n(1)用跨国经营理论，阐述索尼并购电影公司的主要依据。(6分)跨国并购即跨国兼并和收购，指跨国公司以购买现有公司股权资产(而不是成立新公司) 的方式实现跨国经营。并购动机理论包括价值低估论、协同效应论、效率提高论、 稀缺资源论等观点，索尼收购哥伦比亚影业公司的动机在于：","answer":"有研究表明，在中国民营企业中，80%以上为家族企业。这些企业一般具有家族管理和 企业管理融为一体的特点。作为底层草根家族企业一员的中国江西新七星集团，由朱家七兄 弟共同建立，现由第二代也是七兄弟担当要职。特别与众不同的是，该公司在从上到下、从 里到外的各个管理层面，都深深打上了儒家传统文化的印记。经过十余年的创业与发展，现 已成长为一家集贸易、饲料产销及粮食收储、物流等为一体的大型多元化民营企业。企业曾 获“江西省2004年度诚信企业”、“樟树市20032004年度金融信用企业”“宣春市2015-2018 年农业产业化市级龙头企业”等荣誉。集团旗下品牌产品主要包括猪料、鸭料、鸡料等养殖 饲料、饲料原料销售方面以玉米、豆粕、麦麸为主。集团现有员工306人，有10家分(子) 公司，11个直营事业部，分布在樟树、临江、南昌、莲塘、新余、宜春、吉安、上高、高 安、新干、八都等地。集团年生产能力达30万吨，各种饲料原料年销售量达60万吨。2015 年，集团销售收入20.55亿元，近年来，集团主营业务从粮食收储、销售、饲料加工，逐步 拓展至酒店、矿产、林业、仓储物流等行业，呈现出全方位快速健康发展态势。\n特别值得一提的是，七兄弟的老母亲有自己的政治经济学。\n第一条：“家和万事兴”不能闹不团结\n1967年文革期间，全家下放农村7年。1974年回城后，60岁的老父亲去世，兄弟姐妹  9人也一直在一起生活，他们的第二代、第三代也都在一起长大父亲去世后，老母亲龚清莲  成了全家的主心骨。饱经风霜的老太太立下三条家规。落实政策从农村回城后，大哥朱金根、 四哥朱春根从事竹制品加工工作，二哥朱梅放五哥朱庆生烧砖瓦，当时全家4人出力，弟妹  小，都在读书，生活不算富裕。哥哥们各自成家后，虽然增加了新成员(嫂子),但全家仍  在一起生活。1981年，母亲主持，为7兄弟建造了一个共同生活的两层楼。而且，在房屋  分配上，特别采取了门栋交叉居住的办法。用老母亲的话说，就是要重视亲情，不能老人走  了就散了。要团结，团结就是力量。母亲的良苦用心没有白费。后来条件改善，建了一栋  16层楼，大家也还住在一起。在企业和每一个小家庭里，都挂有2014年全家67人的合影  照片。现在，几兄弟包括下代人虽在全国各地奔忙，但每年春节、清明、中秋、国庆都尽量  回家团聚。\n第二条：要共谋发展，“不能让一个孩子落下”\n在分配上要讲多劳多得，但更要兼顾大家。在家族会议中，老母亲有极大的权利。她通 常只是坐在一边旁听，并不过问公司业务，但她特别注重公平分配，遇到分配不合理就会督 促调整。按老母亲定下的规矩，颇有点“吃大锅饭”的意思。就是分配差距不能过大。即便有 人为公司赚了1000万元，也就是奖励2、3万元，而不是按比例提成。从长远看，这样做 可能会影响工作积极性，但它却有效保障了大家庭的和谐发展。公司现任董事长曾独立开过 公司，也赚了点钱，但几年后还是回归了家族企业，因为，对他来讲，钱固然重要，但亲情 更加可贵。用他自己的话说，“家族气氛是一种享受，就是要在享受亲情中快乐地工作”\n(1)  用跨文化管理相关理论阐述家族企业管理模式的主要依据(6分)\n引入文化维度论分析家族企业模式，霍夫斯泰德认为国家文化从六个维度衡量，包括权 力距离、个人和集体主义、不确定性规避、刚性与柔性、长期和短期取向、自我约束与放纵\n①权力距离指数，指成员对于“权力分配不公”的认可程度。东方国家权力距离指数高，权 力集中，下级服从上级。新七星集团老母亲权力大，子女们服从老母亲，符合中国权力 指数高的文化特性。\n②个人主义和集体主义，指成员的利益取向更加倾向于个人还是集体。东方国家强调集体 主义，新七星集团重视家族团结、共谋发展、“不能让一个孩子落下”符合集体主义文化。\n③不确定性规避指数，指遇到不确定事件时是否通过正式的渠道来避免。在不确定性规避 指数高的社会中，人们缺乏安全感，较为保守、反对冒险。新七星集团强调和谐，反对\n(3)  我国这种家族企业管理模式与西方现代企业管理模式的异同(5分) 答案一：跨文化管理\n不同点：\n①集体与个人观：家族企业强调集体价值，西方企业更注重个人主义。\n②人性看法：家族企业强调“人治”,制度较为模糊；西方企业强调法制，制度透明；其基 础是东方文化偏向“性善论”,人有自发向善的意识；西方文化偏向“性恶论”,需要规则 约束。\n③决策方式：家族企业强调权威，自上而下决策；西方企业强调平等，吸纳员工建议。\n④活动导向：家族企业是存在型文化，强调和谐、稳定、团结，收入平均；西方企业是实 干型文化，强调成就与结果，能者多得。\n相同点：\n①家族企业和西方企业都强调对企业价值观的认同，主张以企业文化影响员工。\n②都主张发挥员工作用，提倡个人对企业的贡献。\n答案二：7S模型\n麦肯锡7S模型认为，企业组织包括7个要素：结构、制度、风格、员工、技能、战略和共 同价值观。从7个方面比较家族企业和西方现代企业。\n③ 结 构 Structure:  家族企业缺乏清晰的架构；现代企业有完善的等级结构和部门设置。\n④ 制 度System: 家族企业规则制度较模糊，处事灵活；现代企业制度清晰透明。\n⑤ 风 格 Style: 家族企业决策风格独断；现代企业管理风格强调法治。\n⑥ 战 略Strategy: 家族企业战略强调舍得价值观；现代企业力主扩大市场，明确考核业绩。\n⑦ 技 能Skill:  家族企业员工以亲缘关系为重；现代企业员工以能力为导向。\n⑧ 员 工Staff:  家族企业和西方企业都注重培养和关爱员工。\n⑨共同价值观 Shared Value: 家族企业和西方企业都强调对企业价值观的认同。\n(2)在缺乏对比思考角度的时候，可以参考麦肯锡7S 模型比较企业管理的软件和硬件。企 业的组织管理逃不开制度、组织结构、员工、价值观等方面，参考战略模型有一定的角度， 但不必要。\n出自经院课程跨文化管理，比较美日管理模式。即使同样都是现代企业制度，由于文化差距， 美 国 和 日 本 管 理 模 式 差 别 也 很 大 。\n(4)  你对这种家族企业管理模式的评价(5分)\n家族企业的管理常常是由同一家族的人来进行，提倡团结互助、诚实信用、艰苦奋斗、 资源共享等。由于中国人重视血缘关系，采用家族企业管理模式更容易建立相互信任的关系，\n10.索尼的跨国并购\n2003年，好莱坞大片《蜘蛛侠》上映，这个能够凭借蜘蛛丝在高楼大厦中穿行的银幕 形象，迅速得到了观众的喜爱，随着电影《蜘蛛侠》风靡全球，影片背后的蜘蛛侠也跃然而 出 ，它就是日本的著名电子企业——索尼。并购美国哥伦比亚电影公司，让索尼成功登陆美 国，它的产品也开始全面抢占美国市场。\n索尼历史资料馆是记录辉煌的地方，这里保存着世界上第一台晶体管收音机、第一台电  子显像管彩电、第一台随身听、第一部小型家用摄像机，正是索尼创造了这一个个世界第一。 即使在强手如林的日本企业中，索尼的技术实力也一直难以超越。然而，在1989年9月27  日，这家公司的命运陡然发生了转变。索尼对外宣布了一个惊人消息：斥资46 亿美元，收  购美国哥伦比亚电影公司。索尼是全球知名电子产品制造商，哥伦比亚是好莱坞八大制片商  之一。两家看似毫不相干的企业，走到一起，无论是在外界，还是索尼公司内部，都引起了 轩然大波。\n做出这个重大决定的，正是索尼公司创始人盛田昭夫。在日本，盛田昭夫被称为经营之 圣。他用40 多年时间，把一家做录音带的小工厂，打造成一张日本最闪亮的经济名片。这 样一位经营大师为什么在他68岁那年做出一生中最受争议的选择呢?这也是索尼公司一 次至关重要的生死抉择。这是1975 生产的 BETAMAX SL6300 家用录像机的一号机，这台 录像机把全世界带进了一个家用录像机时代，可这个市场却并不属于索尼。就在它诞生一年 之后，松下公司阵营的 JVC紧接着推出了 VHS 录像系统。但是，由于大量影视制作公司\n加入到松下阵营中去，VHS 录像机以三倍于 Beta 的速度迅速扩张市场。1988年， BETA 录像机退出了民用市场。一场持续了十四年的商业大战以索尼全面失利而告终。索尼的这场 惨败让盛田昭夫深受震动，他清醒地认识到，未来竞争中如果不被打倒，就绝不能只做技术 的领导者。\n并购哥伦比亚电影公司之后，由于用人不当，管理失控，索尼一度造成账面损失27亿  美元，创下日本企业亏损的历史记录。即使索尼公司内部，也不禁对并购再次打上了问号。 2003年第三季度，电影《蜘蛛侠》从这里走向全球，索尼电影公司一举创造纯利1254 亿  日元，超过整个索尼公司一年的利润总额。盛田昭夫的并购决策结出了第一颗丰厚的果实。 蜘蛛侠不仅成为美国文化的符号，也成为索尼最受欢迎的产品。2005年，索尼再度出击好  莱坞，买下米高梅电影公司，同时收购了数千部电影版权。这次并购三年后，索尼主推的蓝  光光盘在又一场标准大战中全面胜出。这些战略都是在(盛田昭夫)大脑中清晰地考虑过的， 现在不但是日本，中国和其他国家也能生产(电子产品),在这个转移过程中，索尼现在还  能有内容制作这一块，可以增强它的实力。\n建立一个自由、豁达的世界级企业，这是索尼创始人在1946年写下的成立宣言。2011 年6月，新的《蜘蛛侠》正在纽约拍摄外景。神奇的蜘蛛侠，依然在借助蜘蛛丝的力量， 在高楼大厦间穿行。而在现实的商业世界里，越来越多的跨国企业借助并购的力量，超越发 展之路上的一道道障碍，飞奔在全球化时代的经济地球上。\n(1)用跨国经营理论，阐述索尼并购电影公司的主要依据。(6分)\n跨国并购即跨国兼并和收购，指跨国公司以购买现有公司股权资产(而不是成立新公司) 的方式实现跨国经营。并购动机理论包括价值低估论、协同效应论、效率提高论、 稀缺资源论等观点，索尼收购哥伦比亚影业公司的动机在于：\n①价值低估论/并购成本较低：哥伦比亚公司财务表现不佳，处于股价低位(可能存在估 值低估),股东有意出售股权，为索尼收购创造了良好的条件。\n②稀缺资产论/获得稀缺资产：哥伦比亚公司是好莱坞制片巨头，在影视行业有着深厚积 淀，拥有海量影视版权、丰富的经验和优秀团队，索尼的收购能够直接继承这些技术、 人才等稀缺资产，具有较强的战略作用。\n③协同效应论/产生经营协同效应：索尼产品是录影摄像设备，哥伦比亚公司是电影制片 业务，看似不相关的二者分别代表影视行业的“硬产品”设备和“软产品”内容，技术设备 和文化服务如果能产生经营协同效应，二者互相补充与促进，将发挥“1+1>2”的效果， 增强公司实力。\n④市场获得论/进入新的行业领域：\nA.   索尼并购哥伦比亚影业，能够以相对较低的成本和较快的速度进入电影制片行业， 快速建立起在该行业的经营基础；\nB.    增加了公司在美国的知名度和品牌影响力，有助于强化母公司的声誉，进而在美国 建立更广泛的合作关系。\n①价值低估论：当一个公司的市场价值低于内在价值，那么可以用较低的价格并购该公司， 产生并购动机。\n②  交易费用论：如果市场运作存在较高的交易成本，则考虑通过并购的方式节约交易费用。\n③  提高效率论：通过并购实现规模效益或范围经济。 A.规模经济指并购后生产规模扩大， 平均成本下降，典型是汽车行业并购； B. 范围经济是产品品种增多而平均成本下降，典\n型 是 快 消 品 。\n④市场获得论：并购能够以较快进入新的市场或领域，利用被并购方的基础开展经营，形 成先入者优势。\n⑤稀缺资产论：获得市场交易难以获得的资源，如自然资源、技术、经验、知识资产或者 经营许可权(“牌照”)。\n⑥协同效应论：并购能产生协同效应。 A.经营协同效应：并购方和被并购方业务整合之后 有“1+1>2”的效果； B. 财务协同效应：收购亏损公司能帮母公司避税。\n审题和思路：设问有“跨国公司理论”,建议加一些跨国公司管理理论，如垄断优势、规模 经济、内部化等，结合理论分析。案例中明显感知哥伦比亚公司有稀缺资产(电影版权), 且并购产生了协同效应，这些应该放到答案要点中。\n获得技术、生产线等稀缺资产.进入欧洲市场快速形成运营.扩大生产规模形成规模经济。\n(2)有哪些可能的挑战，结合案例和理论讨论如何应对(7分)\n索尼的海外并购可能因为缺乏严密审查、支付过高溢价而遭遇失败，挑战包括\n①营运风险：相较于索尼本身的业务，哥伦比亚公司的电影业务属于新的领域，并购完成 后难以产生协同效应，双方资源难以实现共享互补，甚至造成亏损。由于日本和美国的 文化存在冲突，跨文化管理困难，进一步影响整合运营的有效性。\n②社会舆情风险。好莱坞作为美国文化的象征，美国出于保护本国文化的考虑，会抵制日 本资本收购美国企业。\n③ 融资风险：哥伦比亚电影公司体量庞大，并购需要数十亿美元的资金，如果筹 资不当，则会抬高财务杠杆，增加索尼的财务风险。\n④估价过高风险：并购双方的信息不对称，对哥伦比亚公司的收购支付的溢价可能过高， 并购支付过高的溢价带来风险。\n⑤  安置被员工风险：并购完成后，需要安置被并购方的员工，索尼可能因此背上 包袱，增加其管理成本和经营成本。\n⑥政治风险。美日关系复杂，由于美国的歧视性政策和美日双边关系恶化，美国政府对索 尼收购的阻挠和收购后对其在美国经营的限制都会造成较大挑战。\n为此，索尼公司可以采取以下措施应对：\n①熟悉美国的政治环境，避免美国政策的不利影响\nA.   事前评估收购存在的政治风险，做好风险预防和研究；\nB.   通过公关活动保持同美国政府的良好关系，减少日本企业对美投资的歧视政策；\n② 提高专业化和法律意识，减少法律纠纷：寻求专业机构的法律服务，了解美国的并购相 关法律和经营相关法律，如公司法、合同法、劳动法等。\n③全程控制财务风险，优化经营管理\nA.   严格评估哥伦比亚公司资产价值，避免估值过高和隐藏债务问题；牢记价格底线， 时刻注意外部任何可能影响谈判进行的舆论消息，使得收购价格利于己方.\nB.   选择合理的融资方式，降低财务压力；\nC.   加强并购后经营管理，防控财务风险，避免经营不当带来损失。\n④重视跨文化管理和人员整合，尽早实现母公司和哥伦比亚影业的协同。\nA.   研究哥伦比亚影业原有的经验，尊重哥伦比亚公司的管理模式和风格；\nB.   采用东道国中心的人员配置策略，如聘用在业内享有盛誉且对索尼管理文化认同的 美国人作为高级经理，在收购后不断对制度和经营进行调整改善，积极吸取员工意 见；\nC.   根据影视行业发展状况制定经营战略，增强哥伦比亚公司优势并增加盈利。\n买下马德里竞技足球俱乐部20%股份，2月以10.5亿欧元控股欧洲体育传媒巨头盈方体育传  媒集团。8月又宣布5亿美元全资并购美国世界铁人公司100%股权。有人看到了大战略，也  有人道出了不看好和担忧，而最终成败还需要时间检验。中国企业海外并购成功率一直存在  的“痛点”,是什么原因导致了很多中国企业的海外并购夭折失败?请谈一下你的看法。】 万达的海外收购也体现了发展文化体育行业的方向，和索尼收购哥伦比亚公司有相通之处。 可以开辟新的海外市场和业务领域，产生并购的协同效应则收获颇丰。但是最近几年，此类  收购饱受诟病 ， 存在着转移资产的担忧 ， 出现的概率较低 。","knowledge":["国际商务管理"]},{"id":"2019_10","year":2019,"num":10,"type":"案例","question":"索尼的跨国并购 2003 年，好莱坞大片《蜘蛛侠》上映，这个能够凭借蜘蛛丝在高楼大厦中穿行的银幕 形象，迅速得到了观众的喜爱，随着电影《蜘蛛侠》风靡全球，影片背后的蜘蛛侠也跃然而 出，它就是日本的著名电子企业——索尼。并购美国哥伦比亚电影公司，让索尼成功登陆美 国，它的产品也开始全面抢占美国市场。 索尼历史资料馆是记录辉煌的地方，这里保存着世界上第一台晶体管收音机、第一台电 子显像管彩电、第一台随身听、第一部小型家用摄像机，正是索尼创造了这一个个世界第一。 即使在强手如林的日本企业中，索尼的技术实力也一直难以超越。然而，在1989年9月27","answer":"","knowledge":["跨国公司与国际化"]},{"id":"2020_1","year":2020,"num":1,"type":"简答","question":"用国际贸易理论解释美国对中国的贸易逆差。","answer":"(1)   中美贸易逆差\n①一定时期内进口额大于出口额即为贸易逆差。\n② 【选答，建议答】美国对中国逆差是美国发起中美贸易战的理由之一。从贸易数据 看，美国对中国存在巨额贸易逆差，规模约2700亿美元，美方认为长期对华贸易 逆差损害了美国利益，主张减少逆差。\n③贸易逆差不能反映利益格局，尽管“顺差在中国”,但“利益在美国”。中国出口的多为 低附加值产品，利润率低。跨国公司是出口的主力军，美资公司出口造成的美国对 华逆差占50%以上。美方统计口径未考虑服务贸易，同时把转口贸易也记作中国对 美顺差，且美国进口商品使用到岸价而出口商品使用离岸价，高估了逆差。\n(2)   贸易理论解释逆差现象\n①【选答】根据国民收入恒等式Y=C+I+G+X-M, 同 时Y=C+S+T,T=G,  经变形可得 到 S-I=X-M,    美国经济发展模式为高消费、低储蓄，需要大量进口消费品，即储蓄 S过低，净出口X-M 必然为负。美国的经济结构和发展模式决定逆差必然存在。\n②李嘉图的比较优势论认为， 一国应生产并出口自己具有比较优势的产品，进口不具 有比较优势的产品。HO 模型认为， 一国应生产并出口密集使用本国丰裕要素生产 的产品，进口密集使用本国稀缺要素生产的产品。中国在初级产品、中低端制成品 和劳动密集型产品方面具有比较优势，而美国在高技术产品和技术密集型产品方面 具有比较优势，因此，中国对美大量出口初级产品和劳动密集型产品。而同时，美 国限制对华高技术产品出口，违背比较优势分工原则，人为扩大了贸易逆差。\n③弗农将产品生命周期分为新产品时期、成长成熟期、标准化产品时期。产品生命周 期影响中美贸易格局及获益程度。当产品处于新产品时期在美国生产并向其他国家 出口，产品进入成长成熟期到完全的标准化，逐步通过产业转移到中国生产，形成 中国对美国的出口，造成中国顺差、美国逆差。\n④中心-外围理论认为，不合理的分工格局加剧了发展中国家和发达国家的差距。美 国是“中心国家，主要生产和出口中高端产品，利润率高，中国是“外围国家”。主要 出口初级产品和中低端制成品，利润率低。由于中美之间的产品结构不同，贸易利 益主要由居于中心地位的美国获得。\n(3)综之，美国对中国的问题有其国际经济根源，美方不能简单以逆差为由指责中国。\n背了比较优势分工对华技术禁运。","knowledge":["中国对外经济"]},{"id":"2020_2","year":2020,"num":2,"type":"简答","question":"评价中国在全球价值链的地位。","answer":"(1)全球价值链的定义\n全球价值链是一个连接商品或服务生产全过程的链条，把商品或服务的各个环节分散到 不同的国家实现。目前，发达国家在全球价值链中主要承担的品牌设计和产品营销等高端要 素环节的工作，低成本的制造业国家从事的主要是生产加工、组装制造最终产品。\n(2)中国在全球价值链中的地位\n①中国制造业目前仍处于全球价值链分工的中低端\n改革开期以来，中国依靠劳动力成本优势推动制造业发展。目前，中国已是世界第二大 经济体，但制造业“大而不强”,主要为附加值低的加工制造环节。随着中国的劳动力成本优 势丧失，而品牌、专利等高端要素尚未形成，全球价值链处于“低端锁定”。\n② 中国服务业融入全球价值链的程度亟待提高\n中国此前低估了服务业的作用，随着逐步发展，中国的服务业参与国际地位逐渐提高。 但是，传统服务业如运输业、旅游业和建筑业占服务业总出口比重高，新兴服务贸易行业如 金融服务和保险服务占比较低。目前中国对高附加值的新兴服务行业的开放力度不足，中国 服务业融入全球价值链的发展潜力巨大。\n(3)中国参与全球价值链的对策：\n①贯彻“一带一路”倡议，重构全球价值链\n“一带一路”把贸易的视野由国内市场转向国际市场，促使中国提升产品质量，而这要求 中国企业创新升级，提供质量上乘的产品和服务，致使中国提升参与国际分工的地位。\n②培养高级要素，提升自主创新能力\n积极推进人才战略，培育高素质人才，积极引导外资投入高新技术产业和新兴产业，通 过技术外溢效应学习外商先进技术和组织管理经验，培养高级要素。\n③制定政策，扶植本土品牌\n推动中国自主品牌的建设，保护企业商标，打响品牌在国内的知名度，再推向国际市场。\n④把握信息，了解市场需求\n通过对信息和市场需求的把握，做好企业市场定位，针对目标群体，销售自己的产品和\n服务。分析顾客需求，洞悉市场动向 答案二：\n(1)全球价值链 (Global Value Chain,GVC)\n① GVC 指遍布全球的诸多企业网络相互连接而组成的有序集合，把一项产品或服务从概 念开始，经过不同阶段，交付给最终消费者使用之后还要进行最终处理，它是代表全球 一系列专业企业的价值网络。\n② GVC的产生背景是国际分工发展到新阶段，由传统的进出口贸易转化为加工贸易，产 业内贸易转化为产品内贸易，由货物贸易转化为任务贸易。不同国家的企业承担从价值 链上游到下游分工的不同环节。\n(2)中国在全球价值链的地位\n①中国是世界上工业分类最齐全的国家，得益于一带一路和进博会，中国保持巨量出口额 的同时也大量进口中间产品。\n②中国与发展中国家、发达国家构成全球价值链“双环流”格局：中国与发达国家之间的分 工贸易组成上环流；中国与发展中国家之间的分工贸易组成下环流。\n③中国处于全球价值“双环流”的枢纽地位，处于连接上下环流的枢纽位置，是全球价值链 的中心。\n(3)中国遭遇“价值链俘获”:中国在向全球价值链的高附加值、高技术环节移动的过程中， 遭遇发达国家和跨国公司的阻击，试图让中国保持在低附加值环节，被称为在“价值链上的  俘获”,中国在一些产业的核心技术上遭遇外国“卡脖子”例如光刻机，这是中国在全球价值  链中继续发展所面临的重大挑战。\n(2)答案二是经院最高分小于学长的答案，观点比较新颖，吸收了一些论文的思想，分析 了“双环流”理论，属于精彩答案。改革开放初期，中国凭借劳动力优势，承担价值链的中  间加工制造环节，对发达国家出口，成为制造大国，构成全球价值链“国际大循环”格局。 伴随国际分工和经济增长，中国资本和技术优势逐渐形成，成为介于发展中国家与发达国家 的中间海平面，“大循环”变为“双环流”,而中国处于上下环流的枢纽位置。","knowledge":["中国对外经济"]},{"id":"2020_3","year":2020,"num":3,"type":"简答","question":"说明反对自由贸易的经济学理由。","answer":"(1)重商主义认为“金银即财富”,货币是财富的唯一标准形态，把货币的多寡作为衡量一 国财富的标准，提倡采取奖出限入的政策追求贸易顺差以积累货币财富。\n(2)李斯特的幼稚工业保护理论，李斯特批驳斯密和李嘉图的自由贸易学说，吸收了汉密 尔顿的观点，认为生产财富的能力比财富本身更重要，国家应当干预经济，有选择性的征收 关税，以保护本国幼稚工业。\n(3)随着资本主义各国工业化的相继实现，各国也更注重对本国产业的保护，贸易保护不 仅仅限于保护幼稚工业，而是扩大到全部产业，解决本国经济衰退和失业的手段。\n①最优关税理论：对于大国，在零关税和禁止性关税之间有一个使进口国福利最大化的关 税税率，即最优关税率。\n②国际贸易乘数理论：站在大危机后西方资本主义发达国家的立场，凯恩斯在国内投资乘 数理论的基础上，提出了国内贸易乘数理论。凯恩斯主张出口对于国民收入有倍增的作 用，进口对于国民收入有倍减的作用。一国应促进和鼓励出口，限制进口，实现充分就 业，进而走出经济萧条，实现复苏。\n③一些经济学家注意到了发展中国家与发达国家在国际分工格局中不平等的地位，为发展 中国家实行贸易保护摆脱不平等国际分工格局提供了理论依据。\nA.   普雷维什提出了中心外围理论。该理论认为中心与外围国家在国际分工格局上是不 平等的，这加剧了发展中国家和发达国家的差距，导致外围国家贸易条件恶化。因 此外围国家必须进行贸易保护，实现工业化，独立自主地发展民族经济。\nB.    【选答】萨米尔阿明提出了依附论，认为由于国际市场价格的原因，外围国家的利 润向中心国家转移，中心和外围的差距不断扩大。因此外围国家应当加强相互合作， 独立自主地发展民族经济。\nC.   【选答】埃曼纽尔不平等交换理论认为：发展中国家和发达国家的工资不平等是产 生不平等交换的唯一原因。穷国工资水平低，剩余价值率高；富国工资水平高，剩 余价值率低。剩余价值从穷国转移至富国，造成国际经济间的不平等。\n(4)克鲁格曼、布兰德、斯宾塞等人在不完全竞争和外部规模经济的基础上提出了战略性 贸易理论。战略性贸易的政策含义为，一国在不完全竞争和规模经济条件下，利用生产补贴、 出口补贴以及保护国内市场的各种措施来扶植本国战略性产业的成长，增强其在国际市场上  的竞争力占领他国市场，获取规模报酬和垄断利润。\n(5)还有一些论点包括：\n①矫正国内市场扭曲的贸易扭曲理论：贸易扭曲理论认为，在国内市场不完善形成扭曲的 情况下，应采取征税或提供生产补贴等保护措施，以矫正或消除扭曲，增进福利。\n②维持高工资水平、增加国内就业的贸易保护论：发达国家主要进口国内劳动成本较高的 劳动密集型产品，因而对已失去比较优势的传统劳动密集型产业采取贸易保护政策就会 维持国内高工资水平以及劳动密集型产业的生存，从而使得生产增加，就业也增加。\n③改善国际收支的贸易保护论：当一国国际收支出现失衡，特别是出现较大逆差时，可以 通过进口关税、配额等贸易保护措施限制进口，减少外汇支出，以达到改善国际收支的 目的。\n④  维护公平贸易论：这一理论认为，国际贸易中的倾销、补贴等做法破坏了公平贸易这一 国际贸易规则，必须以反倾销税和反补贴税等保护手段来抵制倾销和补贴。\n答案二：按发展中国家和发达国家划分\n(1)发展中国家反对自由贸易的理由\n①保护本国幼稚工业。李斯特的幼稚产业保护理论认为生产财富的能力比财富本身更重要， 一国应征收关税，有选择地保护本国幼稚工业，促进民族工业的发展。当今，保护幼稚  工业、发展民族经济的思想依然得到广泛认同。\n②改善国际收支，增加外汇储备。重商主义主张“金银即财富”,一国应“奖出限入，追求贸 易顺差”。二战后许多国家为了增加出口、获得外汇储备的考虑，常常采取出口导向的“奖 出限入”贸易政策，追求贸易顺差，也是重商主义的体现。\n③改善贸易条件。中心-外围理论认为，不合理的分工格局造成发展中国家贸易条件恶化， 形成这些国家的贫困局面，因此，发展中国家应当扭转不合理的分工格局，改善贸易条 件，保护本国经济。\n④  【选答】增加政府收入。对发展中国家来说，关税是政府收入的重要来源，且征收关税 比征收各种国内税更加容易，因此发展中国家往往关税收入占政府总收入比重较高。\n(2)发达国家反对自由贸易的理由\n①保护国内就业，刺激经济增长。凯恩斯的对外贸易乘数理论认为，出口是经济的“注入” 而进口是“漏出”,在乘数效应作用下，扩大出口对刺激经济有“放大”作用，危机时期政   府应当追求顺差、创造就业，刺激经济复苏。\n②减少贸易逆差，保护公平竞争。欧美发达国家认为发展中国家的长期顺差破坏了贸易公 平，因此，必须限制出口补贴、低价倾销等行为，保护公平竞争。\n③保持国内工资水平，促进社会公平。S-S 定理指出，国际贸易会造成出丰裕要素的报酬 率上升，而稀缺要素的报酬率降低，常常造成进口部门的利益受损，为了保持少数部门 的利益常常征收进口关税。\n④保护战略性产业，获得垄断利润。布兰德、斯宾塞认为，在寡头垄断市场条件下，一国 应当保护本国的战略性产业，维持其垄断或者寡占地位，实现利润转移。\n⑤减少市场扭曲，改进社会福利。贸易扭曲理论认为，由于扭曲的存在，社会未能达到帕 累托最优状态，因此需要实行关税、配额等政策减少扭曲，达到帕累托最优。\n(3)   关税理论\n①最优关税理论认为，大国通过征收关税能够压低进口产品的价格，促进福利增加，关税 率不是越高越好，而是存在一个最优关税率，使得福利最大化。\n②   有效保护率理论认为，有效保护对增值额的保护，更能够反映关税保护的实际效果，指 导资源流向。因此，一国应当采取“阶梯型”关税结构，对原材料和中间产品征低关税， 对最终产品征收高关税，提高有效保护率。\n(2)尽管这些贸易保护理论都有影响力，但是主张互利的自由贸易思想才是国际经济学的 基本立场，保护主义理论各自局限很明显。现实中，保护主义盛行的原因更多在于利益集团 的影响，“特定要素模型+贸易保护的政治经济学”是较为合理的解释。\n(2)一定注意审题，问“经济学理由”则不答政治方面的依据，如中点选民、维护国家安 全 、保护民族文化，都不对。\n(1)和本题答案一的思路基本一致：重商主义 → 幼稚工业保护 →现代理论：发达国家的对 外贸易乘数，发展中国家的中心外围论、依附论、不平等交换理论，中立的最优关税论、有 效保护率、梅兹勒悖论→ 当代理论：战略性贸易政策，贸易扭曲理论。剩下归为其他。\n(2)论述题的篇幅比简答题更长一些，设问是发展脉络，所以要突出理论之间的关系和评 价，比如重商主义和幼稚工业保护的区别、国际贸易乘数和古典理论的区别、当代理论和国 际贸易乘数的区别。然而，贸易保护理论的前后继承关系与发展脉络不如国际贸易理论清晰， 不 用 太 强 求 叙 述 的 逻 辑 性 。","knowledge":["国际贸易政策"]},{"id":"2020_4","year":2020,"num":4,"type":"简答","question":"简述以产业内贸易为主要内容的新贸易理论与传统贸易理论有什么异同。","answer":"(1)含义\n①传统贸易理论主要包括亚当斯密的绝对优势论、李嘉图的比较优势论和赫克歇尔-俄林 的要素禀赋理论，假设前提完全竞争市场，认为国际贸易的动机是绝对优势、比较优势 或要素禀赋差异。\n②新国际贸易理论指产业内贸易理论和动态贸易理论。林德从需求收入角度指出经济发展 水平相同的国家间具有重叠需求，更容易发生产业内贸易。克鲁格曼等人以不完全竞争\n基础，认为规模经济和产品差异是国际贸易的原因，用以解释产业内贸易现象。波斯纳 的技术差距论和弗农的产品生命周期理论从技术进步的角度解释了国际贸易动态变化。\n(2)相同点\n①新贸易理论和传统国际贸易理论都承认贸易的互利性，解释了国际贸易发生的动机。\n②新贸易理论和传统贸易理论都没有考虑公司内贸易的维度。\n(3)不同点\n①贸易格局不同：\n传统贸易理论解释不同种产品之间的贸易即产业间贸易，以及发展中国家和发达国家之 间的垂直分工模式；新贸易理论解释的是重叠贸易即产业内贸易，以及经济发展水平相近的 发达国家之间的水平分工模式。\n②假设前提不同：\nA.   传统贸易理论基于完全竞争市场结构，认为完全竞争市场是最有效率的市场；新贸易理 论基于不完全竞争市场结构，认为商品价格偏离成本，不能如实反映一国的比较成本优 势和劣势，从而引起贸易福利的不均衡分配；\nB.    传统贸易理论假定规模报酬不变，而新贸易理论认为规模经济是贸易的利益来源；\nC.   传统贸易理论假定产品同质，而新贸易理论假定产品具有水平或垂直差异性；\nD.   传统贸易理论仅从生产角度研究贸易动机，而新贸易理论从需求角度考虑，认为需求偏 好相似也会产生贸易。\n③政策取向不同：\n传统贸易理论认为贸易对各个国家都有利，倾向于自由贸易政策；新贸易理论认为贸易 福利的分配时不均衡，采取保护政策也是取向之一。\n④贸易福利不同：\n传统贸易认为贸易利益来源于专业化生产效率的提高；新贸易理论认为，规模经济引起 产品价格降低以及产品种类的增加也是贸易利益来源。\n⑤静态与动态差别：\n传统贸易理论认为不存在技术进步，是静态理论；技术差距论和产品生命周期理论考虑 了技术进步因素，是动态理论。\n贸易理论”,重在分析产业内贸易，动态贸易理论可带过。经典例题只要背过往年答案，到 考 场 上 可 以 直 接 默 写 。","knowledge":["国际贸易理论"]},{"id":"2020_5","year":2020,"num":5,"type":"简答","question":"强势美元的好处与坏处。","answer":"(1)强势美元的含义\n强势美元意为美元呈现走强而其他货币走弱的态势，表现为美元升值。2018年以来， 特朗普政府税改等一系列经济政策初见成效，美国经济态势良好，失业率降到历史低点，美  元走强态势明显。与之相对，美元走强背景下，人民币走弱、汇率贬值，2019年出现“破7”。\n(2)强势美元对美国的影响\n①有利影响：\nA.  有助于促使美元回流，引导国际资金流入美国；\nB.   美元走强预示着美国经济的向好，有助于稳定投资者预期，稳定金融市场。\n②  不利影响：\nA.  美元升值削弱了美国出口产品的竞争力，造成出口缩减，扩大美国的经常项目逆差；\nB.  导致美国跨国公司外币资产和海外利润减少，汇回利润减少，影响资本和金融项目；\nC.  【选答】特里芬两难表明，美国的长期逆差与美元升值相悖，美国想要解决逆差问 题势必要求顺差国货币升值(曾经的日本“广场协议”,入世后的中国)。\n(3)美元强势对新兴经济体的影响\n①有利影响：美元强势造成其他国家货币贬值，在满足马歇尔勒那条件的前提下，新兴经 济体会增加出口。\n②不利影响：\nA.  美元走强可能导致主要大宗商品价格下跌，同时新兴经济体货币贬值降低出口商品 的价格，造成主要大宗商品出口国的贸易条件恶化；\nB.  新兴经济体的外债结构以美元为主，美元升值加大外债管理难度；\nC.  美元回流美国造成外汇市场上美元短缺、造成国际清偿力不足的“美元荒”;\nD.  美元走强造成国际资本流出，恶化新兴经济体的资本外逃局面，破坏金融市场稳定；\nE.  美元升值加剧新兴经济体货币的贬值压力(新兴经济体多采取软盯住美元的固定汇 率制度),甚至出现货币危机，严重冲击国内经济。\n(4)  强势美元对中国的影响\n①美元强势背景下，人民币贬值“破七”具有积极作用\nA.  人民币贬值有利于抵消美国对中国商品加征关税的影响，增强出口产品的价格竞争 力，缓解出口行业的压力，促进出口行业复苏，带动就业；\nB.  一定程度上打开货币政策空间，减轻三元悖论(货币政策独立性、汇率稳定、资本 自由流动三者不能同时实现)的约束。\n② 不 利 影 响\nA.  加大了政策调控的难度；如果汇率预期管理不当，单边贬值预期过强，则容易引发 金融市场动荡，恶化国内经济；\nB.  贬值会加剧中美贸易冲突，面临“汇率操纵国”的指控。\n(2) 美元的国际储备地位导致美元币值变动和美联储政策都会影响国际经济。美联储降息 超发美元，美元贬值，则会向其他国家输出通胀，将美国国内危机转嫁他国，此时形成“美 元灾”;而美国加息缩表，则会造成美元升值，资金回流美国，国际清偿力不足，此时形成\n“美元荒”。因此，不论美元升值还是美元贬值，都会影响世界经济。尤其对新兴经济体来 说，强势美元会造成内外均衡冲突，这个逻辑在2018年金砖货币中重点考过。\n(3)答题要点需要斟酌，比如美元升值会恶化美国经常项目，这个真的是不利影响吗?不 一定。同样提过，美国的逆差其实是利用他国资源为美国消费者提供消费品。再如，美元强 势会引起他国货币贬值，新兴经济体可以增加出口，但这真的是有利影响吗?不一定。新兴 经济体多为出口商品大国，出口商品结构低端利润率低，扩大出口价格会下跌利润缩减，且 大宗商品以美元计价，美元走强则大宗商品价格进一步下降，本币贬值雪上再加霜，多重作 用下新兴经济体的贸易条件恶化问题可能会更突出。\n审题与逻辑：(1)问到强势美元的影响。首先应当解释强势美元的含义，结合当年热点定性， 表明了解强势美元这个问题，建议答。美元和人民币汇率、中国国际收支及外汇储备这些数 据和当年走向本身最好背下来。\n(2)审题发现题干中的有利与不利影响缺乏主体，对谁有利?对谁不利?自然想到分类展 开，分为对美国的影响、对中国的影响和对世界的影响，这样逻辑就很清晰。可答的观点比 较多，选一些表达，但结构应多层次，观点应该是综合多元的。","knowledge":["综合"]},{"id":"2020_6","year":2020,"num":6,"type":"论述","question":"产品原价10万元(不含税),征收20%的关税，产品原料6万元(不含税),征收10%的 关税。计算名义关税率和有效关税率，并说明二者为什么存在区别。","answer":"(1)名义和有效保护率\n名义保护率( NPR) 指一国实行保护使某种商品的国内市场价格高于国际市场价格的百 分比。公式：NPR=(P'-P)/P*100%。P’为国内市场价格，P 为国际市场价格\n有效保护率或实际保护率 (EPR) 是指对产品附加值的保护情况，即实行关税保护使本 国某产业增值部分受保护的情况。公式：EPR=(V'-V)/N\nV'为征收关税后的国内加工增值；V 为不征收关税的国内加工增值\n【选答】或 EPR=(Tj-∑CijTi)/(1-∑Cij),Cij   表示 i 原材料在j 产品中所占比重，Ti 表示 i 原 材料名义税率，Tj 表示j 产品的名义税率\n(2) NPR 和 EPR 计算\n由题可知 P=10,P'=10×(1+20%)=12      NPR=20% V=10-6=4V'=12-6×(1+10%)=5.4\nEPR=(5.4-4)/4=35%\n(3)二者存在差异的原因：\n有效保护率是对增值额的保护，考虑了原材料税率，由于原材料的税率为10%,低于最 终产品税率20%,因此，对增值额的保护程度更高，有效保护率高于名义保护率。由此可见， 降低原材料税率有助于提高有效保护率。\n(4)政策含义\n①名义保护率是对最终价格的保护，而有效保护率是对增值额的保护，是一个更好的指明 资源流向的指标。\n②  在确定有效保护水平后，可以有意识地根据名义保护率和实际保护率之间的关系制定具 体的政策： 一国应实行阶梯型或瀑布型的税制结构，降低对原材料和中间产品的进口税 率，而抬高对最终产品的进口税率。\n设中国对小汽车的关税税率为50%,国内一典型的汽车制造商的成本结构和部件关税如下：\n(1)计算中国小汽车行业的有效保护率。\n(2)如果钢板、发动机、轮胎的关税分别降为3%、5%、2%,计算小汽车的有效保护率。\n(3)从上面的计算中，可以推出哪些关于有效保护率的一般结论?\n这个例题用的是第二个公式 EPR=(Tj-∑CijTi)/(1-∑Cij) 。    第一二问都用这个公式计算： ERP=[50%-(0.2×0.1+0.3×0.15+0.1×0.05)]/[1-(0.2+0.3+0.1)j=107.5%\nERP=[50%-(0.2×0.03+0.3×0.05+0.1×0.02)]/[1-(0.2+0.3+0.1)]=119.25%\n政策含义与真题一样：降低原材料关税可提高有效保护率，一国应采取瀑布型税率结构。  由于公式2人大还没有考过，未来不排除初试出题可能性，如果有效保护率依然是初试重点， 那么出这道题的概率较高，需要留意。\n【李坤望《国际经济学》:欧洲的飞机制造业得到好几个国家政府的资助。据估计，这些资 助相当于某些飞机售价的20%,也就是说， 一架售价为5000万美元的飞机，其成本可能为 6000万美元，其差额即为这些欧洲国家政府的补贴。另外，从其他国家购买零部件的成本 是飞机售价的一半(假设对零部件进口不征关税),按照这种估计，请问欧洲飞机制造商得 到的有效保护率是多少?】\n这道题比较另类，硬把关税的有效保护率改成了补贴的有效保护率，但实质类似，都是对增 值额的保护。\n补贴之前，零部件成本为售价 P 的一半，即增值额为0.5P,   补贴成本的20%,则降低了20% 的成本、增值额变为70%P .补贴的有效保护率为ERP=(0 . 7P - 0 . 5P)/0 . 5P=40% 。","knowledge":["国际贸易政策"]},{"id":"2020_7","year":2020,"num":7,"type":"论述","question":"中央银行突然增加货币供给，外币货币供给不变，本币汇率如何变化?(10分)什么是 汇率超调?汇率超调的实现机制是怎样的?(10分)","answer":"(1)本币汇率会出现贬值。\n理由：影响汇率的主要因素包括财政经济状况、国际收支状况、利率水平、通货膨胀率、 宏观经济政策、中央银行的直接干预、投机资本的操作和重大国际事件等。\n当一国财政经济状况恶化、国际收支逆差、通货膨胀率高、短期内利率下降、市场预期 较差及出现不利于本国的突发事件时，本币趋于贬值。\n①外汇供求和国际收支：央行突然增加货币供给，同时外币货币供给不变，会导致外汇市 场的本币供过于求。反应在国际收支上，扩张的货币政策会增加国内总需求，出口减少 而进口增加，造成国际收支恶化，本币贬值。\n②利率水平：增加货币供给为市场注入流动性，引起金融市场的利率下降，短期来看，资\n本会放弃利率较低的本币而流向较高的外币，因此，短期内本币贬值。\n③心理预期：增加货币供给，利率下降，会形成较强的贬值预期，影响投资者信心，在羊 群效应作用下，投资者会出售抛售本币资产，加剧贬值局面。\n④购买力平价(通货膨胀率):长期看来，货币供给量的增加会引起物价上涨，抬高通货 膨胀率，从购买力平价的角度看，物价水平上升会降低货币本币的内在购买力，造成本\n币贬值。\n【选答】代表事件是美国的量化宽松政策(Quantitative Easing,QE) 。08年危机后，美 联储采取量化宽松政策，增加基础货币供给，以解决次贷危机中出现的流动性短缺问题，刺 激美国经济恢复，此后数年，美元呈现走弱趋势。\n(2)量化宽松是增加货币供给的典型手段，这是2011年论述题考过的，不难判断。\n上一题的结论表明，依据汇率的基本理论，宽松的货币政策会造成本币贬值。然而，为什么 美国近期的QE 却造成了美元升值呢?\n(1)重要原因：美元作为国际货币具有特殊地位，美元不仅是美国的货币，更是一种全球 避险资产。当新冠疫情爆发时，全球经济和金融市场的不确定性增强，资本呈现明显的避险 情绪，投资者会争相买入美元，造成美元需求增加快于供给增加，形成美元升值。\n(2)美元走势不仅取决于美国经济和美联储政策，而且需要看美国和世界主要经济体的基 本面与政策对比：\n①(经济基本面/财政经济状况)不同于07、08年次贷危机，当时危机出现在美国，美国首 当其冲、经济迅速恶化，之后才传导至欧洲、日本等经济体；而本次疫情在全球范围内普遍 爆发，欧洲和日本与美国一样，同样深受疫情拖累而经济衰退；\n②(利率因素)在疫情危机之前，发达经济体已经普遍出现了零利率、负利率现象，这样一 来，即使美联储推出无限量宽松，美元和欧元的利差也比较有限，制约了利率机制发挥作用；\n③(经济政策)当美联储推出QE,   世界主要经济体接连推出宽松政策，如欧洲央行降息， 也延缓了QE 对美元币值的影响；\n④尽管美元宽松，而外围经济体依然面临流动性紧缺的“美元荒”,美元流动性表现为“外 紧内松”的状态；\n⑤(重大事件)除开此次疫情的突然冲击，受英国脱欧影响，欧元和英镑等货币本身呈现弱 势前景。\n(3)其他原因：①特朗普政府一直偏向于强势美元政策，希望通过强势美元维持美元信用 和美元资产的价值，不易出现美元大幅贬值。 QE 刚刚推出的3月份，特朗普政府力推提振 经济的计划，保经济、保美股，因此，彼时各界对美国经济保持较为乐观的预期。②美股高\n位进一步吸收资本流入，支持美元汇率升值。\n然而，随着新冠疫情蔓延和深入，美国二季度经济加快衰退，加之弗洛伊德等突发事件冲击， 市场对美国经济的悲观预期恶化，美元汇率转为贬值趋势。2020年6月至8月，美元表现 为 弱 势 。\n(2)汇率超调\n汇率超调模型又称黏性价格模型，是多恩布什在发展购买力平价说等传统汇率决定理论 基础上，形成的货币主义汇率理论。汇率超调含义为：当受到特定事件影响时，由于金融市 场反应速度快于商品市场，汇率短期内存在过度调整的状态，而后通过反向的回调达到长期 均衡水平。\n①基本假设\nA.  综合考虑货币市场、证券市场和商品市场；\nB.  国内资产和国外资产能够完全替代；\nC.【  最重要】国内金融市场和商品市场调整速度不一致，商品市场存在黏性。即购买 力平价短期内不成立而长期成立；\nD.  风险补偿为零，无抛补利率平价成立。\n答案一：文字描述。\n以央行增加突然增加货币供给为例说明实现机制\nA. 货币市场失衡，短期内价格黏住不变，实际货币供应量增加，利息率下降，引起资 金外流，由此导致外汇汇率上升，本币贬值。\nB. 外汇汇率不会永久高居这一短期水平，会逐渐回落，出现与最初反方向的变化。这 时，商品市场并没有处于均衡状态，而是处于超额需求。通过商品市场的超额需求， 则会带来价格同比例上升。在价格上升过程中，实际货币供应量相应下降，利息率 回升，资本内流，外汇汇率下降，本币升值。\n答案二：图形分析。\n(a)                                                                                                                             (b)\n(c)                                                                              (d)\nt1 时间，国家货币当局突然增加一定比例的货币供给，这时图a 的货币供给量由M1    上升到M2;此时，由长期来看，国内货币供给增加必然导致物价水平等比例上升，但由于商 品市场的价格粘性，由P1到不是瞬时变化，而是有一个缓慢的过渡过程，为图c 。同理，\n由货币供给量增大引起的汇率等幅贬值，故由 E1到 E2, 但是由于价格的粘性存在，在短期 内，仍然保持PO不变，故而货币供给的突然增加意味着在p0 的物价水平上有着过度的货 币供给，利率会出现跳跃下降。此时会导致利率低于外国利率，这种时候人们将会对本国货 币有升值预期来对于低利率进行补偿。此时就是通过汇率超调使 e1 跳跃到e2\n长期内，价格水平缓慢上升，实际货币供给缓慢下降，利率逐渐上升，资本从国外流入， 本币升值，汇率下降至。\n③  【选答，建议补充】人民币汇改经验表明，中国外汇市场进行单边对赌情绪较强，存在 顺周期行为，“超调”现象普遍存在，人民币汇率常常不能反映经济基本面的实际情况。 2019年，受到中美贸易战冲击，每当中美谈判受阻或美方加征关税，都会造成短期资 本的大幅流出，形成人民币汇率超调。因此，要进一步完善人民币汇率定价机制，稳定 外汇市场预期，用好“逆周期调节因子”工具。\n④  【选答】评价：\nA.  汇率超调理论解释了从短期均衡到长期均衡的动态调整过程，假定商品市场存在黏 性，贴合实际，理论解释力较强。\nB.  说明政府在推行宏观经济政策时应当考虑超调问题，具备较强的政策指导作用。\nC.  缺陷：1)理论建立在货币主义的观点上，以存量分析为主，缺乏流量分析；2)缺 乏对资产不能完全替代的考虑。\n(2)实现机制是从短期的不平衡到长期均衡的调整过程，资本市场反应较快，短期内产生 超调现象，而长期看，随着物价调整达到均衡状态。答案一文字描述摘录的马君潞《国际金 融》的表述，比较完整，只要说明“短期到长期”的过程就能得分。\n(3)当年商院国商专业课140分学姐考场回答的作图分析答案，从最后得分看，作图分析 得分更高，鼓励在考场时间分配允许的前提下作图分析，追求满分。\n(4)汇率超调和中美贸易战紧密相关，反映了2019年的人民币汇率热点问题。2018-2019 年，影响人民币汇率的短期因素是中美贸易谈判，一旦谈判受阻，人民币汇率下跌(这里指 贬值);而当中美趋于达成协议，人民币则会升值，短期资本流动和汇率超调对人民币汇率 波动有显著影响。这个问题在笔记的汇率超调部分有补充，供阅读。\n(2)简述单一理论问题要撑起10分的分值，最好有模型概述一假设-内容-评价，背过书并 不难，可以得到不错的分数。如果能结合中美贸易战与人民币汇率的背景分析，可为答案增 色，提前准备了就把热点也写上去。整张卷子能答出一些其他人想不到的亮点，整体分数可 能 更 高 一 点 。","knowledge":["国际金融"]},{"id":"2020_8","year":2020,"num":8,"type":"论述","question":"中科院院士团队研发了二氧化碳制冷设备，获得了技术专利，系列产品用于冰箱、冷库 设备，可替代氟利昂，有利于保护臭氧层，制冷效果好，热量传导速度快，排放全球变暖气 体少。国家支持成立公司研发该系列产品，现向资本市场进行天使轮投资，请写出商业计划 书，并列举搜集哪方面的数据和资料，会引起投资人兴趣。","answer":"【是的 zzzzz 同学的考场回忆版】\n一、项目介绍\n二、项目宏观背景分析","knowledge":["跨国公司与国际化"]},{"id":"2020_9","year":2020,"num":9,"type":"案例","question":"中国机电产品 一家中国机电企业以直接出口、间接出口等方式进入国际市场，产品又以经销、代销等 方式进入国际市场。目前，由于中美贸易摩擦，该机电企业销量受到极大冲击。 (1)该企业通过哪些渠道进入国际市场? ( 5 分 ) (2)产品通过哪些方式进入国际市场?经销和代理有什么不同?(5分) (3)中美贸易战对机电企业造成了哪些风险?该机电企业应采取哪些方法应对中美贸易战 带来的冲击?(10分)","answer":"一家中国机电企业以直接出口、间接出口等方式进入国际市场，产品又以经销、代销等 方式进入国际市场。目前，由于中美贸易摩擦，该机电企业销量受到极大冲击。\n(1)  该企业通过哪些渠道进入国际市场?(5分)\n企业进入国际市场的方式包括贸易型、契约型和投资型。\n①贸易型指企业通过商品出口的方式打开国际销售市场。这种方式成本较低，但 对市场的控制力较弱，且易受到贸易壁垒限制。机电企业通过直接出口与间接出口的方 式进入海外市场，属于贸易型模式\n②契约型指企业通过交钥匙工程、技术授权、特许专营等形式进入国际市场，以合约的方 式将企业的技术、服务、品牌或其他无形资产交由客户使用，并获得收入。这 种方式能够充分利用企业的闲置资产，与投资模式相比风险较低，但存在技术泄露的风 险。中国机电企业通过技术咨询服务、工程承包为海外客户提供解决方案，属于契约型 进入模式。\n③投资型指企业在他国成立独资或合资公司，参与东道国经营。这种方式控制力 强，但同时成本高、失败风险大。中国机电企业在海外投资设厂或设立分销机构，属于\n投 资 型 的 市 场 进 入 模 式 。\n(2)  产品通过哪些方式进入国际市场?经销和代理有什么不同?(5分)\n产品进入国际市场的方式包括出口贸易(国内生产)和海外生产。前者包括直接出口(由 海外中间商销售产品或企业自建海外销售渠道)与间接出口(由国内贸易商代企业寻找海外 市场),后者指通过制造外包(含OEM贴牌生产和ODM 原始设计)或对外直接投资实现产 品在国外市场当地生产并出售。\n国际贸易中的经销是指进口商(即经销商)根据国外出口商(即供货商)达成的协议， 承担义务在规定期限和地域内购销指定商品的做法，分为一般经销(定销)和独家经销(包 销)。国际贸易中的代理指代理商代表委托人招揽客户、接受订单、签订合同、代为处理委 托人的货物、代收货款的行为。经销商与代理商都承担了出口商与海外消费者之间中间商的 角色，区别在于：\n①法律关系、货物所有权和风险：经销属于一种买卖关系，经销商获得货物的所有权，并 承担销售商品的风险；代理属于一种委托代理关系，货物所有权仍然属于生产厂商，风 险一般由厂商承担。\n②利润分配方式：经销商通过加价销售赚取利润；代理商通过佣金赚取利润。\n③市场控制力：经销商处于独立经营的地位，权力较大，生产商较难通过经销商而掌握市 场；代理商处于被委托的关系，本质依然是委托人与买家交易，易于控制市场。\n产品进入国际市场的方式包括产品出口、国外生产、补偿贸易和加工贸易。\n①  产品出口指把现有产品的一部分转运到国外市场销售，生产设施仍然留在国内。产品出 口的方式包括直接出口和间接出口。\n②国外生产指在海外设厂直接在海外市场生产产品并在海外销售。主要形式包括国外装配、 技术授权与合资经营。\n③  补偿贸易指买方以贷款形式购进基期设备、技术专利等，进行原油生产规模的改建和扩 建，加强产品竞争力。其贷款不用现汇支付给卖方，而是待项目竣工投产后，以该项目的产 品或其他产品清偿。包括产品返销、互购、部分补偿和第三国补偿。\n④  加工贸易指企业进口全部或者部分原材料或零部件，经加工或装配后出口到国际市场。 包括进料加工、来料加工与来件装配、来样定制。\n(2)出口按渠道长短划分，包括与中间商合作(含经销商与代理商)、与零售商合作、设立 直营销售机构(准确说批发商和零售商都属于中间商), 合作渠道越短，市场控制力越强。  渠道环节很复杂，不要死板地深究概念，越深究越分不清楚。简单理解：制造商→ 中间批发 商：包括取得货物所有权的经销商、不取得货物所有权的代理商→零售商→ 消费者。\n(3)如果制造商自己负责出口管理，由海外经销商、代理商协助其出售商品，或设立海外 销售机构(销售代表处or  销售分公司),则属于直接出口；如果制造商不负责出口管理，由 国内的经销商购买后向海外出售，或代理商代为寻求海外买家，则为间接出口。\n(2)从贸易实务的角度看，经销和代理是不同的法律关系，在所有权转移、风险划分存在 根本不同。法律关系、所有权转移和风险划分侧重于贸易实务，初试备考不一定知道，好在 所占分值不高，保持好心态，不会不要紧。从初试内容看，经销和代理的对比可以从市场进 入模式角度分析，如经销和代理都属于中间商，相对于直接建立销售机构，成本较低，能够 充分利用经销商和代理商的渠道资源；代理商更多像撮合和业务介绍关系，最后买卖双方依 然是出口商和海外买家，所以通过代理的方式更容易控制海外市场。即使不懂贸易实务，答 市场控制力也能得分， 一定不要空着。\n直接出口与间接出口的区别在于厂商是否直接参与出口管理环节；间接出口市场控制力较弱， 适用于规模较小的企业或国际化的初期阶段(乌普萨拉模型),反之成本风险较低；直接出  口能够直接接触海外的市场信息，市场控制力较强，但需要独立完成出口环节，成本和风险   高 于 间 接 出 口 。\n(3)   中美贸易战对机电企业造成了哪些风险?该机电企业应采取哪些方法应对中美贸易 战带来的冲击?(10分)\n中美贸易战对机电企业造成的风险如下：\n①政策变动风险：中美贸易摩擦前景不明朗，未来可能遭遇更加严苛的关税或其他政策限 制。\n②法律风险：中美贸易战背景下，机电企业容易同美方产生法律纠纷，应诉时间长、成本\n高、损失大。\n③  供应链风险：中美贸易战可能导致机电行业上下游供应链断裂，上游关键零部 件供货不畅，下游销售受阻。\n④市场风险：美方对机电行业加征关税，产品市场竞争力下降，可能导致丧失机电企业丧 失海外市场份额，订单减少，市场规模萎缩。\n⑤财务风险：市场下滑导致企业收入减少，关税和合同纠纷增加成本费用，影响企业现金 流，加大财务压力甚至引发偿债问题。\n⑥破产与失业风险：经营状况恶化导致国内机电企业破产，工人失业；机电行业转移到他 国生产，实体经济外移，减少就业。\n⑦金融风险：机电企业无法偿债，导致国内银行贷款出现不良，银行信贷出现损失。 面对中美贸易摩擦，机电企业可以采取的措施：\n①多元市场经营，减少对于美国市场的依赖；在出口受阻的情况下需要加大对国内市场的 开发，转外贸为内需；\n②做好政治风险研究和预防，建立预警机制；\n③开展政府和行业协会的公关，影响美方对机电进口的政策制定；\n④充分利用国际贸易和投资保险，通过保险减少机电产品销售损失\n⑤ 在美国设立合资企业，以在东道国生产代替产品出口，避开关税壁垒；\n⑥增强谈判能力和应诉能力，遇到法律事件及时应对纠纷；\n⑦建立人才储备机制，培养法律、营销、公关等人才。\n长期看来，机电企业应谋划转型，加大对底层技术的研发，变低价优势为核心技 术优势，提高产品附加值，在国际市场中取得领先地位而获得更强的话语权，不至于因美 国加征关税而陷入被动。\n(2)题干设问为企业的应对措施，那么答案写国家和行业层面的就不够契合。如何应对可 以正常想到转变经营战略、绕过关税壁垒海外投资设厂生产、加强应诉和谈判能力等方面， 或 者 按 照 前 期 、 中 期 与 后 期 分 类 的 思 路 也 可 行 。\n影响从正面和负面组织，对策可采取“对症下药法”或者按照设问要求，分为政府对策和企 业对策。提供几条要点思路：\n(1)积极影响\n①一定时期内对生活和医护用品的需求提升，相关行业的企业和有条件增设相关生产 线的企业有着更多机会。\n②有利于外贸企业展开线上营销。在国内疫情爆发时，我国企业已经积累了线上营销、\n管理、交易的运作经验。后续海外疫情的爆发进一步降低了线下交易的可能性，线 上营销产生的出口额会大幅提高。\n③倒逼企业升级。全球产业链受阻，会迫使我国企业摆脱对外国相关支撑产业的依赖， 从而发展自身，推动外贸企业转型升级。\n④国际市场迎来“洗牌”机遇。疫情造成全球产业“停摆”,中国外贸企业可以在疫 情爆发的“时间差”中提升自身，跻身中高端国际市场地位。\n(2)消极影响\n①外贸企业面临双向违约风险。疫情期间原材料断供，国际物流受阻，清关期延长， 货物检疫标准增高，可能导致企业无法按期交货或无法按期领受货物并支付货款。\n②全球贸易需求总体下滑，外贸企业订单需求大幅减少。 一方面，原有订单可能被延 迟甚至取消，外贸企业无法按时收汇。 一方面，国外进口商可能转移进货渠道，长 期来看使我国外贸企业面临外部的产业转移风险。\n③企业生产经营成本激增。企业复工伴随着新增的管理成本，同时许多国家对来自我 国的出口产品提高了检疫标准等级，使外贸企业出口环节和中间环节费用增加，导 致企业经营成本上升。\n④各国限制贸易措施使外贸企业出口压力增大。美国、印度等国家借机升级贸易战(如 印度对玩具行业加征60%税),食品、生物制品行业受限制较大(如俄罗斯等国暂\n停 对 外 采 购 食 品 ) 。","knowledge":["国际商务管理"]},{"id":"2020_10","year":2020,"num":10,"type":"案例","question":"传音手机凭什么在非洲市场称王 在当今的手机市场上，iPhone 、三星、华为、小米、OPPO、Vivo等品牌可谓家喻户晓， 然而有一个国产手机品牌虽然在国内默默无名，却以全球出货总量达到亿部的数量级，占领 了非洲40%的市场，成为中国出口手机的销量之王。它就是“传音 ( Tecno)”。 传音成立于2006年，创始团队来自TCL。2015年，南非的商业杂志African Business 发布年度“非洲消费者最喜爱品牌100强”,传音力压谷歌、微软等国际科技巨头，成为非 洲中高端机的代表。","answer":"在当今的手机市场上，iPhone、三星、华为、小米、OPPO、Vivo 等品牌可谓家喻户晓， 然而有一个国产手机品牌虽然在国内默默无名，却以全球出货总量达到亿部的数量级，占领 了非洲40%的市场，成为中国出口手机的销量之王。它就是“传音 (Tecno)”。\n传音成立于2006年，创始团队来自TCL。2015 年，南非的商业杂志 African Business 发布年度“非洲消费者最喜爱品牌100强”,传音力压谷歌、微软等国际科技巨头，成为非洲 中高端机的代表。\n传音凭什么在非洲卖得这么好?非洲消费者为什么这么喜欢传音手机?其实，最根本的 原因在于传音解决了非洲人民自拍的难题。对于肤色较深的人种，大部分手机拍摄很难做到 面部识别，尤其是在光线不佳的情况下，更难以取得理想的效果，而传音手机恰恰抓住了这 一手机拍照的痛点。\n为了更好的解决非洲消费者的需求，传音分别在非洲人口大国尼日利亚和肯尼亚的首都 设立了研发中心，大量搜集当地黑人照片，通过眼睛和牙齿来定位，加强面部其他区域的曝 光，帮助消费者获得更加满意的照片，提升了用户体验。\n非洲有50多个国家和地区，超过11亿人口。早在2012年，非洲就成为全球第二大移 动通信市场，仅次于亚太地区，传音为了避开国内和发达地区市场的激烈竞争，曾专门对非 洲手机市场做了调查，发现当时只有三星、诺基亚等少数手机品牌。于是将国内外手机厂商 关注较少的非洲市场作为自己主攻目标市场。\n2007年11月，传音首度试水非洲市场，推出第一款Tecno 品牌的双卡双待手机，当时 手机在当地的普及率不高，在非洲市场，传音充分借鉴了国产手机厂商多年市场运作积累下 来的经验教训，在多数国产手机还在比拼硬件时，传音手机把焦点放在用户上。传音手机根 据非洲消费者在肤色排汗等方面的特征。开发出了特种美颜、防出汗、防摔等符合非洲消费 者特定需求的产品，深受消费者喜爱。2012年，非洲人普遍使用功能机时，推出高端智能 手机品牌Infinix并以出色的质量征服广大非洲消费者，很多非洲人把传音手机误认为是德国 制造。2017年3月，传音正式推出采用最新的“四象合成”成像技术的Camon CX,该机定位\n于年轻人，主打黑皮肤用户的自拍功能，在非洲、中东与拉美41国发售。目前，传音以Tecno、 Itel、Infinix等自主品牌占据了手机市场40%的份额，2015年手机出货量超过5000万部，2016  年出货量超过8000万部。\n除了贴近非洲消费者生活特点之外，传音还能够真正了解非洲人民的特殊需求，传音手 机推出了主打音乐功能，音效奇佳的音乐手机，而且买手机送大耳麦。\n非洲用户大多有两张以上的SIM卡，大部分人因为经济问题只能买一部手机，双卡手 机在非洲成为刚需，传音推出的双卡甚至四卡手机大受欢迎。\n在非洲市场的营销渠道开发与扩展，采取了中国企业擅长的“农村包围城市”战略，从三 星和诺基亚这些品牌较少关注的贫困落后地区入手，奠定了自己的市场地位和影响力，赢得 了良好的口碑。目前，传音的全球销售已覆盖尼日利亚、肯尼亚、坦桑尼亚、印度、巴基斯 坦、越南等58个国家。\n在非洲，传音是第一个在本地建立售后服务网络的外国手机企业。传音耗资数亿人民币， 在非洲建立世界级售后服务中心，超过1000个售后维修点，拥有1100名专业技术人员， 是非洲最大的用户服务网。\n在促销宣传方面传音采用了大面积、广覆盖的策略。传音遍布各街道的店面海报、公告 牌铺天盖地，留下深刻的印象。传音的售后服务中心在内罗毕开张时，曾邀请当时的内罗毕 市长剪彩，盛况空前，甚至导致封路。\n可以说，传音的成功并不是偶然的，对市场需求的精准把握，以及精准而务实的产品策 略、渠道策略、品牌策略、营销策略在非洲市场取得了骄人的成绩。\n(1)  传音为什么选择非洲市场(5分)\n答案一：选择目标市场的依据或国际投资的选址决策\n①非洲具有较大市场规模和市场潜力：非洲有50多个国家和地区，超过11亿人口，全 球第二大移动通信市场，市场规模大；非洲区位优势条件较好，部分国家成为重要的新 兴市场，保持较快增速，居民收入水平提高，市场潜力大。\n②非洲市场竞争较小而吸引力强：传音进入非洲之前，国内手机厂商较少关注非洲市场， 而国外也只有三星、诺基亚等少数手机品牌在非洲经营，非洲手机竞争市场相对较小。 具备较强的市场吸引力。\n③非洲市场具有兼容性与可行性：非洲对外来投资和产品持欢迎态度，非洲国家生产能力 相对不发达，社会消费品较少，需要外来手机厂商提供产品满足其需求，进入非洲市场 具备可行性。\n④  进入非洲市场符合传音手机的目标与能力：传音手机具有较强的手机设计研发和生产能 力，能够满足非洲消费者的偏好；同时，中国国内手机市场竞争较为激烈，进入非洲市 场可以避开国内竞争，获得增长空间，符合企业目标。\n答案二：SWOT分析法\n引入SWOT 模型分析传音的市场战略：\n① 优 势 (Strength):  传音手机具有较强的手机设计研发和生产能力，能够满足非洲消费\n者在拍照等方面的偏好。\n② 弱 点 (Weakness): 非洲手机市场主要是低端机型，传音产品不存在明显的弱点和软肋。\n③ 机 遇 (Opportunity):    非洲有50多个国家和地区，超过11亿人口，全球第二大移动通 信市场，市场规模大；许多非洲国家作为新兴经济增长潜力大，居民消费能力提高，未 来手机市场还有增长潜力。\n④ 威 胁 (Threat): 国内手机厂商较少关注非洲市场，而国外也只有三星、诺基亚等少数 手机品牌在非洲经营，当前市场威胁较小。\n根据SWOT分析，传音在S 和O 层面占据主导地位，应当采取增长型策略，进入非洲市场。\n①战略定位：聚焦薄弱市场，正确的战略判断和战略选择，抓住了非洲市场机遇。\n②竞争战略：为用户创造差异化价值，以产品和服务的方式增强用户体验，如满足自 拍需求、建立优质的售后服务。\n③品牌战略：采取恰当的品牌策略，推出高端手机品牌增加附加值；进行品牌分层与 组合，扩大市场占有。\n转型机遇逐渐退出市场。同时，传音还面临和中兴、华为等国内手机厂商的竞争，可能逐渐 失去先入者优势，中兴、华为不仅是手机制造商，还是通讯基础设施提供商，竞争优势明显 强于传音，随着竞争者数量增加，传音可能遭遇激烈的竞争逐步陷入困境。如果对传音手机 有所了解，尽管传音在非洲大获成功，但当传音进入印度、拉美时却并不顺利。全球手机市 场竞争愈加激烈，国内手机厂商想要实现增长，可谓困难重重。\n(2)当然，可以有更高的战略定位，跳出“非洲市场”这个思维框架，站在未来发展规划 提建议。简单认为，传音手机的定位是功能机和中低价位的智能机(专注于发展中国家市场), 如果考虑经济周期和消费升级 ( or  降级),未来这一片市场的规模是扩大还是缩小，传音 手机是否需要改变定位?发展中国家市场是否制约了传音的发展空间，要不要反向杀入发达 国家市场(如欧美市场)?5G 技术、物联网技术、智慧城市技术将多大程度影响传音手机 的市场地位，传音是否需要多元化经营，依托手机技术开发智能家居等新领域?如果对传音 和全球手机市场有更充足的了解，可以回答这些战略层次的问题。","knowledge":["跨国公司与国际化","中国对外经济","国际商务管理"]},{"id":"2021_1","year":2021,"num":1,"type":"简答","question":"在本土成功的企业到国际上还能成功吗?为什么?","answer":"(1)本土企业在国际市场需要克服海外经营的“陌生人劣势”,面临政治、宏观经济、社会 文化、技术和行业竞争方面的风险。\n①政治风险：海外市场政局动荡、政策不稳定等政治因素超预期变化，带来不利影响。 企业在国际市场可能遭遇战争、政策变动、双边关系恶化或遭遇东道国的歧视和抵 制，最终导致国际经营失败。\n②宏观经济风险：企业在国际市场的宏观经济更加复杂多变，经济衰退、通胀激增、 汇率波动都可能造成企业在海外经营失败。\n③跨文化风险：海外市场和本土市场的东道国文化和价值观方面不同，形成跨文化冲 突，造成管理困难。\n④竞争风险：在东道国面临竞争激烈，竞争对手能力较强，潜在进入者和替代品的威 胁较大，威胁到企业的生存。\n(2)错误选择市场区位。企业在国际化过程中，必须考虑内外部因素选择恰当的进入市场， 有些企业海外扩张过于激进，选择了政治不确定性高、行业竞争激烈的市场，最终出现亏损， 被迫改变经营策略。\n(3)采取不当的国际经营形式。企业国际经营的方式包括出口贸易、契约式安排、合资经 营和独资经营等方式。有些企业规模较小，抗风险能力弱，但大幅加杠杆收购海外企业，导 致企业陷入债务危机，导致经营失败。\n(4)误判国际化的时机。如果企业作为先入者进入国际市场，则有可能因不熟悉当地环境  而付出沉重代价，如果企业作为后入者进入国际市场，则有可能无法与先入者的顾客口碑、 规模优势竞争。\n(5)不能处理本土化和标准化的关系。如有些企业在国际经营过程中、忽略了不同市场消 费者的偏好，推行标准化的策略，不能满足当地市场需求，出现市场失败。\n(6)组织不适。在国际化的过程中规模扩大，需要调整组织结构提高组织效率，采用地区  分部结构或产品分部结构，但有些企业没有及时进行组织变革，不能适应国际经营而失败。\n(2)和许多高分同学沟通过程中发现，答这道题目很多同学用了举例的方法，这是形成分 数差异的因素。那么答案中可以把案例储备素材补充进来，比如政治风险用中海油收购优尼 科失败，技术风险用诺基亚没有跟上智能手机开发，跨文化风险用戴姆勒一克莱斯勒并购失 败，错误经营形式用海航大规模海外收购，本土化和标准化用可口可乐的战略选择，组织不 适用壳牌公司的全球结构等。","knowledge":["综合"]},{"id":"2021_2","year":2021,"num":2,"type":"简答","question":"分析人民币汇率变化的趋势和原因。","answer":"(1)2020年人民币汇率呈现“先贬后升”的两阶段趋势。2020年1月末至5月末，人民币贬 值；6月初至12月末，人民币升值。\n(2)第一阶段：自年初新冠疫情爆发来，截至5月末，人民币累计对美元贬值4.4%,5月 27日在岸人民币报价7.1765。\n①国际金融市场大动荡，避险偏好强，流动性紧缺，对美元需求激增，迫使人民币贬值。\n②  疫情在中国最先爆发，冲击中国经济。\n③生产基本停滞，出口锐减，2020年第一季度经常项目逆差。\n(3)第二阶段：自2020年6月以来，人民币表现为走强的趋势，截至12月末，人民币兑 美元汇率升值约9.2%,12月29日报价为6.5375。\n①财政经济状况：中国从新冠疫情快速中快速恢复，复工复产状态良好，经济恢复正增长； 对比之下，欧美疫情持续蔓延，经济形势恶化；中外在疫情下的不同表现是人民币强势 的基本面因素。\n②利率政策(短期):中国在疫情得到初步控制后，货币政策逐步恢复中性，下半年 LPR 整体保持在3.85%;反观欧美推出无上限的量化宽松，零利率甚至负利率，中国保持的 正利差吸引资金流入。\n③  长期投资：外部世界疫情形势依然严峻，投资环境较差；相较之下，中国政府改革释放 了红利，中国是更理想的投资目的地，2020上半年IFDI流入逆势增长。\n④  贸易收支：疫情后的中国恢复出口，第三季度出口顺差创新高，支持人民币升值。\n⑤  通货膨胀：QE背景下的货币超发势必增加通货膨胀的预期，使美元等货币趋于贬值， 对应人民币升值。\n(4)【选答】人民币汇率走势研判： 2021年人民币汇率保持强势，“破6”属于小概率事件。 影响2021年汇率变动的主要因素：外部市场疫情控制，世界经济的复苏情况，中美利\n差，中国的出口前景，央行的干预偏好，大国关系带来的不确定性。\n目前，人民币汇率走强的基本面是在全球经济受到疫情冲击的背景下、中国经济表现优 于其他主要经济体。2021年，外部疫情蔓延而中国在后疫情时代保持较好的增长态势，中 国出口保持强劲、经常项目顺差，这些依然属于大概率事件，因此，支持人民币走强的基本 面因素没有改变，基于这一判断，2021年人民币汇率将保持强势。\n但是，其他几个因素的不确定性会导致人民币汇率反向调整。一是全球疫情走向，伴随 疫苗的广泛接种和群体免疫，西方经济会走上复苏道路；二是美联储政策逐渐回归正常，中 美之间利差空间减小，改变国际资本流向；三是后疫情时代保护主义抬头，全球贸易秩序“碎 片化”格局加剧，贸易摩擦增加，阻碍中国出口增长。\n此外，人民币汇率还和央行的政策偏好相关，尽管8-11汇改之后，人民币双向浮动逐 渐常态化，汇率干预已经大大减少，但是，过快的人民币升值并不符合中国政府的宏观经济 调节的目标，因此，央行对汇率的干预也可能改变人民币的升值趋势。\n(1)描述人民币汇率趋势的两大指标是人民币兑美元汇率和人民币汇率指数，考试要用客 观数据说明趋势变动，下图用在岸人民币数据表示：\n2020-05.02020-05.0(2)汇率的影响因素： 一国的经济实力(根本)、经常项目收支(重要)、相对利率差异(重 要)、货币政策影响下的相对通货膨胀率(重要)、政府的调控(辅助)以及对于上述因素心 理预期。虽然新冠疫情是直接原因，但是疫情影响是通过什么机制影响人民币汇率的，这就 要求我们理论结合实际具体分析。\n(2)类似说明趋势类问题涉及另一个重要的潜在答题要点，就是“趋势研判”,不仅要答过 去，而且要分析未来，这是作为论述题的要求，也是得分差距的来源之一，但这里作为简答 题就不要求答这一点。比如，问“如何看中国2020年出口增长”,那么不仅要关注2020年 的成绩，还要分析2021年这个趋势会怎样变化。如果把人民币汇率作为论述题考，就要加 上 趋 势 研 判 的 部 分 。","knowledge":["国际金融","中国对外经济"]},{"id":"2021_3","year":2021,"num":3,"type":"简答","question":"企业海外并购的风险和对策。","answer":"(1)并购风险\n①  营运风险：整合困难。企业并购完成后可能并不会产生协同效应，并购双方资源难以实 现共享互补，甚至会出现规模不经济，比如整个企业反而可能会被并入企业拖累。\n②融资风险：企业并购往往需要大量资金，如果企业筹资不当，就会对企业资本结构和 财务杠杆产生不利影响，增加企业财务风险。\n③反收购风险：如果企业并购演化成敌意收购，被并购方就会不惜代价设置障碍，从而增 加企业收购成本，甚至会导致收购失败。\n④安置被收购企业员工风险：在实施企业并购时，并购方往往会被要求安置被收购企业员 工或者支付相关成本，如果并购方处理不当，会背上沉重的包袱，增加其管理成本。\n⑤资产不实风险/信息不对称导致过高代价：由于并购双方的信息不对称，有时并购方看 好的被并购方的资产在并购后有可能存在严重高估，甚至一文不值，从而给并购方造成 巨大的经济损失。\n⑥文化碰撞。并购双方企业的文化存在冲突，影响整合运营的有效性。\n⑦政治风险。存在东道国政局动荡、国家意识形态偏见、政策变动和歧视性风险，使得海 外并购遭遇阻碍，无法顺利进行。\n(2)应对策略\n①建立政治风险评估机制，防范政治风险；\nA.  并购之前通过专业的评估机构对目标公司所处国家的政治风险进行评估；\nB.  开展政府和媒体公关活动，保持同东道国政府的良好关系，消除对中国企业的猜疑；\nC.  利用投资保险降低损失。\n②提高专业化和法律意识，防范法律风险；\nA.  熟悉东道国的并购法律环境，寻求专业机构的法律服务；\nB.  国家加强对中国企业走出去的法律支持。\n③全程控制财务风险\nA.  并购前进行细致的评估与审查，评估被并购方价值，避免估值过高和隐藏债务问题；\nB.  选择合理的支付方式和融资方式，降低财务压力。\nC.  加强并购后的审查和管理，防控经营中财务风险。\n④重视文化和人员整合，防范整合风险\nA.  控制文化整合风险，尽早实现运营的协同效应；\nB.  控制人员整合风险，避免人才流失问题。\n⑤采取正确的并购战略，防范竞争对手恶意抬高收购价格。","knowledge":["综合"]},{"id":"2021_4","year":2021,"num":4,"type":"简答","question":"上半年全球直接投资指数大幅下降，但是中国吸引外资保持平稳，根据外商投资理论以 及现实情况分析原因，并解释中国扩大吸引外资规模，提高外资利用质量的政策。","answer":"(1)中国吸引外资平稳的原因\n①长期因素：中国的区位优势\n邓宁的国际直接投资理论认为，区位优势是FDI投资选址的决定因素，区位优势来源于 一国的自然地理、政治环境、经济人口因素、产业集聚等方面。\nA.   中国拥有最大的消费市场，居民生活水平高，市场因素是吸引外资的重要原因。\nB.   中国拥有最齐全的制造门类和完备的基础设施，形成较好的产业协同和产业集聚效 应。\nC.   中国拥有丰富的要素供给，熟练劳动力和研发型、知识型、管理型人才供给充分， 利于企业生产与创新。\nD.   中国政府不断优化和改善营商环境，促进国际投资便利化。\n②短期因素：新冠疫情下中外疫情控制差异。\n中国以较小的代价率先控制疫情，复工复产有力，生产秩序稳定，经济恢复预期向好。 同时，为了对冲疫情对内外资企业的不利影响，采取了减税降费、融资支持、直接补贴等方\n式帮助企业渡过难关，进一步提高了外资吸引力。\n反观，新冠疫情蔓延对各国经济造成严重冲击，出现衰退危机，社会生产秩序混乱，直 接投资环境恶化，造成一部分外资转而流向中国市场。\n(2)提高利用外资质量的政策\n①健全外商投资准入体系，放宽制造业的准入标准。进一步缩减外资准入负面清单，扩大 利用外资范围；减少对外资的所有权限制，逐步放宽外资持股比例的限制；减少对外资 在华经营的运作干预，缩减对招商引资的不合理要求。\n②落实外商准入国民待遇，营造内外资企业公平竞争的环境。坚持“国民待遇”,做到内资 和外资一视同仁，给予外商投资充分的优惠政策；做到内资和外资公平竞争，避免给予 外资过多的优惠而形成“超国民待遇”影响本土企业的成长空间。\n③坚持推进投资便利化，提高服务外资的质效。创造透明、公平的环境，提供优质、高效 的公共服务；深化外资审批体制改革，促进投资便利化，调整外资审批内容、简化审批 程序、最大限度缩小审批范围、增强审批透明度。\n④不断加强法制建设，优化外商在华的制度环境。加强对营商环境的顶层设计和制度建设， 打造一流的外商投资制度环境；完善落实《外商投资法》,保护外商投资的合法利益； 加强在知识产权等领域的法律保护。\n⑤持续优化基础设施。加强铁路、公路、港口等基础设施互联互通建设，便利出口型外资 企业扩大对外贸易；降低外商经营的生产要素成本；打造具有示范效应的产业集群，形 成内资与外资的上下游优势互补。\n⑥有步骤地扩大金融业对外开放。提高金融机构服务效率，为在华外资企业提供融资、结  算便利；完善合格境外投资者制度，深化境内外资本市场互联互通，减少货币兑换限制。\n(1)外商投资理论指我们说的FDI  理论，很容易想到区位优势理论(国际直接投资环境), 这个在国际投资学中有详细说明，结合热点的要素供给(人力资本、数据要素)、营商环境 (外商投资法)、基础设施(新基建计划)、产业集聚等因素说明。\n(2)措施方面不是必须结合国家政策，可以答“如何应对新冠疫情对FDI 的影响”或者国 际直接投资的效应里面的东道国鼓励投资的政策。\n(2)考完之后和同学们沟通的过程中发现了许多同学思维局限，原因分析只答了“新冠疫 情”的影响，但是忽略了更多更加根本性的因素，比如中国拥有最广阔的市场、中国拥有最 齐全的制造业门类等区位优势，最后得分不太理想。提醒我们思考原因的时候，不能仅仅关 注表象，而且要分析长期因素——正好也是需要。\n(3)注意政策的审题，设问里面有两个层面， 一是“扩大外资规模”,侧重于“量”,二是 “提高外资利用质量”,侧重于“质”。扩大外资规模则要“宽”,放宽外资准入标准，提高 外资利用质量则要“严”,优化外资结构，促进内外资公平竞争。\n总之不难发现，我们通过审题就能总结出答题的内容与框架，提醒我们答题不要提笔瞎 写 ， 一 定 要 心 中 有 数 。","knowledge":["综合"]},{"id":"2021_5","year":2021,"num":5,"type":"简答","question":"进口替代工业化是什么?为什么大多数采取进口替代工业化的发展中国家经济并没有快 速增长?","answer":"(1)含义：进口替代战略，就是通过建立和发展本国的工业，替代制成品进口，以带动经 济增长，实现工业化，减少贸易逆差，改善国际收支状况。\n(2)【选答】理论基础：李斯特的幼稚工业保护理论、普雷维什的中心外围理论\n(3)失效原因：答案一\n① 违背了比较优势原则，通过人为的干预将资源和生产要素转向自己处于比较劣势的部门 或产业，减缓经济发展速度。\n②保护政策导致国内产业竞争意识不强，生产成本过高，缺乏效率刺激。\n③进口替代的进一步发展，会遇到国内市场狭小的限制，很难实现扩大出口，无法利用规 模经济优势。\n④进口替代政策可能导致发展中国家的二元经济结构强化，阻滞整个国家经济现代化进程。\n⑤单纯的进口替代还有限制出口的效应，会抑制国内企业的效率和出口势头，必要的进口 在增加，出口又难以增加，比如导致外汇短缺，国际收支恶化。\n⑥“封闭性”的进口替代发展战略存在自给自足的倾向，将自己封闭起来的战略不利于借助 外部的资源和技术发展自己的经济。\n⑦采取这一战略的国家和地区没有能够及时调整其政策，降低对国内制成品工业的高度保 护，消除抑制出口的刺激，而改行出口激励的机制。\n答案二：进口替代战略的理论基础具有明显缺陷，在应用中局限性大。\n幼稚工业保护的缺陷：\n①选择幼稚工业非常困难，界定哪些产业、在什么时间是需要实现进口替代的产业，往往 难以实现。\n②对进口替代产业的保护导致其丧失竞争意识，依赖于保护，效率低下。\n中心-外围理论的缺陷：\n①中心外围理论是反市场机制的，进口替代会压抑市场机制的作用，局限性较大。\n②进口替代的主张割裂了国内与国外资源的关系，不利于引进国外技术。\n③发展中国家市场规模较小，不能通过保护而改善本国贸易条件。\n此外，发展中国家往往缺乏实施进口替代的条件：这些国家外汇储备短缺，缺乏资金支 持资本密集型的进口替代工业发展；大举借债会加剧国内的债务负担，引发债务危机；人力  资本匮乏，缺乏独立研发发展工业的能力；政府不够透明，在发展进口替代工业时滋生腐败。","knowledge":["综合"]},{"id":"2021_6","year":2021,"num":6,"type":"论述","question":"请论述服务贸易在国际贸易发展中的趋势和动因。","answer":"(1)国际服务贸易\n国际服务贸易，指服务贸易提供者从一国境内通过商业存在或自然人的商业现场向服务 消费者提供服务，并获取外汇收入的过程。包括跨境交付、境外消费、商业存在和自然人移 动4种形式。\n(2)发展趋势\n①总量和差额：服务贸易发展速度快。\nA.   世界服务贸易的增速总体快于GDP 增速；\nB.    世界服务贸易持续以高于货物贸易的速度发展；\nC.   世界服务贸易依存度不断提高。\n②地理方向和地区分布：国际服务贸易的发展在世界范围内不平衡。\nA.   发达国家居于主导地位；发展中国家在世界服务贸易中地位上升，增长明显加快；\nB.    发达国家整体表现为服务贸易的顺差，发展中国家逆差。\n③贸易产业和产品结构：\nA.   国际服务贸易的范围不断扩展，结构进一步完善；\nB.    知识密集型的服务业迅速扩张，服务贸易向高增值型服务转移。\n④微观主体：跨国公司成为服务贸易贡献的主力军。\n⑤国际规则和政策：服务贸易谈判艰难推进，国际服务贸易保护主义盛行。\nA.   “ 乌拉圭回合”诞生了《服务贸易总协定》( GATS), 服务贸易朝自由化发展；\nB.    发达国家主导全球服务贸易新规则的制定；\nC.   国际服务贸易摩擦频繁，服务贸易保护主义盛行。\n⑥ 贸易利益&作用：国际服务贸易分工格局不平等，发达国家居于价值链高端。发达国家 与发展中国家在服务贸易方面的差距短期难以缩小。\n⑦中国的服务贸易处于相对劣势，服务贸易整体竞争力不强，且服务贸易的逆差处于不断 扩大趋势。\n(3)发展原因： 经济根源：\n①亚当斯密的“剩余外溢”学说认为，国际贸易的发展是生产力发展的必然结果。一国生产 的产品首先满足国内需求，当国内市场出现饱和时，产品会寻求国际扩张。当发达国家 的服务产业发展到一定阶段，且出现过剩生产时，则会出现服务的国际交换，即国际服 务贸易。\n②  HO理论等国际贸易理论认为，一国对外贸易结构必然是本国经济结构的反映，服务贸 易的繁荣是经济结构调整的必然结果。二战后，以服务业为代表的第三产业迅猛发展， 增速远远超过制造业。因此，服务贸易占世界贸易总额比重提高是服务业快速发展的重 要背景。\n③李嘉图模型等贸易理论认为，比较优势是决定贸易分工格局的基础。\nA.   整体看来，发展中国家在制造业拥有比较优势，成为货物贸易的顺差国，而发达国 家在服务业拥有比较优势，成为服务贸易的顺差国。\nB.   在服务业内部看来，发达国家人力资本等要素更加丰富，主要出口咨询、金融等技 术密集型服务，而发展中国家劳动力和自然资源丰富，主要出口劳务等劳动密集型 服务。\n④新贸易理论、国家竞争优势等贸易理论认为，需求结构是影响服务贸易的规模和方向的 重要因素。伴随世界经济发展和收入水平的提高，国际社会对服务的需求迅速扩大，刺 激了国际服务贸易的增长。发达国家生产性服务、消费性服务需求大于发展中国家，发 达国家服务业发展比发展中国家获得较强支撑，比较优势更加明显。\n推动因素：\n① 国际货物贸易的发展带动了国际服务贸易的增长。战后货物贸易的增长，带动了国际运 输服务、国际结算服务等行业的，促进了国际服务贸易的增长。\n②科学技术进步是国际服务贸易发展的重要推动因素。科学技术增加了服务贸易的产品种 类，加快了人员的国际流动，推动服务贸易流量的扩大。\n③多边贸易谈判推动服务贸易的自由化进程，自乌拉圭回合谈判以来，国际服务贸易成为 多边贸易谈判的重要议题，主张减少服务贸易壁垒。\n④区域经济一体化促进了区域内服务贸易。欧盟、NAFTA 在成立之初就将服务自由贸易 作为区域合作目标之一；CPTPP 保留了CPP 大部分条款，建立了较高水平的服务贸易 规则。\n⑤各国政府把发展服务贸易、提高贸易竞争力作为重要的对外贸易政策目标，尤其是发达 国家在鼓励对外服务贸易方面做出了诸多努力。\n⑥跨国公司通过国际经营活动将服务延伸至全球，与服务贸易相关的FDI出现大幅增长， 如沃尔玛的分支机构遍及世界各国，促进了国际服务贸易(“商业存在”形式)的发展。\n(2)概念解释一般用到《服务贸易总协定》( GATS) 的定义和四种形式，整体默写服务贸易 的定义即可，四种具体形式不需要展开。\n(3)趋势类问题一般包括：总量、差额、地理结构、产业结构、贸易政策和规则、贸易利 益分配等方面构成。这些问题都不需要死记硬背，总量就是整体发展水平，差额就是谁顺差、 谁逆差，地理结构就是哪些地区贸易所占比重大，产业结构就是哪些行业比重高，规则包括  多边规则 ( GATS) 和区域贸易协定，政策包括保护政策和自由政策。问到了趋势，则要兼顾  静态与动态，如“发达国家占比高”(静态)、“发展中国家增速快”(动态),基本上我们用 日常的积淀就能组织出答案来。趋势描述问题永远都不能靠死记硬背，如果简单的描述都不  能掌握的话，考试也就没有高分可言了。\n(4)原因类问题首选理论解释的思路，显然，我们学过解释国际服务贸易的经典模型包括 比较优势理论和竞争优势理论，二者都能从一定角度解释服务贸易，或者从供给与需求角度 分类。这里采用了内外因把解释分为“经济根源”(理论解释)和“推动因素”,推动因素是 主体划分的思路，从多边组织、区域组织、政府、跨国公司展开。\n析当代国际服务贸易飞速发展的原因，以及增强中国服务贸易国际竞争力的对策，并阐释国 际服务贸易在国际商务未来发展中的作用。】\n【中财2020年论述：中国服务贸易对外开放所面临什么问题?中国服务贸易对外开放的对 策分析。】以上两题是论述“中国服务贸易”的题目，可与人大考的“世界服务贸易”结合 复 习 ， 储 备 中 国 服 务 贸 易 竞 争 力 及 相 关 对 策 。","knowledge":["综合"]},{"id":"2021_7","year":2021,"num":7,"type":"论述","question":"请从国际经济学角度分析RCEP 的贸易促进效应。","answer":"(1) RCEP的基本概况\n《区域全面经济伙伴关系协定》(Regional Comprehensive Economic Partnership,RCEP) 是2012年由东盟发起，历时八年， 由包括中国、日本、韩国、澳大利亚、新西兰和东盟 十国共15方成员制定的协定。RCEP 是亚太地区规模最大、最重要的自由贸易协定谈判， 达成后将覆盖世界近一半人口和近三分之一贸易量，成为世界上涵盖人口最多、成员构成最 多元、发展最具活力的自由贸易区。\n(2)从国际经济学角度分析\n①关税同盟理论和自贸区理论。\n瓦伊纳和利普西的关税同盟理论认为，关税同盟对成员国内部实行贸易自由化，对成员 国以外实行贸易保护，具有贸易创造效应和贸易转移效应。\n自由贸易区与关税同盟理论不同，自由贸易区的成员国在对非成员国的进口中保持了独 立制定关税的主权，因此有可能会发生贸易偏转效应。\nA.    贸易创造效应，指建立关税同盟后， 一些国内生产品被同盟内其他生产成本更低的 产品的进口所替代，从而增加贸易规模，产品价格下降，增加社会福利。贸易创造 效应是一种正效应。RCEP 成员国之间削减90%以上的关税，会减少自贸区内部关税 成本，形成“贸易创造”效应。\nB.    贸易偏转效应，指区域内某成员国一方面向其他成员国出口产品，另一方面从其他 非成员国进口相同产品以替代本国产品对国内需求的满足。贸易偏转取代了贸易转 移的负效应，未造成资源效率的整体扭曲，因此，自贸区的福利效应要优于关税同 盟。RCEP 成员国保留了贸易政策的自主权，在RCEP 基础上，中国可进一步开展中 日韩自贸区谈判，深化中国-东盟自贸区合作，加入CPTPP等，拓展成员国之间及 成员国与非成员国之间的双边贸易合作，进一步增强贸易创造效应。\nC.   贸易扩大效应指收入增加带来需求增加，进一步扩大成员国的贸易流量。RCEP 的贸 易促进效应有助于促进东亚经济圈的GDP 增长，提高成员国居民收入，对于一些需 求收入弹性>1的产品，尤其是工业制成品，收入增加会带动对这些产品的需求增 长，从需求的角度产生更大的贸易流量。\n②大市场理论(关税同盟的动态效应)。西托夫斯基认为，组建共同市场，把狭小的国内 市场扩大为贸易集团内部的市场，更能实现规模经济的要求。RCEP签订后，东亚经济  圈的企业面临的激烈竞争，刺激劳动生产率提高和成本下降，更好的发挥规模经济效应。 同时，RCEP 内部商品和要素自由流动，提高了资源的配置效率。此外，开放市场的竞  争效应有利于 RCEP 成员国整体生产率的提高，促使技术进步，进一步增加了贸易带来  的福利。\n③  比较优势理论。李嘉图的比较优势论认为，不同国家应按照比较优势分工，出口具有比  较优势的产品，进口不具有比较优势的产品，贸易的结果是使双方获利。RCEP 成员国 之间经济发展特征不同，各自拥有比较优势，东盟拥有较低的劳动力成本；澳大利亚、 印尼拥有铁矿石、石油等丰富的自然资源；新西兰、澳大利亚、泰国等拥有发达的农业、 畜牧业；中国、日本拥有齐全的制造业，成员国之间分工互补，有利于实现多边共赢。\n④协议性分工理论。小岛清认为两国达成相互提供市场的协议，实行协议性分工。协议性  分工不能依靠通过价格机制自动地实现，而必须通过协议来实现，通过经济一体化的制  度把协议性分工组织化。RCEP 通过协议组织安排，成员国承诺扩大特定领域生产进口 (如中国进口农产品),促使贸易双方优势得到更快释放，实现规模经济和专业化分工。\n⑤国际投资和贸易的互补效应。贸易与 FDI的关系理论认为，当FDI为垂直型时，国际贸  易与投资会产生互补效应。RCEP 作为区域投资和贸易协定，各成员国在区位优势条件  上互不相同。资源导向型产业可以到印尼、澳大利亚投资，而劳动力密集型的企业可以 到越南、泰国等地生产，实现上下游产业分工，进而产生上下游产品的贸易促进效应。\n(3)综上所述，RCEP 对东亚区域贸易具有强大的贸易促进效应，在中国着力构建新发展格 局的背景下，RCEP 对畅通国内国际双循环格局有着重要作用。为此，我国要加快推进RCEP 的成果落地，提高区域自由贸易水平，促进RCEP 及“朋友圈”的经济贸易发展。\n(2)题目的难点在于要理论与实际结合，单独默写理论不难，单独谈谈 RCEP 也有话可说， 但是怎么做到二者结合却非常困难，比如RCEP 能发挥各国的比较优势，那么成员国各自有  什么比较优势?恰恰是很多同学答不了的，也是形成分数差异所在。\n(2)限定需要“结合国际经济学”,那么没有答相关国际经济学原理，高分就相对困难了， 因为对同学们而言，很难“重剑无锋，大巧不工”地运用国际经济学理论分析经济热点，所  以说，扎实的国际经济学原理作为铺垫才是基础。","knowledge":["综合"]},{"id":"2021_8","year":2021,"num":8,"type":"论述","question":"在中美贸易摩擦的过程中，有人宣称：“美国对价值500亿美元的中国产品征收25%的 关税，对我们的经济起到了促进效果，但事实上，美国征收关税对美国生产成本的影响很小， 征收关税后的损失也是由中国来承担的”。以下为美国对中国食糖征收25%关税前后的价格 变化： (1)计算美国征收中国商品关税后福利变动情况。(10分) a. 消费者福利损失；b. 生产者福利增加； c. 政府财政收入； d. 国民净福利影响","answer":"(1)计算美国征收中国商品关税后福利变动情况。(10分)\n①消费者福利损失；②生产者福利增加；③政府财政收入；④国民净福利影响\n图7- 1 关税的效应：局部均衡分析\n征收关税前，Pw=0.1,Q1=6,Q2=22,     进口量Q1Q2=16\n征收关税后，Pw=0.1,T=0.02,Pt=0.1+0.02=0.12,Q3=8,Q4=20,进口量Q3Q4=12 ①消费者剩余减少=a+b+c+d=T×(Q4+Q2)/2=0.42 billion USD\n②生产者剩余增加=a=T×(Q1+Q3)/2=0.14 billion USD ③政府税收收入=c=T×Q3Q4=0.24 billion USD\n④ 社 会 净 福 利 = 生 产 者 剩 余 增 加 - 消 费 者 剩 余 减 少 + 政 府 税 收 = - ( b+d) =0.14-0.42+0.24=-0.04 billion USD\n征收进口关税使国民净福利损失0.04×10亿美元。\n(2)用国际贸易理论分析，指出“有人宣称”发言中存在的问题，并结合上一题计算结果分 析对美国福利造成损失的原因。(10分)\n①征收关税的经济效应。通过上述计算表明，尽管征收关税提高了生产者剩余，但同时福 利转移效应将征税的成本转嫁给了消费者，形成消费者福利的降低。\n征税导致社会资源发生扭曲与错配，征税使得生产资源流向相对低效的进口替代部门， 被保护的产业丧失竞争意识不再改进技术，造成生产扭曲为b。\n价格扭曲导致消费者支付更高价格，进口原材料的厂商生产成本会同时增加，向其下游 传递通货膨胀，物价出现整体上涨，形成消费扭曲 d。\n综合看来，无谓损失为b+d, 所以，对美国来说，征收关税必然导致社会福利的降低。\n②  最优关税理论。对大国来说，关税的福利效应来自于贸易条件改善收益和资源扭曲成本\n二者的对比，贸易条件改善作用主要取决于本国对进口产品的需求价格弹性。\n尽管美国在一些商品上是贸易大国，但是通过征税影响贸易条件收效甚少。以题干的食 糖为例，美国大众喜好甜食，食糖是一种生活和生产的必需品，需求价格弹性小，征收关税 很难减少食糖进口。类似地，美国很多行业对中国的进口都有一定依赖，依赖越强，需求价 格弹性低，通过征税来提高美国整体社会福利的可能就越小。\n综上所述，由于美国违反了比较优势原则，虽然政府和部分企业获得了一定好处，但整 体国民福利是受损的。“有人宣称”的言论是站不住脚的。对于中美来说，只有合作才能共赢。\n(2)观察第一问计算，征税前世界市场价格和征税后没有发生变化，由此判断是小国征税\n的负效应，可用来作为第二问的依据。经院专业课高分学姐提供了另一个关键要点：从最优 关税的角度看，食糖是美国的必需品，对中国依赖大，所以征税的代价由美国而不是中国承 担。\n(2)要求反驳美方的观点，关键词在“经济促进效果”“对美国影响很小”“由中国承担”, 那么对应的反驳是“经济阻碍效果”、“对美国影响很大”、“由美国承担”。\n从简答和论述题的答案我们不难发现，表面看来一张卷子没考国际商务理论，但其实具 体 答 案 都 是 紧 紧 贴 合 我 们 学 过 的 理 论 展 开 的 。","knowledge":["国际贸易政策"]},{"id":"2022_1","year":2022,"num":1,"type":"简答","question":"试分析区域经济一体化对全球经济一体化的正面和负面影响。","answer":"(1)区域经济一体化和全球经济一体化\n①区域经济一体化：指一定地理范围内两个及以上国家，签订自由贸易协定或区域贸易协 定，消除地区范围内产品、要素的流动限制，甚至统一经济社会政策，逐步实现资源配 置最优的过程。主要包括自贸区、关税同盟、共同市场、经济联盟和政治联盟。\n②全球经济一体化：指在全球范围内不断加深世界各国的经济联系，扩大市场开放，最大 程度实现自由贸易和投资，并且建立全球多边协调机制的过程。\n(2)区域经济一体化对全球经济一体化的正面影响：\n①区域经济一体化是全球经济一体化的有机构成部分。以WTO 为代表的全球经济一体化 的重要目标是全球贸易投资自由化，而以 FTA 和RTA为代表的区域经济一体化的目
