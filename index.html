<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

<title>人大434备考系统</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

<style>
/* ===== iOS 26 LIQUID GLASS DESIGN ===== */
:root{
  --r:#ff453a;--bg:#f2f2f7;--card:rgba(255,255,255,.42);--t:#1d1d1f;--ts:#86868b;--bdr:rgba(255,255,255,.18);
  --bl:#007aff;--gn:#30d158;--or:#ff9f0a;--pu:#5e5ce6;
  --sidebar-bg:rgba(255,255,255,.32);--sidebar-hover:rgba(0,0,0,.03);
  --sh:0 2px 8px rgba(0,0,0,.04),0 0 0 .5px rgba(255,255,255,.35);--panel-bg:rgba(0,0,0,.03);
  --amber-bg:rgba(255,159,10,.08);--amber-border:rgba(255,159,10,.15);--amber-text:#78350f;
  --shadow-md:0 8px 32px rgba(0,0,0,.06),0 0 0 .5px rgba(255,255,255,.3);--shadow-lg:0 16px 48px rgba(0,0,0,.1);
  --radius:18px;--radius-lg:24px;
  --transition:all .3s cubic-bezier(.25,.1,.25,1);
  --glass-blur:32px;
  --glass-border:rgba(255,255,255,.45);
  --glass-highlight:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--t);line-height:1.5;font-size:14px;display:flex;height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;position:relative}
/* Liquid Glass Background Orbs */
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:-1;background:
  radial-gradient(ellipse 600px 600px at 8% -12%,rgba(210,190,245,.55) 0%,transparent 65%),
  radial-gradient(ellipse 500px 500px at 92% 25%,rgba(180,210,250,.5) 0%,transparent 65%),
  radial-gradient(ellipse 550px 550px at 55% 115%,rgba(180,235,200,.5) 0%,transparent 65%),
  radial-gradient(ellipse 400px 400px at 2% 55%,rgba(255,220,180,.45) 0%,transparent 65%),
  radial-gradient(ellipse 380px 380px at 88% 78%,rgba(240,200,220,.45) 0%,transparent 65%)
;}
::selection{background:rgba(94,92,230,.15);color:var(--t)}

/* ===== SIDEBAR ===== */
.sidebar{width:240px;background:var(--sidebar-bg);backdrop-filter:blur(36px);-webkit-backdrop-filter:blur(36px);color:var(--ts);overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column;border-right:.5px solid rgba(255,255,255,.3);z-index:100;position:relative;scroll-behavior:smooth}
body.sb-collapsed .sidebar{position:fixed;inset:0 0 0 0;width:auto;transform:translateX(-100%);border-right:none}
body.sb-collapsed .sidebar.open{transform:translateX(0);width:280px;border-right:.5px solid rgba(255,255,255,.3);box-shadow:8px 0 40px rgba(0,0,0,.1)}
body.sb-collapsed .main{margin-left:0}
/* sidebar overlay backdrop */
.sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.12);z-index:99;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
body.sb-collapsed .sidebar.open ~ .sidebar-backdrop{display:block}
.sidebar-hdr{padding:28px 18px 18px;text-align:center;position:relative}
.sidebar-hdr::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);pointer-events:none}
.sidebar-hdr h2{color:var(--t);font-size:16px;font-weight:700;margin-bottom:2px;letter-spacing:-.2px}
.sidebar-hdr p{font-size:11px;color:var(--ts);margin-top:4px}
.sidebar-nav{padding:4px 0;flex:1;overflow-y:auto}
.sidebar-nav::-webkit-scrollbar{width:0}
.sidebar-section-label{padding:20px 18px 6px;font-size:10px;font-weight:700;color:var(--ts);letter-spacing:.6px;text-transform:uppercase}
.sidebar-tabs{display:flex;padding:4px 12px;gap:2px;border-bottom:.5px solid var(--bdr)}
.sidebar-tabs button{border:none;background:transparent;color:var(--ts);border-radius:10px;font-size:12px;cursor:pointer;padding:7px 12px;font-weight:600;font-family:inherit;transition:var(--transition)}
.sidebar-tabs button:hover{background:var(--sidebar-hover);color:var(--t)}
.sidebar-tabs button.active{background:var(--pu);color:#fff}
.kn-tree{display:none}.kn-tree.active{display:block}
.qz-tree{display:none}.qz-tree.active{display:block}
.ni{display:flex;align-items:center;gap:10px;padding:8px 16px;margin:1px 8px;cursor:pointer;font-size:13px;transition:var(--transition);border-radius:10px;color:var(--ts);font-weight:450}
.ni:hover{background:var(--sidebar-hover);color:var(--t)}
.ni.lv0{font-weight:600;color:var(--ts);padding:9px 16px;font-size:13px;margin:2px 8px 0}
.ni.lv1{padding-left:30px;font-size:12px;color:var(--ts);margin-left:8px}
.ni.lv2{padding-left:46px;font-size:12px;color:var(--ts);margin-left:8px}
.ni.active{background:rgba(94,92,230,.1);font-weight:600;color:var(--pu);border-left:3px solid var(--pu);padding-left:13px}
.ni .badge{margin-left:auto;background:rgba(0,0,0,.04);color:var(--ts);font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.sidebar-btm{padding:14px 16px;border-top:.5px solid var(--bdr);display:flex;gap:4px}
.sidebar-btm button{flex:1;padding:9px;border:none;background:rgba(0,0,0,.03);color:var(--ts);border-radius:10px;font-size:12px;cursor:pointer;transition:var(--transition);font-weight:600;font-family:inherit}
.sidebar-btm button:hover{background:rgba(0,0,0,.06);color:var(--t)}
.sidebar-btm button.active{background:var(--r);color:#fff}

/* ===== SB WARN ===== */
.sb-warn{margin:12px 16px 0;padding:12px;border-radius:12px;background:var(--amber-bg);border:.5px solid var(--amber-border)}
.sb-warn .wl{font-size:10px;font-weight:700;color:var(--amber-text);margin-bottom:6px}
.sb-warn .wi{font-size:11px;padding:2px 0;cursor:pointer;line-height:1.5}.sb-warn .wi:hover{text-decoration:underline}

/* ===== MAIN ===== */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:rgba(255,255,255,.48);backdrop-filter:blur(40px) saturate(1.4);-webkit-backdrop-filter:blur(40px) saturate(1.4);height:48px;border-radius:24px;display:flex;align-items:center;position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:50;box-shadow:0 4px 24px rgba(0,0,0,.08),0 0 0 .5px rgba(255,255,255,.5);width:calc(100% - 48px);max-width:900px;overflow:hidden}.topbar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:var(--glass-highlight);pointer-events:none}
.tb-left{display:flex;align-items:center;gap:4px;padding-left:12px;flex-shrink:0;min-width:0}
.bc{font-size:12px;color:var(--ts);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px}.bc span{color:var(--pu);font-weight:600}.bc:empty{display:none}
.tb-center{flex:1;display:flex;justify-content:center;padding:0 12px;min-width:0}
.tb-center input{border:none;border-radius:14px;padding:8px 16px;font-size:13px;width:100%;max-width:400px;outline:none;background:rgba(0,0,0,.04);font-family:inherit;transition:var(--transition);color:var(--t)}
.tb-center input::placeholder{color:var(--ts)}
.tb-center input:focus{background:rgba(0,0,0,.06);box-shadow:0 0 0 3px rgba(94,92,230,.15)}
.tb-right{display:flex;align-items:center;gap:8px;padding-right:12px;flex-shrink:0}
.tb-user{display:flex;align-items:center;gap:6px;padding:4px 12px 4px 6px;border-radius:20px;cursor:pointer;transition:var(--transition);font-size:12px;color:var(--ts);white-space:nowrap}
.tb-user:hover{background:rgba(0,0,0,.04);color:var(--t)}
.tb-avatar{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--pu),var(--bl));color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.tb-name{font-size:12px;font-weight:500}
.menu-btn{display:block;background:none;border:none;border-radius:10px;padding:6px 10px;font-size:18px;cursor:pointer;color:var(--ts);min-width:32px;min-height:32px;transition:var(--transition)}
.menu-btn:hover{background:rgba(0,0,0,.04);color:var(--t)}
.back-btn{display:none;background:none;border:none;border-radius:10px;padding:6px 12px;font-size:15px;cursor:pointer;color:var(--ts);min-width:32px;min-height:32px;transition:var(--transition)}
.back-btn:hover{background:rgba(0,0,0,.04);color:var(--t)}
.back-btn.show{display:block}
.content{flex:1;overflow-y:auto;padding:76px 28px 48px;scroll-behavior:smooth}
.content::-webkit-scrollbar{width:6px}.content::-webkit-scrollbar-thumb{background:rgba(0,0,0,.12);border-radius:3px}.content::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,.2)}
.content-fade-in{animation:contentFade .4s cubic-bezier(.23,1,.32,1) both}
@keyframes contentFade{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.content-fade-out{animation:contentFadeOut .2s ease-in both}
@keyframes contentFadeOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-8px)}}
.stagger-in{animation:staggerFade .45s cubic-bezier(.23,1,.32,1) both}
@keyframes staggerFade{from{opacity:0;transform:translateY(18px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.skeleton-line{height:14px;background:linear-gradient(90deg,rgba(0,0,0,.04) 25%,rgba(0,0,0,.02) 50%,rgba(0,0,0,.04) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px;margin-bottom:10px}
.skeleton-line.short{width:60%}.skeleton-line.medium{width:80%}.skeleton-line.title{height:22px;width:40%;margin-bottom:16px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ===== BANNER ===== */
.banner{background:rgba(255,255,255,.65);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border-radius:var(--radius-lg);padding:20px 26px;margin-bottom:20px;display:flex;align-items:center;gap:16px;border:.5px solid var(--glass-border);position:relative;overflow:hidden;box-shadow:var(--sh)}
.banner::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:var(--glass-highlight);pointer-events:none}
.banner .ico{font-size:28px;flex-shrink:0}
.banner .txt{flex:1;font-size:13px;color:var(--ts);line-height:1.6}
.banner .txt strong{font-size:15px;display:block;margin-bottom:4px;color:var(--t);font-weight:700}
.banner .btn{flex-shrink:0;padding:10px 22px;border-radius:14px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;background:var(--or);color:#fff;transition:var(--transition)}
.banner .btn:hover{background:#e68a00;transform:translateY(-1px)}

/* ===== TODAY ===== */
.today{background:var(--card);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border-radius:var(--radius-lg);border:.5px solid var(--glass-border);padding:26px 28px;margin-bottom:22px;box-shadow:var(--sh);position:relative;overflow:hidden}
.today::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:var(--glass-highlight);pointer-events:none}
.today h3{font-size:16px;font-weight:700;margin-bottom:4px;letter-spacing:-.2px}
.today .sub{font-size:12px;color:var(--ts);margin-bottom:18px}
.today .tasks{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}
.today .task{display:flex;align-items:center;gap:14px;padding:16px;border-radius:16px;background:rgba(0,0,0,.02);cursor:pointer;transition:var(--transition);border:.5px solid transparent;position:relative;overflow:hidden}
.today .task::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:var(--glass-highlight);pointer-events:none;opacity:0;transition:opacity .3s}
.today .task:hover{border-color:rgba(94,92,230,.2);background:rgba(255,255,255,.6);transform:translateY(-3px);box-shadow:var(--shadow-md)}
.today .task:hover::before{opacity:1}
.today .task .num{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;flex-shrink:0}
.today .task .info h4{font-size:14px;font-weight:600;margin-bottom:2px}
.today .task .info p{font-size:12px;color:var(--ts)}

/* ===== CARDS ===== */
.hero{background:var(--card);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border-radius:var(--radius-lg);padding:34px 38px;box-shadow:var(--sh);margin-bottom:22px;border:.5px solid var(--glass-border);position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:var(--glass-highlight);pointer-events:none}
.hero h1{font-size:26px;font-weight:800;margin-bottom:6px;letter-spacing:-.5px}
.hero .desc{font-size:14px;line-height:1.7;color:var(--ts)}
.hero .sts{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.hero .st{background:rgba(0,0,0,.03);padding:6px 16px;border-radius:20px;font-size:12px;transition:var(--transition);border:.5px solid rgba(0,0,0,.05)}
.hero .st:hover{background:rgba(94,92,230,.06);color:var(--pu)}
.hero .st strong{color:var(--pu)}
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin:28px 0 14px}
.sec-hd h3{font-size:16px;font-weight:700;letter-spacing:-.2px}
.sec-hd a,.sec-hd span{font-size:12px;color:var(--pu);cursor:pointer;font-weight:500;text-decoration:none;transition:var(--transition)}
.sec-hd a:hover{opacity:.7}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;margin-top:0}
.gc{background:var(--card);backdrop-filter:blur(var(--glass-blur)) saturate(1.3);-webkit-backdrop-filter:blur(var(--glass-blur)) saturate(1.3);border-radius:var(--radius);padding:20px 22px;box-shadow:var(--sh);cursor:pointer;transition:var(--transition);border:.5px solid var(--glass-border);display:flex;gap:14px;align-items:flex-start;position:relative;overflow:hidden}
.gc::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:var(--glass-highlight);pointer-events:none}
.gc:hover{border-color:rgba(94,92,230,.2);box-shadow:var(--shadow-md);transform:translateY(-3px);background:rgba(255,255,255,.78)}
.gc .ico{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;margin-top:2px}
.gc .cnt h4{font-size:14px;font-weight:700;margin-bottom:4px}
.gc .cnt p{font-size:12px;color:var(--ts);margin-bottom:8px;line-height:1.5}
.gc .cnt .tags{display:flex;gap:6px;flex-wrap:wrap}
.gc .cnt .tag{font-size:10px;font-weight:600;padding:3px 10px;border-radius:12px;background:rgba(0,0,0,.04);color:var(--ts)}
.gc .cnt .tag.urg{background:var(--amber-bg);color:var(--amber-text)}
.gc .right{text-align:right;flex-shrink:0;min-width:48px}
.gc .right .pct{font-size:22px;font-weight:800}.gc .right .pct.hi{color:var(--gn)}.gc .right .pct.mid{color:var(--or)}.gc .right .pct.lo{color:var(--ts)}
.gc .right .lbl{font-size:10px;color:var(--ts);margin-top:2px}
.gc h4{margin-bottom:4px}
.gc p{font-size:12px;color:var(--ts);margin-bottom:8px;line-height:1.5}
.gc .bar{height:3px;background:rgba(0,0,0,.04);border-radius:2px;overflow:hidden;margin-top:12px}
.gc .bi{height:100%;border-radius:2px}
.rel{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0}
.rt{padding:6px 16px;border-radius:20px;background:rgba(0,0,0,.03);font-size:12px;cursor:pointer;transition:var(--transition);color:#555;border:.5px solid rgba(0,0,0,.06)}
.rt:hover{background:var(--pu);color:#fff;border-color:transparent}
.pcard{background:var(--card);backdrop-filter:blur(var(--glass-blur)) saturate(1.3);-webkit-backdrop-filter:blur(var(--glass-blur)) saturate(1.3);border-radius:var(--radius-lg);box-shadow:var(--sh);margin-bottom:16px;overflow:hidden;border:.5px solid var(--glass-border);position:relative}
.pcard::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:var(--glass-highlight);pointer-events:none;z-index:1}
.pcard-hdr{padding:18px 24px;border-bottom:.5px solid var(--bdr)}
.pcard-hdr h3{font-size:16px;font-weight:700;margin:0}
.pcard-body{padding:18px 24px}
.pcard-section{margin-bottom:14px}
.pcard-section h4{font-size:14px;font-weight:600;color:var(--t);margin-bottom:6px}
.pcard-section p{font-size:13px;line-height:1.8;color:var(--ts)}
.pcard-section ul{padding-left:18px}
.pcard-section li{font-size:13px;margin-bottom:4px;color:#444}
.pcard-q{background:var(--amber-bg);padding:14px 16px;border-radius:12px;font-size:13px;border:.5px solid var(--amber-border);line-height:1.8}
.pcard-refs{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.pcard-ref{padding:4px 12px;border-radius:14px;background:rgba(0,0,0,.03);font-size:11px;cursor:pointer;transition:var(--transition);border:.5px solid rgba(0,0,0,.06)}
.pcard-ref:hover{background:var(--bl);color:#fff;border-color:transparent}

/* ===== KNOWLEDGE ===== */
.kn-hero{background:var(--card);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border-radius:var(--radius-lg);box-shadow:var(--sh);overflow:hidden;margin-bottom:20px;border:.5px solid var(--glass-border);position:relative}
.kn-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:var(--glass-highlight);pointer-events:none;z-index:1}
.kn-hero-hdr{padding:24px 30px;border-bottom:.5px solid var(--bdr)}
.kn-hero-hdr h2{font-size:20px;font-weight:800;color:var(--t);margin-bottom:6px;letter-spacing:-.3px}
.kn-hero-hdr .kn-path{font-size:12px;color:var(--ts);margin-bottom:8px}
.kn-hero-hdr .kn-overview{font-size:14px;line-height:1.9;color:var(--t);padding:8px 0}
.kn-hero-body{padding:8px 0}
.kn-section{margin:0 30px 8px;border-left:3px solid rgba(94,92,230,.2);padding:4px 0 8px 18px}
.kn-section h4{font-size:14px;font-weight:700;color:var(--t);margin-bottom:10px}
.kn-section ul{margin:0;padding-left:0;list-style:none}
.kn-section ul li{padding:5px 0 5px 20px;position:relative;font-size:14px;line-height:1.8;color:#444;border-bottom:.5px solid rgba(0,0,0,.04)}
.kn-section ul li:before{content:"";position:absolute;left:0;top:14px;width:8px;height:8px;border-radius:50%;background:var(--pu);opacity:.3}
.kn-formula-box{margin:10px 30px;padding:16px 20px;background:rgba(0,0,0,.02);border-radius:12px;border:.5px solid rgba(0,0,0,.06);font-size:14px;line-height:1.9;font-family:"SF Mono","Fira Code","Courier New",monospace;color:var(--t)}
.kn-eval-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:10px 30px}
.kn-eval-pros{padding:16px 18px;background:rgba(48,209,88,.06);border-radius:12px;border:.5px solid rgba(48,209,88,.12)}
.kn-eval-pros h5{font-size:13px;color:var(--gn);margin-bottom:8px;font-weight:600}
.kn-eval-pros li{font-size:13px;line-height:1.7;color:#065f46;padding:3px 0}
.kn-eval-cons{padding:16px 18px;background:rgba(255,69,58,.05);border-radius:12px;border:.5px solid rgba(255,69,58,.1)}
.kn-eval-cons h5{font-size:13px;color:var(--r);margin-bottom:8px;font-weight:600}
.kn-eval-cons li{font-size:13px;line-height:1.7;color:#991b1b;padding:3px 0}
.kn-exam-link{margin:10px 30px 20px;padding:14px 18px;background:var(--amber-bg);border-radius:12px;border:.5px solid var(--amber-border);font-size:13px;line-height:1.8;color:#78350f}
.kn-fulltext{margin:10px 30px;padding:14px 18px;background:rgba(0,0,0,.02);border-radius:12px;border:.5px solid rgba(0,0,0,.06)}
.kn-fulltext pre{margin:0;font-family:"PingFang SC","Microsoft YaHei",sans-serif;font-size:13px;line-height:1.9;color:#444;white-space:pre-wrap}
.kn-tabs{display:flex;gap:0;margin-bottom:18px;background:rgba(0,0,0,.03);border-radius:14px;overflow:hidden;padding:3px}
.kn-tab{flex:1;padding:10px 16px;text-align:center;font-size:13px;font-weight:600;cursor:pointer;transition:var(--transition);border-radius:12px;color:var(--ts);background:transparent}
.kn-tab:hover{color:var(--t)}
.kn-tab.active{color:var(--t);background:rgba(255,255,255,.8);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.kn-tab .count{font-size:11px;font-weight:400;color:var(--ts);margin-left:4px}
.kn-content{display:block}.kn-content.hidden{display:none}

/* ===== QUESTIONS ===== */
.qc{background:var(--card);backdrop-filter:blur(var(--glass-blur)) saturate(1.3);-webkit-backdrop-filter:blur(var(--glass-blur)) saturate(1.3);border-radius:var(--radius);box-shadow:var(--sh);margin-bottom:6px;overflow:hidden;border:.5px solid var(--glass-border);position:relative}
.qc::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:var(--glass-highlight);pointer-events:none;z-index:1}
.qh{padding:14px 20px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:var(--transition)}
.qh:hover{background:rgba(0,0,0,.015)}
.qn{background:var(--r);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:10px;min-width:28px;text-align:center}
.qt{font-size:10px;font-weight:600;padding:3px 10px;border-radius:10px;flex-shrink:0}
.ts{background:rgba(48,209,88,.1);color:#066f2d}.tl{background:rgba(94,92,230,.08);color:#5a2e96}.tj{background:rgba(0,122,255,.08);color:#1a4d9e}.ta{background:var(--amber-bg);color:var(--amber-text)}
.qyr{font-size:11px;color:var(--ts);margin-left:auto}
.qtx{flex:1;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.qb{display:none;padding:0 20px 18px 62px}.qb.open{display:block}
.qa{font-size:14px;line-height:1.9;color:#444;padding:16px;background:rgba(0,0,0,.015);border-radius:14px;border:.5px solid rgba(0,0,0,.06);max-height:400px;overflow-y:auto;white-space:pre-wrap}
.qa strong{color:var(--r)}
.qa2{display:flex;gap:6px;margin-left:8px}
.qa2 button{border:none;background:none;cursor:pointer;font-size:15px;padding:4px;border-radius:6px;transition:var(--transition)}
.qa2 button:hover{background:rgba(0,0,0,.04)}
.qa2 .star{color:#f59e0b}.qa2 .done{color:var(--gn)}

/* ===== QUIZ ===== */
.quiz-box{background:var(--card);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border-radius:var(--radius-lg);box-shadow:var(--sh);padding:30px;max-width:720px;border:.5px solid var(--glass-border);position:relative;overflow:hidden}
.quiz-box::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:var(--glass-highlight);pointer-events:none}
.quiz-q{font-size:16px;line-height:1.9;margin:18px 0}
.quiz-a{display:none;font-size:14px;line-height:1.9;color:#444;padding:16px;background:rgba(0,0,0,.015);border-radius:14px;border:.5px solid rgba(0,0,0,.06);white-space:pre-wrap}
.quiz-a.show{display:block}
.quiz-nav{display:flex;gap:10px;margin-top:18px}
.btn{padding:10px 24px;border-radius:14px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:var(--transition);font-family:inherit;display:inline-flex;align-items:center;gap:7px}
.btn:active{transform:scale(.97)}
.btn-r{background:var(--r);color:#fff}.btn-r:hover{background:#e03a30}
.btn-b{background:var(--bl);color:#fff}.btn-b:hover{background:#0066d6}
.btn-gen{background:var(--pu);color:#fff}.btn-gen:hover{background:#4c4ad4}

/* ===== CHAT ===== */
.chat-msg{max-width:88%;margin:6px 0;line-height:1.7;font-size:13px;word-break:break-word}
.chat-msg.user{align-self:flex-end;background:var(--pu);color:#fff;padding:12px 18px;border-radius:18px 18px 4px 18px;margin-left:auto}
.chat-msg.assistant{align-self:flex-start;background:rgba(0,0,0,.035);padding:14px 18px;border-radius:18px 18px 18px 4px}
.chat-msg.assistant p{margin:4px 0}.chat-msg.assistant strong{color:#333}
.chat-msg .chat-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--ts);margin:0 3px;animation:dotPulse 1.4s infinite}
.chat-msg .chat-dot:nth-child(2){animation-delay:.2s}.chat-msg .chat-dot:nth-child(3){animation-delay:.4s}
@keyframes dotPulse{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1.2)}}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== AI CHAT FULL-PAGE ===== */
.ai-chat-wrap{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;z-index:100;background:#f2f2f7;overflow:hidden}
.ai-chat-wrap::before{content:'';position:absolute;inset:0;pointer-events:none;z-index:0;background:
  radial-gradient(ellipse 500px 500px at 10% -10%,rgba(210,190,245,.4) 0%,transparent 65%),
  radial-gradient(ellipse 400px 400px at 90% 25%,rgba(180,210,250,.35) 0%,transparent 65%),
  radial-gradient(ellipse 450px 450px at 55% 115%,rgba(180,235,200,.35) 0%,transparent 65%)
}
.ai-chat-hdr{flex-shrink:0;position:relative;z-index:1;padding:14px 24px;display:flex;justify-content:space-between;align-items:center;
  background:rgba(255,255,255,.35);backdrop-filter:blur(40px) saturate(1.4);-webkit-backdrop-filter:blur(40px) saturate(1.4);
  border-bottom:.5px solid rgba(255,255,255,.3)}
.ai-chat-hdr h3{font-size:17px;font-weight:700;color:var(--t)}
.ai-chat-hdr .sub{font-size:11px;color:var(--ts);margin-left:10px}
.ai-chat-hdr-btns{display:flex;gap:6px}
.ai-chat-hdr-btn{padding:6px 14px;background:rgba(255,255,255,.4);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:.5px solid rgba(255,255,255,.4);border-radius:12px;font-size:12px;cursor:pointer;color:var(--ts);font-family:inherit;transition:var(--transition)}
.ai-chat-hdr-btn:hover{background:rgba(255,255,255,.6);color:var(--t)}
.ai-chat-body{flex:1 1 0;overflow-y:auto;min-height:0;padding:24px 24px 8px;display:flex;flex-direction:column;gap:14px;position:relative;z-index:1;scroll-behavior:smooth}
.ai-chat-body::-webkit-scrollbar{width:6px}.ai-chat-body::-webkit-scrollbar-track{background:transparent}.ai-chat-body::-webkit-scrollbar-thumb{background:rgba(94,92,230,.15);border-radius:3px}.ai-chat-body::-webkit-scrollbar-thumb:hover{background:rgba(94,92,230,.3)}
.ai-welcome{background:rgba(255,255,255,.45);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  padding:20px 24px;border-radius:18px;font-size:14px;line-height:1.8;max-width:78%;align-self:flex-start;
  border:.5px solid rgba(255,255,255,.4);position:relative;overflow:hidden}
.ai-welcome::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:var(--glass-highlight);pointer-events:none}
.ai-welcome strong{font-size:15px;display:block;margin-bottom:6px}
.ai-msg{max-width:78%;min-width:0;font-size:14px;line-height:1.8;word-break:break-word;overflow-wrap:break-word;position:relative;overflow:hidden;flex-shrink:0}
.ai-msg-user{align-self:flex-end;background:linear-gradient(135deg,#5e5ce6,#007aff);color:#fff;
  padding:14px 20px;border-radius:18px 18px 4px 18px;margin-left:auto;box-shadow:0 2px 12px rgba(94,92,230,.15)}
.ai-msg-user::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);pointer-events:none}
.ai-msg-bot{align-self:flex-start;background:rgba(255,255,255,.5);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  padding:18px 22px;border-radius:18px 18px 18px 4px;
  border:.5px solid rgba(255,255,255,.4);box-shadow:0 2px 12px rgba(0,0,0,.04)}
.ai-msg-bot::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:var(--glass-highlight);pointer-events:none}
.ai-msg-bot p{margin:4px 0}.ai-msg-bot strong{color:var(--t)}
.ai-msg-bot h1,.ai-msg-bot h2,.ai-msg-bot h3,.ai-msg-bot h4{margin:8px 0 4px}
.ai-msg-bot ul,.ai-msg-bot ol{padding-left:20px;margin:6px 0}
.ai-msg-bot code{background:rgba(0,0,0,.05);padding:1px 5px;border-radius:4px;font-size:12px}
.ai-msg-bot pre{background:rgba(0,0,0,.04);border-radius:10px;padding:12px 14px;overflow-x:auto;margin:8px 0}
.ai-msg-bot pre code{background:none;padding:0}
.ai-msg-err{align-self:flex-start;color:var(--r);font-size:13px;padding:12px 18px;background:rgba(255,69,58,.06);
  border-radius:14px;border:.5px solid rgba(255,69,58,.12)}
.ai-loading{display:flex;align-items:center;gap:10px;padding:14px 20px;background:rgba(255,255,255,.4);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:18px 18px 18px 4px;
  border:.5px solid rgba(255,255,255,.3);font-size:13px;color:var(--ts);align-self:flex-start;max-width:200px}
.ai-loading .ai-dot{width:7px;height:7px;border-radius:50%;background:var(--pu);display:inline-block;margin:0 2px;animation:aiBounce 1.4s infinite ease-in-out}
.ai-loading .ai-dot:nth-child(1){animation-delay:0s}.ai-loading .ai-dot:nth-child(2){animation-delay:.2s}.ai-loading .ai-dot:nth-child(3){animation-delay:.4s}
.ai-chat-input-bar{flex-shrink:0;position:relative;z-index:1;padding:16px 24px 20px;display:flex;gap:12px;align-items:flex-end;
  background:rgba(255,255,255,.3);backdrop-filter:blur(40px) saturate(1.4);-webkit-backdrop-filter:blur(40px) saturate(1.4);
  border-top:.5px solid rgba(255,255,255,.3)}
.ai-chat-textarea{flex:1;padding:12px 18px;border:.5px solid rgba(255,255,255,.35);border-radius:16px;
  font-size:14px;outline:none;background:rgba(255,255,255,.4);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  resize:none;font-family:inherit;min-height:44px;max-height:120px;color:var(--t);transition:var(--transition)}
.ai-chat-textarea::placeholder{color:var(--ts)}
.ai-chat-textarea:focus{border-color:rgba(94,92,230,.3);box-shadow:0 0 0 3px rgba(94,92,230,.1)}
.ai-chat-send{padding:12px 24px;background:linear-gradient(135deg,#5e5ce6,#007aff);color:#fff;border:none;
  border-radius:16px;font-size:14px;font-weight:600;cursor:pointer;height:44px;white-space:nowrap;font-family:inherit;
  transition:var(--transition);box-shadow:0 2px 12px rgba(94,92,230,.2)}
.ai-chat-send:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(94,92,230,.3)}
.ai-chat-send:active{transform:scale(.97)}
.loading{text-align:center;padding:60px;color:var(--ts)}
.loading .spinner{display:inline-block;width:28px;height:28px;border:3px solid rgba(0,0,0,.05);border-top-color:var(--pu);border-radius:50%;animation:spin .8s linear infinite}

/* ===== DASHBOARD & MACRO ===== */
.dash-hero{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:20px}
.dash-metric{background:var(--card);backdrop-filter:blur(var(--glass-blur)) saturate(1.3);-webkit-backdrop-filter:blur(var(--glass-blur)) saturate(1.3);border-radius:var(--radius);padding:16px 18px;border:.5px solid var(--glass-border);transition:var(--transition);box-shadow:var(--sh)}
.dash-metric:hover{border-color:rgba(94,92,230,.2);box-shadow:var(--shadow-md);transform:translateY(-2px)}
.dash-metric .label{font-size:11px;color:var(--ts);margin-bottom:6px}
.dash-metric .value{font-size:22px;font-weight:800;color:var(--t)}
.dash-metric .change{font-size:11px;margin-top:4px}
.dash-charts{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.dash-chart-card{background:var(--card);backdrop-filter:blur(var(--glass-blur)) saturate(1.3);-webkit-backdrop-filter:blur(var(--glass-blur)) saturate(1.3);border-radius:var(--radius);padding:18px;border:.5px solid var(--glass-border);box-shadow:var(--sh)}
.dash-chart-card h4{font-size:13px;font-weight:700;margin-bottom:8px}
.dash-chart-card .subtitle{font-size:11px;color:var(--ts)}
.macro-section-header{margin:24px 0 14px;padding-bottom:10px;border-bottom:2px solid rgba(0,0,0,.04);display:flex;align-items:center;justify-content:space-between}
.macro-section-header h3{font-size:16px;font-weight:700}
/* ===== PROFESSORS ===== */
.prof-card{background:var(--card);backdrop-filter:blur(var(--glass-blur)) saturate(1.3);-webkit-backdrop-filter:blur(var(--glass-blur)) saturate(1.3);border-radius:var(--radius-lg);border:.5px solid var(--glass-border);overflow:hidden;margin-bottom:16px;transition:var(--transition);box-shadow:var(--sh);position:relative}
.prof-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:var(--glass-highlight);pointer-events:none;z-index:1}
.prof-card:hover{border-color:rgba(94,92,230,.2);box-shadow:var(--shadow-md)}
.prof-hdr{padding:18px 22px;border-bottom:.5px solid var(--bdr)}
.prof-hdr h3{font-size:15px;font-weight:700;margin-bottom:2px}
.prof-hdr .title{font-size:12px;color:var(--ts)}
.prof-body{padding:16px 22px}
.prof-row{padding:10px 14px;margin-bottom:6px;background:rgba(0,0,0,.02);border-radius:12px;font-size:13px;line-height:1.7}
.prof-row strong{color:var(--t)}
.prof-tags{display:flex;gap:6px;flex-wrap:wrap;padding-top:12px;margin-top:10px;border-top:.5px solid var(--bdr)}
.prof-tag{padding:4px 10px;border-radius:14px;font-size:11px;font-weight:500;background:rgba(0,0,0,.03);color:var(--ts);transition:var(--transition);border:.5px solid rgba(0,0,0,.06)}
.prof-tag:hover{background:rgba(94,92,230,.08);color:var(--pu);border-color:transparent}
.ai-btn-row{margin-top:12px}
/* ===== CHART ===== */
.chart-container{position:relative;width:100%}
.dash-charts canvas{max-height:250px}

/* ===== ACCORDION ===== */
.kn-accordion{margin:0 30px 6px;border:.5px solid var(--glass-border);border-radius:var(--radius);overflow:hidden;background:var(--card);backdrop-filter:blur(var(--glass-blur)) saturate(1.3);-webkit-backdrop-filter:blur(var(--glass-blur)) saturate(1.3);box-shadow:var(--sh);position:relative}
.kn-accordion::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:var(--glass-highlight);pointer-events:none;z-index:1}
.kn-accordion.open .kn-acc-body{display:block}
.kn-acc-hdr{padding:14px 18px;cursor:pointer;font-size:14px;font-weight:600;color:var(--t);display:flex;align-items:center;gap:8px;user-select:none;transition:var(--transition)}
.kn-acc-hdr:hover{background:rgba(0,0,0,.02)}
.kn-acc-arrow{transition:transform .2s;display:inline-block;color:var(--ts);font-size:11px}
.kn-accordion.open .kn-acc-arrow{transform:rotate(90deg)}
.kn-acc-body{display:none;padding:0 18px 14px;font-size:13px;line-height:1.8;color:#444}
.kn-acc-body ul{padding-left:18px;margin:0;list-style:none}
.kn-acc-body li{padding:4px 0 4px 20px;position:relative;border-bottom:.5px solid rgba(0,0,0,.04)}
.kn-acc-body li:before{content:"";position:absolute;left:0;top:12px;width:7px;height:7px;border-radius:50%;background:var(--pu);opacity:.3}
.kn-acc-body ol{padding-left:18px;margin:0}
.kn-acc-body ol li{padding:4px 0;list-style-type:decimal;font-size:13px;border-bottom:.5px solid rgba(0,0,0,.04)}

/* ===== PREDICTIONS & HOT TOPICS ===== */
.know-pred-card,.hot-topic-card{background:var(--card);backdrop-filter:blur(var(--glass-blur)) saturate(1.3);-webkit-backdrop-filter:blur(var(--glass-blur)) saturate(1.3);border-radius:var(--radius-lg);box-shadow:var(--sh);margin-bottom:18px;overflow:hidden;border:.5px solid var(--glass-border);transition:var(--transition);position:relative}
.know-pred-card::before,.hot-topic-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:var(--glass-highlight);pointer-events:none;z-index:1}
.know-pred-card:hover,.hot-topic-card:hover{box-shadow:var(--shadow-lg)}
.know-pred-hdr,.hot-topic-hdr{padding:18px 24px;border-bottom:.5px solid var(--bdr);display:flex;align-items:flex-start;gap:12px}
.know-pred-hdr h4,.hot-topic-hdr h4{font-size:15px;font-weight:700}
.know-pred-body,.hot-topic-body{padding:18px 24px}
.know-pred-section{margin-bottom:16px}
.know-pred-section h5{font-size:13px;font-weight:700;margin-bottom:8px}
.know-pred-brief{padding:14px 16px;background:var(--amber-bg);border-radius:12px;font-size:13px;line-height:1.7;border:.5px solid var(--amber-border);color:#78350f}
.know-pred-dir{padding:14px 16px;background:rgba(0,0,0,.02);border-radius:12px;font-size:13px;line-height:1.7}
.know-pred-q .pq{padding:10px 14px;background:rgba(0,0,0,.02);border-radius:12px;font-size:13px;line-height:1.7;margin-bottom:6px}
.know-pred-ref{display:inline-block;padding:4px 12px;border-radius:14px;background:rgba(0,0,0,.03);font-size:11px;cursor:pointer;transition:var(--transition);color:var(--ts);margin:3px;border:.5px solid rgba(0,0,0,.06)}
.know-pred-ref:hover{background:var(--pu);color:#fff;border-color:transparent}
.hot-topic-body p{font-size:13px;line-height:1.8;color:var(--ts)}
.hot-topic-hint{padding:14px 16px;background:var(--amber-bg);border-radius:12px;font-size:12px;line-height:1.7;color:#78350f;border:.5px solid var(--amber-border)}
.hot-topic-kn,.hot-topic-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.hot-topic-tag{padding:3px 10px;border-radius:14px;font-size:11px;font-weight:500;background:rgba(0,0,0,.03);color:var(--ts)}

/* ===== AI ANIMATIONS ===== */
.ai-loading-msg{display:flex;align-items:center;gap:8px;padding:10px 16px;color:var(--pu);font-size:13px}
.ai-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--pu);margin:0 3px;animation:aiBounce 1.4s infinite ease-in-out}
.ai-dot:nth-child(1){animation-delay:0s}.ai-dot:nth-child(2){animation-delay:.2s}.ai-dot:nth-child(3){animation-delay:.4s}
@keyframes aiBounce{0%,80%,100%{transform:scale(0);opacity:.3}40%{transform:scale(1);opacity:1}}
.ai-sand{display:inline-block;animation:aiFlip 2s infinite ease-in-out;font-size:16px}
@keyframes aiFlip{0%,100%{transform:rotate(0deg)}50%{transform:rotate(180deg)}}

/* ===== MACRO DAILY ===== */
.macro-card{background:var(--card);backdrop-filter:blur(var(--glass-blur)) saturate(1.3);-webkit-backdrop-filter:blur(var(--glass-blur)) saturate(1.3);border-radius:var(--radius-lg);border:.5px solid var(--glass-border);overflow:hidden;margin-bottom:16px;box-shadow:var(--sh);position:relative}
.macro-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:var(--glass-highlight);pointer-events:none;z-index:1}
.macro-card-hdr{padding:16px 22px;border-bottom:.5px solid var(--bdr)}
.macro-card-hdr h3{font-size:16px;font-weight:700}
.macro-card-body{padding:18px 22px}
.macro-highlight ul{padding-left:20px;margin:0}
.macro-highlight li{font-size:13px;line-height:1.9;padding:4px 0}
.macro-section{margin:18px 0}.macro-section h4{font-size:14px;font-weight:700;margin-bottom:10px}
.macro-item{margin-bottom:12px;padding:12px;background:rgba(0,0,0,.02);border-radius:10px}
.macro-item h5{font-size:13px;font-weight:600;margin-bottom:4px}
.macro-item p{font-size:12px;color:var(--ts);line-height:1.6}
.macro-data-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-top:8px}
.macro-data-item{background:rgba(0,0,0,.02);padding:10px 12px;border-radius:10px;text-align:center}
.macro-data-item .label{font-size:11px;color:var(--ts);margin-bottom:4px}
.macro-data-item .value{font-size:16px;font-weight:700;color:var(--t)}
/* ===== LOGIN ===== */
.login-overlay{position:fixed;inset:0;z-index:9999;background:
  radial-gradient(ellipse 500px 500px at 10% -20%,rgba(224,212,245,.5) 0%,transparent 60%),
  radial-gradient(ellipse 400px 400px at 90% 30%,rgba(196,224,249,.45) 0%,transparent 60%),
  radial-gradient(ellipse 450px 450px at 50% 120%,rgba(200,240,212,.4) 0%,transparent 60%),
  #f2f2f7;
  display:flex;align-items:center;justify-content:center;flex-direction:column}
.login-card{background:rgba(255,255,255,.72);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border-radius:28px;padding:48px 44px;box-shadow:0 20px 60px rgba(0,0,0,.08),0 0 0 .5px rgba(255,255,255,.6);border:none;text-align:center;max-width:400px;width:90%;position:relative;overflow:hidden}
.login-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent);pointer-events:none}
.login-card h2{font-size:26px;font-weight:800;margin-bottom:8px;color:var(--t);letter-spacing:-.5px}
.login-card p{font-size:14px;color:var(--ts);margin-bottom:28px}
.login-card input{width:100%;padding:14px 18px;border:none;border-radius:14px;font-size:15px;text-align:center;outline:none;font-family:inherit;transition:var(--transition);background:rgba(0,0,0,.04);color:var(--t)}
.login-card input.user{letter-spacing:0;margin-bottom:14px}
.login-card input.invite{margin-bottom:14px;background:rgba(48,209,88,.06)}
.login-card input:focus{background:rgba(0,0,0,.06);box-shadow:0 0 0 3px rgba(94,92,230,.15)}

<div class="login-overlay" id="loginOverlay">
  <div class="login-card">
    <h2>📚 人大434备考系统</h2>
    <p>登录或注册账号</p>
    <input type="text" id="loginUser" class="user" placeholder="用户名" autofocus>
    <input type="password" id="loginPwd" placeholder="密码" onkeydown="if(event.key==='Enter')doLogin()">
    <input type="text" id="loginInvite" class="invite" placeholder="邀请码（注册必填）" style="display:none">
        <button type="button" id="btnLogin" style="cursor:pointer">登录</button>
    <button type="button" id="btnRegister" style="background:#f0fdf4;color:#059669;border:1px solid #a7f3d0;margin-top:8px;cursor:pointer">注册新账号</button>
    <div class="err" id="loginErr"></div>
    <div class="sync-status" id="syncStatus"></div>
    <div style="font-size:10px;color:#ccc;margin-top:8px">v2.0 · KV</div>
    <script>
    var _api = 'https://api.ruc434s.cloud';
    function _loginReg(path, u, p, e, inv) {
      var ac = new AbortController();
      var to = setTimeout(function(){ ac.abort(); e.textContent = '请求超时，请重试'; }, 15000);
      var body = {username: u, password: p};
      if (inv) body.inviteCode = inv;
      fetch(_api + path, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body),
        signal: ac.signal
      }).then(function(r){ clearTimeout(to); return r.json(); }).then(function(d){
        if (d.token) {
          localStorage.setItem('r434_token', d.token);
          localStorage.setItem('r434_user', d.username || u);
          document.getElementById('loginOverlay').style.display = 'none';
          // Update topbar user display
          if (typeof updateTopbarUser !== 'undefined') updateTopbarUser();
          // Store API key for direct AI calls
          if (d.apiKey && typeof setAPIKey !== 'undefined') setAPIKey(d.apiKey);
          // load cloud data
          var t = d.token;
          fetch(_api + '/data', {headers:{'Authorization':'Bearer '+t}}).then(function(r){return r.json()}).then(function(dd){
            if (!dd.error) {
              if (dd.marks) try{localStorage.setItem('r434',JSON.stringify(dd.marks))}catch(e){}
              if (dd.kv) try{localStorage.setItem('r434_kv',JSON.stringify(dd.kv))}catch(e){}
              if (dd.chat) try{localStorage.setItem('r434_chat',JSON.stringify(dd.chat))}catch(e){}
            }
          }).catch(function(){});
        } else { e.textContent = d.error || '操作失败'; }
      }).catch(function(x){
        clearTimeout(to);
        if (x.name === 'AbortError') return; // timeout already handled
        e.textContent = '网络错误: ' + (x.message || '请检查网络');
      });
    }
    document.getElementById('btnLogin').addEventListener('click', function() {
      var u = document.getElementById('loginUser').value.trim();
      var p = document.getElementById('loginPwd').value.trim();
      var e = document.getElementById('loginErr');
      if (!u || !p) { e.textContent = '请输入用户名和密码'; return; }
      e.textContent = '验证中...';
      _loginReg('/login', u, p, e);
    });
    document.getElementById('btnRegister').addEventListener('click', function() {
      var u = document.getElementById('loginUser').value.trim();
      var p = document.getElementById('loginPwd').value.trim();
      var iv = document.getElementById('loginInvite');
      var e = document.getElementById('loginErr');
      if (!u || !p) { e.textContent = '请输入用户名和密码'; return; }
      if (u.length < 2) { e.textContent = '用户名需2个字符以上'; return; }
      if (p.length < 4) { e.textContent = '密码需4位以上'; return; }
      // Show invite code field if hidden
      if (iv.style.display === 'none') { iv.style.display = ''; iv.focus(); return; }
      var invite = iv.value.trim();
      if (!invite) { e.textContent = '请输入邀请码'; return; }
      e.textContent = '注册中...';
      _loginReg('/register', u, p, e, invite);
    });
    </script>
  </div>
</div>

  }
  return true;
});
window.addEventListener('unhandledrejection', function(e) {
  console.error('Unhandled promise rejection:', e.reason);
});

<script>
var DATA = [{"id":"2011_1","year":2011,"num":1,"type":"简答","question":"内部化理论是如何解释在技术授权高度发达的今天还存在国际直接投资的?","answer":"内部化理论（Internalization Theory）由巴克利和卡森提出，核心观点是：企业通过对外直接投资建立内部市场，替代外部市场的不完全性，从而降低交易成本。\n\n在技术授权高度发达的今天仍存在国际直接投资的原因：\n① 技术知识具有公共品特性，外部市场交易存在定价困难。技术授权面临\"Arrow信息悖论\"——买方不了解技术价值前不愿出价，了解后又不愿付费。\n② 企业拥有的隐性知识（tacit knowledge）难以通过技术授权完整转移，需要通过内部化（FDI）实现有效转移。\n③ 技术授权可能导致技术扩散，削弱企业的垄断优势。通过FDI内部化可保护专有技术和品牌价值。\n④ 跨国经营存在市场不完全（中间产品市场、要素市场等），内部化可规避外部市场的高交易成本和不确定性。","knowledge":["跨国公司与国际化"]},{"id":"2011_2","year":2011,"num":2,"type":"简答","question":"简述保障措施在WTO法律体系中的作用，并列举5种WTO保障措施。","answer":"(1)保障措施：指当不可预见的发展导致产品的进口数量增加，以致对生产同类或直接竞 争产品的国内产业造成严重损害或严重损害威胁时，进口成员方可以在非歧视原则的基础上 对该产品的进口实施限制。\n(2)作用：\n①保障措施平衡了WTO法律规则的灵活性和严格性。【选答】一方面，允许各成员在进 口大量增加造成对国内产业严重损害或其威胁的例外情况下，暂时停止施行 WTO 特定\n义务；另一方面，确保援用方善意行使其权利并尊重其他成员在WTO 下的权利。\n②保障措施权衡了自由贸易与贸易保护的力量。【选答】它将自由贸易的范畴限制在一个 “安全阀”水平，为推动贸易自由化提供保险机制，促使成员做出更多的自由化承诺，消 除了成员方对于自由贸易可能造成利益损失的恐惧。同时，紧急保障措施实施的时间、 限度、程序都有明确规定，允许成员在特定情形下无歧视性的贸易保护。\n③保障措施平衡WTO 成员的权利和义务。【选答】保障措施维护了WTO成员国利用WTO    规则来维护和促进本国经贸发展的权利，同时强化了各国公平透明解决贸易争端的义务。\n④保障措施增加了WTO体制运行的稳定性。【选答】从立法角度看，保障措施的出现是一 大进步，保障措施作为一项临时性措施，其目的在于减少产品进口，以便使国内某一行 业能够适应外国供应商不断增加的竞争压力。对于各成员来说，在他们因进口急剧增加 而受到损害的情况下，保障措施就成为保护他们的安全阀。\n(3) WTO的保障措施条款主要表现为：\n① GATT(1994) 第19条：狭义的保障措施，当因出现未预料到的发展，或因缔约方(进 口国)履行GATT/WTO协定义务的结果，使某种产品的进口数量急剧增长，致使该进 口国国内的相同产业(生产相同产品或直接替代产品)受到严重损害或面临严重损害威 胁时，该进口国可自行决定，在“制止或补救该损害所必需的程度与时间内”提高关税或 采取数量限制措施。\n② 《保障措施协议》:在拖延会导致难以弥补的损害的紧急情况下，一成员根据一项明确 证实进口的增加已经或正在威胁造成严重损害的初步裁定，可以采取临时保障措施。\n③ 《农业协定》第5条“实施特别保障措施”:成员方对将非关税措施予以关税化的进口产 品，在符合一定条件(数量增加、价格下降)时可暂时违背规则，实施特别保障措施。\n④ 《纺织品与服装协定》第6条“农产品特别保障措施”满足以下两个条件之一的情况， 成员国可以采取农产品特别保障措施。条件一、在任一年内这种产品的进口量超过了由 现行市场准入机会决定的触发水平；条件二，该产品以国内货币表示的CIF进口价低于 触发价格。\n采取保障措施的成员均应以书面形式通知农业委员会；通知应尽可能提前作出，且 无论如何应在采取该保障行动后10天内作出。当有关产品进口量在下降过程中，虽然 进口价格低于触发价格，WTO成员也不应对该产品采取特别保障措施。同时，在采取 特别保障措施时，采取措施的成员不应再寻求其他的救济。\n⑤  GATS第10条：1)应在非歧视原则基础上就紧急保障措施问题进行多边谈判。谈判结 果应不迟于WTO 协议生效之日起3年内付诸实施。2)在第1款所说的谈判结果开始 生效前的一段时期，尽管有第二十一条第1款的规定，任何成员在其承诺生效之日起1 年，可以将修改或撤销一具体承诺的意愿通知服务贸易理事会；前提是该成员向理事会 说明此修改或撤销不能等待第二十一条第1款规定的3年期限的理由。3)第2款的规 定，应在WTO协议生效3年后停止适用。","knowledge":["国际贸易政策"]},{"id":"2011_3","year":2011,"num":3,"type":"简答","question":"在国际会计中涉及到跨国公司母公司与子公司之间的财务报表合并问题，假设1家美国 公司于某年年初投资1800万日元用于在日本设立一家公司，该子公司分别在年初和年中购 买了各900万日元的固定资产和存货。假设年初和年中美元兑日元的汇率分别是1美元=100 日元和1美元=80日元。年终时该子公司的资产负债表(局部)包含以下内容，此时汇率为 1美元=90日元。 年终在与母公司进行报表合并时，分别根据现行汇率法和时限法对上述子公司会计表格进行 调整，调整的结果添在下表中，并说明两种方法各自的缺点。","answer":"年终在与母公司进行报表合并时，分别根据现行汇率法和时限法对上述子公司会计表格进行\n调整，调整的结果添在下表中，并说明两种方法各自的缺点。\n(1)现行汇率法对所有资产和负债项目按期末汇率折算，但所有者权益项目按投入资本是  的历史汇率折算。所以：固定资产900/90=10,存货：900/90=10。所有者权益：1800/100=18。 时限法以历史成本计量的资产、负债采用历史汇率，以现行市价计量的资产、负债采用线性  汇率，折算汇率与各项目的计量方法一致。所以固定资产、存货和所有者权益项目都按历史  汇率计算。固定资产为年初购买，所有者权益为年初投入，使用年初汇率，但存货是年中购  买，采用年中汇率。固定资产：900/100=9,存货：900/80=11.25,所有者权益=1800/100=18。\n(2)各自缺点\n现行汇率法的缺点：\n①  该方法假定附属公司以所在国货币表示的外币资产和负债项目都要承受汇率变动的风 险，这显然是不合理的。\n②  现行汇率法把子公司当作独立自主经营的海外实体，对子公司的资产和负债项目按子公 司所在国的效用来计量，因而体现的是实体理论，与编制合并报表时广泛采用的母公司 理论相违背。\n时限法的缺点：\n折算时的工作量大，而且将外币折算差额直接计入当期损益，容易使跨国公司的合并利 润多变，从而影响跨国公司上市股票的价格","knowledge":["国际金融","跨国公司与国际化"]},{"id":"2011_4","year":2011,"num":4,"type":"简答","question":"简述世界文化差异的霍夫斯泰德模式的主要内容。","answer":"霍夫斯泰德提出了文化维度理论，从六个维度的角度分析国家文化的差异。\n①权力距离指数\n权力距离 ( Power Distance Index) 指社会中地位低的人对于权力在社会或组织中不平 等分配的接受程度。权力距离指数越高，对不公平的接受程度越高，等级观念较强；权力距 离指数较低，强调权力的公平分配与平等。\n②不确定性规避\n不确定性规避 ( Uncertainty Avoidance  Index) 指受到不确定的事件和非常规的环境威 胁时是否通过正式的渠道来避免和控制不确定性。不确定规避指数高的文化追求稳定，反对\n偏激与冒险；而不确定性规避程度低的文化对待反常行为较为宽容，鼓励创新与冒险。\n③个人主义和集体主义\n个人/集体主义 (Individualism vs Collectivism) 维度是衡量社会关注个人的利益还是关 注集体的利益。个人主义文化中，人们倾向于关心自己及小家庭，突出个人价值；而集体主 义文化注重族群内关系，关心大家庭，突出集体价值。\n④男性化与女性化\n男性化与女性化 ( Masculinity vs Femininity) 指社会代表男性的品质如竞争性、独断性 更多，还是代表女性的品质如谦虚、关爱他人更多，以及不同性别之间的分工界限。男性度 指数越高，说明男性气质越突出，性别分工越明显；男性度指数较低，说明社会强调关爱他 人，性别平等。\n⑤长期取向和短期取向\n长期取向与短期取向 (Long-term vs Short-term) 指对延迟其物质、情感、社会需求的  满足所能接受的程度。长期取向指数越高，则越能牺牲当下换未来的满足，注重长期利益。 长期取向指数越低，则更注重眼前利益。\n⑥ 自 我 放 纵 与 约 束\n自身放纵与约束(Indulgence vs Restraint) 指对人基本需求与享受生活享乐欲望的允许 程度。放纵指数越高，社会对自我放纵的允许度越大。自我放纵指数越低，社会越反对享受， 强调自我约束。","knowledge":["国际商务管理"]},{"id":"2011_5","year":2011,"num":5,"type":"简答","question":"在下述四个例子中，决定贸易模式的主要是比较优势还是规模经济?为什么? (1)加拿大是主要的新闻纸出口国 (2)英特尔生产世界上半数以上的CPU (3)美国和日本相互出口小轿车 (4)中国是电视机的主要出口国","answer":"(1)加拿大是主要的新闻纸出口国\n(2)英特尔生产世界上半数以上的CPU\n(3)美国和日本相互出口小轿车\n(4)中国是电视机的主要出口国\n比较优势指由于技术水平或要素禀赋差异形成的相对价格差异，在完全竞争市场条件下， 一国会出口本国具有比较成本优势的产品。比较优势差异产生产业间贸易。\n规模经济指由于生产规模扩大导致平均成本下降的现象，分为内部规模经济和外部规模 经济。内部规模经济使企业生产成本降低，生产效率提高。外部规模经济使行业总体规模扩 大，厂商数量提高。规模经济产生经济发展水平相近的国家之间的贸易和产业内贸易。\n(1)  决定加拿大出口新闻纸的是比较优势。木材是生产新闻纸的基本原料，加拿大森林 资源丰富，木材价格较低，因此具备出口新闻纸的比较成本优势。\n(2)  决定英特尔生产半数以上CPU的基础是规模经济。CPU生产具有规模经济效应，随 着生产规模的扩大，呈现规模收益递增的特点，提高了英特尔的生产效率，故英特 尔会出口CPU。\n(3)  决定美国和日本相互出口小轿车的基础是规模经济。规模经济和产品异质能够解释 发达国家之间的贸易和产业内贸易现象，美国和日本相互出口小轿车，属于产业内 贸易，理论基础是规模经济理论。\n(4)  决定中国是电视机主要出口国的因素是比较优势。电视机行业生产标准化程度高，\n属于劳动力密集型行业，中国是人口大国，劳动力资源丰富，具有生产劳动密集型 产品的相对成本优势，故中国成为电视机的主要出口国。","knowledge":["国际贸易理论"]},{"id":"2011_6","year":2011,"num":6,"type":"论述","question":"美国近期采取的量化宽松政策对美元汇率和全球通货膨胀有怎样的影响?","answer":"(1)量化宽松的含义\n主要是指中央银行在实行零利率或近似零利率政策后，通过购买国债等中长期债券，增 加基础货币供给，向市场注入大量流动性资金的干预方式，以鼓励开支和借贷。2009年， 为改善信贷市场环境和应对金融危机，美联储声明将在未来6个月内购买总额3000亿美元 的长期国债，正式宣告美元进入量化宽松货币政策时代。\n(2)对美元汇率的影响：\n美联储量化宽松政策，实际增加美元供应量，会形成美元的贬值趋势。主要原因在于：\n①根据外汇供求原理：美元供给增加，在需求量不变的情况下，美元供过于求，因此美元 会趋于贬值。\n②美元供应量的增加为经济注入流动性，降低美国金融市场的利率水平，国际资金更偏好 投资非美元资产，造成美元贬值。\n③量化宽松政策形成较强的贬值预期，在羊群效应作用下，投资者进一步抛售美元，加剧 美元贬值趋向。\n(3)对全球通胀的影响\n【选答】美联储的量化宽松政策本意是解决资产价格下跌引发的次贷危机，降低企业贷款成 本，促进消费并刺激经济，达到复苏美国经济的目的。\n然而，由于美元在国际货币体系中的地位，量化宽松会引发全球通货膨胀，冲击全球经 济。“美元是美国的，但问题是世界的。”\n①对全球通货膨胀的影响\nA.    量化宽松会导致全球美元超发，长期导致货币的内在价值下降，引发全球通货膨胀；\nB.   美元币值下降，则原油、铁矿等大宗商品价格上涨，抬高全球企业生产成本，引起 全球物价上涨；\nC.   量化宽松政策会导致全球货币竞相贬值，进一步恶化全球范围内的通货膨胀。\n②  对新兴经济体通货膨胀的影响\nA.   大宗商品价格上升会形成新型经济体的输入性通货膨胀；\nB.   美元贬值，大量热钱涌入新兴经济体，造成新兴市场流动性过剩，经济过热或形成 资产泡沫，引发通货膨胀；\nC.   新兴经济体保持对美元的盯住汇率，为了避免被动升值、稳定出口，新兴市场不得 不同样增发货币，导致国内通胀。\n一是通过经常项目，美元贬值导致以美元计价的基础资源大宗商品价格上升，企业生产成本 变高，制成品价格上涨，物价上涨；\n二是通过资本和金融项目，美元贬值，热钱流出美国而流入他国(新兴经济体为代表),导  致新兴经济体的流动性过剩，资产价格上升，物价上涨； 一和二我们叫“输入性通货膨胀”。 三是全球经济秩序需要协调，不可能美国单边宽松和贬值，为了稳定币值(防升值预期)和  出口，全球会竞相采取宽松和贬值的政策，最终进一步抬高全球通货膨胀。\n(2)量化宽松的影响和“强势美元”的逻辑刚好相反，在2020年强势美元和2019年金砖 货币这两题的真题解析中有说明，可以对比记忆。\n2020年3月，美联储宣布降息至零利率水平，而后重启量化宽松政策，“无限制”购买国债 和机构抵押贷款。这一轮 QE 和2010年的情形相似，对此需要深入理解，2011年这道题的 答案要求能自己写出来，还能迁移分析2020年的QE。美元走势和美联储政策是国际金融的 热 点 ， 很 可 能 反 映 在 初 试 试 题 中 ， 值 得 留 意 。","knowledge":["国际金融"]},{"id":"2011_7","year":2011,"num":7,"type":"论述","question":"论述比较优势理论和H-0 理论的基本内容及主要异同点，并结合中国对外贸易发展的现 实，论述中国对外贸易发展所依据的主要国际贸易理论。","answer":"(1)比较优势论和HO 理论的异同\n李嘉图比较优势论认为，国际贸易的基础是比较优势而非绝对优势。一国应按照“两利 相权取其重，两弊相权取其轻”的原则出口具有比较优势的产品，进口不具有比较优势的产 品，贸易的结果是使双方获利。\nHO 模型即赫克歇尔和俄林的要素禀赋论，认为即使技术水平相同但要素禀赋的不同的 两国也可以进行国际贸易，一国应生产并出口密集使用其相对丰裕要素生产的产品，进口密 集使用其相对稀缺要素生产的产品。\n二者相同点：\n①二者都主张自由贸易，承认自由贸易具有互利性；\n②  二者都是比较利益论，都要发挥比较优势：比较优势论认为外生的技术差异导致了生产 成本的差异。要素禀赋理论认为外生的自然资源禀赋差异导致了生产成本的不同。\n二者不同点：\n①贸易产生的原因不同：比较优势理论认为是劳动生产率差异，要素禀赋理论认为是要素 禀赋差异。\n②使用的要素不同：比较优势理论是单要素生产模型，要素禀赋理论是双要素生产模型。\n③  交换规律不同：比较优势理论认为国内交换规律不适用于国际交换，要素禀赋理论认为 国内交换规律可以适用于国际交换。\n④收入分配效应不同： HO 理论比李嘉图的比较优势论更进一步，研究了国际贸易与一国 国内收入分配的关系\n(2)中国对外贸易发展依据的国际贸易理论\n①  比较优势战略论：基于李嘉图比较优势论和HO 理论，以林毅夫为代表的经济学家认为， 一国的主要产业的要素密集度应当和本国的要素禀赋一致，脱离要素禀赋而人为地提升 产业结构，必然要扭曲价格体系，压制市场机制的作用。因此，政府应当采取比较优势 战略，充分利用要素禀赋的比较优势参与国际分工，进而促进资本积累，提高资本丰裕 度，改变资源结构。\n②  比较优势陷阱论：对比较优势战略的异议者认为，比较优势是静态理论，按比较优势参 与国际分工会陷入比较优势陷阱。比较优势论强化了低水平的产业结构，不利于产业结 构调整，既得利益者会各种办法阻止制度创新和技术进步。比较优势陷阱论并没有否定 比较优势论的基本思想，而是提醒不要静止和僵化地看待比较优势论。\n③国家竞争优势理论：竞争优势论的支持者认为，一国资源禀赋的比较优势并不等于该国 产业或产品在国际市场上的竞争优势。目前，中国国内企业和产业将比较优势转化为竞 争优势的能力还比较差，在国际市场竞争中缺乏足够的竞争优势。为适应知识经济和高 新基础产业蓬勃发展的需要，中国外贸发展战略从比较优势导向转化为竞争优势导向为 必然选择。\n④  马克思的国际价值理论：有些学者认为，比较优势学说过去长期给落后国家带来了灾难， 今天仍然起着破坏性作用。在批驳李嘉图的比较优势论的同时，这些学者以马克思的国 际价值论为指导，主张通过国际交换、提高生产效率并节约社会劳动、获得更多的新价 值，由此说明马克思的国际价值理论是我国发展对外贸易的重要理论依据。\n(2)旧版答案里面有个说法叫“中国的二元经济结构”,所以在中西部地区使用单一的比较 优势论，沿海地区比较优势论与竞争优势论结合。挺有道理的，当然可答。但是H老师在教  材中表述的观点是“在二元制结构下，比较优势战略不仅能够得以顺利实施，而且能够推动  二元经济向良性方向发展”、“结合中国二元经济的现实情况，实施比较优势战略可以促进农  村剩余劳动力向非农业转移”,与旧版答案有一点不符，因此，答案没有引用SC 这一观点。 审题与思路：第一问和第二问之间存在关联，第一问提到比较优势论和HO 模型，那么第二  问中国对外贸易的指导思想，应当包括比较优势理论和HO 理论，符合我们对中国对外贸易  的认知。中国需要以比较优势和要素禀赋参与国际分工，构成与发达国家的“国际大循环”。 但是以比较优势理论指导存在局限和问题，随着中国经济增长，中国的比较优势渐渐丧失  (HOS 定理),所以对中国来说需要参与国际分工的新格局“水平分工和垂直分工并存”、“自 由贸易和贸易保护并存”、“比较优势论和新贸易理论并存”等等，都是可行的要点。\n和本题第二问明显相通。比较优势是相对概念，而竞争优势是绝对概念；比较优势先天优势 和静态优势，竞争优势是后天优势和动态优势；比较优势是基于全球的立场，竞争优势基于 本国立场；比较优势的前提是完全竞争市场，竞争优势包括不完全竞争等。\n为什么要以竞争优势指导中国的对外贸易?强调比较优势和竞争优势的区别——有比较优 势不一定有竞争优势，僵化以比较优势理论作为政策依据.可能陷入比较优势陷阱。","knowledge":["国际贸易理论"]},{"id":"2011_8","year":2011,"num":8,"type":"论述","question":"根据产品生命周期理论，试述企业进出国际市场的不同阶段及其特点。","answer":"(1)产品生命周期理论\n弗农提出了产品生命周期理论，将产品生命周期分为新产品时期、成长成熟期和标准化 产品时期三个阶段，分析创新时机、规模经济和不确定性对国际贸易模式的影响，创建了国 际贸易中的产品生命周期理论，用以解释国际贸易和国际投资的动态变化。\n①引入阶段(导入期):\nA.    产品特点：生产非标准化，产品差异性明显，生产规模较小。产品是技术密集型产品。\nB.    市场特点：新产品的国内需求弹性较低，需求量相对较大，厂商拥有垄断地位，属于卖 方市场。\nC.   进出市场的方式：不存在国际贸易或只有小规模的国际贸易，集中于收入水平相近的发 达国家。\n②成长成熟阶段：\nA.   产品特点：技术成型并开始扩散，生产过程标准化不断提高，产品转为资本密集型产品。\nB.   市场特点：生产过程中规模经济效应越来越明显，市场竞争程度不断加强，企业必须不 断提高生产规模，以降低单位成本和增加竞争力。\nC.   进出市场的方式：\na)     产品出口增加，包括创新国对其他发达国家和发展中国家的出口。\nb)    创新国企业开始选择服务国外需求的最优方式，在本国生产出口、到目标市场投资 生产并销售和对外技术转让这三种方式之间进行权衡选择选择。\n③标准化产品阶段：\nA.   产品特点：生产技术完全标准化，产品成为劳动力密集型，劳动成本成为决定因素。\nB.   市场特点：市场竞争越来越激烈，消费者对产品有较大选择余地，市场变为买方市场。\nC.   进出市场的方式：发展中国家扩大生产向发达国家出口；包括创新国在内的发达国家生 产不断减少，逐渐从出口转为进口；创新国逐步退出生产，产品生命周期在创新国基本 完结，创新国着手研究开发新的产品。\n(2)产品生命周期理论是工业制成品贸易的动态贸易理论。动态含义体现在三个方面：\n①生产要素密集度的动态变化\nA.   引入阶段：研发密集型产品。\nB.  成长成熟阶段：产品由技术密集型向资本密集型转变。\nC.   标准化阶段：劳动密集型产品。\n②贸易国比较优势的动态转移\nA.   引入阶段：美国或者创新国具有比较优势。\nB.   成长成熟阶段：一般发达经济体及新兴工业化经济体具有比较优势。\nC.   标准化阶段：一般发展中经济体具有比较优势。\n③进口需求的动态变化\nA. 美国对奢侈型商品的需求最大--向美国出口引入阶段的耐用消费品，出口的比较优势最 大。\nB.   德国对中档型商品的需求最大--向德国出口成长成熟阶段的耐用消费品，出口的比较优 势最大。\nC.   日本对初级型商品的需求最大--向日本出口标准化阶段的耐用消费品，出口的比较优势 最大。","knowledge":["国际贸易理论"]},{"id":"2011_10","year":2011,"num":10,"type":"案例","question":"Diebold 公司国际化 Diebold 公司是总部位于美国俄亥俄州的具有150多年历史的金融设备制造商主要产品 之一为自动柜员机(ATM 机)。该公司20世纪80年代开始走出国门，与荷兰公司Philips 达 成协议，运用后者的全球分销渠道进行销售。1990年该合作无疾而终，Diebold 转而与 IBM 公司成立合资公司Interbold, 该合资公司充分整合了Diebold 的研发优势和 IBM 全球销售 网络优势。随后，Diebold 海外销售稳步上升。与此同时，美国 ATM机行业日益饱和，新兴 发展中国家市场蓬勃发展。1997年，出于 IBM公司对ATM 机销售长期不重视，Diebold 回购 了Interbold 中 IBM公司的股份，从而完全掌握了Interbold 的全球销售渠道，同时，Diebold 意识到本土化生产的重要性：比如亚洲消费者喜欢在ATM 机上支付水电费，消费者希望能用 ATM 机存现金等。1999年，Diebold 并购了巴西的Procomp 司，该公司销售额为40亿美元， 且在ATM 机市场上实力雄厚。紧接着还收购了法国的Groupe Bull的和荷兰的Getronics,","answer":"Diebold公司是总部位于美国俄亥俄州的具有150多年历史的金融设备制造商主要产品  之一为自动柜员机(ATM机)。该公司20世纪80年代开始走出国门，与荷兰公司Philips达成协   议，运用后者的全球分销渠道进行销售。1990年该合作无疾而终， Diebold 转而与IBM公司   成立合资公司Interbold,  该合资公司充分整合了Diebold 的研发优势和IBM全球销售网络优势。 随 后 ，Diebold 海外销售稳步上升。与此同时，美国ATM机行业日益饱和，新兴发展中国家   市场蓬勃发展。1997年，出于IBM 公司对ATM机销售长期不重视， Diebold回购了Interbold      中IBM 公司的股份，从而完全掌握了Interbold 的全球销售渠道，同时，Diebold 意识到本土化   生产的重要性：比如亚洲消费者喜欢在ATM机上支付水电费，消费者希望能用ATM机存现金   等。1999年，Diebold 并购了巴西的Procomp 司，该公司销售额为40亿美元，且在ATM机市  场上实力雄厚。紧接着还收购了法国的Groupe Bull的和荷兰的Getronics,  这两个巨头的欧   洲市场销售额达10亿美元。在中国，没有现成的公司可收购， Diebold 于是在上海建立了一   家由其控股的公司，负责生产和销售AT机、金库门、保险柜、和警械柜等产品，其中ATM     机中国市场占有率50%,中国TM机市场目前仍由舶来品主导，但是市场重心正向国产品牌倾   斜。2006年，国产品牌仅占据二成份额，到2009年，已经占据近四成份额。而Diebold 在一   些重点城市如天津和重庆的销售业绩并不佳。根据案例内容回答下列问题：\n(1) Diebold在国际化过程中，采取了哪些市场进入模式，为何采取不同模式?(6分)\nDiebold 采取了投资型进入模式，按持股比例划分，包括合资经营和独资经营；按是否 新建企业划分，包括并购和绿地投资。\n①  与IBM 成立合资公司属于合资模式：优点在于从合资者处得到东道国经济、政治、文 化等的知识，利用IBM公司的销售网络，实现优势联合；同时，能够与IBM 分摊市场 开发的风险和费用，降低成本与风险。(此外，部分情形如进入巴西等新兴市场，政治 上可能只允许合资，面临国有化和干预的风险低)\n② 并 购 巴 西Procomp 公司、收购法国的Groupe Bull和荷兰Getronics 属于并购模式，跨 国并购让Diebold公司迅速进入巴西、法国、荷兰市场，利用被并购方的市场份额和渠 道进行，扩大ATM机产品的市场占有率。\n③在上海新建控股公司属于绿地投资模式和独资经营模式。新建企业不存在历史遗留问题， 能够最大程度按Diebold 需求建立生产和销售企业。独资模式可独享全部利润，对子公\n司的控制力强 ， 利于实现区位经济和规模经济 。\n(3)用波特五力模型对该公司所处中国市场的竞争情况进行分析(6分)\n迈克尔波特的五力模型从供应商议价能力、消费者议价能力、替代品替代能力、竞争者竞争 能力和潜在进入者的进入能力分析企业面临的竞争状态。\n①  供应商议价能力。Diebold 公司是大型跨国公司，每年ATM机销售量巨大，采购零部 件数量多，并且ATM 机零部件标准化程度高，生产难度不大，所以供应商讨价还价能 力差。\n②消费者议价能力。 ATM机主要是银行采购，单个消费者购买量大，且标准化程度较高， 技术难度一般，国内也出现了更多物美价廉的产品，故消费者讨价还价能力强。\n③潜在竞争者的进入能力。该行业标准化程度高，技术难度一般，进入门槛较低。\n④替代品的替代能力。国产ATM机价格低，且 Diebold公司ATM 机用户转换成本低， 产品标准化程度较高，故替代品替代能力强。\n⑤同业竞争者的竞争能力。国产品牌从占据二成份额涨到四成份额，涨幅明显，侵吞了 Diebold公司市场份额，市场竞争十分激烈。\n(4)结合中国市场和外资政策近几年变化，从营销4P角度制定营销策略\n4P营销理论包括产品 Product、定价 Price、渠道Place、分销Promotion。\n①产品是企业提供给目标市场的物品和服务组合，包括产品质量、性能、售后服务等。 Diebold要开发更适合中国消费者使用习惯的产品，优化产品性能，体现中国本土ATM  机不具备的功能和价值，增加产品的附加利益；提高产品使用中国供应商零部件的比重， 增加产品的国有化属性，获得政府购买优势。\n②价格是顾客购买产品时的价格，常见的定价方法包括成本导向法、需求导向法和竞争导 向法。由于银行采购 ATM 批量大，可采取需求导向的定价方法，加强与银行的价格谈 判，争取大批量的订单而降低ATM机单价，使双方都能受益。\n③渠道是将产品送达目标市场所进行的各种活动，包括中间商选择、道代理、仓储、运输 及物流配送。Diebold可在中国建立直营销售机构，拥有自己的销售团队，充分理解中 国国有银行、股份制银行、地方城商行的运行模式和采购需求，提高渠道掌控力。\n④销是企业为说服目标顾客购买其产品进行的活动，包括广告营销、活动促销、人员推销、 公关营销。ATM 机营销主要依靠人员推销和公关营销，因此，需要开展政府公关活动， 持续推广 Diebold的产品","knowledge":["跨国公司与国际化","国际商务管理"]},{"id":"2012_1","year":2012,"num":1,"type":"简答","question":"简述比较优势陷阱，并分析其产生的原因。","answer":"比较优势陷阱（Comparative Advantage Trap）是指发展中国家长期依赖资源禀赋或廉价劳动力形成的比较优势参与国际分工，导致贸易条件恶化、产业升级困难，陷入低附加值锁定的困境。\n\n产生原因：\n① 贸易条件恶化：初级产品和低端制成品需求收入弹性低，长期价格呈下降趋势，发展中国家出口购买力下降（普雷维什-辛格命题）。\n② 技术依赖：依赖比较优势导致产业停留在劳动密集型环节，缺乏技术创新动力，无法实现产业升级。\n③ 要素固化：资源向低端产业集中，人力资本积累不足，阻碍要素禀赋结构升级。\n④ 价值链锁定：发达国家掌握研发、品牌等高附加值环节，发展中国家被锁定在低端加工制造环节。\n⑤ 制度路径依赖：制度安排和政策导向强化了原有的比较优势格局。","knowledge":["国际贸易理论"]},{"id":"2012_2","year":2012,"num":2,"type":"简答","question":"比较绿地投资和跨国并购的优缺点。","answer":"(1)跨国并购 (Merger&Acquisition)\n包括跨国兼并和跨国收购两种。跨国兼并是指原来两个不同国家企业的资产和经营结合 成一个新的法人实体。跨国收购指购买海外公司的资产或股权并控制其经营活动，分为全资 收购、少数股权收购和多数股权收购。\n并购的优点在于：\n①便于迅速营运。通过并购现有的企业，可以快速建立起自己在外国目标市场的营运设施。\n②  在竞争对手之前抢占先机。在快速全球化市场先发制人，如电子通信行业，企业相互竞 争试图争夺全球领先地位，因此这些市场呈现出集中地并购浪潮。\n③并购比新建企业风险要小。当企业实施并购时，它买下的是一种能生产出收入和利润流\n的资产。相反，新建企业能带来的收入和利润流是不确定，因为它从未存在过。\n缺点在于：\n①经常为并购企业的资产支付过高的价格。\n②并购企业之间的文化碰撞：70%的跨国并购没有实现预期价值以失败告终，而其中又有 70%失败于文化整合问题。\n③并购与被并购企业的运营实现协同效应，比想象要长得多。\n④并购前缺乏严密的审查。\n(2)绿地投资 ( Greenfield    Investment)\n又称创建投资或新建投资，是指跨国公司等投资主体在东道国境内依照东道国的法律设 置的部分或全部资产所有权归外国投资者所有的企业。\n绿地投资的优点在于：\n①使企业最大限度的建设自己想要的分支机构形式。减少文化碰撞和管理问题；\n②没有旧企业遗留问题；\n③没有资产高估风险。\n缺点在于：\n①成本高，风险高，周期长；\n②被对手赶超，而后者以并购的方式进入。","knowledge":["跨国公司与国际化"]},{"id":"2012_3","year":2012,"num":3,"type":"简答","question":"简述产业内贸易发生的原因和度量指数。","answer":"(1)产业内贸易发生的原因\n产业内贸易指贸易双方同类产品的进出口，又称重叠贸易。20世纪60年代以来，传统  的国际分工格局，出现了两个倾向：产业内贸易越来越多、发达国家之间的贸易越来越多。 原有的贸易理论已不能解释这些新趋势。克鲁格曼兰卡斯特等人突破了传统贸易理论的假定， 从产品异质、需求偏好相似、规模经济等角度解释产业内贸易，提出了产业内贸易理论。\n①不完全竞争是产业内贸易的市场基础。包括完全垄断、寡头垄断、垄断竞争，不完全竞 争使同一产业的产品呈现出复杂的产品系列。\n②  产品差异化是产业内贸易的基础。开展国际贸易后，两国或多国市场融合，各国各自生 产几种异质性产品互不重合，通过贸易增加了消费者选择余地，提高了福利水平。\n③需求偏好相似是产业内贸易产生的动因。各国经济发展水平越接近，其需求结构也越相 似，相互贸易可能性越大。\n④规模经济是产业内贸易的利益来源。内部规模经济使企业生产成本降低，生产效率提高。 外部规模经济使行业总体规模扩大，厂商数量提高。这都会使消费者数量增加，消费者 剩余增加，社会福利水平提高。\n(2)产业内贸易的度量包括沃顿指数、巴拉萨指数、格鲁伯-劳埃德指数\n① 【选答】沃顿指数：S=Xi/Mi。其中 Xi, 表示i 行业的出口，Mi 表示i 行业的进口，改 数值越接近与1,说明进出口比例越相近，产业内贸易程度越高；越远离1而接近无穷 小或无穷大，说明产业内贸易程度越低。沃顿指数基本不再采用了。\n② 【选答】巴拉萨指数，又称产业间贸易指数，与产业内贸易承反比关系，B=|Xi-Mil/ (Xi+Mi) 。巴拉萨指数的经济含义是，i 产业的净出口多大程度上被进口所抵消，巴拉 萨指数越大，则产业内贸易水平越低。\n③格鲁伯-劳埃德指数，即产业内贸易指数：IITi=1-|Xi-Mil/(Xi+Mi) 。G-L    指数衡量的是\ni 产业中双向贸易的程度，其值在0-1之间。GL指数越接近1,表明该产业的产业内贸 易程度越高。当GL指数为0,一国在该产业是纯进口或纯出口；当GL指数为1,一国 在该产业的进口和出口值刚好相等。\n(2)产业内贸易的度量包括沃顿指数、B 指数和GL 指数，我们一般讲的产业内贸易指数是 GL 指数，另外两个如果没有背下来，则建议不答。\n根据GL指数公式计算得到结果，比较简单。\n2019年、2020年真题都是10分的计算、10分的简述。2019年是10分解释跨国经营的含义， 10分计算跨国指数。2020年10分有效关税计算，10分有效与名义关税对比。\n那么以类似结构，出一道题：什么是产业内贸易?与传统贸易理论有何区别?(10分)根   据计算该国各行业产业内贸易指数，并指出哪个家产业内贸易水平最高。(10分)或者再偏   一点的考点：简述比较优势理论的主要内容，并计算该国各产业的显示性比较优势指数( RCA)。 以上两个要点考到的概率不高，但相似的计算题结构还可能出现。因此，看书要注意公式和   解 释 之 间 的 联 系 。","knowledge":["国际贸易理论"]},{"id":"2012_4","year":2012,"num":4,"type":"简答","question":"简述避免国际双重征税的方法。","answer":"(1)国际重复征税\n指两个或者两个以上的国家按同一税种，对同一纳税人就同一征税对象，在同一时期内征税。\n(2)【选答】产生原因\n国际重复征税是由不同国家的税收管辖权同时叠加在同一笔所得之上引起的，这种国与国之 间税收管辖权的交叉重叠可以分为相同税收的管辖权互相重叠和不同的税收管辖权相互重 叠两种。\n(3)避免国际重复征税的方法\n①免税法：指一国政府对本国居民纳税人的已向来源地国缴纳了税款的国外所得予以全部   或部分免税待遇。免税法分为全额免税法和累进免税法。全额免税法是指一国政府对本  国居民的国外所得不予征税，并且在确定对其国内所得征税的税率时也不考虑这笔所得。 累进免税法是指一国政府对本国居民的国外所得不予征税，但是在确定其国内所得征税   的税率时，要将这笔所得额计算在内一并考虑。\n②减免法：指一国政府对本国居民的国外所得在标准税率的基础上减免一定比例，按较低 的税率征。\n③抵免法：指一国政府在对本国居民的国外所得征税时，允许其用国外已缴纳的税款冲抵  在本国应缴纳的税款，因此，实际征收的税款为应纳本国税款与已纳外国税款的差额。\n④扣除法：指一国政府在对本国居民的国外所得征税时，允许其将该所得负担的外国税款 作为费用从应税国外所得中扣除，只对扣除后的余额按照相应的税率征税。","knowledge":["综合"]},{"id":"2012_5","year":2012,"num":5,"type":"简答","question":"简述供应链管理的内容。","answer":"供应链管理（Supply Chain Management, SCM）是对从原材料供应商到最终消费者的全链条进行系统规划、协调与控制的管理活动。主要包含以下方面：\n\n① 需求预测与计划：基于市场数据预测客户需求，制定采购和生产计划，实现供需匹配。\n② 采购与供应商管理：选择和管理供应商，建立长期合作关系，确保原材料质量和供应稳定性。\n③ 生产与制造管理：优化生产流程和排程，平衡产能与需求，推行准时制（JIT）和精益生产。\n④ 库存管理：科学设定安全库存和再订货点，降低库存持有成本，防止缺货和积压。\n⑤ 物流与配送管理：管理仓储、运输和配送网络，优化物流路径，降低物流成本，提高配送效率。\n⑥ 信息流管理：建立信息共享平台，实现供应链各环节数据同步，减少信息不对称和牛鞭效应。","knowledge":["国际商务管理"]},{"id":"2012_6","year":2012,"num":6,"type":"论述","question":"综述欧洲货币一体化理论与发展实践，对当前欧洲债务危机发生的根源进行评析。","answer":"(1)欧洲货币一体化的基础是最优货币区理论\n蒙代尔提出，最优货币区是采用单一货币、或几种货币之间的汇率永久固定、对外统一 浮动的经济区域，对内采用固定汇率，对外采用浮动汇率，以此达到内外均衡的最优目标。 货币一体化指采用单一货币的最优货币区，区域内流通单一货币，建立超国家的统一的中央 银行来执行货币政策的职能。欧元一体化即是典型的代表。\n(2)欧洲货币一体化实践\n第一阶段：1960~1971。这段时期内，欧洲各国组成了英镑区、黄金集团、法郎区三个 货币区，被视为欧洲货币一体化进程的开端。\n第二阶段：1972~1978。在欧洲经济一体化进程的推动下，西欧六国(法、德、意、荷 兰、比利时、卢森堡)货币开始联合浮动。\n第三阶段：1979~1998。欧共体各国建立了欧洲货币体系，包括：欧洲货币单位 ECU、 稳定汇率机制和欧洲货币合作基金，其中以稳定汇率机制最为重要。这一体系持续了20年， 为欧元的创立积累了经验。中间包括德洛尔计划、《马斯特里赫特条约》。\n第四阶段：1999年至今。欧洲经济货币联盟正式成立。1999年1月1日，欧元统一货 币欧元正式启动。2002年1月1日欧元的纸币和硬币开始在市场上正式流通。\n(3)欧债危机\n2010年，受到美国次贷危机冲击，希腊、冰岛等“欧猪五国”(PIIGS) 爆发债务危机， 引起欧元区经济动荡，称为“欧债危机”。欧元区初衷是建立统一市场，实现人员、商品、服 务和资本的自由流动，统一货币使成员国能通过固定汇率降低不确定性，同时还能获取额外 的贸易创造效应，对外增强谈判能力。\n但是，欧元区并未建立完全实现商品要素的自由流动，缺乏完善的财政协调机制，因此， 欧元诞生就伴随着内生的制度缺陷——尤其是财政和货币政策分离的缺陷在危机中不断放 大。\n(4)欧债危机产生的根源\n①  欧元区成员国经济发展水平和通货膨胀率相差甚远。受到危机冲击时，经济落后的欧猪 国家更容易陷入衰退问题。此时，欧猪国家和德法发达国家经济政策目标出现背离，欧 洲央行的货币政策很难兼顾，不能为了少数国家采取货币宽松政策。\n②  由于财政与货币政策的分离，欧猪国家丧失了货币政策工具，只能采取扩张性财政政策 刺激经济，造成债务不断积累(而高消费和高福利的刚性支出，希腊等国本身债务水平 就很高),《马约》对欧元成员国债务水平又有严格限制，制约政府融资能力，限制了财 政政策工具发挥作用。\n③  欧盟缺乏强有力的政治领导。财政、货币政策属于国家主权，欧元区的统一货币政策本 身使得成员国放弃了货币政策的经济主权，如果在此基础上要求统一财政政策，则意味 着成员国向欧盟进一步让渡经济主权，势必造成民族国家的反对。出现危机时，欧盟成 员国各有诉求，协调极为困难，谈判成本高，导致危机扩散与蔓延。\n(2)欧洲货币一体化进程最初的魏尔纳计划都相继搁浅，《马约》和欧元问世是实际的货币 一体化进程。论述题的重心是根据国际金融理论(汇率制度、内外均衡理论)分析欧债危机 的产生原因， 一体化进程不强求死记硬背。\n(3)欧元区问题的分析思路是收益-成本分析法。欧洲一体化/欧洲货币一体化能带来什么? 又会付出什么代价?类似思路用于分析近几年的热点“英国脱欧”。\n欧洲一体化必须牺牲部分国家主权，引发国内就业问题，造成政府财政负担，为了迁就欧盟 的规章制度损害英国的比较优势(如金融业),滋生难民问题和民族矛盾。总之，和共同市 场带来的收益相比，英国作为成员国需要付出的成本越来越高。\n影响采用按主体划分的思路，考虑对英国的影响、对欧盟的影响、对世界的影响；①对世界 来说，美国之下，中国、欧盟、日本都是重要经济体，欧洲一体化进程受挫而影响世界经济\n格局，中国话语权会相对提升；②对欧盟来说，英国脱欧意味着欧盟失去了一个重要支柱， 一体化进程受挫，影响欧元币值和国际地位；③对英国来说，未来一段时间，脱欧谈判将曲 折前行，英国的政治经济社会面临更大不确定性；④对中国来说，以往中欧合作的一部分会  变成中英的双边合作，因此可能要和英国重新进行贸易和投资的双边谈判。\n英国脱欧和特朗普上台都是逆全球化的表现，在复试中可能有提问，初试考到概率较低，答 案可参考逆全球化产生的原因或2013年论述题贸易保护的政治经济学答案。","knowledge":["综合"]},{"id":"2012_7","year":2012,"num":7,"type":"论述","question":"综述影响汇率变化的因素，并评估人民币被低估的观点。\n\n(2)人民币被低估的观点国内外关于人民币汇率低估的观点主要有两方面?一方面，其根据是中国存在巨额贸易 顺差和外汇占款；另一方面，其利用购买力平价理论来估算人民币汇率。这两种观点是有失 偏颇的，理由有三：\n(2)人民币币值低估和人民币升值的主要依据是购买力平价和中国的长期顺差(2014年论 述题答案有详细解读),这两个理论在实际运用时都存在缺陷，\n(2)如果增加能力导向，再为答案增色的话，第二问可以结合人民币汇率的变动趋势，然 后说明人民币低估的理由，最后反驳这个观点。但是2012年彼时年份较早，类似的观点当 下较少提及，汇率政策也大不相同，所以答案不再结合当时的人民币汇率走势分析了，仅提 供思路。","answer":"(1)影响汇率变化的因素\n①财政经济状况。一国财政经济状况较以前改善，该国货币趋于升值，反之，趋于贬值。\n②国际收支状况。一国国际收支改善或顺差，货币趋于升值。反之，趋于贬值。\n③利率政策与利率水平。短期来看，如果利率升高，资本流入增加，外汇供给也增加，本 币供给若保持不变，会使本币升值，外币贬值。长期来看，根据利率平价，高利率货币 在期汇市场上趋于贬值，低利率货币在期汇市场上趋于升值。\n④ 宏观经济政策。扩张性的财政政策，会增加就业，促进经济增长，使得本币趋于升值。\n⑤市场预期。人们对市场预期的心理不同，直接导致外汇买卖方向的变化或外汇投机的变 化，从而使得外汇供求发生变化，导致汇率的变化。\n⑥各国央行的直接干预。如收购或抛售外汇、冲销干预、采取紧缩或扩张的货币政策等。\n⑦重大的国际事件。如战争、动乱、政府更替或发生政变、突发性恐怖事件、重大自然灾 害等。\n(2)人民币被低估的观点\n国内外关于人民币汇率低估的观点主要有两方面?一方面，其根据是中国存在巨额贸易 顺差和外汇占款；另一方面，其利用购买力平价理论来估算人民币汇率。这两种观点是有失 偏颇的，理由有三：\n①购买力平价遭到滥用。\n购买力平价理论认为两国的货币的购买力之比是决定汇率的基础，汇率的变动是由两国 货币购买力之比变动引起的。但购买力平价遭到滥用：\nA.   购买力平价法在应用中存在一些问题：由于一价定律短期来看难以符合现实，所以购买 力平价理论对短期汇率的变动没有太强的说服力；没有考虑市场结构的差异；没有考虑 支出结构或消费结构的差异；购买力平价法大多高估了发展中国家货币的购买力，低估 了发达国家货币的购买力；只考虑了可贸易品的价格，没有把非贸易品的价格考虑进去。\nB.  忽视购买力平价理论成立的假设前提。即国际间的贸易必须完全自由，所有商品价格均 呈现同幅度变动；物价为影响汇率的唯一因素，影响购买力的因素只有货币数量。然而 在现实条件中，这些假设都难以成立。\n②贸易顺差不等于人民币汇率被低估，人民币汇率并非是导致美国贸易逆差的主要因素。\nA.  中美贸易地位不对等。中国虽有较多贸易收支盈余，但获利很少，长期以来美国在高技 术产品向中国的出口中设置了重重障碍。\nB.   中国对美国贸易顺差绝大部分是加工贸易，而外商投资企业是加工贸易的最大经营主体 并创造这部分顺差，如果以附加值为基础对中国的顺差进行调整，中国对美顺差将大幅 减少。中国的贸易顺差只不过是产业全球化以及中国积极参与国际产业链大趋势下的附 带结果，并不说明人民币汇率被低估。\nC.    美国的统计方法大大高估了对华贸易逆差，美方将通过第三方的中国商品对美转口全部 算作从中国进口，同时又将美国商品通过香港等地对华转口忽略不计。美国进口商品以\n到岸价计算，出口商品以离岸价计算，低估了出口商品价格。此外，美方在统计对华贸 易逆差时只计算了商品贸易，不包括服贸易。\n③2005年汇率改革以来，人民币已经大幅升值。2005年汇改使得人民币汇率逐步走向浮 动，人民币兑美元汇率从2005年的8.2左右升值到2008年的6.8左右，汇改使得人民 币汇率更接近市场水平，缓解了人民币币值存在低估的问题。\n(2)人民币币值低估和人民币升值的主要依据是购买力平价和中国的长期顺差(2014年论 述题答案有详细解读),这两个理论在实际运用时都存在缺陷，指明这两个观点的问题，就 能得到2012年论述题的答案。\n(2)如果增加能力导向，再为答案增色的话，第二问可以结合人民币汇率的变动趋势，然 后说明人民币低估的理由，最后反驳这个观点。但是2012年彼时年份较早，类似的观点当 下较少提及，汇率政策也大不相同，所以答案不再结合当时的人民币汇率走势分析了，仅提 供思路。","knowledge":["国际金融","中国对外经济"]},{"id":"2012_8","year":2012,"num":8,"type":"论述","question":"假设A、B 两国生产技术相同且在短期内不变，生产1单位衣服需要的资本为1单位，需 要的劳动为3单位；生产1单位食品需要的资本为2单位，所需要的劳动为2单位。 A国拥 有240单位劳动和150单位资本； B国拥有180单位劳动和120单位资本。则： (1)哪个国家为资本充裕的国家?哪种产品为劳动密集型产品? (2)假设所有要素都被充分利用，且A 国的劳动与资本的价格分别为5和10,B国劳动与 资本的价格分别为10和4,则A、B 两国最多生产多少衣服和多少食品?两国的衣服和食品 的价格各是多少?","answer":"(1)哪个国家为资本充裕的国家?哪种产品为劳动密集型产品? A 国：K/L=150/240=5/8\nB国：K/L=120/180=2/3>5/8\n2/3>5/8,所以B 国为资本丰裕国家\n衣服生产的资本与劳动投入比例为1/3,食品生产的资本与劳动投入比例为1/1,所以衣服 是劳动密集型产品，食品是资本密集型产品。\n(2)假设所有要素都被充分利用，且A 国的劳动与资本的价格分别为5和10,B 国劳动与 资本的价格分别为10和4,则A、B 两国最多生产多少衣服和多少食品?两国的衣服和食 品的价格各是多少?\n设生产衣服C单位，生产食品F 单位，则C+2F=150+120;3C+2F=240+180, 解得 C=75,F=97.5\nA国衣服的价格=1×10+3×5=25,食品的价格=2×10+2×5=30\nB国衣服的价格等于1×4+3×10=34,食品价格为2×4+2×10=28\n(3)假设两国偏好相同，两国间进行贸易，且衣服与食品的国际交换价格为1((Pc/Pf=1), 哪个国家会出口衣服?哪个国家出口食品?两国从贸易中获取的利益谁会相对稍多一些?\n由 HO 定理，A 国劳动充裕，出口劳动密集型产品衣服，进口食品，B 国出口食品进口 衣服。根据穆勒的相互需求方程式，A 国进出口商品的比价是25/30,B 国进出口商品的比\n价是28/34,国际价格是1/1,开放贸易后， B 国国内价格和国际价格相差更大，福利改善 更明显，B国获益更多。","knowledge":["国际贸易理论"]},{"id":"2012_9","year":2012,"num":9,"type":"案例","question":"LH 公 司 二十世纪末，欧洲LH公司进入了中国市场。LH曾经一度拥有2000多个品牌，是快速 消费品市场的国际性企业。LH的产品包括茶叶，其“Lipton” 袋装红茶全球年销售额达数 十亿美元，进入中国后，LH公司并购了北京茶叶总公司，希望通过公司的国际化品牌包装 能力和袋装红茶的经验，在中国开发推广袋装绿茶。但是，大部分中国人喝的茶不是在超市 买的，而是在茶店买。中国人对绿茶的消费讲究茶艺和原产地。很快，LH公司发现在中国 推广袋装绿茶很困难。","answer":"二十世纪末，欧洲LH公司进入了中国市场。LH曾经一度拥有2000多个品牌，是快速消 费品市场的国际性企业。LH的产品包括茶叶，其“Lipton”袋装红茶全球年销售额达数十亿美 元，进入中国后，LH公司并购了北京茶叶总公司，希望通过公司的国际化品牌包装能力和  袋装红茶的经验，在中国开发推广袋装绿茶。但是，大部分中国人喝的茶不是在超市买的， 而是在茶店买。中国人对绿茶的消费讲究茶艺和原产地。很快，LH公司发现在中国推广袋  装绿茶很困难。\nLH的另一个产品是冰淇淋，它收购了在华南地区很有名气的冰淇凌品牌“蔓登琳”。冰淇淋必 须在冷冻时运输，它的销售渠道也因此变得与众不同。当时蔓登琳在华南地区铺点已经相当 成功，为了节约资金，加速销售网络建设，收购蔓登琳成了拓展市场最快捷的方式。收购之 后 ，LH针对中国冰淇淋消费者对价格的偏好，推出一系列2元低价位的自有品牌冰淇淋，彻 底取代了蔓登琳的市场地位。蔓登琳在完成了渠道网点的转接任务后，逐渐在市场上销声匿 迹，目前LH的冰淇凌己经在全国畅销。根据案例内容回答下列问题：\n(1)跨国公司选择国际目标市场战略时应考虑哪些因素?如何评价LH 在中国的表现?(7\n分 )\n选择目标市场战略应考虑的因素：\n①企业资源。资源雄厚，可以实行差异市场营销；否则，最好实行无差异或集中市场。\n②产品同质性。产品同质性指产品在性能、特点等方面的差异性大小。同质产品实行无差 异营销，异质产品实行差异或集中市场营销。\n③市场同质性。如果市场上所有顾客同一时期偏好相似，购买数量相似，且对市场营销刺 激反应相似，则可视为同质市场，实行无差异市场营销；反之，实行差异或集中市场营 销。\n④产品所处生命周期阶段。导入期和成长期的产品，市场营销重点在启发和巩固消费者偏 好，宜实行无差异或集中市场营销；成熟期产品，可改用差异市场营销战略。\n⑤竞争对手的目标市场涵盖战略。企业所采用的战略可以与竞争对手有所区别。 评价LH中国的表现：\n①  LH公司作为大型国际企业，企业资源实力雄厚，具备实行差异性营销的实力；茶叶、\n冰淇淋等快消产品具有差异性；中国消费者的消费偏好明显不同，市场同质性弱；而快 消品处于产品生命周期的成熟期，产品消费相对稳定；LH公司的竞争对手是中国本土 快消企业和国际快消巨头，考虑到竞争对手的产品有一定竞争能力，LH公司应当体现  差异化；因此，LH适宜在中国采取差异性营销战略或集中性营销战略。\n② 起 初 ，LH在茶叶产品上采用无差异性营销战略，忽略了中国人习惯于在茶点购买绿茶 的消费特点，导致袋装绿茶销售惨淡，说明LH公司在目标市场战略选择存在失误。\n③ LH公司在冰淇淋产品上采取集中性市场营销战略，根据中国消费者对价格的偏好，占 领低价位冰淇淋市场，是正确市场战略选择。\n(2)新产品有哪些类型?评价LH 公司的新产品选择和市场推广战略。(5分) 新产品类型：\n①全新产品：指采用新原理，新技术、新材料，具有新结构、新功能的产品。\n②进型产品：在老产品的基础上改进，改进后的新产品结构更合理功能更齐全能满足消费\n者需要，利于消费者接受。\n③换代新产品：在原有产品基础上部分采用新结构、新材料、新技术制造的，性能有显著 提高的产品。\n④仿制新产品：企业仿制国内外已经研制生产出来的新产品\n⑤市场再定位型新产品：以新的市场或细分市场为目标市场的现有产品 评价LH公司新产品：\n①  LH公司的袋装绿茶在袋装红茶基础上形成，属于改进型新产品。LH的袋装绿茶通过公 司国际化品牌包装和袋装红茶的经验进行推广，但与消费者偏好不符，并没有得到很好 地推广效果\n②低价冰淇淋定位低价市场，属于市场再定位型新产品。LH 的低价冰淇淋借助收购国产 品牌快速打入市场，切合消费者消费偏好，迅速提高了LH自有品牌的市场份额。\n(3) LH公司在中国茶叶和冰淇淋市场上分别来用了怎样的市场策略?(6分) 答案一：\n①  LH在茶叶市场上采取了无差异性营销战略。无差异性营销战略不考虑细分市场的差异 性，对整个市场只提供一种产品，针对消费者的共同需求，依靠大规模分销和大众化广 告。节约生产销售成本，更容易达到规模经济，营销费用低；但产品无吸引力，易被模 仿。 LH推出的袋装绿茶，统一包装，产品完全标准化，满足无差异营销战略的特点。\n②  LH在冰淇淋市场上采取了集中性营销战略。集中性营销战略指企业选择一块小市场来 定位营销。小企业通常采用此种战略行之有效的与大企业竞争；目标市场太小或环境变 化导致市场萎缩是其不利因素。LH 公司自有品牌的冰淇淋瞄准了低价市场，切合了消  费者心理，取得了巨大成功。\n答案二：\n引入4P理论分析LH公司的市场策略\n①产品策略：在茶叶市场上， LH推出的袋装绿茶是改良型产品，产品特性和营销特点都 承自旧产品；在冰淇淋市场上，LH推出的低价冰淇淋产品是再定位新产品，符合中国 市场的特点。\n②定价策略：茶叶市场上，LH 依靠国际化品牌的价值增值，定价较高；而冰淇淋市场上， LH推出的是低价产品，价格较低，更容易被大众接受。\n③  渠道策略：LH的茶叶主要在超市销售，超市作为中间商控制产品的主要渠道；而冰淇 淋产品利用并购“蔓登琳”得到的渠道网络，对渠道有较强掌控力。\n④促销策略：由于茶叶主要在超市销售， LH公司很难进行活动促销；而冰淇淋产品利用 自 有 渠 道 推 广 ， 可 以 加 大 更 强\n(4)公司拥有众多品牌，会面临哪些品牌管理的问题?如何在中国做好品牌管理?(7分) 答案一：\n面临的问题：\n①  消费者的挑战。消费者收入水平提高，消费理念和消费结构发生变化。\n②市场环境的挑战。技术革命导致产品更新换代加速，市场竞争日趋激烈，产品可替代性 增强。\n③企业本身的挑战。产品创新艰难，人才流动性大，企业组织结构面临挑战等。\n④  如何在跨越文化壁垒和满足当地需求间达到平衡；品牌政策的哪些方面可以全球通用， 哪些方面保持机动灵活。\n如何做好品牌管理：\n①打造最优化的管理。 LH公司在中国市场要根据中国市场的特点，优化对于品牌的管理 和运营。\n②提供最优质的产品和服务。产品和服务是品牌得以长盛不衰的根本，LH公司要根据中 国市场的特点，满足中国消费者需求，提供优质的产品和服务，这样才能积累更多的品 牌资产，让品牌长盛不衰。\n③  建立亲密客户关系。 LH 公司要把精力放在如何为特定客户提供所需服务上而不是放在 满足整个市场需求是哪个，要与客户建立稳定、长期的关系。\n答案二：\nLH 公司有2000多个品牌， 采用的品牌管理策略是多品牌策略。众多品牌有助 于企业培植、覆盖市场，降低营销成本，限制对手和有力回应零售商挑战，还能保护核心品 牌。但也面临管理问题：\n①多品牌不利于强化统一的品牌形象。由于品牌众多，消费者缺乏对LH 公司品牌的 统一认知，不利于LH公司扩大品牌影响力。\n②多品牌管理困难，管理成本高。每个品牌都需要巨额、长期的宣传预算，LH 公司 可能不能将有限的资源充分用在每个品牌上，不利于某些潜力强的品牌获得更快的 市场增长。\n③各个品牌之间可能存在竞争，互相侵蚀对方的市场份额，造成资源浪费。\n④随着品牌数量增多，其净市场贡献率呈现边际递减的趋势。\n如何做好品牌管理\n①采取品牌收缩战略，淘汰一些市场表现不佳的小品牌，如逐步废弃“袋装绿茶”品牌， 增加对表现良好的核心品牌投入。\n②采取延伸品牌策略，将成功品牌扩展至具备潜力的新产品，借助成功品牌的影响力 影响新产品，如可以将冰淇淋产品的品牌延伸至其他低价快消品。\n③修正品牌形象，对存在问题的品牌进行更新与再定位，建立 LH 公司的统一品牌， 增强LH公司的品牌识别度、美誉度。\n④强化品牌资产，提供更优质的服务，利用LH公司品牌创造更高的品牌溢价。\n比较典型的并购优势：快速进入市场并直接利用被并购方的设施运营。冰淇淋需要冷冻设施 支持其销售，被并购方的运营和销售渠道都比较完善，通过并购LH 公司能直接获得这些资 产 ， 进 入 华 南 地 区 的 冰 淇 淋 市 场 。","knowledge":["跨国公司与国际化","国际商务管理"]},{"id":"2012_10","year":2012,"num":10,"type":"案例","question":"赞比亚投资 赞比亚商业、贸易与工业部长Felix Mutati 于2010年9日宣布，赞比亚最大的能源公 司Zesco 将与中国水利水电建设集团公司合作开发15亿美元的发电站项目。赞比亚亟需资 金，中国企业对其大规模投资非常重要。 赞比亚国民经济对矿产资源(主要是铜矿资源)的依赖度高达55%。二十世纪60年代， 中国政府无偿援助修建了坦赞铁路，使赞比亚的铜矿石不用经过不友好国家而可直接出口。 中国企业在赞比亚的活动主要集中在铜产业，中国投资占赞比亚全国总投资额的20%。2006 年胡锦涛主席与赞比亚总统 Levy Mwanawasa签订90亿美元合作协议以后，十三家中国大型 国有企业在赞比亚建立了第一个经济特区，主要从事铜矿加工，雇佣了6000本地员工及150 中国员工。 Felix Mutati 部长盛赞中国企业，称其将大部分利润进行赞比亚当地再投资， 促进了就业；经济特区使一部分人先富起采，扩大了内需，带动了建筑业和旅游业的发展； 帮助赞比亚建立铜深加工产业，有助于赞比亚摆脱对资源出口的严重依赖，降低国际市场波 动的风险，实现经济平衡发展。但是，西方国家对于中国企业在非洲经营的非议颇多，如“新 殖民主义论”、“就业挤出论”等。中国大型国有企业在赞比亚的经营面临新考验。","answer":"赞比亚商业、贸易与工业部长Felix Mutati于2010年9日宣布，赞比亚最大的能源公司\nZesco将与中国水利水电建设集团公司合作开发15亿美元的发电站项目。赞比亚亟需资金， 中国企业对其大规模投资非常重要。\n赞比亚国民经济对矿产资源(主要是铜矿资源)的依赖度高达55%。二十世纪60年代， 中国政府无偿援助修建了坦赞铁路，使赞比亚的铜矿石不用经过不友好国家而可直接出口。 中国企业在赞比亚的活动主要集中在铜产业，中国投资占赞比亚全国总投资额的20%。2006 年胡锦涛主席与赞比亚总统Levy Mwanawasa签订90亿美元合作协议以后，十三家中国大型 国有企业在赞比亚建立了第一个经济特区，主要从事铜矿加工，雇佣了6000本地员工及150 中国员工。 Felix Mutati部长盛赞中国企业，称其将大部分利润进行赞比亚当地再投资，促 进了就业；经济特区使一部分人先富起采，扩大了内需，带动了建筑业和旅游业的发展；帮 助赞比亚建立铜深加工产业，有助于赞比亚摆脱对资源出口的严重依赖，降低国际市场波动 的风险，实现经济平衡发展。但是，西方国家对于中国企业在非洲经营的非议颇多，如“新 殖民主义论”、“就业挤出论”等。中国大型国有企业在赞比亚的经营面临新考验。根据案例 内容回答下列问题：\n(1)在 PEST 框架内，对中国资源能源型国有企业在赞比亚投资环境进行分析。(12分)\nPEST分析是指宏观环境的分析，P是政治(politics),E是经济(economy),是社会(society) T是技术( technology), 在分析一个企业所处的背景的时候，通常是通过这四个因素来进行 分析企业所面临的状况。\n①政治环境：主要包括政治制度与体制，政局，政府的态度等。法律方面主要包括政府制 定的法律、法规赞比亚政府与中国政府签订多项协议。\nA.   中国和赞比亚双边关系良好：2006年领导人互访并签订了经济合作协议；合作历 史悠久，曾援助修建坦赞铁路。\nB.   政府采取友好的投资政策：建立经济特区，吸引外资；经济部门欢迎中国企业，给 中国企业许多优惠政策。\nC. 赞比亚作为转轨国家，未来可能面临政策变动，给中国企业带来不确定性。\n赞比亚政府层面，也表现出赞比亚政府对中国企业的重视。但是西方国家对中国企业在 非洲经营的非议，易在赞比亚引起不利于企业经营的舆论，是潜在的风险。\n②经济环境：包括GDP、利率水平、财政货币政策、通货膨胀、失业率水平、居民可支配 收入水平、汇率、能源供给成本、市场机制、市场需求等等。\nA.   自然资源：赞比亚矿产资源丰富，中国的能源资源企业能够用更低的成本获取矿产 资源。\nB.    劳动力成本低廉，适宜发展初等加工行业；但劳动力素质不高，生产效率低。\nC.   消费市场：人均可支配收入少，国内市场规模有限。\nD.  基础设施：交通设施良好，矿产可通过铁路对外出口。\nE.    产业协同：建筑业、旅游业等行业与采矿业相互促进。\nF.    市场体制：市场不完善，交易风险高；金融市场不完善，汇率利率波动频繁。\n③社会环境：其中影响最大的是人口环境和文化背景。而人口环境主要包括人口规模、年 龄结构、人口分布、种族结构以及收入分布等因素。\nA.   文化差异：赞比亚文化与中国文化差别较大，风俗习惯的不同，造成跨文化管理困 难。\nB.    意识形态：西方国家宣扬“新殖民主义论”、“就业挤出论”威胁中国企业的舆论环境。\n④  技术环境：不仅包括发明，而且还包括与企业市场有关的新技术、新工艺、新材料的出\n现和发展趋势以及应用背景。\nA.   技术兼容困难：赞比亚资源矿产开发环境和中国国内大为不同，中国企业技术的跨 国使用面临挑战。\nB.   技术水平与进步：赞比亚技术实力弱，对中国能源资源企业产品技术的提高基本没 有 帮 助 。\n(2)在PEST分析基础上讨论中国资源能源型国有企业在赞比亚投资的战略。(13分) 答案一：\n①国际投资动机选择：\nA.   中国资源型国有企业在赞比亚的投资主要资源导向型战略，投资的主要目的是获得 赞比亚的矿产资源。\nB.   随着赞比亚的经济增长和资源开发，中国企业对服务业、建筑业的投资会增加，这 种投资属于市场导向型。\n②  国际投资与贸易关系：\nA.   中国资源能源国有企业在赞比亚的投资属于垂直型投资，即在赞比亚的生产经营与 国有企业在国内生产分属于不同的工序，处于价值链的不同环节。\nB.   中国国有企业对赞比亚的投资会产生与贸易的互补效应，产生赞比亚对中国和其他 国家的矿产资源出口。\n③  国际投资的规模与时机选择：\nA.   中国能源资源国有企业的投资选择了大规模进入和先入者进入的方式，中国投资占 赞比亚全国总投资额的20%,呈现极强的规模化特点。\nB.   大规模进入能够增强在赞比亚市场的竞争力，使得政府相信中国企业对在当地投资 有着长期的兴趣，增强中外合作的互信关系；能够扩大市场占用率，形成对他国投 资者更强的规模优势。\nC.   大规模进入的风险较高，由于大规模进入需要投入的资金量大，缺乏灵活性，如果 项目出现延误，则可能产生较大投资风险。\n④国际投资的方式选择：\nA.   中国能源资源国有企业采取了契约式合营和合资经营的方式。\nB.    赞比亚能源公司与中国水利水电建设集团公司合作开发的发电站项目，属于契约式 合作经营，双方根据项目合同承担责任并履行义务。这种方式以合同为基础，风险 较投资成立子公司较小，能充分利用中国能源资源企业的技术能力。\nC.   中国国有能源资源企业在经济特区成立子公司，与东道国合营，属于合资经营的方 式。能源资源往往受到东道国的管控，合资经营在政治上是唯一可行的方式，还能 和赞比亚合作方学习当地经营的经验。\n⑤ 国 际 投 资 的 战 略 选 择 ：\nA.   中国能源资源企业在赞比亚的投资采取了国际战略和多国战略结合的方式。\nB.  中国企业帮助赞比亚开发矿产资源，为当地转让缺少的技能和产品，属于国际战略； 能够帮助中国能源资源企业节约大量成本支出。\nC.  然而，国际战略缺乏地区调试能力，随着中国企业在赞比亚面临的本土化压力增大， 中国企业需要雇佣更多的当地员工和管理者，在国际战略的基础上增加本土化元素。\n⑥  国际投资的组织选择\nA.   中国能源资源企业对赞投资更多采取国际业务部结构，在赞比亚的经营管理由国有 企业母公司统筹，较为简单直接，效率较高，但外派人员缺乏权力自主性，对赞比 亚的经营决策反应力不足。\nB.    未来可考虑设置非洲代表处或地区分部，使得公司资源更多向赞比亚倾斜。\n⑦国际投资的效果\nA.  东道国效应：中国能源资源企业对赞比亚投资，为赞比亚提供了经济发展所需的技 术、资金，有助于赞比亚经济增长；创造了大量就业机会；同时，矿产资源的出口\n改善了赞比亚的国际收支。\nB.  母国效应：中国能源资源企业对赞比亚投资，最初会造成资本项目的流出，但长期 看来，能够促进国内传统行业的调整；同时在赞当地获得经营利润后汇回中 国，反而能改善资本和金融项目国际收支。\n⑧国际投资的风险\nA.    由于能源资源的特殊性，地缘政治色彩浓厚，赞比亚政府会长期对能源资源开发施 加所有权限制和运作限制，甚至不排除未来会发生强制技术转让问题。\nB.    赞比亚希望中国企业把利润留在当地而不是汇回中国，对可能采取汇回限制。\n答案二：圣才教育《国际商务434考研笔记》\n①按投资战略的规模特征分类，该投资属于发展型投资战略。发展型投资战略是企业在现 有水平上向高一级近进的战略，在国民经济高速发展的时期及企业经营状况良好的情况 下，推行这一战略会收到良好的效果。这一战略的特点是增加对企业设备、原材料，人 力资源等的投资，以扩大企业生产规模，提高产品市场占有率中国能源资源企业投资赞 比亚的铜产业，增加了对设备、材料等的投入，扩大了企业规模，有利于提高产品市场 占有率。\n②  按投资战略的投向特征分类，该投资属于专业化投资战略。该投资战略是指企业长期将 资金投放于某一特定生产经营领域或特定产品和业务项目上，投资的增加通常只是引起 经营规模和市场规模的扩大，而不会引起经营结构和市场结构的改变，企业采取这种投 资战略的基本目的多是为了追逐高额利润中国能源资源企业特定地投资于赞比亚的铜 产业，专注于能源资源产业的投资。\n③按投资战略所需要的资金密度分类，该投资属于资金密集型投资战略。该战略是指在长 时期内，企业确定的投资方向需要投入大量的资金，这些投资方向的实际运行主要依靠 资产的运用来实现，铜产业的投资需要大量的资金来购买设备和原材料，属于资金密集 型投资。","knowledge":["综合"]},{"id":"2013_1","year":2013,"num":1,"type":"简答","question":"简述厂商垄断优势理论的内容。该理论为什么适用于发达国家，而不适用于发展中国家?","answer":"厂商垄断优势理论（Monopolistic Advantage Theory）由海默（Hymer）提出，后经金德尔伯格（Kindleberger）发展，核心观点是：跨国公司进行对外直接投资是因为其拥有某种垄断优势，这些优势足以抵消在东道国经营的不利条件。\n\n垄断优势主要包括：\n① 技术优势（产品差异化、专利、专有技术）\n② 规模经济优势（生产和研发的规模效应）\n③ 管理优势（先进的组织和管理能力）\n④ 资本和融资优势（更容易获得低成本融资）\n⑤ 原材料控制优势\n\n该理论适用于发达国家而非发展中国家的原因：\n① 发达国家企业拥有更多核心技术、品牌和研发能力，具备垄断优势积累。\n② 发达国家市场制度完善，企业有更强的组织管理能力和融资渠道。\n③ 发展中国家企业大多缺乏核心技术，以劳动密集型为主，不具有对外投资的垄断优势。\n④ 垄断优势是FDI的前提条件，缺乏垄断优势的发展中国家企业难以在海外与东道国企业竞争。","knowledge":["国际贸易理论"]},{"id":"2013_2","year":2013,"num":2,"type":"简答","question":"XX 年 X 月 X 日，在某著名外汇市场上，E1=$1.4761/4;£1=$1.9733/77; 那么英镑 兑欧元的套算汇率是多少(不考虑汇兑成本)?若某交易商给出的报价(平均价)为 f1=E1.3395, 上下浮动2个点，那么该汇率与上述汇率是否构成三角套汇?","answer":"(2)三角套汇最终有三种情形：①连乘积等于1,不存在套汇机会；②连乘积大于1,从前 往后套汇；③连乘积小于1,从后往前套汇。本题是情形①,补充两道情形②和③的试题， 选自马君潞《国际金融》。\n(3)2013年三角套汇考在简答，属于特殊情况。未来更有可能是计算题出现。\n(1)求中间价，EUR/USD=0.7,USD/GBP=1.603,EUR/GBP=1.140。\n(2)转化为同一标价法， GBP/USD=1/1.603,USD/EUR=1/0.7\n(3)连乘可得1/1.603×1/0.7×1. 1400=1.0159>1,存在套汇机会。套汇操作如下：\n① 在 伦 敦 把 1 0 0W 英镑兑换为美元，汇价为银行英镑买入价，得到62.3053w 美元；\n②在纽约市场把美元换成欧元，汇价为银行美元买入价，得到88.7540w 欧元；\n③  在法兰克福把欧元换回英镑，汇价银行欧元买入价，得到101.0021w 英镑。\n(4)套汇收益10021英镑\n【法兰克福，EUR/JPY=139.05/139.10;     纽约，USD/JPY=104.65/70; 伦敦，EUR/USD=1.3245/50\n如果你有100w 美元，如何套利，结果是多少?】\n(1)转化为同一标价法，法兰克福， JPY/EUR=(1/139.1)/(1/139.05) USD/JPY×JPY/EUR×EUR/USD=0.9965<1\n(2)汇率连乘积小于1,构成三角套汇，套汇方法：\n①  在伦敦市场将美元换成欧元，此时银行报美元买入价EUR/USD=1.3250,    得到 100W/1.3250=75.4717W欧元。\n②     在法兰克福将欧元换成日元，此时银行报欧元买入价 EUR/JPY=139.05,  得到","knowledge":["国际金融"]},{"id":"2013_3","year":2013,"num":3,"type":"简答","question":"简述品牌与产品的关系、品牌与商标的关系。","answer":"(1)品牌的含义\n品牌是一种名称、术语、标志、符号、设计，或者是组合运用，用于辨别某个厂商的产 品或服务，并使之与竞争对手的产品或服务区分开来。品牌包括：①单一品牌；②标准品牌；\n③集合品牌；④延伸品牌。\n(2)品牌与产品的关系\n①产品是有形的，而品牌是无形的；\n②产品是工厂生产的东西，品牌是消费者所购买的东西；\n③产品可以被竞争者模仿，但品牌则是独一无二的；\n④产品极易迅速过时落伍，但成功的品牌却能持久不衰，品牌的价值将长期影响企业。\n(3)品牌与商标的关系\n①  联系：品牌必须使用而无须注册，品牌一经注册即成为商标；商标只有注册后方可受法  律保护并享有商标专用权，注册而不使用的商标不是品牌，品牌比商标有更宽泛的外延。\n②  区别：商标和品牌实际上是一个问题的两个方面。品牌是个市场概念，商标是个法律概 念；品牌不是天生就有的，品牌是营销出来的。","knowledge":["国际商务管理"]},{"id":"2013_4","year":2013,"num":4,"type":"简答","question":"简述国际收支调节的弹性法的主要内容、意义和缺陷。","answer":"罗宾逊、勒纳基于供求弹性局部均衡分析，提出弹性分析法，认为满足马歇尔勒那条件 的前提下，贬值可增加出口，改善国际收支。\n(1)假设前提\n①经济处于充分就业，国民收入不变，进出口供给弹性具有完全弹性。\n②将商品和劳务贸易收支等同于国际收支，忽略资本和金融项目的影响。\n③汇率变动是影响国际收支的唯一因素，即不考虑贬值造成的国内物价变动、不考虑总收 入和总支出变动、不考虑货币供给变化。\n④本币贬值不会造成他国的报复。\n(2)主要内容\n①弹性法认为，在符合马歇尔-勒纳条件前提下，当国际收支出现逆差，本币贬值，出口 商品相对价格下降，进口商品相对价格上升，出口增加，进口减少，国际收支改善。\n②马歇尔勒纳条件 ( ML Condition): 进出口供给弹性无穷大的情况下，一国进出口需求 弹性之和的绝对值大于1,此时贬值可改善国际收支。公式为：|dx+dMl>1,(S=SM=∞)   dm、dx 为进出口需求弹性，Su、Sx为进口、出口供给弹性。\n③货币贬值存在时滞效应——“〕曲线”效应\nJ曲线效应指一国货币贬值后，最初会使得国际收支状况进一步恶化，只有经过一段时 间以后，才会使贸易收入增加，改善国际收支。产生J 曲线效应的原因是：\nA.     从进口方面来看，存在进口惯性。进口合同都是事先签订的，且存在进口替代滞后， 只有找到替代产品后才能减少进口。\nB.    从出口方面来看，存在出口增加时滞。扩大出口存在生产滞后；同时还存在寻求市  场等因素。出口价格降低但出口数量却未同步增加，导致总的外汇收入反而降低。\n(3)意义\n①  弹性法正确指出了只有在一定进出口供求价格弹性的条件下，货币贬值才有改善贸易收 支的作用。\n②  以汇率贬值改善国际收支的观点适合了当时西方国家指定政策的需要，并在许多国家调 节国际收支取得了一定效果。\n③  是国际收支调节的重要理论，至今仍有科学价值。\n(4)缺陷：\n①  受制于时代局限，弹性法提出时尚未建立宏观经济学体系，因此，弹性法仅停留在局部 均衡分析层面，忽视了汇率变化对社会总收入和总支出影响。\n②  弹性法将国际收支等同于贸易收支，不考虑汇率对资本和金融项目的影响，不符合实际。\n③  弹性法忽视对物价的考虑，认为本币贬值不改变国内价格，这种假定不合理，因为贬值 会导致国内物价上涨、生产成本提高，出口竞争力会下降。\n④  弹性法要求ML 条件成立，但现实中不一定满足，且充分就业和出口供给弹性无穷大存 在矛盾。\n⑤ 【选答】如果各国竞相贬值，最终会引发“以邻为壑”贸易冲突，破坏国际经济秩序。\n(2)《国际商务》教材里弹性法写得整体尚可，没有问题——只是理论评价里面缺点组织得 不太好不够全面，所以调整了一些表述。\n(3)注意弹性法、吸收法和货币法的相互比较，经院复试曾出现过，所以不排除初试出到 的可能——可能性不高，但如果考到了则是比较难的题目。\n① 弹性法和吸收法都是BOP 调节理论，都没有考虑资本和金融账户，将贸易收支当成全部 国际收支。\n②  吸收法从总支出与总需求的相对关系中来考察国际收支失衡的原因及调节政策；弹性法 从相对价格关系来入手分析国际收支失衡的原因及调节政策。\n③  吸收法建立在凯恩斯宏观经济学基础之上，采取一般均衡分析法；弹性法建立在马歇尔 等人的微观经济学基础之上，采取局部均衡分析法。\n④就货币贬值的效应来讲：吸收法从贬值对国民收入和国内吸收的相对影响中考察贬值对 国际收支的影响；弹性法从价格与需求的相对关系中来考察贬值对国际收支的影响。\n【李坤望《国际经济学》:比较吸收法和货币法】\n①  吸收法和货币法不是对立的，而是互为补充，是一个问题的两个方面；\n②吸收法只考虑贸易收支，货币法考虑贸易和金融收支；\n③  吸收法的理论基础是宏观经济学一般均衡，货币法的理论基础是货币主义；\n④  吸收法认为国际收支失衡的实质是总支出与总收入不平衡，货币法认为国际收支失衡的\n实质是货币总供给与总需求的失衡；\n⑤吸收法重点分析了贬值对物价的影响，货币法缺乏对物价因素的考虑，认为国际收支是 货 币 现 象 。","knowledge":["国际金融"]},{"id":"2013_5","year":2013,"num":5,"type":"简答","question":"试比较以解释产业内贸易现象为主的新贸易理论和传统国际贸易理论的异同。","answer":"(1)含义\n①传统贸易理论主要包括亚当斯密的绝对优势论、李嘉图的比较优势论和赫克歇尔-俄林 的要素禀赋理论，假设前提完全竞争市场，认为国际贸易的动机是绝对优势、比较优势 或要素禀赋差异。\n②  新国际贸易理论指产业内贸易理论和动态贸易理论。林德从需求收入角度指出经济发展 水平相同的国家间具有重叠需求，更容易发生产业内贸易。克鲁格曼等人以不完全竞争 基础，认为规模经济和产品差异是国际贸易的原因，用以解释产业内贸易现象。波斯纳 的技术差距论和弗农的产品生命周期理论从技术进步的角度解释了国际贸易动态变化。\n(2)相同点\n①新贸易理论和传统国际贸易理论都承认贸易的互利性，解释了国际贸易发生的动机。\n②新贸易理论和传统贸易理论都没有考虑公司内贸易的维度。\n(3)不同点\n①贸易格局不同：\n传统贸易理论解释不同种产品之间的贸易即产业间贸易，以及发展中国家和发达国家之 间的垂直分工模式；新贸易理论解释的是重叠贸易即产业内贸易，以及经济发展水平相近的 发达国家之间的水平分工模式。\n②假设前提不同：\nA.   传统贸易理论基于完全竞争市场结构，认为完全竞争市场是最有效率的市场；新贸易理 论基于不完全竞争市场结构，认为商品价格偏离成本，不能如实反映一国的比较成本优 势和劣势，从而引起贸易福利的不均衡分配；\nB.    传统贸易理论假定规模报酬不变，而新贸易理论认为规模经济是贸易的利益来源；\nC.    传统贸易理论假定产品同质，而新贸易理论假定产品具有水平或垂直差异性；\nD.   传统贸易理论仅从生产角度研究贸易动机，而新贸易理论从需求角度考虑，认为需求偏 好相似也会产生贸易。\n③政策取向不同：\n传统贸易理论认为贸易对各个国家都有利，倾向于自由贸易政策；新贸易理论认为贸易 福利的分配时不均衡，采取保护政策也是取向之一。\n④  贸易福利不同：\n传统贸易认为贸易利益来源于专业化生产效率的提高；新贸易理论认为，规模经济引起 产品价格降低以及产品种类的增加也是贸易利益来源。\n⑤静态与动态差别：\n传统贸易理论认为不存在技术进步，是静态理论；技术差距论和产品生命周期理论考虑 了技术进步因素，是动态理论。","knowledge":["国际贸易理论"]},{"id":"2013_6","year":2013,"num":6,"type":"论述","question":"假定本国与外国均生产和消费以下四种产品，每种产品的单位劳动投入如下： (1)外国在哪种产品上拥有绝对优势? (2)本国在哪种产品上拥有最大的比较优势?在哪种产品上生产优势最低? (3)假如外国工资是本国工资的8倍，本国将生产哪些产品?外国将生产哪些产品? (4)说明专业化生产及由此产生的贸易是怎样使两国获益的? (5)假如外国工资变成本国工资的6 倍，专业化模式与贸易模式是否会改变?新的模式是 怎样的?","answer":"(1)  外国在哪种产品上拥有绝对优势?\n本国的A、B、C、D 的劳动投入均高于外国，四种产品外国均处于绝对优势，本国绝对劣势。\n(2)   本国在哪种产品上拥有最大的比较优势?在哪种产品上生产优势最低?\n①机会成本法：\n本国B、C、D的机会成本分别为1.5、2、2.5,外国B、C、D 机会成本为2、4、15,本国  D 的机会成本优势相对于外国最明显，所以 D 比较优势最大。同理，A 的生产劣势最明显。\n② 【推荐】相对劳动生产率法，记劳动生产率为a, 本国为1,外国为2,产品分别为\nA、B、C、D。\na₁A/a₂=(1/12)/1=1/12\na₁₆/az=(1/18)/(1/2)=1/9\naic/a2c=(1/24)/(1/4)=1/6 a₁o/a₂=(1/30)/(1/15)=1/2\n由此可见，本国在生产D 产品上相对劳动生产率最高，而在生产A 产品上小队劳动生产率 最低，故本国生产 D 的比较优势最大，A 的劣势最明显。\n(4)  说明专业化生产及由此产生的贸易是怎样使两国获益的?\n对本国而言生产1单位A 产品要投入劳动12单位，而外国仅需1单位，即使考虑外国 工资是本国工资的8倍，进口外国生产的A 产品仅需8单位的投入，节约了4单位。反之 对外国而言，生产1单位C产品需投入4单位劳动，考虑8倍工资则是32单位的投入，而 本国生产则是24单位，外国进口1单位C节约了8单位。\n总之，贸易使得进口产品的成本变低，国际贸易使本国和外国都获益。\n(5)  假如外国工资变成本国工资的6倍，专业化模式与贸易模式是否会改变?新的模式 是怎样的?\n方法一：多恩布什-费雪-萨缪尔森模型\n承第(2)与(3)问，外国工资变成本国工资的6倍， W₁W₂=1/6\na₁p/a₂b>W₁/W₂>ag/a₂B>a₁/a₂A a1c/ a2c = W₁/W₂\n贸易模式发生改变。本国会出口D 产品，进口A、B产品。反之，外国进口D 产品而出口A、 B产品。本国与外国都不具备出口C的成本动机。\n方法二：\n产品A的成本比例=(6×1)/(1×12)=1/2<1 产品B的成本比例=(6×2)/(1×18)=2/3<1 产品C的成本比例=(6×4)/(1×24)=1\n产品D 的成本比例=(6×15)/(1×30)=3>1\n因此外国将生产A、B, 本国生产D;C  的生产国家不确定，两国皆可生产。专业化模式与 贸易模式可能发生改变。\n(2)两个国家多种商品模型是用相对劳动生产率和相对工资比较，生产X 产品的相对劳动 生产率高于相对工资则出口。多个国家两种商品的结论是相对成本和世界相对价格比较 ( P1/P2),  进而判断哪些国家出口1,哪些国家出口2。以下附一道两种商品多个国家的计 算题，是本题的变形版，需要掌握。\n已知国际市场均衡的大米相对价格为2,各国贸易模式如何?如果国际市场大米相对价格上 升至3 .5呢?\n美、法、中、泰四国的大米相对价格为：\nCu/Cu₂=2/0.5=4;CF:₂/CF₂=5/2=2.5;Cc₁/Cc₂=9/3=3;Cr₁/Cr₂=6/6=1 当P₁/P₂=2;Cu₁/Cu₂>Cc₁/Cc₂>CF₁/CF₂>P₁/P₂>Cr₁/CT₂\n即美中法三国生产大米的相对成本高于世界市场，而泰国低于世界市场。泰国出口大米，美 中法三国进口大米而出口小麦。\n当 P₁/P₂=2;Cu₁/Cu₂>P₁/P₂>Cc₁/Cc₂>Cr₁/CF₂>Cr₁/Cr₂\n此时，美国进口大米，出口小麦；中法泰三国出口大米而进口小麦。\n总结：这两题提示我们要看懂国际经济学基本公式，李嘉图模型的扩展本身不难，除了极少 数题目需要微观均衡基础，大部分从简单公式推导就能得到。","knowledge":["国际贸易理论"]},{"id":"2013_7","year":2013,"num":7,"type":"论述","question":"试从贸易保护的政治经济学角度，评析目前各种贸易保护政策盛行的原因。","answer":"经济学家中高度一致的论点就是所有国家都从自由贸易中获益，然而现实中贸易保护盛 行才是常态。2008年以来，整个世界表现为贸易保护
