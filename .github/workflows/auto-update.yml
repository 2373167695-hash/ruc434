name: 爬取原始数据（仅供AI质检后部署）

on:
  schedule:
    - cron: '0 2 * * 1'       # 每周一 UTC 2:00 = 北京时间 10:00（与AI质检错开）
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install akshare requests beautifulsoup4
        timeout-minutes: 5

      - name: 爬取宏观数据
        run: python scripts/fetch_macro.py
        timeout-minutes: 5

      - name: 爬取热点数据
        run: python scripts/fetch_hotspots.py
        continue-on-error: true
        timeout-minutes: 5

      - name: 提交原始数据
        run: |
          git config user.name "r434-crawler"
          git config user.email "crawler@r434.pages.dev"
          git add data/macro_data.json data/hotspots_raw.json
          if git diff --staged --quiet; then
            echo "无数据变更"
          else
            git commit -m "crawl: 原始数据采集 [$(date +%Y-%m-%d)]"
            git push
            echo "原始数据已推送，等待AI质检"
          fi
